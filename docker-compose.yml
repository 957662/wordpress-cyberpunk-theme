version: '3.8'

services:
  # WordPress Backend
  wordpress:
    image: wordpress:latest
    container_name: cyberpress-wordpress
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: cyberpress_db
    volumes:
      - wordpress_data:/var/www/html
      - ./docker/wp-content:/var/www/html/wp-content
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - cyberpress_network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: cyberpress-mysql
    environment:
      MYSQL_DATABASE: cyberpress_db
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - cyberpress_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyberpress-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_WP_API_URL: http://wordpress:80/wp-json
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      - wordpress
    restart: unless-stopped
    networks:
      - cyberpress_network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: cyberpress-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - wordpress
    restart: unless-stopped
    networks:
      - cyberpress_network

  # Redis Cache (Optional)
  redis:
    image: redis:alpine
    container_name: cyberpress-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - cyberpress_network

volumes:
  wordpress_data:
  mysql_data:
  redis_data:

networks:
  cyberpress_network:
    driver: bridge
