<svg width="300" height="80" viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cyber Circuit Icon -->
  <g transform="translate(10, 10)">
    <!-- Outer hexagon frame -->
    <path d="M30 0 L60 17.32 L60 51.96 L30 69.28 L0 51.96 L0 17.32 Z"
          stroke="url(#iconGradient)"
          stroke-width="2"
          fill="none"
          filter="url(#glow)"/>

    <!-- Inner tech pattern -->
    <circle cx="30" cy="34.64" r="15"
            stroke="#00f0ff"
            stroke-width="1.5"
            fill="none"
            opacity="0.8"/>
    <circle cx="30" cy="34.64" r="8"
            fill="#9d00ff"
            opacity="0.6"
            filter="url(#glow)"/>

    <!-- Circuit lines -->
    <path d="M0 17.32 L15 17.32 L20 25"
          stroke="#00f0ff"
          stroke-width="1"
          fill="none"
          opacity="0.6"/>
    <path d="M60 51.96 L45 51.96 L40 43"
          stroke="#ff0080"
          stroke-width="1"
          fill="none"
          opacity="0.6"/>
    <path d="M30 0 L30 10"
          stroke="#f0ff00"
          stroke-width="1"
          opacity="0.6"/>

    <!-- Tech dots -->
    <circle cx="30" cy="34.64" r="2" fill="#00f0ff" filter="url(#glow)"/>
    <circle cx="15" cy="17.32" r="1.5" fill="#ff0080"/>
    <circle cx="45" cy="51.96" r="1.5" fill="#9d00ff"/>
  </g>

  <!-- Text -->
  <text x="90" y="48"
        font-family="'Orbitron', 'Arial Black', sans-serif"
        font-size="36"
        font-weight="bold"
        fill="url(#textGradient)"
        filter="url(#glow)">
    CYBER
  </text>
  <text x="90" y="70"
        font-family="'Orbitron', sans-serif"
        font-size="14"
        font-weight="normal"
        fill="#00f0ff"
        opacity="0.8"
        letter-spacing="8">
    PRESS
  </text>
</svg>