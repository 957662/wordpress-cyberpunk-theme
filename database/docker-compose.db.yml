version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cyberpress-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cyberpress_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cyberpress_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberpress_network

  # pgAdmin (Optional - Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cyberpress-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@cyberpress.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - cyberpress_network
    profiles:
      - with-pgadmin

  # PostgreSQL Backup Service
  postgres-backup:
    image: postgres:15-alpine
    container_name: cyberpress-postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cyberpress_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      BACKUP_SCHEDULE: "${BACKUP_SCHEDULE:-0 2 * * *}"
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
      - ./scripts/backup-database.sh:/backup.sh:ro
    depends_on:
      - postgres
    networks:
      - cyberpress_network
    command: >
      sh -c "
        chmod +x /backup.sh &&
        echo 'Installing cron...' &&
        apk add --no-cache dcron &&
        echo '${BACKUP_SCHEDULE:-0 2 * * *} /backup.sh full >> /var/log/backup.log 2>&1' > /etc/crontabs/root &&
        echo 'Starting cron daemon...' &&
        crond -f -l 2
      "
    profiles:
      - with-backup

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  cyberpress_network:
    driver: bridge
