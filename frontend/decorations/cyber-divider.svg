<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" width="400" height="20">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="dividerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="dividerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 主分割线 -->
  <line
    x1="20"
    y1="10"
    x2="180"
    y2="10"
    stroke="url(#dividerGradient)"
    stroke-width="1"
    filter="url(#dividerGlow)"
  />

  <line
    x1="220"
    y1="10"
    x2="380"
    y2="10"
    stroke="url(#dividerGradient)"
    stroke-width="1"
    filter="url(#dividerGlow)"
  />

  <!-- 中心装饰 -->
  <circle cx="200" cy="10" r="3" fill="#00f0ff" filter="url(#dividerGlow)" />
  <circle cx="200" cy="10" r="5" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5" filter="url(#dividerGlow)" />

  <!-- 科技装饰点 -->
  <circle cx="150" cy="10" r="1.5" fill="#00f0ff" opacity="0.6" />
  <circle cx="250" cy="10" r="1.5" fill="#00f0ff" opacity="0.6" />
  <circle cx="120" cy="10" r="1" fill="#00f0ff" opacity="0.4" />
  <circle cx="280" cy="10" r="1" fill="#00f0ff" opacity="0.4" />

  <!-- 电路纹样 -->
  <rect x="175" y="9" width="5" height="2" fill="#00f0ff" opacity="0.3" />
  <rect x="220" y="9" width="5" height="2" fill="#00f0ff" opacity="0.3" />
</svg>
