<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- 霓虹渐变 -->
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="circuitGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 数据流动画 -->
    <style>
      .data-pulse {
        animation: dataPulse 2s ease-in-out infinite;
      }
      @keyframes dataPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      .node-glow {
        animation: nodeGlow 1.5s ease-in-out infinite alternate;
      }
      @keyframes nodeGlow {
        0% { filter: url(#circuitGlow); }
        100% { filter: brightness(1.5); }
      }
    </style>
  </defs>

  <!-- 电路线路 -->
  <g stroke="url(#circuitGradient)" stroke-width="1.5" fill="none" filter="url(#circuitGlow)">
    <!-- 主线路 -->
    <path d="M20 60 L60 60 L80 40 L100 40" />
    <path d="M20 60 L40 80 L100 80" />
    <path d="M60 60 L60 100" />
  </g>

  <!-- 电路节点 -->
  <g class="node-glow">
    <!-- 中心大节点 -->
    <circle cx="60" cy="60" r="8" fill="#00f0ff" filter="url(#circuitGlow)" />
    <circle cx="60" cy="60" r="12" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5" />

    <!-- 周围节点 -->
    <circle cx="20" cy="60" r="5" fill="#9d00ff" filter="url(#circuitGlow)" />
    <circle cx="80" cy="40" r="4" fill="#9d00ff" filter="url(#circuitGlow)" />
    <circle cx="100" cy="40" r="3" fill="#00f0ff" class="data-pulse" />
    <circle cx="40" cy="80" r="4" fill="#9d00ff" filter="url(#circuitGlow)" />
    <circle cx="100" cy="80" r="3" fill="#00f0ff" class="data-pulse" style="animation-delay: 0.5s" />
    <circle cx="60" cy="100" r="3" fill="#00f0ff" class="data-pulse" style="animation-delay: 1s" />
  </g>

  <!-- 数据流动点 -->
  <g class="data-pulse">
    <circle cx="40" cy="60" r="2" fill="#00f0ff" />
    <circle cx="70" cy="50" r="2" fill="#9d00ff" style="animation-delay: 0.3s" />
    <circle cx="30" cy="70" r="2" fill="#9d00ff" style="animation-delay: 0.6s" />
    <circle cx="60" cy="80" r="2" fill="#00f0ff" style="animation-delay: 0.9s" />
  </g>

  <!-- 电路纹理 -->
  <g opacity="0.3">
    <rect x="18" y="58" width="4" height="4" fill="#00f0ff" />
    <rect x="58" y="18" width="4" height="4" fill="#00f0ff" />
    <rect x="98" y="38" width="4" height="4" fill="#00f0ff" />
    <rect x="38" y="78" width="4" height="4" fill="#00f0ff" />
    <rect x="98" y="78" width="4" height="4" fill="#00f0ff" />
  </g>
</svg>
