<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <!-- 全息渐变 -->
    <linearGradient id="hologramGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0.4" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="hologramGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 扫描线动画 -->
    <style>
      .scanline {
        animation: scan 3s linear infinite;
      }
      @keyframes scan {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      .flicker {
        animation: flicker 0.5s ease-in-out infinite alternate;
      }
      @keyframes flicker {
        0% { opacity: 0.8; }
        100% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- 主边框 -->
  <rect
    x="10"
    y="10"
    width="280"
    height="180"
    rx="5"
    fill="none"
    stroke="url(#hologramGradient)"
    stroke-width="2"
    filter="url(#hologramGlow)"
    class="flicker"
  />

  <!-- 内边框 -->
  <rect
    x="20"
    y="20"
    width="260"
    height="160"
    rx="3"
    fill="none"
    stroke="#00f0ff"
    stroke-width="1"
    opacity="0.5"
  />

  <!-- 扫描线 -->
  <rect
    class="scanline"
    x="10"
    y="10"
    width="280"
    height="2"
    fill="url(#hologramGradient)"
    opacity="0.3"
  />

  <!-- 角标装饰 -->
  <g filter="url(#hologramGlow)">
    <!-- 左上 -->
    <path d="M10 30 L10 10 L30 10" fill="none" stroke="#00f0ff" stroke-width="3" />
    <!-- 右上 -->
    <path d="M270 10 L290 10 L290 30" fill="none" stroke="#00f0ff" stroke-width="3" />
    <!-- 右下 -->
    <path d="M290 170 L290 190 L270 190" fill="none" stroke="#ff0080" stroke-width="3" />
    <!-- 左下 -->
    <path d="M30 190 L10 190 L10 170" fill="none" stroke="#ff0080" stroke-width="3" />
  </g>

  <!-- 科技装饰点 -->
  <circle cx="10" cy="100" r="2" fill="#00f0ff" class="flicker" filter="url(#hologramGlow)" />
  <circle cx="290" cy="100" r="2" fill="#9d00ff" class="flicker" filter="url(#hologramGlow)" style="animation-delay: 0.2s" />
  <circle cx="150" cy="10" r="2" fill="#00f0ff" class="flicker" filter="url(#hologramGlow)" style="animation-delay: 0.4s" />
  <circle cx="150" cy="190" r="2" fill="#ff0080" class="flicker" filter="url(#hologramGlow)" style="animation-delay: 0.6s" />

  <!-- 电路纹样 -->
  <g opacity="0.3">
    <rect x="50" y="10" width="1" height="5" fill="#00f0ff" />
    <rect x="100" y="10" width="1" height="5" fill="#00f0ff" />
    <rect x="200" y="10" width="1" height="5" fill="#00f0ff" />
    <rect x="250" y="10" width="1" height="5" fill="#00f0ff" />

    <rect x="50" y="185" width="1" height="5" fill="#ff0080" />
    <rect x="100" y="185" width="1" height="5" fill="#ff0080" />
    <rect x="200" y="185" width="1" height="5" fill="#ff0080" />
    <rect x="250" y="185" width="1" height="5" fill="#ff0080" />
  </g>

  <!-- 数据流装饰 -->
  <g opacity="0.4">
    <rect x="10" y="50" width="5" height="1" fill="#9d00ff" />
    <rect x="10" y="100" width="5" height="1" fill="#9d00ff" />
    <rect x="10" y="150" width="5" height="1" fill="#9d00ff" />

    <rect x="285" y="50" width="5" height="1" fill="#9d00ff" />
    <rect x="285" y="100" width="5" height="1" fill="#9d00ff" />
    <rect x="285" y="150" width="5" height="1" fill="#9d00ff" />
  </g>
</svg>
