<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 霓虹渐变 -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff">
        <animate attributeName="stop-color" values="#00f0ff;#9d00ff;#00f0ff" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#9d00ff">
        <animate attributeName="stop-color" values="#9d00ff;#ff0080;#9d00ff" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ff0080">
        <animate attributeName="stop-color" values="#ff0080;#00f0ff;#ff0080" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- 发光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 背景渐变 -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0.95"/>
    </radialGradient>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" stroke="url(#neonGradient)" stroke-width="2"/>

  <!-- 外部六边形装饰 -->
  <path d="M100 15L173.3 57.5V142.5L100 185L26.7 142.5V57.5L100 15Z"
        fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
  </path>

  <!-- 中部六边形装饰 -->
  <path d="M100 30L156.6 62.5V137.5L100 170L43.4 137.5V62.5L100 30Z"
        fill="none" stroke="#9d00ff" stroke-width="1.5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="15s" repeatCount="indefinite"/>
  </path>

  <!-- 内部科技图案 -->
  <g filter="url(#glow)">
    <!-- 中央芯片图标 -->
    <rect x="80" y="80" width="40" height="40" rx="4" fill="none" stroke="url(#neonGradient)" stroke-width="2"/>

    <!-- 芯片引脚 -->
    <g stroke="#00f0ff" stroke-width="2">
      <!-- 上方引脚 -->
      <line x1="90" y1="80" x2="90" y2="70"/>
      <line x1="100" y1="80" x2="100" y2="70"/>
      <line x1="110" y1="80" x2="110" y2="70"/>

      <!-- 下方引脚 -->
      <line x1="90" y1="120" x2="90" y2="130"/>
      <line x1="100" y1="120" x2="100" y2="130"/>
      <line x1="110" y1="120" x2="110" y2="130"/>

      <!-- 左侧引脚 -->
      <line x1="80" y1="90" x2="70" y2="90"/>
      <line x1="80" y1="100" x2="70" y2="100"/>
      <line x1="80" y1="110" x2="70" y2="110"/>

      <!-- 右侧引脚 -->
      <line x1="120" y1="90" x2="130" y2="90"/>
      <line x1="120" y1="100" x2="130" y2="100"/>
      <line x1="120" y1="110" x2="130" y2="110"/>
    </g>

    <!-- 中央核心 -->
    <circle cx="100" cy="100" r="8" fill="url(#neonGradient)">
      <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 装饰点 -->
  <g fill="#ff0080" opacity="0.6">
    <circle cx="100" cy="25" r="2">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="175" cy="100" r="2">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="175" r="2">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="100" r="2">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 数据流线条 -->
  <g stroke="#00f0ff" stroke-width="1" opacity="0.4">
    <path d="M50 50 L80 80">
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M150 50 L120 80">
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M50 150 L80 120">
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path d="M150 150 L120 120">
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 外围光环 -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#neonGradient)" stroke-width="0.5" opacity="0.3">
    <animate attributeName="r" values="90;95;90" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>