<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="icon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#9d00ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>

    <pattern id="icon-grid" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M 6 0 L 0 0 0 6" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="url(#icon-grid)"/>

  <!-- Outer Hexagon -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18"
           fill="rgba(10,10,15,0.9)" stroke="url(#icon-gradient)" stroke-width="2"
           filter="url(#icon-glow)"/>

  <!-- Inner Hexagon -->
  <polygon points="32,14 48,23 48,41 32,50 16,41 16,23"
           fill="rgba(0,240,255,0.05)" stroke="#00f0ff" stroke-width="1.5"
           opacity="0.7"/>

  <!-- CP Text -->
  <text x="32" y="42" text-anchor="middle" font-family="Arial Black, sans-serif"
        font-size="20" font-weight="bold" fill="url(#icon-gradient)"
        filter="url(#icon-glow)">CP</text>

  <!-- Circuit Lines -->
  <path d="M 8 18 L 4 18 L 4 8" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="4" cy="8" r="2" fill="#00f0ff"/>

  <path d="M 56 18 L 60 18 L 60 46" stroke="#9d00ff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="60" cy="46" r="2" fill="#9d00ff"/>

  <path d="M 32 60 L 32 64" stroke="#ff0080" stroke-width="1.5" opacity="0.6"/>
  <circle cx="32" cy="64" r="2" fill="#ff0080"/>

  <!-- Animated Data Point -->
  <circle cx="50" cy="10" r="3" fill="none" stroke="#00f0ff" stroke-width="1.5">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="10" r="1.5" fill="#00f0ff"/>
</svg>
