<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#9d00ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff0080" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="darkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景暗色矩形 -->
  <rect width="400" height="120" rx="8" fill="#0a0a0f"/>

  <!-- 六边形图标 -->
  <g filter="url(#darkGlow)">
    <path d="M60 20L90 37.5V82.5L60 100L30 82.5V37.5L60 20Z"
          fill="none" stroke="url(#darkGradient)" stroke-width="3"/>
    <path d="M60 32L82 44.5V69.5L60 82L38 69.5V44.5L60 32Z"
          fill="url(#darkGradient)" fill-opacity="0.2" stroke="url(#darkGradient)" stroke-width="2"/>

    <!-- 中心发光点 -->
    <circle cx="60" cy="60" r="8" fill="#00f0ff">
      <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="60" r="4" fill="#ffffff"/>
  </g>

  <!-- 文字 -->
  <g filter="url(#darkGlow)">
    <text x="100" y="68" font-family="'Orbitron', sans-serif" font-size="42"
          font-weight="bold" fill="url(#darkGradient)" letter-spacing="4">CYBER</text>
    <text x="100" y="98" font-family="'Orbitron', sans-serif" font-size="28"
          fill="#00f0ff" letter-spacing="8">PRESS</text>

    <line x1="240" y1="35" x2="240" y2="90" stroke="url(#darkGradient)" stroke-width="2" opacity="0.8"/>

    <text x="250" y="62" font-family="'Inter', sans-serif" font-size="11"
          fill="#ff0080" letter-spacing="2">FUTURE</text>
    <text x="250" y="78" font-family="'Inter', sans-serif" font-size="11"
          fill="#9d00ff" letter-spacing="2">PLATFORM</text>
  </g>
</svg>
