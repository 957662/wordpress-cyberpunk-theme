<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <!-- Cyber Glow Filter -->
    <filter id="cyber-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Neon Gradient -->
    <linearGradient id="neon-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#9d00ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="cyber-grid" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M 4 0 L 0 0 0 4" fill="none" stroke="#00f0ff" stroke-width="0.3" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background Grid -->
  <rect width="200" height="60" fill="url(#cyber-grid)" opacity="0.5"/>

  <!-- Hexagon Frame -->
  <polygon points="30,10 50,20 50,40 30,50 10,40 10,20"
           fill="none" stroke="url(#neon-gradient)" stroke-width="2"
           filter="url(#cyber-glow)"/>

  <!-- Inner Hexagon -->
  <polygon points="30,18 44,25 44,35 30,42 16,35 16,25"
           fill="rgba(0,240,255,0.1)" stroke="#00f0ff" stroke-width="1"
           opacity="0.8"/>

  <!-- CP Monogram -->
  <text x="30" y="36" text-anchor="middle" font-family="Arial Black, sans-serif"
        font-size="16" font-weight="bold" fill="url(#neon-gradient)"
        filter="url(#cyber-glow)">CP</text>

  <!-- CyberPress Text -->
  <text x="62" y="38" font-family="Orbitron, Arial Black, sans-serif"
        font-size="24" font-weight="bold" fill="url(#neon-gradient)"
        filter="url(#cyber-glow)" letter-spacing="2">
    CYBER
  </text>

  <text x="62" y="52" font-family="Orbitron, Arial, sans-serif"
        font-size="14" font-weight="500" fill="#00f0ff"
        letter-spacing="6">
    PRESS
  </text>

  <!-- Circuit Lines -->
  <path d="M 56 28 L 120 28" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
  <circle cx="120" cy="28" r="2" fill="#00f0ff" opacity="0.8"/>
  <path d="M 122 28 L 140 28" stroke="#9d00ff" stroke-width="1" opacity="0.6"/>
  <circle cx="140" cy="28" r="1.5" fill="#9d00ff"/>

  <!-- Decorative Elements -->
  <rect x="165" y="15" width="25" height="2" fill="#ff0080" opacity="0.8">
    <animate attributeName="width" values="25;5;25" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="165" y="20" width="15" height="1" fill="#00f0ff" opacity="0.6"/>
  <rect x="175" y="25" width="15" height="1" fill="#9d00ff" opacity="0.6"/>

  <!-- Data Points -->
  <circle cx="190" cy="40" r="3" fill="none" stroke="#00f0ff" stroke-width="1.5">
    <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="190" cy="40" r="1" fill="#00f0ff"/>
</svg>
