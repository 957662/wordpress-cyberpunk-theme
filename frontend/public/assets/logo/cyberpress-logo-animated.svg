<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-anim" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur">
        <animate attributeName="stdDeviation" values="1;3;1" dur="2s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gradient-anim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#00f0ff;#9d00ff;#ff0080;#00f0ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#9d00ff;#ff0080;#f0ff00;#9d00ff" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Animated Icon -->
  <g filter="url(#glow-anim)">
    <path d="M15 10 L25 5 L35 10 L35 22 L25 27 L15 22 Z" stroke="url(#gradient-anim)" stroke-width="2" fill="none">
      <animate attributeName="stroke-width" values="2;3;2" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <circle cx="25" cy="16" r="3" fill="url(#gradient-anim)">
      <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Animated Text -->
  <text x="45" y="37" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#gradient-anim)" filter="url(#glow-anim)">
    CyberPress
  </text>

  <!-- Scanning Line -->
  <line x1="45" y1="15" x2="190" y2="15" stroke="url(#gradient-anim)" stroke-width="1" opacity="0.5">
    <animate attributeName="y1" values="15;45;15" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="15;45;15" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>