<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#9d00ff"/>
      <stop offset="100%" stop-color="#ff0080"/>
    </linearGradient>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#9d00ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景六边形框架 -->
  <g filter="url(#glow)">
    <path d="M60 20L90 37.5V82.5L60 100L30 82.5V37.5L60 20Z"
          fill="none" stroke="url(#mainGradient)" stroke-width="2.5"/>
    <path d="M60 32L82 44.5V69.5L60 82L38 69.5V44.5L60 32Z"
          fill="url(#mainGradient)" fill-opacity="0.15" stroke="url(#neonGradient)" stroke-width="2"/>

    <!-- 中心电路图案 -->
    <circle cx="60" cy="60" r="12" fill="#00f0ff" fill-opacity="0.3"/>
    <circle cx="60" cy="60" r="6" fill="#00f0ff"/>
    <path d="M60 32V48" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
    <path d="M60 72V82" stroke="#9d00ff" stroke-width="2" stroke-linecap="round"/>
    <path d="M38 44.5H50" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
    <path d="M70 69.5H82" stroke="#ff0080" stroke-width="2" stroke-linecap="round"/>
    <path d="M60 54V66" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
    <path d="M54 60H66" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- 文字部分 -->
  <g filter="url(#glow)">
    <text x="100" y="68" font-family="'Orbitron', sans-serif" font-size="42"
          font-weight="bold" fill="url(#neonGradient)" letter-spacing="4">CYBER</text>
    <text x="100" y="98" font-family="'Orbitron', sans-serif" font-size="28"
          fill="#00f0ff" letter-spacing="8">PRESS</text>

    <!-- 装饰竖线 -->
    <line x1="240" y1="35" x2="240" y2="90" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.6"/>

    <!-- 标语 -->
    <text x="250" y="62" font-family="'Inter', sans-serif" font-size="11"
          fill="#ff0080" letter-spacing="2">FUTURE</text>
    <text x="250" y="78" font-family="'Inter', sans-serif" font-size="11"
          fill="#9d00ff" letter-spacing="2">PLATFORM</text>
  </g>
</svg>
