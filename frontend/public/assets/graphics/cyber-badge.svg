<svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyber-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#9d00ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff0080" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="200" height="80" rx="8" fill="rgba(10, 10, 15, 0.9)" stroke="url(#cyber-gradient)" stroke-width="2"/>

  <!-- 角标装饰 -->
  <g filter="url(#glow)">
    <!-- 左上 -->
    <path d="M12 12 L12 25 L25 12" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="12" r="2" fill="#00f0ff"/>

    <!-- 右上 -->
    <path d="M188 12 L188 25 L175 12" fill="none" stroke="#9d00ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="188" cy="12" r="2" fill="#9d00ff"/>

    <!-- 左下 -->
    <path d="M12 68 L12 55 L25 68" fill="none" stroke="#ff0080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="68" r="2" fill="#ff0080"/>

    <!-- 右下 -->
    <path d="M188 68 L188 55 L175 68" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="188" cy="68" r="2" fill="#00f0ff"/>
  </g>

  <!-- 中心装饰线 -->
  <line x1="40" y1="40" x2="160" y2="40" stroke="url(#cyber-gradient)" stroke-width="1" opacity="0.3"/>

  <!-- 科技纹路 -->
  <g opacity="0.2">
    <line x1="30" y1="25" x2="30" y2="55" stroke="#00f0ff" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="170" y1="25" x2="170" y2="55" stroke="#9d00ff" stroke-width="1" stroke-dasharray="2,2"/>
  </g>

  <!-- 闪烁点 -->
  <circle cx="100" cy="40" r="3" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
