<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="circuit-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- 主电路路径 -->
      <path d="M0 30 H40 V20 H60" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M100 70 H60 V80 H40" stroke="#9d00ff" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M30 0 V30 H20 V50" stroke="#ff0080" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M70 100 V70 H80 V50" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.4"/>

      <!-- 交叉线路 -->
      <path d="M50 0 V25" stroke="#9d00ff" stroke-width="0.5" fill="none" opacity="0.3"/>
      <path d="M50 100 V75" stroke="#ff0080" stroke-width="0.5" fill="none" opacity="0.3"/>
      <path d="M0 50 H25" stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.3"/>
      <path d="M100 50 H75" stroke="#9d00ff" stroke-width="0.5" fill="none" opacity="0.3"/>

      <!-- 电路节点 -->
      <circle cx="40" cy="30" r="2" fill="#00f0ff" opacity="0.6"/>
      <circle cx="60" cy="70" r="2" fill="#9d00ff" opacity="0.6"/>
      <circle cx="30" cy="50" r="2" fill="#ff0080" opacity="0.6"/>
      <circle cx="70" cy="50" r="2" fill="#00f0ff" opacity="0.6"/>
      <circle cx="50" cy="25" r="1.5" fill="#9d00ff" opacity="0.5"/>
      <circle cx="50" cy="75" r="1.5" fill="#ff0080" opacity="0.5"/>
      <circle cx="25" cy="50" r="1.5" fill="#00f0ff" opacity="0.5"/>
      <circle cx="75" cy="50" r="1.5" fill="#9d00ff" opacity="0.5"/>
    </pattern>

    <filter id="circuit-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 应用图案 -->
  <rect width="100" height="100" fill="url(#circuit-pattern)"/>
</svg>
