<svg width="50" height="50" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="matrix-pattern" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="rgba(10, 10, 15, 1)"/>
      <rect x="2" y="2" width="1" height="1" fill="#00ff00" opacity="0.8"/>
    </pattern>
  </defs>

  <!-- 应用矩阵图案 -->
  <rect width="50" height="50" fill="url(#matrix-pattern)"/>
</svg>
