<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- CyberPress Logo Text -->
  <text x="50" y="38" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="url(#cyberGradient)" filter="url(#glow)" letter-spacing="2">
    CYBERPRESS
  </text>

  <!-- Decorative Elements -->
  <rect x="45" y="44" width="110" height="2" fill="#00f0ff" opacity="0.7"/>
  <rect x="45" y="48" width="70" height="1" fill="#9d00ff" opacity="0.5"/>
  <rect x="45" y="50" width="40" height="1" fill="#ff0080" opacity="0.3"/>

  <!-- Corner accents -->
  <path d="M 40 12 L 40 18 L 46 18" stroke="#00f0ff" stroke-width="2" fill="none"/>
  <path d="M 160 12 L 160 18 L 154 18" stroke="#ff0080" stroke-width="2" fill="none"/>
  <circle cx="40" cy="48" r="2" fill="#00f0ff"/>
  <circle cx="160" cy="48" r="2" fill="#ff0080"/>

  <!-- Circuit pattern -->
  <path d="M 10 30 L 25 30 L 30 25" stroke="#00f0ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 190 30 L 175 30 L 170 35" stroke="#ff0080" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="30" cy="25" r="3" fill="#00f0ff" opacity="0.8"/>
  <circle cx="170" cy="35" r="3" fill="#ff0080" opacity="0.8"/>
</svg>
