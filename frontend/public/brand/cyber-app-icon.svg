<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="appIconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="appIconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" fill="#0a0a0f" rx="80"/>

  <!-- 背景网格装饰 -->
  <g opacity="0.1">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#00f0ff" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#00f0ff" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#00f0ff" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#00f0ff" stroke-width="1"/>
  </g>

  <!-- 中心六边形 Logo -->
  <g filter="url(#appIconGlow)">
    <!-- 外圈六边形 -->
    <polygon points="256,64 424,164 424,348 256,448 88,348 88,164"
             stroke="url(#appIconGradient)" stroke-width="6" fill="none"/>

    <!-- 中圈六边形 -->
    <polygon points="256,120 392,200 392,312 256,392 120,312 120,200"
             stroke="#00f0ff" stroke-width="4" fill="none" opacity="0.8"/>

    <!-- 内圈六边形 -->
    <polygon points="256,164 348,216 348,296 256,348 164,296 164,216"
             stroke="#9d00ff" stroke-width="3" fill="none" opacity="0.6"/>

    <!-- 中心圆 -->
    <circle cx="256" cy="256" r="48" stroke="url(#appIconGradient)" stroke-width="4" fill="none"/>
    <circle cx="256" cy="256" r="32" fill="#00f0ff" opacity="0.3"/>
    <circle cx="256" cy="256" r="20" fill="#9d00ff" opacity="0.5"/>
    <circle cx="256" cy="256" r="10" fill="#00f0ff"/>
    <circle cx="256" cy="256" r="5" fill="#ffffff"/>

    <!-- 电路连接线 -->
    <line x1="256" y1="208" x2="256" y2="120" stroke="#00f0ff" stroke-width="3"/>
    <line x1="256" y1="304" x2="256" y2="392" stroke="#00f0ff" stroke-width="3"/>
    <line x1="208" y1="256" x2="120" y2="256" stroke="#00f0ff" stroke-width="3"/>
    <line x1="304" y1="256" x2="392" y2="256" stroke="#00f0ff" stroke-width="3"/>

    <!-- 对角线 -->
    <line x1="178" y1="178" x2="128" y2="128" stroke="#9d00ff" stroke-width="2" opacity="0.6"/>
    <line x1="334" y1="178" x2="384" y2="128" stroke="#9d00ff" stroke-width="2" opacity="0.6"/>
    <line x1="178" y1="334" x2="128" y2="384" stroke="#9d00ff" stroke-width="2" opacity="0.6"/>
    <line x1="334" y1="334" x2="384" y2="384" stroke="#9d00ff" stroke-width="2" opacity="0.6"/>

    <!-- 装饰节点 -->
    <circle cx="256" cy="120" r="6" fill="#9d00ff"/>
    <circle cx="256" cy="392" r="6" fill="#9d00ff"/>
    <circle cx="120" cy="256" r="6" fill="#9d00ff"/>
    <circle cx="392" cy="256" r="6" fill="#9d00ff"/>

    <!-- 角落装饰 -->
    <circle cx="88" cy="164" r="4" fill="#00f0ff"/>
    <circle cx="424" cy="164" r="4" fill="#00f0ff"/>
    <circle cx="88" cy="348" r="4" fill="#00f0ff"/>
    <circle cx="424" cy="348" r="4" fill="#00f0ff"/>
  </g>
</svg>
