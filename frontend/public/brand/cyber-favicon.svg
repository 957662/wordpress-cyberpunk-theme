<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="faviconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="64" height="64" fill="#0a0a0f" rx="8"/>

  <!-- 六边形 Logo -->
  <g filter="url(#faviconGlow)">
    <!-- 外圈六边形 -->
    <polygon points="32,8 52,20 52,44 32,56 12,44 12,20"
             stroke="url(#faviconGradient)" stroke-width="2" fill="none"/>

    <!-- 内圈六边形 -->
    <polygon points="32,16 46,24 46,40 32,48 18,40 18,24"
             stroke="#00f0ff" stroke-width="1.5" fill="none" opacity="0.7"/>

    <!-- 中心 -->
    <circle cx="32" cy="32" r="8" stroke="#9d00ff" stroke-width="2" fill="none"/>
    <circle cx="32" cy="32" r="4" fill="#00f0ff"/>
    <circle cx="32" cy="32" r="2" fill="#ffffff"/>

    <!-- 装饰点 -->
    <circle cx="32" cy="16" r="1.5" fill="#9d00ff"/>
    <circle cx="32" cy="48" r="1.5" fill="#9d00ff"/>
    <circle cx="18" cy="32" r="1.5" fill="#9d00ff"/>
    <circle cx="46" cy="32" r="1.5" fill="#9d00ff"/>
  </g>
</svg>
