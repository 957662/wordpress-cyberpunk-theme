<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bracketGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#00f0ff"/>
      <stop offset="100%" stopColor="#9d00ff"/>
    </linearGradient>

    <filter id="bracketGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Top-left corner -->
  <g filter="url(#bracketGlow)">
    <path d="M5 30 L5 5 L30 5" stroke="url(#bracketGradient)" strokeWidth="3" fill="none" strokeLinecap="round"/>
    <circle cx="5" cy="5" r="2" fill="#00f0ff"/>
    <path d="M10 30 L10 10 L30 10" stroke="url(#bracketGradient)" strokeWidth="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Top-right corner -->
  <g filter="url(#bracketGlow)">
    <path d="M95 30 L95 5 L70 5" stroke="url(#bracketGradient)" strokeWidth="3" fill="none" strokeLinecap="round"/>
    <circle cx="95" cy="5" r="2" fill="#9d00ff"/>
    <path d="M90 30 L90 10 L70 10" stroke="url(#bracketGradient)" strokeWidth="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Bottom-left corner -->
  <g filter="url(#bracketGlow)">
    <path d="M5 70 L5 95 L30 95" stroke="url(#bracketGradient)" strokeWidth="3" fill="none" strokeLinecap="round"/>
    <circle cx="5" cy="95" r="2" fill="#9d00ff"/>
    <path d="M10 70 L10 90 L30 90" stroke="url(#bracketGradient)" strokeWidth="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Bottom-right corner -->
  <g filter="url(#bracketGlow)">
    <path d="M95 70 L95 95 L70 95" stroke="url(#bracketGradient)" strokeWidth="3" fill="none" strokeLinecap="round"/>
    <circle cx="95" cy="95" r="2" fill="#00f0ff"/>
    <path d="M90 70 L90 90 L70 90" stroke="url(#bracketGradient)" strokeWidth="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Center decoration -->
  <rect x="40" y="40" width="20" height="20" stroke="url(#bracketGradient)" strokeWidth="1" fill="none" opacity="0.3"/>
  <circle cx="50" cy="50" r="2" fill="#00f0ff"/>
</svg>
