<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Top Left Corner -->
    <path d="M10 10 L30 10 L10 30 Z" fill="#00f0ff" opacity="0.3"/>
    <path d="M10 10 L40 10 L10 40" stroke="#00f0ff" stroke-width="2" fill="none"/>

    <!-- Corner Dots -->
    <circle cx="10" cy="10" r="2" fill="#00f0ff"/>
    <circle cx="20" cy="10" r="1" fill="#00f0ff" opacity="0.6"/>
    <circle cx="10" cy="20" r="1" fill="#00f0ff" opacity="0.6"/>

    <!-- Circuit Lines -->
    <path d="M10 50 L10 70 L20 70" stroke="#9d00ff" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M50 10 L70 10 L70 20" stroke="#ff0080" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- Tech Accents -->
    <rect x="80" y="5" width="15" height="2" fill="#00f0ff" opacity="0.6"/>
    <rect x="80" y="10" width="10" height="1" fill="#9d00ff" opacity="0.4"/>
    <rect x="5" y="80" width="2" height="15" fill="#ff0080" opacity="0.6"/>
    <rect x="10" y="80" width="1" height="10" fill="#00f0ff" opacity="0.4"/>
  </g>
</svg>