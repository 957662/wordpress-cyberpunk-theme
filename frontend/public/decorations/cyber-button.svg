<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.3" />
    </linearGradient>
    <filter id="btnGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Button Background -->
  <rect x="2" y="2" width="196" height="46" fill="url(#btnGrad)"
        stroke="#00f0ff" stroke-width="1" rx="5" filter="url(#btnGlow)" />

  <!-- Corner Accents -->
  <g stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.8">
    <path d="M5 8 L8 5 L12 5" />
    <path d="M195 8 L192 5 L188 5" />
    <path d="M5 42 L8 45 L12 45" />
    <path d="M195 42 L192 45 L188 45" />
  </g>

  <!-- Tech Dots -->
  <g fill="#00f0ff" opacity="0.6">
    <circle cx="15" cy="25" r="1.5" />
    <circle cx="185" cy="25" r="1.5" />
  </g>

  <!-- Center Line -->
  <line x1="20" y1="25" x2="180" y2="25" stroke="#00f0ff" stroke-width="0.5" opacity="0.3" />
</svg>
