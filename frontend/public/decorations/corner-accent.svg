<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cornerCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a0aa;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="cornerPurple" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6600aa;stop-opacity:0.8" />
    </linearGradient>
    <filter id="cornerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Top Left Corner -->
  <g filter="url(#cornerGlow)">
    <path d="M 10 40 L 10 10 L 40 10" stroke="url(#cornerCyan)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 10 25 L 10 10 L 25 10" stroke="url(#cornerCyan)" stroke-width="1.5" fill="none" opacity="0.5"/>
    <circle cx="10" cy="10" r="4" fill="#00f0ff"/>
    <circle cx="25" cy="10" r="2" fill="#00f0ff" opacity="0.6"/>
    <circle cx="10" cy="25" r="2" fill="#00f0ff" opacity="0.6"/>
  </g>

  <!-- Bottom Right Corner -->
  <g filter="url(#cornerGlow)">
    <path d="M 90 60 L 90 90 L 60 90" stroke="url(#cornerPurple)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 90 75 L 90 90 L 75 90" stroke="url(#cornerPurple)" stroke-width="1.5" fill="none" opacity="0.5"/>
    <circle cx="90" cy="90" r="4" fill="#9d00ff"/>
    <circle cx="75" cy="90" r="2" fill="#9d00ff" opacity="0.6"/>
    <circle cx="90" cy="75" r="2" fill="#9d00ff" opacity="0.6"/>
  </g>
</svg>
