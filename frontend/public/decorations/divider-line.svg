<svg width="400" height="20" viewBox="0 0 400 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divider-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </linearGradient>
    <filter id="divider-glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main Line -->
  <line x1="20" y1="10" x2="380" y2="10" stroke="url(#divider-gradient)" stroke-width="1" filter="url(#divider-glow)"/>

  <!-- Center Diamond -->
  <rect x="195" y="6" width="10" height="8" fill="none" stroke="#00f0ff" stroke-width="1" transform="rotate(45 200 10)"/>
  <circle cx="200" cy="10" r="2" fill="#00f0ff"/>

  <!-- Side Dots -->
  <circle cx="100" cy="10" r="1" fill="#9d00ff" opacity="0.5"/>
  <circle cx="300" cy="10" r="1" fill="#9d00ff" opacity="0.5"/>
</svg>
