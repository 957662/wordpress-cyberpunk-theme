<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="hexLoadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="hexLoadGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Hexagon -->
  <polygon points="50,5 90,25 90,75 50,95 10,75 10,25"
           fill="none" stroke="url(#hexLoadGrad)" stroke-width="2"
           filter="url(#hexLoadGlow)" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </polygon>

  <!-- Middle Hexagon -->
  <polygon points="50,20 75,32.5 75,67.5 50,80 25,67.5 25,32.5"
           fill="none" stroke="url(#hexLoadGrad)" stroke-width="2"
           filter="url(#hexLoadGlow)" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </polygon>

  <!-- Inner Hexagon -->
  <polygon points="50,35 65,42.5 65,57.5 50,65 35,57.5 35,42.5"
           fill="rgba(0,240,255,0.2)" stroke="url(#hexLoadGrad)" stroke-width="2"
           filter="url(#hexLoadGlow)">
    <animate attributeName="fill-opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </polygon>

  <!-- Center Point -->
  <circle cx="50" cy="50" r="5" fill="#00f0ff" filter="url(#hexLoadGlow)">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite" begin="0.9s"/>
  </circle>

  <!-- Rotating Elements -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="4s" repeatCount="indefinite"/>
    <circle cx="50" cy="15" r="2" fill="#00f0ff" filter="url(#hexLoadGlow)"/>
    <circle cx="85" cy="40" r="2" fill="#9d00ff" filter="url(#hexLoadGlow)"/>
    <circle cx="85" cy="60" r="2" fill="#ff0080" filter="url(#hexLoadGlow)"/>
    <circle cx="50" cy="85" r="2" fill="#00f0ff" filter="url(#hexLoadGlow)"/>
    <circle cx="15" cy="60" r="2" fill="#9d00ff" filter="url(#hexLoadGlow)"/>
    <circle cx="15" cy="40" r="2" fill="#ff0080" filter="url(#hexLoadGlow)"/>
  </g>
</svg>
