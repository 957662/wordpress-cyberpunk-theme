<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="dataFlowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="dataFlowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Data Packets -->
  <g>
    <circle cx="10" cy="25" r="3" fill="#9d00ff" filter="url(#dataFlowGlow)">
      <animate attributeName="cx" values="10;190;10" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="25" r="3" fill="#9d00ff" filter="url(#dataFlowGlow)">
      <animate attributeName="cx" values="30;210;30" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="25" r="3" fill="#00f0ff" filter="url(#dataFlowGlow)">
      <animate attributeName="cx" values="50;230;50" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="25" r="3" fill="#00f0ff" filter="url(#dataFlowGlow)">
      <animate attributeName="cx" values="70;250;70" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="25" r="3" fill="#00ff88" filter="url(#dataFlowGlow)">
      <animate attributeName="cx" values="90;270;90" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="110" cy="25" r="3" fill="#00ff88" filter="url(#dataFlowGlow)">
      <animate attributeName="cx" values="110;290;110" dur="1.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="1.9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Flow Line -->
  <line x1="0" y1="25" x2="200" y2="25" stroke="url(#dataFlowGrad)"
        stroke-width="1" opacity="0.3" />

  <!-- End Points -->
  <g fill="#00ff88" filter="url(#dataFlowGlow)">
    <circle cx="0" cy="25" r="2" opacity="0.5"/>
    <circle cx="200" cy="25" r="2" opacity="0.5"/>
  </g>
</svg>
