<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" fill="none">
  <defs>
    <linearGradient id="divider-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#9d00ff"/>
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Main Line -->
  <line x1="0" y1="10" x2="400" y2="10"
        stroke="url(#divider-gradient)"
        stroke-width="1"/>

  <!-- Center Element -->
  <rect x="190" y="8" width="20" height="4" fill="#00f0ff" opacity="0.8">
    <animate attributeName="width" values="20;30;20" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x" values="190;185;190" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Side Elements -->
  <circle cx="150" cy="10" r="2" fill="#9d00ff">
    <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="10" r="2" fill="#9d00ff">
    <animate attributeName="r" values="2;3;2" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Data Packets -->
  <circle cx="50" cy="10" r="1" fill="#00f0ff" opacity="0.5">
    <animate attributeName="cx" values="0;200;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="10" r="1" fill="#ff0080" opacity="0.5">
    <animate attributeName="cx" values="400;200;400" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
