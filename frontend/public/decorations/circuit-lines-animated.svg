<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="circuitAnimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.3" />
    </linearGradient>
    <filter id="circuitAnimGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main Circuit Line -->
  <path d="M0 50 L50 50 L70 30 L150 30 L170 50 L250 50 L270 70 L350 70 L400 50"
        stroke="url(#circuitAnimGrad)" stroke-width="2" fill="none"
        filter="url(#circuitAnimGlow)" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Animated Pulse -->
  <circle r="4" fill="#00f0ff" filter="url(#circuitAnimGlow)">
    <animateMotion dur="3s" repeatCount="indefinite"
                  path="M0 50 L50 50 L70 30 L150 30 L170 50 L250 50 L270 70 L350 70 L400 50"/>
  </circle>

  <!-- Circuit Nodes -->
  <g fill="#00f0ff" filter="url(#circuitAnimGlow)">
    <circle cx="50" cy="50" r="3" opacity="0.6"/>
    <circle cx="70" cy="30" r="3" opacity="0.6"/>
    <circle cx="150" cy="30" r="3" opacity="0.6"/>
    <circle cx="170" cy="50" r="3" opacity="0.6"/>
    <circle cx="250" cy="50" r="3" opacity="0.6"/>
    <circle cx="270" cy="70" r="3" opacity="0.6"/>
    <circle cx="350" cy="70" r="3" opacity="0.6"/>
  </g>

  <!-- Secondary Lines -->
  <g stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.3">
    <path d="M70 30 L70 10"/>
    <path d="M150 30 L150 10"/>
    <path d="M170 50 L170 90"/>
    <path d="M250 50 L250 90"/>
    <path d="M270 70 L270 90"/>
  </g>

  <!-- Terminal Points -->
  <g fill="#00f0ff" opacity="0.4">
    <circle cx="70" cy="10" r="2"/>
    <circle cx="150" cy="10" r="2"/>
    <circle cx="170" cy="90" r="2"/>
    <circle cx="250" cy="90" r="2"/>
    <circle cx="270" cy="90" r="2"/>
  </g>
</svg>
