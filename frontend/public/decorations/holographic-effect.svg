<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="holo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0.4" />
    </linearGradient>
    <filter id="holo-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="holo-distortion">
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Holographic Base -->
  <rect x="50" y="50" width="200" height="200" fill="url(#holo-gradient)" opacity="0.1" filter="url(#holo-glow)"/>

  <!-- Holographic Grid -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.3" filter="url(#holo-glow)">
    <!-- Vertical Lines -->
    <line x1="50" y1="50" x2="50" y2="250"/>
    <line x1="75" y1="50" x2="75" y2="250"/>
    <line x1="100" y1="50" x2="100" y2="250"/>
    <line x1="125" y1="50" x2="125" y2="250"/>
    <line x1="150" y1="50" x2="150" y2="250"/>
    <line x1="175" y1="50" x2="175" y2="250"/>
    <line x1="200" y1="50" x2="200" y2="250"/>
    <line x1="225" y1="50" x2="225" y2="250"/>
    <line x1="250" y1="50" x2="250" y2="250"/>

    <!-- Horizontal Lines -->
    <line x1="50" y1="50" x2="250" y2="50"/>
    <line x1="50" y1="75" x2="250" y2="75"/>
    <line x1="50" y1="100" x2="250" y2="100"/>
    <line x1="50" y1="125" x2="250" y2="125"/>
    <line x1="50" y1="150" x2="250" y2="150"/>
    <line x1="50" y1="175" x2="250" y2="175"/>
    <line x1="50" y1="200" x2="250" y2="200"/>
    <line x1="50" y1="225" x2="250" y2="225"/>
    <line x1="50" y1="250" x2="250" y2="250"/>
  </g>

  <!-- Holographic Object (Pyramid) -->
  <g filter="url(#holo-glow)" opacity="0.8">
    <!-- Pyramid Base -->
    <polygon points="100,200 200,200 150,150" fill="none" stroke="#00f0ff" stroke-width="2">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </polygon>

    <!-- Pyramid Sides -->
    <polygon points="100,200 150,120 150,150" fill="url(#holo-gradient)" opacity="0.4"/>
    <polygon points="200,200 150,120 150,150" fill="url(#holo-gradient)" opacity="0.3"/>
    <polygon points="100,200 200,200 150,120" fill="none" stroke="#9d00ff" stroke-width="1.5"/>

    <!-- Apex Point -->
    <circle cx="150" cy="120" r="5" fill="#ff0080">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Holographic Scanning Lines -->
  <g stroke="#00f0ff" stroke-width="1" opacity="0.5">
    <line x1="50" y1="0" x2="250" y2="0">
      <animate attributeName="y1" values="0;300;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;300;0" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Floating Particles -->
  <g fill="#00f0ff" opacity="0.6">
    <circle cx="80" cy="100" r="2">
      <animate attributeName="cy" values="100;150;100" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="180" r="1.5" fill="#9d00ff">
      <animate attributeName="cy" values="180;130;180" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="220" r="2" fill="#ff0080">
      <animate attributeName="cy" values="220;170;220" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Data Rings -->
  <g stroke="url(#holo-gradient)" stroke-width="1" fill="none" opacity="0.4">
    <ellipse cx="150" cy="150" rx="80" ry="30">
      <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="10s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="150" cy="150" rx="60" ry="20">
      <animateTransform attributeName="transform" type="rotate" from="360 150 150" to="0 150 150" dur="8s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Holographic Glitch Effect -->
  <g opacity="0.3">
    <rect x="50" y="50" width="200" height="5" fill="#00f0ff">
      <animate attributeName="y" values="50;245;50" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Corner Markers -->
  <g stroke="#00f0ff" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 40 40 L 40 60 L 60 60"/>
    <path d="M 260 40 L 260 60 L 240 60"/>
    <path d="M 40 260 L 40 240 L 60 240"/>
    <path d="M 260 260 L 260 240 L 240 240"/>
  </g>

  <!-- Status Text -->
  <g font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.7">
    <text x="50" y="280">HOLOGRAM_V2.0</text>
    <text x="150" y="280" text-anchor="middle" fill="#9d00ff">ACTIVE</text>
    <text x="250" y="280" text-anchor="end">99%</text>
  </g>
</svg>
