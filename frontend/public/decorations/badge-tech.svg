<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <linearGradient id="badgeCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="badgePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.2" />
    </linearGradient>
    <filter id="badgeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect x="5" y="5" width="110" height="30" rx="4" fill="url(#badgeCyan)" stroke="#00f0ff" stroke-width="1"/>

  <!-- Left icon -->
  <circle cx="20" cy="20" r="6" fill="#00f0ff" filter="url(#badgeGlow)"/>
  <path d="M 18 20 L 20 22 L 22 18" stroke="#0a0a0f" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text placeholder -->
  <text x="35" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#00f0ff">TECH</text>
</svg>
