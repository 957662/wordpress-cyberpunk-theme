<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 4" fill="none">
  <defs>
    <linearGradient id="scannerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0">
        <animate attributeName="offset" values="0;0.5;1" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1">
        <animate attributeName="offset" values="0.25;0.75;1.25" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0">
        <animate attributeName="offset" values="0.5;1;1.5" dur="2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <line x1="0" y1="2" x2="200" y2="2" stroke="url(#scannerGradient)" stroke-width="2"/>
</svg>
