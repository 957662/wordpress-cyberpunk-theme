<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="frame-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main Frame Border -->
  <rect x="10" y="10" width="380" height="380" fill="none" stroke="url(#frame-gradient)" stroke-width="2" filter="url(#frame-glow)"/>

  <!-- Inner Frame -->
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="url(#frame-gradient)" stroke-width="1" opacity="0.5"/>

  <!-- Corner Brackets - Top Left -->
  <g stroke="#00f0ff" stroke-width="2" fill="none" filter="url(#frame-glow)">
    <path d="M 10 60 L 10 10 L 60 10"/>
    <path d="M 20 50 L 20 20 L 50 20" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Corner Brackets - Top Right -->
  <g stroke="#9d00ff" stroke-width="2" fill="none" filter="url(#frame-glow)">
    <path d="M 390 60 L 390 10 L 340 10"/>
    <path d="M 380 50 L 380 20 L 350 20" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Corner Brackets - Bottom Left -->
  <g stroke="#ff0080" stroke-width="2" fill="none" filter="url(#frame-glow)">
    <path d="M 10 340 L 10 390 L 60 390"/>
    <path d="M 20 350 L 20 380 L 50 380" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Corner Brackets - Bottom Right -->
  <g stroke="#f0ff00" stroke-width="2" fill="none" filter="url(#frame-glow)">
    <path d="M 390 340 L 390 390 L 340 390"/>
    <path d="M 380 350 L 380 380 L 350 380" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Decorative Lines -->
  <g stroke="url(#frame-gradient)" stroke-width="1" fill="none" opacity="0.6">
    <!-- Top decorative elements -->
    <line x1="100" y1="10" x2="100" y2="30"/>
    <line x1="150" y1="10" x2="150" y2="25"/>
    <line x1="200" y1="10" x2="200" y2="30"/>
    <line x1="250" y1="10" x2="250" y2="25"/>
    <line x1="300" y1="10" x2="300" y2="30"/>

    <!-- Bottom decorative elements -->
    <line x1="100" y1="390" x2="100" y2="370"/>
    <line x1="150" y1="390" x2="150" y2="375"/>
    <line x1="200" y1="390" x2="200" y2="370"/>
    <line x1="250" y1="390" x2="250" y2="375"/>
    <line x1="300" y1="390" x2="300" y2="370"/>

    <!-- Left decorative elements -->
    <line x1="10" y1="100" x2="30" y2="100"/>
    <line x1="10" y1="150" x2="25" y2="150"/>
    <line x1="10" y1="200" x2="30" y2="200"/>
    <line x1="10" y1="250" x2="25" y2="250"/>
    <line x1="10" y1="300" x2="30" y2="300"/>

    <!-- Right decorative elements -->
    <line x1="390" y1="100" x2="370" y2="100"/>
    <line x1="390" y1="150" x2="375" y2="150"/>
    <line x1="390" y1="200" x2="370" y2="200"/>
    <line x1="390" y1="250" x2="375" y2="250"/>
    <line x1="390" y1="300" x2="370" y2="300"/>
  </g>

  <!-- Corner Dots -->
  <g fill="#00f0ff" filter="url(#frame-glow)">
    <circle cx="10" cy="10" r="3">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="390" cy="10" r="3" fill="#9d00ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="390" r="3" fill="#ff0080">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="390" cy="390" r="3" fill="#f0ff00">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Mid-corner Accents -->
  <g stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.5">
    <!-- Top mid -->
    <rect x="195" y="10" width="10" height="5" fill="#00f0ff" stroke="none"/>
    <!-- Bottom mid -->
    <rect x="195" y="385" width="10" height="5" fill="#00f0ff" stroke="none"/>
    <!-- Left mid -->
    <rect x="10" y="195" width="5" height="10" fill="#00f0ff" stroke="none"/>
    <!-- Right mid -->
    <rect x="385" y="195" width="5" height="10" fill="#00f0ff" stroke="none"/>
  </g>

  <!-- Tech Pattern Overlay -->
  <g stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.2">
    <rect x="30" y="30" width="340" height="340" stroke-dasharray="5,5"/>
    <rect x="40" y="40" width="320" height="320" stroke-dasharray="3,3"/>
  </g>

  <!-- Animated Pulse Lines -->
  <g stroke="url(#frame-gradient)" stroke-width="1" fill="none" opacity="0.4">
    <path d="M 10 200 L 30 200" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M 390 200 L 370 200" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M 200 10 L 200 30" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M 200 390 L 200 370" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
