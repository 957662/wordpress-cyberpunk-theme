<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dots-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 5x5 点阵 -->
  <g filter="url(#dots-glow)">
    <!-- 第一行 -->
    <circle cx="10" cy="10" r="1.5" fill="#00f0ff" opacity="0.8"/>
    <circle cx="30" cy="10" r="1" fill="#9d00ff" opacity="0.6"/>
    <circle cx="50" cy="10" r="1.5" fill="#00f0ff" opacity="0.8"/>
    <circle cx="70" cy="10" r="1" fill="#9d00ff" opacity="0.6"/>
    <circle cx="90" cy="10" r="1.5" fill="#00f0ff" opacity="0.8"/>

    <!-- 第二行 -->
    <circle cx="10" cy="30" r="1" fill="#9d00ff" opacity="0.6"/>
    <circle cx="30" cy="30" r="1.5" fill="#ff0080" opacity="0.8"/>
    <circle cx="50" cy="30" r="1" fill="#00f0ff" opacity="0.6"/>
    <circle cx="70" cy="30" r="1.5" fill="#ff0080" opacity="0.8"/>
    <circle cx="90" cy="30" r="1" fill="#9d00ff" opacity="0.6"/>

    <!-- 第三行 -->
    <circle cx="10" cy="50" r="1.5" fill="#00f0ff" opacity="0.8"/>
    <circle cx="30" cy="50" r="1" fill="#00f0ff" opacity="0.6"/>
    <circle cx="50" cy="50" r="2" fill="#f0ff00" opacity="1"/>
    <circle cx="70" cy="50" r="1" fill="#00f0ff" opacity="0.6"/>
    <circle cx="90" cy="50" r="1.5" fill="#00f0ff" opacity="0.8"/>

    <!-- 第四行 -->
    <circle cx="10" cy="70" r="1" fill="#9d00ff" opacity="0.6"/>
    <circle cx="30" cy="70" r="1.5" fill="#ff0080" opacity="0.8"/>
    <circle cx="50" cy="70" r="1" fill="#00f0ff" opacity="0.6"/>
    <circle cx="70" cy="70" r="1.5" fill="#ff0080" opacity="0.8"/>
    <circle cx="90" cy="70" r="1" fill="#9d00ff" opacity="0.6"/>

    <!-- 第五行 -->
    <circle cx="10" cy="90" r="1.5" fill="#00f0ff" opacity="0.8"/>
    <circle cx="30" cy="90" r="1" fill="#9d00ff" opacity="0.6"/>
    <circle cx="50" cy="90" r="1.5" fill="#00f0ff" opacity="0.8"/>
    <circle cx="70" cy="90" r="1" fill="#9d00ff" opacity="0.6"/>
    <circle cx="90" cy="90" r="1.5" fill="#00f0ff" opacity="0.8"/>
  </g>
</svg>
