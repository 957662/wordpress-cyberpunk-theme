<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="holoGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="holoGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Holographic base -->
  <rect x="10" y="10" width="180" height="180" rx="10" fill="url(#holoGrad1)"/>

  <!-- Scanning lines -->
  <g opacity="0.3">
    <line x1="10" y1="40" x2="190" y2="40" stroke="#00f0ff" stroke-width="1"/>
    <line x1="10" y1="80" x2="190" y2="80" stroke="#00f0ff" stroke-width="1"/>
    <line x1="10" y1="120" x2="190" y2="120" stroke="#00f0ff" stroke-width="1"/>
    <line x1="10" y1="160" x2="190" y2="160" stroke="#00f0ff" stroke-width="1"/>
  </g>

  <!-- Corner accents -->
  <path d="M 10 30 L 10 10 L 30 10" stroke="#00f0ff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 190 30 L 190 10 L 170 10" stroke="#00f0ff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 10 170 L 10 190 L 30 190" stroke="#9d00ff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 190 170 L 190 190 L 170 190" stroke="#9d00ff" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Data dots -->
  <g fill="#00f0ff" opacity="0.5">
    <circle cx="30" cy="30" r="2"/>
    <circle cx="170" cy="30" r="2"/>
    <circle cx="30" cy="170" r="2"/>
    <circle cx="170" cy="170" r="2"/>
  </g>
</svg>
