<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.3" />
    </linearGradient>
    <filter id="badgeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Badge Background -->
  <rect x="2" y="2" width="116" height="36" fill="url(#badgeGrad)"
        stroke="url(#badgeGrad)" stroke-width="1" rx="4" filter="url(#badgeGlow)" />

  <!-- Left Accent -->
  <rect x="2" y="15" width="8" height="10" fill="#9d00ff" opacity="0.8" />

  <!-- Right Accent -->
  <rect x="110" y="15" width="8" height="10" fill="#00f0ff" opacity="0.8" />

  <!-- Tech Lines -->
  <g stroke="url(#badgeGrad)" stroke-width="0.5" opacity="0.6">
    <line x1="20" y1="10" x2="100" y2="10" />
    <line x1="20" y1="30" x2="100" y2="30" />
  </g>

  <!-- Center Dots -->
  <g fill="#00f0ff" opacity="0.5">
    <circle cx="30" cy="20" r="1.5" />
    <circle cx="40" cy="20" r="1.5" />
    <circle cx="80" cy="20" r="1.5" />
    <circle cx="90" cy="20" r="1.5" />
  </g>

  <!-- Corner Brackets -->
  <g stroke="url(#badgeGrad)" stroke-width="1" fill="none" opacity="0.7">
    <path d="M15 8 L15 5 L18 5" />
    <path d="M105 8 L105 5 L102 5" />
    <path d="M15 32 L15 35 L18 35" />
    <path d="M105 32 L105 35 L102 35" />
  </g>
</svg>
