<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="loaderGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="80" stroke="url(#loaderGrad2)" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="125.6 377" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Middle Ring -->
  <circle cx="100" cy="100" r="65" stroke="#00f0ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="102 306" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner Ring -->
  <circle cx="100" cy="100" r="50" stroke="#9d00ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="78.5 235.5" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Core Ring -->
  <circle cx="100" cy="100" r="35" stroke="#ff0080" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="55 165">
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Center Dot -->
  <circle cx="100" cy="100" r="10" fill="url(#loaderGrad2)">
    <animate attributeName="r" values="10;15;10" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting Particles -->
  <g fill="#00f0ff">
    <circle cx="100" cy="20" r="3">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="180" r="3">
      <animateTransform attributeName="transform" type="rotate" from="180 100 100" to="540 100 100" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="100" r="3">
      <animateTransform attributeName="transform" type="rotate" from="90 100 100" to="450 100 100" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="100" r="3">
      <animateTransform attributeName="transform" type="rotate" from="270 100 100" to="630 100 100" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>