<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="corner-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main corner lines -->
  <path d="M5 5 L40 5" stroke="url(#corner-grad)" stroke-width="2"/>
  <path d="M5 5 L5 40" stroke="url(#corner-grad)" stroke-width="2"/>

  <!-- Inner corner -->
  <path d="M8 8 L30 8" stroke="url(#corner-grad)" stroke-width="1" opacity="0.6"/>
  <path d="M8 8 L8 30" stroke="url(#corner-grad)" stroke-width="1" opacity="0.6"/>

  <!-- Corner dot -->
  <circle cx="5" cy="5" r="3" fill="#00f0ff"/>

  <!-- Tech dots -->
  <circle cx="40" cy="5" r="2" fill="#9d00ff" opacity="0.8"/>
  <circle cx="5" cy="40" r="2" fill="#9d00ff" opacity="0.8"/>
</svg>