<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="loader-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#9d00ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
  </defs>

  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="40"
          stroke="url(#loader-gradient)"
          stroke-width="3"
          fill="none"
          stroke-dasharray="100"
          stroke-dashoffset="0">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Middle Ring -->
  <circle cx="50" cy="50" r="30"
          stroke="#00f0ff"
          stroke-width="2"
          fill="none"
          stroke-dasharray="60"
          stroke-dashoffset="0"
          opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner Ring -->
  <circle cx="50" cy="50" r="20"
          stroke="#9d00ff"
          stroke-width="1.5"
          fill="none"
          stroke-dasharray="40"
          stroke-dashoffset="0"
          opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Center Core -->
  <circle cx="50" cy="50" r="8" fill="url(#loader-gradient)">
    <animate attributeName="r" values="8;10;8" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting Element -->
  <circle cx="50" cy="10" r="3" fill="#ff0080">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
