<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="cyberGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.2"/>
    </pattern>
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0a0a0f;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- 网格背景 -->
  <rect width="100" height="100" fill="url(#cyberGrid)"/>

  <!-- 装饰点 -->
  <circle cx="0" cy="0" r="1" fill="#00f0ff" opacity="0.5"/>
  <circle cx="20" cy="0" r="1" fill="#00f0ff" opacity="0.5"/>
  <circle cx="40" cy="0" r="1" fill="#00f0ff" opacity="0.5"/>
  <circle cx="60" cy="0" r="1" fill="#00f0ff" opacity="0.5"/>
  <circle cx="80" cy="0" r="1" fill="#00f0ff" opacity="0.5"/>
  <circle cx="100" cy="0" r="1" fill="#00f0ff" opacity="0.5"/>

  <circle cx="0" cy="20" r="1" fill="#9d00ff" opacity="0.5"/>
  <circle cx="20" cy="20" r="1" fill="#9d00ff" opacity="0.5"/>
  <circle cx="40" cy="20" r="1" fill="#9d00ff" opacity="0.5"/>
  <circle cx="60" cy="20" r="1" fill="#9d00ff" opacity="0.5"/>
  <circle cx="80" cy="20" r="1" fill="#9d00ff" opacity="0.5"/>
  <circle cx="100" cy="20" r="1" fill="#9d00ff" opacity="0.5"/>

  <circle cx="0" cy="40" r="1" fill="#ff0080" opacity="0.5"/>
  <circle cx="20" cy="40" r="1" fill="#ff0080" opacity="0.5"/>
  <circle cx="40" cy="40" r="1" fill="#ff0080" opacity="0.5"/>
  <circle cx="60" cy="40" r="1" fill="#ff0080" opacity="0.5"/>
  <circle cx="80" cy="40" r="1" fill="#ff0080" opacity="0.5"/>
  <circle cx="100" cy="40" r="1" fill="#ff0080" opacity="0.5"/>

  <!-- 渐变遮罩 -->
  <rect width="100" height="100" fill="url(#gridFade)"/>
</svg>
