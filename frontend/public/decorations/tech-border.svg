<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" fill="none" width="400" height="20">
  <defs>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0" />
    </linearGradient>
    <filter id="borderGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main border line -->
  <line x1="0" y1="10" x2="400" y2="10" stroke="url(#borderGradient)" stroke-width="2" filter="url(#borderGlow)"/>

  <!-- Tech decorations -->
  <rect x="80" y="7" width="20" height="2" fill="#00f0ff" opacity="0.8"/>
  <rect x="80" y="11" width="15" height="1" fill="#00f0ff" opacity="0.5"/>

  <rect x="300" y="7" width="20" height="2" fill="#ff0080" opacity="0.8"/>
  <rect x="305" y="11" width="15" height="1" fill="#ff0080" opacity="0.5"/>

  <!-- Circuit nodes -->
  <circle cx="80" cy="10" r="3" fill="#00f0ff" opacity="0.9" filter="url(#borderGlow)"/>
  <circle cx="200" cy="10" r="4" fill="#9d00ff" opacity="0.9" filter="url(#borderGlow)"/>
  <circle cx="320" cy="10" r="3" fill="#ff0080" opacity="0.9" filter="url(#borderGlow)"/>

  <!-- Data points -->
  <circle cx="100" cy="10" r="1.5" fill="#00f0ff" opacity="0.6"/>
  <circle cx="120" cy="10" r="1.5" fill="#00f0ff" opacity="0.4"/>
  <circle cx="280" cy="10" r="1.5" fill="#ff0080" opacity="0.6"/>
  <circle cx="300" cy="10" r="1.5" fill="#ff0080" opacity="0.4"/>
</svg>