<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <pattern id="techGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#00f0ff" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Main Frame -->
  <rect x="20" y="20" width="760" height="560" rx="5" stroke="url(#techGradient)" stroke-width="2" fill="none"/>

  <!-- Inner Frame -->
  <rect x="35" y="35" width="730" height="530" rx="3" stroke="url(#techGradient)" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Corner Accents -->
  <g>
    <!-- Top Left -->
    <rect x="20" y="20" width="40" height="3" fill="url(#techGradient)"/>
    <rect x="20" y="20" width="3" height="40" fill="url(#techGradient)"/>
    <circle cx="30" cy="30" r="4" fill="#00f0ff">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Top Right -->
    <rect x="760" y="20" width="40" height="3" fill="url(#techGradient)" transform="rotate(90, 760, 20)"/>
    <rect x="777" y="20" width="3" height="40" fill="url(#techGradient)"/>
    <circle cx="770" cy="30" r="4" fill="#9d00ff">
      <animate attributeName="r" values="4;6;4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Bottom Left -->
    <rect x="20" y="580" width="40" height="3" fill="url(#techGradient)"/>
    <rect x="20" y="540" width="3" height="40" fill="url(#techGradient)"/>
    <circle cx="30" cy="570" r="4" fill="#ff0080">
      <animate attributeName="r" values="4;6;4" dur="2s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>

    <!-- Bottom Right -->
    <rect x="760" y="580" width="40" height="3" fill="url(#techGradient)" transform="rotate(90, 760, 580)"/>
    <rect x="777" y="540" width="3" height="40" fill="url(#techGradient)"/>
    <circle cx="770" cy="570" r="4" fill="#00f0ff">
      <animate attributeName="r" values="4;6;4" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Tech Lines Top -->
  <g stroke="url(#techGradient)" stroke-width="1" opacity="0.4">
    <line x1="100" y1="20" x2="100" y2="35"/>
    <line x1="150" y1="20" x2="150" y2="30"/>
    <line x1="200" y1="20" x2="200" y2="35"/>
    <line x1="600" y1="20" x2="600" y2="35"/>
    <line x1="650" y1="20" x2="650" y2="30"/>
    <line x1="700" y1="20" x2="700" y2="35"/>
  </g>

  <!-- Tech Lines Bottom -->
  <g stroke="url(#techGradient)" stroke-width="1" opacity="0.4">
    <line x1="100" y1="565" x2="100" y2="580"/>
    <line x1="150" y1="570" x2="150" y2="580"/>
    <line x1="200" y1="565" x2="200" y2="580"/>
    <line x1="600" y1="565" x2="600" y2="580"/>
    <line x1="650" y1="570" x2="650" y2="580"/>
    <line x1="700" y1="565" x2="700" y2="580"/>
  </g>

  <!-- Side Decorations -->
  <g stroke="url(#techGradient)" stroke-width="1" opacity="0.3">
    <!-- Left -->
    <line x1="20" y1="150" x2="35" y2="150"/>
    <line x1="20" y1="200" x2="30" y2="200"/>
    <line x1="20" y1="250" x2="35" y2="250"/>
    <line x1="20" y1="350" x2="35" y2="350"/>
    <line x1="20" y1="400" x2="30" y2="400"/>
    <line x1="20" y1="450" x2="35" y2="450"/>

    <!-- Right -->
    <line x1="765" y1="150" x2="780" y2="150"/>
    <line x1="770" y1="200" x2="780" y2="200"/>
    <line x1="765" y1="250" x2="780" y2="250"/>
    <line x1="765" y1="350" x2="780" y2="350"/>
    <line x1="770" y1="400" x2="780" y2="400"/>
    <line x1="765" y1="450" x2="780" y2="450"/>
  </g>

  <!-- Grid Pattern Overlay -->
  <rect x="35" y="35" width="730" height="530" fill="url(#techGrid)" opacity="0.2"/>
</svg>