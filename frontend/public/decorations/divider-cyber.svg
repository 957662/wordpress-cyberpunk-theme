<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" width="400" height="20" preserveAspectRatio="none">
  <defs>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </linearGradient>
    <filter id="dividerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Center diamond -->
  <g filter="url(#dividerGlow)">
    <polygon points="200,10 195,5 200,0 205,5" fill="#00f0ff"/>
    <polygon points="200,20 195,15 200,10 205,15" fill="#9d00ff"/>
  </g>

  <!-- Lines extending from center -->
  <g filter="url(#dividerGlow)">
    <line x1="205" y1="10" x2="300" y2="10" stroke="url(#dividerGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="195" y1="10" x2="100" y2="10" stroke="url(#dividerGrad)" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Decorative nodes -->
  <circle cx="150" cy="10" r="2" fill="#00f0ff" opacity="0.3"/>
  <circle cx="250" cy="10" r="2" fill="#00f0ff" opacity="0.3"/>
  <circle cx="100" cy="10" r="1.5" fill="#00f0ff" opacity="0.2"/>
  <circle cx="300" cy="10" r="1.5" fill="#00f0ff" opacity="0.2"/>
</svg>
