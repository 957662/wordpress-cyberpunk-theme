<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 4" fill="none">
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0">
        <animate attributeName="offset" values="0%;100%;0%" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1">
        <animate attributeName="offset" values="0%;100%;0%" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0">
        <animate attributeName="offset" values="0%;100%;0%" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Main Line -->
  <line x1="0" y1="2" x2="800" y2="2" stroke="url(#glowGradient)" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- Glow Effect -->
  <line x1="0" y1="2" x2="800" y2="2" stroke="#00f0ff" stroke-width="6" opacity="0.3" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
</svg>