<svg xmlns="http://www.w3.org/2000/svg" width="120" height="104" viewBox="0 0 120 104">
  <defs>
    <pattern id="hexPattern" x="0" y="0" width="40" height="34.64" patternUnits="userSpaceOnUse">
      <polygon points="20,0 40,10 40,30 20,40 0,30 0,10"
               fill="none" stroke="#9d00ff" stroke-width="0.5" opacity="0.15"/>
    </pattern>

    <linearGradient id="hexGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- 六边形网格 -->
  <rect width="120" height="104" fill="url(#hexPattern)"/>

  <!-- 亮色六边形 -->
  <g opacity="0.6">
    <polygon points="20,0 40,10 40,30 20,40 0,30 0,10"
             fill="url(#hexGlow)" stroke="#00f0ff" stroke-width="0.3"/>
    <polygon points="60,0 80,10 80,30 60,40 40,30 40,10"
             fill="url(#hexGlow)" stroke="#00f0ff" stroke-width="0.3"/>
    <polygon points="100,0 120,10 120,30 100,40 80,30 80,10"
             fill="url(#hexGlow)" stroke="#00f0ff" stroke-width="0.3"/>
  </g>
</svg>
