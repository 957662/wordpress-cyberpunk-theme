<svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="corner-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 外角 -->
  <path d="M0 10 L0 0 L10 0"
        fill="none"
        stroke="#00f0ff"
        stroke-width="2"
        filter="url(#corner-glow)"/>

  <!-- 内角 -->
  <path d="M0 20 L0 12 L12 12"
        fill="none"
        stroke="#9d00ff"
        stroke-width="1"
        opacity="0.6"/>

  <!-- 装饰点 -->
  <circle cx="0" cy="0" r="1.5" fill="#00f0ff" filter="url(#corner-glow)"/>
  <circle cx="0" cy="15" r="0.8" fill="#9d00ff" opacity="0.5"/>
  <circle cx="15" cy="0" r="0.8" fill="#ff0080" opacity="0.5"/>
</svg>
