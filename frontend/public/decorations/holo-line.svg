<svg width="400" height="10" viewBox="0 0 400 10" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Main line -->
  <line x1="0" y1="5" x2="400" y2="5" stroke="url(#line-grad)" stroke-width="2"/>

  <!-- Animated dot -->
  <circle r="4" fill="#00f0ff">
    <animateMotion dur="3s" repeatCount="indefinite">
      <mpath href="#linePath"/>
    </animateMotion>
  </circle>

  <!-- Hidden path for animation -->
  <path id="linePath" d="M0 5 L400 5" fill="none"/>
</svg>