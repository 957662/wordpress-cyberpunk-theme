<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="cornerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Top Left Corner -->
  <g id="corner-tl">
    <path d="M0 60 L0 0 L60 0" stroke="url(#cornerGradient)" stroke-width="2" fill="none"/>
    <path d="M0 80 L0 0 L80 0" stroke="url(#cornerGradient)" stroke-width="1" fill="none" opacity="0.5"/>
    <rect x="0" y="0" width="20" height="20" fill="url(#cornerGradient)" opacity="0.3"/>
    <circle cx="10" cy="10" r="3" fill="#00f0ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Top Right Corner -->
  <g id="corner-tr" transform="translate(400, 0) scale(-1, 1)">
    <path d="M0 60 L0 0 L60 0" stroke="url(#cornerGradient)" stroke-width="2" fill="none"/>
    <path d="M0 80 L0 0 L80 0" stroke="url(#cornerGradient)" stroke-width="1" fill="none" opacity="0.5"/>
    <rect x="0" y="0" width="20" height="20" fill="url(#cornerGradient)" opacity="0.3"/>
    <circle cx="10" cy="10" r="3" fill="#00f0ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom Left Corner -->
  <g id="corner-bl" transform="translate(0, 400) scale(1, -1)">
    <path d="M0 60 L0 0 L60 0" stroke="url(#cornerGradient)" stroke-width="2" fill="none"/>
    <path d="M0 80 L0 0 L80 0" stroke="url(#cornerGradient)" stroke-width="1" fill="none" opacity="0.5"/>
    <rect x="0" y="0" width="20" height="20" fill="url(#cornerGradient)" opacity="0.3"/>
    <circle cx="10" cy="10" r="3" fill="#00f0ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom Right Corner -->
  <g id="corner-br" transform="translate(400, 400) scale(-1, -1)">
    <path d="M0 60 L0 0 L60 0" stroke="url(#cornerGradient)" stroke-width="2" fill="none"/>
    <path d="M0 80 L0 0 L80 0" stroke="url(#cornerGradient)" stroke-width="1" fill="none" opacity="0.5"/>
    <rect x="0" y="0" width="20" height="20" fill="url(#cornerGradient)" opacity="0.3"/>
    <circle cx="10" cy="10" r="3" fill="#00f0ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>