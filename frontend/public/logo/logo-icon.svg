<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- 霓虹青渐变 -->
    <linearGradient id="iconCyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a0aa;stop-opacity:1" />
    </linearGradient>
    <!-- 赛博紫渐变 -->
    <linearGradient id="iconPurpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a00aa;stop-opacity:1" />
    </linearGradient>
    <!-- 激光粉渐变 -->
    <linearGradient id="iconPinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa0055;stop-opacity:1" />
    </linearGradient>
    <!-- 强发光滤镜 -->
    <filter id="iconNeonGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 外层六边形 -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18"
           fill="none" stroke="url(#iconCyanGradient)" stroke-width="2"
           filter="url(#iconNeonGlow)"/>

  <!-- 内层电路图案 -->
  <g transform="translate(16, 16)" fill="none" stroke="url(#iconPurpleGradient)" stroke-width="2">
    <!-- 横线 -->
    <line x1="4" y1="8" x2="28" y2="8"/>
    <line x1="4" y1="16" x2="28" y2="16"/>
    <line x1="4" y1="24" x2="28" y2="24"/>

    <!-- 竖线 -->
    <line x1="8" y1="4" x2="8" y2="28"/>
    <line x1="16" y1="0" x2="16" y2="32"/>
    <line x1="24" y1="4" x2="24" y2="28"/>
  </g>

  <!-- 中心芯片 -->
  <circle cx="32" cy="32" r="8" fill="url(#iconPinkGradient)" filter="url(#iconNeonGlow)"/>
  <circle cx="32" cy="32" r="4" fill="#ffffff"/>

  <!-- 装饰点 -->
  <circle cx="32" cy="6" r="2" fill="url(#iconCyanGradient)" filter="url(#iconNeonGlow)"/>
  <circle cx="32" cy="58" r="2" fill="url(#iconCyanGradient)" filter="url(#iconNeonGlow)"/>
  <circle cx="6" cy="32" r="2" fill="url(#iconCyanGradient)" filter="url(#iconNeonGlow)"/>
  <circle cx="58" cy="32" r="2" fill="url(#iconCyanGradient)" filter="url(#iconNeonGlow)"/>
</svg>
