<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <!-- 霓虹青渐变 -->
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a0aa;stop-opacity:1" />
    </linearGradient>
    <!-- 赛博紫渐变 -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a00aa;stop-opacity:1" />
    </linearGradient>
    <!-- 激光粉渐变 -->
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa0055;stop-opacity:1" />
    </linearGradient>
    <!-- 发光滤镜 -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 主图标：赛博电路芯片 -->
  <g transform="translate(10, 10)">
    <!-- 外框 -->
    <rect x="0" y="0" width="40" height="40" rx="6"
          fill="none" stroke="url(#cyanGradient)" stroke-width="2"
          filter="url(#neonGlow)"/>

    <!-- 内部电路图案 -->
    <g fill="none" stroke="url(#purpleGradient)" stroke-width="1.5">
      <!-- 横向线条 -->
      <line x1="8" y1="12" x2="32" y2="12"/>
      <line x1="8" y1="20" x2="32" y2="20"/>
      <line x1="8" y1="28" x2="32" y2="28"/>

      <!-- 纵向连接线 -->
      <line x1="12" y1="12" x2="12" y2="28"/>
      <line x1="20" y1="8" x2="20" y2="32"/>
      <line x1="28" y1="12" x2="28" y2="28"/>
    </g>

    <!-- 芯片核心点 -->
    <circle cx="20" cy="20" r="4" fill="url(#pinkGradient)" filter="url(#neonGlow)"/>
    <circle cx="20" cy="20" r="2" fill="#ffffff"/>
  </g>

  <!-- 文字：CYBER -->
  <g transform="translate(60, 38)" font-family="'Courier New', monospace" font-weight="bold" font-size="28" fill="url(#cyanGradient)" filter="url(#neonGlow)">
    <text x="0" y="0">CYBER</text>
  </g>

  <!-- 文字：PRESS -->
  <g transform="translate(155, 38)" font-family="'Courier New', monospace" font-weight="bold" font-size="28" fill="url(#purpleGradient)" filter="url(#neonGlow)">
    <text x="0" y="0">PRESS</text>
  </g>
</svg>
