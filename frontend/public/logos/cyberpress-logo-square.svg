<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="neonCyanSq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neonPurpleSq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16162a;stop-opacity:1" />
    </linearGradient>
    <filter id="glowSq">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlowSq">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="64" fill="url(#bgGradient)" />

  <!-- 扫描线效果 -->
  <g opacity="0.03">
    <line x1="0" y1="64" x2="512" y2="64" stroke="#00f0ff" stroke-width="1" />
    <line x1="0" y1="128" x2="512" y2="128" stroke="#00f0ff" stroke-width="1" />
    <line x1="0" y1="192" x2="512" y2="192" stroke="#00f0ff" stroke-width="1" />
    <line x1="0" y1="256" x2="512" y2="256" stroke="#00f0ff" stroke-width="1" />
    <line x1="0" y1="320" x2="512" y2="320" stroke="#00f0ff" stroke-width="1" />
    <line x1="0" y1="384" x2="512" y2="384" stroke="#00f0ff" stroke-width="1" />
    <line x1="0" y1="448" x2="512" y2="448" stroke="#00f0ff" stroke-width="1" />
  </g>

  <!-- 外圈 -->
  <circle cx="256" cy="240" r="180" stroke="url(#neonCyanSq)" stroke-width="3" opacity="0.3" />
  <circle cx="256" cy="240" r="150" stroke="url(#neonPurpleSq)" stroke-width="2" opacity="0.4" />

  <!-- 大六边形 -->
  <path d="M256 80 L412 170 L412 350 L256 440 L100 350 L100 170 Z"
        fill="none" stroke="url(#neonCyanSq)" stroke-width="4" filter="url(#glowSq)" />

  <!-- 内部六边形填充 -->
  <path d="M256 120 L370 186 L370 294 L256 360 L142 294 L142 186 Z"
        fill="url(#neonCyanSq)" opacity="0.08" stroke="url(#neonPurpleSq)" stroke-width="2" />

  <!-- 中心圆核心 -->
  <circle cx="256" cy="240" r="40" fill="url(#neonCyanSq)" filter="url(#strongGlowSq)" opacity="0.9" />
  <circle cx="256" cy="240" r="15" fill="#0a0a0f" />
  <circle cx="256" cy="240" r="8" fill="url(#neonCyanSq)" filter="url(#strongGlowSq)" />

  <!-- CPU 芯片纹路 -->
  <g opacity="0.7">
    <!-- 上方 -->
    <line x1="256" y1="200" x2="256" y2="120" stroke="url(#neonCyanSq)" stroke-width="2" />
    <line x1="236" y1="210" x2="236" y2="140" stroke="url(#neonCyanSq)" stroke-width="2" opacity="0.5" />
    <line x1="276" y1="210" x2="276" y2="140" stroke="url(#neonCyanSq)" stroke-width="2" opacity="0.5" />

    <!-- 左方 -->
    <line x1="216" y1="240" x2="136" y2="240" stroke="url(#neonCyanSq)" stroke-width="2" />
    <line x1="226" y1="220" x2="156" y2="220" stroke="url(#neonCyanSq)" stroke-width="2" opacity="0.5" />
    <line x1="226" y1="260" x2="156" y2="260" stroke="url(#neonCyanSq)" stroke-width="2" opacity="0.5" />

    <!-- 右方 -->
    <line x1="296" y1="240" x2="376" y2="240" stroke="url(#neonCyanSq)" stroke-width="2" />
    <line x1="286" y1="220" x2="356" y2="220" stroke="url(#neonCyanSq)" stroke-width="2" opacity="0.5" />
    <line x1="286" y1="260" x2="356" y2="260" stroke="url(#neonCyanSq)" stroke-width="2" opacity="0.5" />

    <!-- 下方芯片脚 -->
    <line x1="226" y1="280" x2="226" y2="340" stroke="url(#neonPurpleSq)" stroke-width="3" />
    <line x1="246" y1="280" x2="246" y2="350" stroke="url(#neonPurpleSq)" stroke-width="3" />
    <line x1="266" y1="280" x2="266" y2="350" stroke="url(#neonPurpleSq)" stroke-width="3" />
    <line x1="286" y1="280" x2="286" y2="340" stroke="url(#neonPurpleSq)" stroke-width="3" />
  </g>

  <!-- 角落装饰 -->
  <g opacity="0.5">
    <path d="M64 64 L96 64 L64 96" stroke="url(#neonCyanSq)" stroke-width="3" fill="none" />
    <path d="M448 64 L416 64 L448 96" stroke="url(#neonCyanSq)" stroke-width="3" fill="none" />
    <path d="M64 448 L96 448 L64 416" stroke="url(#neonPurpleSq)" stroke-width="3" fill="none" />
    <path d="M448 448 L416 448 L448 416" stroke="url(#neonPurpleSq)" stroke-width="3" fill="none" />
  </g>

  <!-- CYBERPRESS 文字 -->
  <text x="256" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#neonCyanSq)" filter="url(#glowSq)">
    CYBER
  </text>
  <text x="256" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#neonPurpleSq)" letter-spacing="8">
    PRESS
  </text>
</svg>
