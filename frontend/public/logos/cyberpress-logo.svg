<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- 霓虹青渐变 -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a0ff;stop-opacity:1" />
    </linearGradient>

    <!-- 霓虹紫渐变 -->
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>

    <!-- 发光滤镜 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆环 - 外层 -->
  <circle cx="100" cy="100" r="90" stroke="url(#neonCyan)" stroke-width="2" opacity="0.3" />

  <!-- 背景圆环 - 中层 -->
  <circle cx="100" cy="100" r="75" stroke="url(#neonPurple)" stroke-width="1.5" opacity="0.4" />

  <!-- 背景圆环 - 内层 -->
  <circle cx="100" cy="100" r="60" stroke="url(#neonCyan)" stroke-width="1" opacity="0.5" />

  <!-- 六边形核心 -->
  <path d="M100 45 L140 67.5 L140 112.5 L100 135 L60 112.5 L60 67.5 Z"
        fill="none" stroke="url(#neonCyan)" stroke-width="2.5" filter="url(#glow)" />

  <!-- 内部六边形 -->
  <path d="M100 55 L125 70 L125 95 L100 110 L75 95 L75 70 Z"
        fill="url(#neonCyan)" opacity="0.1" stroke="url(#neonPurple)" stroke-width="1.5" />

  <!-- 中心圆 -->
  <circle cx="100" cy="82" r="12" fill="url(#neonCyan)" filter="url(#strongGlow)" opacity="0.9" />

  <!-- CPU 芯片纹路 -->
  <g opacity="0.7">
    <!-- 垂直线 -->
    <line x1="100" y1="70" x2="100" y2="55" stroke="url(#neonCyan)" stroke-width="1" />
    <line x1="90" y1="75" x2="90" y2="60" stroke="url(#neonCyan)" stroke-width="1" opacity="0.5" />
    <line x1="110" y1="75" x2="110" y2="60" stroke="url(#neonCyan)" stroke-width="1" opacity="0.5" />

    <!-- 水平线 -->
    <line x1="88" y1="82" x2="73" y2="82" stroke="url(#neonCyan)" stroke-width="1" />
    <line x1="112" y1="82" x2="127" y2="82" stroke="url(#neonCyan)" stroke-width="1" />

    <!-- 芯片脚 -->
    <line x1="85" y1="95" x2="85" y2="105" stroke="url(#neonPurple)" stroke-width="1.5" />
    <line x1="95" y1="95" x2="95" y2="105" stroke="url(#neonPurple)" stroke-width="1.5" />
    <line x1="105" y1="95" x2="105" y2="105" stroke="url(#neonPurple)" stroke-width="1.5" />
    <line x1="115" y1="95" x2="115" y2="105" stroke="url(#neonPurple)" stroke-width="1.5" />
  </g>

  <!-- 装饰点 -->
  <circle cx="100" cy="82" r="4" fill="#0a0a0f" />
  <circle cx="100" cy="82" r="2" fill="url(#neonCyan)" filter="url(#strongGlow)" />

  <!-- 数据流动线条 -->
  <g opacity="0.6">
    <path d="M50 100 Q40 100 35 90" stroke="url(#neonCyan)" stroke-width="1.5" fill="none" />
    <path d="M150 100 Q160 100 165 90" stroke="url(#neonCyan)" stroke-width="1.5" fill="none" />
    <path d="M100 50 Q100 40 90 35" stroke="url(#neonPurple)" stroke-width="1.5" fill="none" />
    <path d="M100 150 Q100 160 110 165" stroke="url(#neonPurple)" stroke-width="1.5" fill="none" />
  </g>

  <!-- 角落装饰 -->
  <g opacity="0.4">
    <path d="M20 30 L35 30 L35 45" stroke="url(#neonCyan)" stroke-width="2" fill="none" />
    <path d="M180 30 L165 30 L165 45" stroke="url(#neonCyan)" stroke-width="2" fill="none" />
    <path d="M20 170 L35 170 L35 155" stroke="url(#neonPurple)" stroke-width="2" fill="none" />
    <path d="M180 170 L165 170 L165 155" stroke="url(#neonPurple)" stroke-width="2" fill="none" />
  </g>

  <!-- CYBER 文字 -->
  <text x="100" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="url(#neonCyan)" filter="url(#glow)">
    CYBER
  </text>
  <text x="100" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="url(#neonPurple)" letter-spacing="3">
    PRESS
  </text>
</svg>
