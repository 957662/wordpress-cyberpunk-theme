<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <radialGradient id="darkGradient1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="darkGradient2" cx="30%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#12121a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Main Background -->
  <rect width="1920" height="1080" fill="url(#darkGradient1)"/>

  <!-- Gradient Accents -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#darkGradient2)"/>

  <!-- Subtle Grid -->
  <g opacity="0.03">
    <defs>
      <pattern id="darkGrid" width="100" height="100" patternUnits="userSpaceOnUse">
        <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#00f0ff" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="1920" height="1080" fill="url(#darkGrid)"/>
  </g>

  <!-- Corner Accents -->
  <g opacity="0.1">
    <!-- Top Left -->
    <path d="M 0 0 L 200 0 L 0 200 Z" fill="#00f0ff"/>
    <!-- Top Right -->
    <path d="M 1920 0 L 1720 0 L 1920 200 Z" fill="#9d00ff"/>
    <!-- Bottom Left -->
    <path d="M 0 1080 L 200 1080 L 0 880 Z" fill="#ff0080"/>
    <!-- Bottom Right -->
    <path d="M 1920 1080 L 1720 1080 L 1920 880 Z" fill="#00f0ff"/>
  </g>

  <!-- Floating Particles -->
  <g opacity="0.3">
    <circle cx="200" cy="200" r="2" fill="#00f0ff">
      <animate attributeName="cy" values="200;180;200" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1720" cy="150" r="3" fill="#9d00ff">
      <animate attributeName="cy" values="150;130;150" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="930" r="2" fill="#ff0080">
      <animate attributeName="cy" values="930;910;930" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1770" cy="900" r="3" fill="#00f0ff">
      <animate attributeName="cy" values="900;880;900" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
