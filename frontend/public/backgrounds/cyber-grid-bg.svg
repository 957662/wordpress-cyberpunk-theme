<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="gridGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="cyberGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <g filter="url(#gridGlow)">
        <!-- Grid Lines -->
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>

        <!-- Corner Accents -->
        <rect x="0" y="0" width="8" height="8" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
        <rect x="32" y="32" width="8" height="8" fill="none" stroke="#9d00ff" stroke-width="0.5" opacity="0.2"/>

        <!-- Center Dot -->
        <circle cx="20" cy="20" r="1" fill="#00f0ff" opacity="0.25"/>
      </g>
    </pattern>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stopColor="#0a0a0f" stopOpacity="0"/>
      <stop offset="100%" stopColor="#0a0a0f" stopOpacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0f"/>

  <!-- Grid Overlay -->
  <rect width="400" height="400" fill="url(#cyberGrid)"/>

  <!-- Vignette Effect -->
  <rect width="400" height="400" fill="url(#vignette)"/>

  <!-- Floating Particles -->
  <g opacity="0.3">
    <circle cx="50" cy="80" r="1" fill="#00f0ff">
      <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="200" r="1.5" fill="#9d00ff">
      <animate attributeName="cy" values="200;180;200" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="320" r="1" fill="#ff0080">
      <animate attributeName="cy" values="320;300;320" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="150" r="1.2" fill="#00f0ff">
      <animate attributeName="cy" values="150;130;150" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Tech Lines -->
  <g stroke="currentColor" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>
</svg>