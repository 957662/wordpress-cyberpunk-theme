<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="cyberBgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>

    <!-- Neon glow effects -->
    <radialGradient id="neonGlow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="neonGlow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="neonGlow3" cx="50%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0" />
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="cyberGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#cyberBgGradient)"/>

  <!-- Grid overlay -->
  <rect width="1920" height="1080" fill="url(#cyberGrid)"/>

  <!-- Neon glow effects -->
  <ellipse cx="384" cy="324" rx="400" ry="300" fill="url(#neonGlow1)"/>
  <ellipse cx="1536" cy="756" rx="400" ry="300" fill="url(#neonGlow2)"/>
  <ellipse cx="960" cy="540" rx="300" ry="200" fill="url(#neonGlow3)"/>

  <!-- Decorative circuit lines -->
  <g stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.1">
    <!-- Top left circuit -->
    <path d="M 0 100 L 200 100 L 250 150 L 250 300"/>
    <circle cx="200" cy="100" r="3" fill="#00f0ff"/>
    <circle cx="250" cy="150" r="3" fill="#00f0ff"/>

    <!-- Bottom right circuit -->
    <path d="M 1920 980 L 1720 980 L 1670 930 L 1670 780"/>
    <circle cx="1720" cy="980" r="3" fill="#9d00ff"/>
    <circle cx="1670" cy="930" r="3" fill="#9d00ff"/>

    <!-- Top right circuit -->
    <path d="M 1920 100 L 1720 100 L 1670 150 L 1670 300"/>
    <circle cx="1720" cy="100" r="3" fill="#ff0080"/>
    <circle cx="1670" cy="150" r="3" fill="#ff0080"/>
  </g>

  <!-- Corner accents -->
  <g stroke="#00f0ff" stroke-width="2" fill="none" opacity="0.3">
    <path d="M 0 50 L 50 50 L 50 0"/>
    <path d="M 1870 0 L 1870 50 L 1920 50"/>
    <path d="M 0 1030 L 50 1030 L 50 1080"/>
    <path d="M 1870 1080 L 1870 1030 L 1920 1030"/>
  </g>
</svg>