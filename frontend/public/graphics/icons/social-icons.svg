<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <defs>
    <linearGradient id="socialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>

    <filter id="socialGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 标题 -->
  <text x="300" y="30" text-anchor="middle" font-size="14" fill="#00f0ff" font-weight="bold" letter-spacing="2">
    SOCIAL MEDIA ICONS
  </text>

  <!-- GitHub -->
  <g transform="translate(60, 80)">
    <rect width="80" height="80" fill="#16162a" rx="12" stroke="#00f0ff" stroke-width="1"/>
    <g transform="translate(40, 40)">
      <path d="M-12 -8C-12 -16 -6 -20 0 -20C6 -20 12 -16 12 -8V4C12 8 10 12 6 12V16C6 18 8 20 10 20H14C16 20 18 18 18 16V-8C18 -20 10 -28 0 -28C-10 -28 -18 -20 -18 -8V16C-18 18 -16 20 -14 20H-10C-8 20 -6 18 -6 16V12C-10 12 -12 8 -12 4V-8Z" fill="#00f0ff" filter="url(#socialGlow)"/>
      <circle cx="-5" cy="-10" r="2" fill="#0a0a0f"/>
      <circle cx="5" cy="-10" r="2" fill="#0a0a0f"/>
    </g>
    <text x="40" y="115" text-anchor="middle" font-size="10" fill="#e0e0e0">GitHub</text>
  </g>

  <!-- Twitter/X -->
  <g transform="translate(170, 80)">
    <rect width="80" height="80" fill="#16162a" rx="12" stroke="#9d00ff" stroke-width="1"/>
    <g transform="translate(40, 40)">
      <path d="M-8 10L-4 6C-6 4 -8 2 -8 -2C-8 -8 -4 -12 2 -12H6C12 -12 16 -8 16 -2V6C16 10 14 12 10 12H2L-4 16L-8 12H-10C-14 12 -16 10 -16 6V-2C-16 -8 -12 -12 -6 -12H2L8 -8L12 -12" stroke="#9d00ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="40" y="115" text-anchor="middle" font-size="10" fill="#e0e0e0">Twitter</text>
  </g>

  <!-- LinkedIn -->
  <g transform="translate(280, 80)">
    <rect width="80" height="80" fill="#16162a" rx="12" stroke="#00f0ff" stroke-width="1"/>
    <g transform="translate(40, 40)">
      <rect x="-12" y="-16" width="8" height="8" rx="2" fill="#00f0ff" filter="url(#socialGlow)"/>
      <rect x="-12" y="-4" width="8" height="20" rx="2" fill="#00f0ff" filter="url(#socialGlow)"/>
      <path d="M0 16V-4H8V16C8 18 6 20 4 20H0V16H4Z" fill="#00f0ff" filter="url(#socialGlow)"/>
      <path d="M12 16V-4H20V16C20 18 18 20 16 20H12V16H16Z" fill="#00f0ff" filter="url(#socialGlow)"/>
    </g>
    <text x="40" y="115" text-anchor="middle" font-size="10" fill="#e0e0e0">LinkedIn</text>
  </g>

  <!-- YouTube -->
  <g transform="translate(390, 80)">
    <rect width="80" height="80" fill="#16162a" rx="12" stroke="#ff0080" stroke-width="1"/>
    <g transform="translate(40, 40)">
      <rect x="-16" y="-12" width="32" height="24" rx="4" stroke="#ff0080" stroke-width="2" fill="none"/>
      <path d="M-4 -6L8 0L-4 6Z" fill="#ff0080" filter="url(#socialGlow)"/>
    </g>
    <text x="40" y="115" text-anchor="middle" font-size="10" fill="#e0e0e0">YouTube</text>
  </g>

  <!-- Discord -->
  <g transform="translate(500, 80)">
    <rect width="80" height="80" fill="#16162a" rx="12" stroke="#9d00ff" stroke-width="1"/>
    <g transform="translate(40, 40)">
      <ellipse cx="0" cy="0" rx="16" ry="14" stroke="#9d00ff" stroke-width="2" fill="none"/>
      <circle cx="-6" cy="-2" r="4" fill="#9d00ff" filter="url(#socialGlow)"/>
      <circle cx="6" cy="-2" r="4" fill="#9d00ff" filter="url(#socialGlow)"/>
      <path d="M-4 6C-2 8 2 8 4 6" stroke="#9d00ff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M-14 -8L-10 -4M14 -8L10 -4" stroke="#9d00ff" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="40" y="115" text-anchor="middle" font-size="10" fill="#e0e0e0">Discord</text>
  </g>
</svg>
