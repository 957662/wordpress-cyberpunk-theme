<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="patternGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0.3"/>
    </linearGradient>

    <filter id="patternGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="cyberGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.15"/>
      <circle cx="20" cy="20" r="1" fill="#9d00ff" opacity="0.2"/>
    </pattern>

    <pattern id="hexPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <polygon
        points="30,0 56,15 56,45 30,60 4,45 4,15"
        fill="none"
        stroke="#00f0ff"
        stroke-width="0.5"
        opacity="0.1"
      />
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="#0a0a0f"/>
  <rect width="800" height="600" fill="url(#cyberGrid)"/>

  <!-- 顶部装饰线 -->
  <g transform="translate(0, 20)">
    <line x1="50" y1="0" x2="750" y2="0" stroke="url(#patternGrad)" stroke-width="1" filter="url(#patternGlow)"/>
    <circle cx="50" cy="0" r="3" fill="#00f0ff" filter="url(#patternGlow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="0" r="3" fill="#ff0080" filter="url(#patternGlow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 左侧六边形装饰 -->
  <g transform="translate(100, 150)" opacity="0.4">
    <polygon
      points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"
      fill="none"
      stroke="url(#patternGrad)"
      stroke-width="1"
    >
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0"
        to="360"
        dur="30s"
        repeatCount="indefinite"
      />
    </polygon>
    <polygon
      points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20"
      fill="none"
      stroke="#00f0ff"
      stroke-width="0.5"
      opacity="0.5"
    >
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="360"
        to="0"
        dur="25s"
        repeatCount="indefinite"
      />
    </polygon>
  </g>

  <!-- 右侧六边形装饰 -->
  <g transform="translate(700, 450)" opacity="0.4">
    <polygon
      points="0,-80 69.3,-40 69.3,40 0,80 -69.3,40 -69.3,-40"
      fill="none"
      stroke="url(#patternGrad)"
      stroke-width="1"
    >
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="360"
        to="0"
        dur="35s"
        repeatCount="indefinite"
      />
    </polygon>
    <polygon
      points="0,-55 47.6,-27.5 47.6,27.5 0,55 -47.6,27.5 -47.6,-27.5"
      fill="none"
      stroke="#9d00ff"
      stroke-width="0.5"
      opacity="0.5"
    >
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0"
        to="360"
        dur="30s"
        repeatCount="indefinite"
      />
    </polygon>
  </g>

  <!-- 中心电路装饰 -->
  <g transform="translate(400, 300)" opacity="0.3">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#00f0ff" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#9d00ff" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#ff0080" stroke-width="0.5"/>

    <!-- 辐射线 -->
    <g>
      <line x1="-100" y1="0" x2="100" y2="0" stroke="#00f0ff" stroke-width="0.5"/>
      <line x1="0" y1="-100" x2="0" y2="100" stroke="#00f0ff" stroke-width="0.5"/>
      <line x1="-70" y1="-70" x2="70" y2="70" stroke="#9d00ff" stroke-width="0.5"/>
      <line x1="-70" y1="70" x2="70" y2="-70" stroke="#9d00ff" stroke-width="0.5"/>
    </g>

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0"
      to="360"
      dur="60s"
      repeatCount="indefinite"
    />
  </g>

  <!-- 底部数据流装饰 -->
  <g transform="translate(50, 550)">
    <rect x="0" y="0" width="700" height="2" fill="url(#patternGrad)" opacity="0.5"/>
    <g>
      <circle cx="0" cy="1" r="3" fill="#00f0ff">
        <animate attributeName="cx" from="0" to="700" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="1" r="2" fill="#9d00ff">
        <animate attributeName="cx" from="100" to="800" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="200" cy="1" r="2.5" fill="#ff0080">
        <animate attributeName="cx" from="200" to="900" dur="3.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- 角落装饰 -->
  <g opacity="0.5">
    <!-- 左上 -->
    <path d="M0,0 L30,0 L30,2 L2,2 L2,30 L0,30 Z" fill="#00f0ff"/>
    <!-- 右上 -->
    <path d="M800,0 L770,0 L770,2 L798,2 L798,30 L800,30 Z" fill="#9d00ff"/>
    <!-- 左下 -->
    <path d="M0,600 L30,600 L30,598 L2,598 L2,570 L0,570 Z" fill="#ff0080"/>
    <!-- 右下 -->
    <path d="M800,600 L770,600 L770,598 L798,598 L798,570 L800,570 Z" fill="#00f0ff"/>
  </g>
</svg>
