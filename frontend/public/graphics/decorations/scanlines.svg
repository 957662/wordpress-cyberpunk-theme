<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <pattern id="scanlinesPattern" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(0, 240, 255, 0.03)"/>
      <rect y="2" width="4" height="2" fill="transparent"/>
    </pattern>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="#0a0a0f"/>

  <!-- 扫描线效果 -->
  <rect width="800" height="600" fill="url(#scanlinesPattern)"/>

  <!-- 移动扫描线 -->
  <rect x="0" y="0" width="800" height="3" fill="url(#scanGrad)">
    <animate attributeName="y" from="0" to="600" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- 装饰元素 -->
  <g opacity="0.3">
    <text x="400" y="300" text-anchor="middle" font-size="48" fill="#00f0ff" font-weight="bold" letter-spacing="8">
      SCANLINES
    </text>
    <text x="400" y="350" text-anchor="middle" font-size="14" fill="#9d00ff" letter-spacing="4">
      EFFECT PATTERN
    </text>
  </g>

  <!-- CRT 效果边缘 -->
  <g opacity="0.1">
    <ellipse cx="400" cy="300" rx="350" ry="250" fill="none" stroke="#00f0ff" stroke-width="1"/>
    <ellipse cx="400" cy="300" rx="300" ry="200" fill="none" stroke="#9d00ff" stroke-width="0.5"/>
  </g>
</svg>
