<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="contactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080"/>
      <stop offset="100%" style="stop-color:#00f0ff"/>
    </linearGradient>

    <filter id="contactGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="pulseRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" fill="#0a0a0f"/>

  <!-- 连接线网络 -->
  <g opacity="0.2">
    <line x1="400" y1="200" x2="200" y2="100" stroke="#ff0080" stroke-width="1"/>
    <line x1="400" y1="200" x2="600" y2="100" stroke="#00f0ff" stroke-width="1"/>
    <line x1="400" y1="200" x2="200" y2="300" stroke="#9d00ff" stroke-width="1"/>
    <line x1="400" y1="200" x2="600" y2="300" stroke="#ff0080" stroke-width="1"/>
    <line x1="200" y1="100" x2="600" y2="100" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="200" y1="300" x2="600" y2="300" stroke="#9d00ff" stroke-width="0.5"/>
  </g>

  <!-- 节点 -->
  <g>
    <!-- 中心节点 -->
    <circle cx="400" cy="200" r="30" fill="url(#pulseRadial)">
      <animate attributeName="r" values="30;40;30" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="200" r="15" fill="#ff0080" filter="url(#contactGlow)"/>

    <!-- 周围节点 -->
    <circle cx="200" cy="100" r="10" fill="#ff0080" filter="url(#contactGlow)"/>
    <circle cx="600" cy="100" r="10" fill="#00f0ff" filter="url(#contactGlow)"/>
    <circle cx="200" cy="300" r="10" fill="#9d00ff" filter="url(#contactGlow)"/>
    <circle cx="600" cy="300" r="10" fill="#ff0080" filter="url(#contactGlow)"/>
  </g>

  <!-- 通信图标 -->
  <g transform="translate(400, 200)">
    <!-- 邮件图标 -->
    <g transform="translate(-50, -80)">
      <circle cx="0" cy="0" r="20" fill="#16162a" stroke="#ff0080" stroke-width="1"/>
      <path d="M-8 -3L0 3L8 -3M-8 8V-8H8V8" stroke="#ff0080" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- 电话图标 -->
    <g transform="translate(50, -80)">
      <circle cx="0" cy="0" r="20" fill="#16162a" stroke="#00f0ff" stroke-width="1"/>
      <path d="M-6 6V4C-6 2 -4 0 0 0C4 0 6 2 6 4V6M-3 6H3" stroke="#00f0ff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- 定位图标 -->
    <g transform="translate(-50, 80)">
      <circle cx="0" cy="0" r="20" fill="#16162a" stroke="#9d00ff" stroke-width="1"/>
      <path d="M0 -8C-4.4 -8 -8 -4.4 -8 0C-8 6 0 12 0 12C0 12 8 6 8 0C8 -4.4 4.4 -8 0 -8ZM0 3C-1.7 3 -3 1.7 -3 0C-3 -1.7 -1.7 -3 0 -3C1.7 -3 3 -1.7 3 0C3 1.7 1.7 3 0 3Z" stroke="#9d00ff" stroke-width="1.5" fill="none"/>
    </g>

    <!-- 社交图标 -->
    <g transform="translate(50, 80)">
      <circle cx="0" cy="0" r="20" fill="#16162a" stroke="#ff0080" stroke-width="1"/>
      <circle cx="0" cy="0" r="8" stroke="#ff0080" stroke-width="1.5" fill="none"/>
      <circle cx="0" cy="0" r="3" fill="#ff0080"/>
    </g>
  </g>

  <!-- 标题 -->
  <g transform="translate(400, 370)">
    <text x="0" y="0" text-anchor="middle" font-size="42" font-weight="bold" fill="url(#contactGrad)" filter="url(#contactGlow)" letter-spacing="4">
      CONTACT
    </text>
    <text x="0" y="25" text-anchor="middle" font-size="14" fill="#e0e0e0" letter-spacing="8">
      GET IN TOUCH
    </text>
  </g>
</svg>
