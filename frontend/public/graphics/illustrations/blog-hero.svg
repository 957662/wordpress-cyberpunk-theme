<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>

    <filter id="heroGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="heroGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00f0ff" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" fill="#0a0a0f"/>
  <rect width="800" height="400" fill="url(#heroGrid)"/>

  <!-- 装饰六边形 -->
  <g transform="translate(100, 200)" opacity="0.2">
    <polygon
      points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50"
      fill="none"
      stroke="url(#heroGrad)"
      stroke-width="1"
    >
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0"
        to="360"
        dur="40s"
        repeatCount="indefinite"
      />
    </polygon>
  </g>

  <g transform="translate(700, 200)" opacity="0.2">
    <polygon
      points="0,-80 69.3,-40 69.3,40 0,80 -69.3,40 -69.3,-40"
      fill="none"
      stroke="url(#heroGrad)"
      stroke-width="1"
    >
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="360"
        to="0"
        dur="35s"
        repeatCount="indefinite"
      />
    </polygon>
  </g>

  <!-- 主内容区 -->
  <g transform="translate(400, 180)">
    <!-- 图标 -->
    <g transform="translate(-200, -30)">
      <rect width="60" height="60" fill="none" stroke="#00f0ff" stroke-width="2" rx="8" filter="url(#heroGlow)"/>
      <path d="M20 40V20H25V30H35V20H40V40M20 25H40" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- 标题 -->
    <text x="0" y="-10" text-anchor="middle" font-size="48" font-weight="bold" fill="url(#heroGrad)" filter="url(#heroGlow)" letter-spacing="4">
      BLOG
    </text>

    <!-- 副标题 -->
    <text x="0" y="30" text-anchor="middle" font-size="16" fill="#e0e0e0" letter-spacing="6">
      INSIGHTS &amp; ARTICLES
    </text>

    <!-- 装饰线 -->
    <line x1="-150" y1="55" x2="150" y2="55" stroke="#9d00ff" stroke-width="1" opacity="0.5"/>
    <circle cx="-150" cy="55" r="3" fill="#00f0ff" filter="url(#heroGlow)"/>
    <circle cx="150" cy="55" r="3" fill="#ff0080" filter="url(#heroGlow)"/>
  </g>

  <!-- 底部数据流 -->
  <g transform="translate(100, 370)" opacity="0.4">
    <line x1="0" y1="0" x2="600" y2="0" stroke="#00f0ff" stroke-width="1"/>
    <circle cx="0" cy="0" r="2" fill="#00f0ff">
      <animate attributeName="cx" from="0" to="600" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="0" r="2" fill="#9d00ff">
      <animate attributeName="cx" from="100" to="700" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 浮动粒子 -->
  <g opacity="0.3">
    <circle cx="150" cy="100" r="2" fill="#00f0ff">
      <animate attributeName="cy" values="100;90;100" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="300" r="2" fill="#9d00ff">
      <animate attributeName="cy" values="300;310;300" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="350" r="1.5" fill="#ff0080">
      <animate attributeName="cy" values="350;340;350" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="80" r="1.5" fill="#00f0ff">
      <animate attributeName="cy" values="80;90;80" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
