<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>

    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 外部旋转六边形 -->
  <g transform="translate(50, 50)">
    <polygon
      points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20"
      fill="none"
      stroke="url(#iconGradient)"
      stroke-width="2"
      filter="url(#iconGlow)"
    >
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0"
        to="360"
        dur="10s"
        repeatCount="indefinite"
      />
    </polygon>

    <!-- 内部六边形背景 -->
    <polygon
      points="0,-28 24.2,-14 24.2,14 0,28 -24.2,14 -24.2,-14"
      fill="rgba(22, 22, 42, 0.9)"
      stroke="#00f0ff"
      stroke-width="1.5"
      opacity="0.9"
    >
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="360"
        to="0"
        dur="8s"
        repeatCount="indefinite"
      />
    </polygon>

    <!-- CP 字母 -->
    <text
      x="0"
      y="10"
      text-anchor="middle"
      font-family="Arial, sans-serif"
      font-size="20"
      font-weight="bold"
      fill="url(#iconGradient)"
      filter="url(#iconGlow)"
    >
      CP
    </text>

    <!-- 装饰点 -->
    <circle cx="0" cy="-28" r="2" fill="#00f0ff" filter="url(#iconGlow)">
      <animate
        attributeName="opacity"
        values="0.3;1;0.3"
        dur="1.5s"
        repeatCount="indefinite"
      />
    </circle>
    <circle cx="24.2" cy="14" r="2" fill="#9d00ff" filter="url(#iconGlow)">
      <animate
        attributeName="opacity"
        values="0.3;1;0.3"
        dur="1.5s"
        begin="0.5s"
        repeatCount="indefinite"
      />
    </circle>
    <circle cx="-24.2" cy="14" r="2" fill="#ff0080" filter="url(#iconGlow)">
      <animate
        attributeName="opacity"
        values="0.3;1;0.3"
        dur="1.5s"
        begin="1s"
        repeatCount="indefinite"
      />
    </circle>
  </g>
</svg>
