<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" fill="none">
  <!-- Simplified favicon version -->
  <defs>
    <linearGradient id="markGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="50" height="50" rx="10" fill="#0a0a0f"/>

  <!-- C letter stylized -->
  <path d="M 15 10 L 15 40 L 35 40 L 35 35 L 20 35 L 20 15 L 35 15 L 35 10 Z" fill="url(#markGradient)"/>

  <!-- Tech accents -->
  <rect x="15" y="10" width="20" height="2" fill="#00f0ff"/>
  <rect x="15" y="38" width="20" height="2" fill="#ff0080"/>
  <circle cx="35" cy="10" r="2" fill="#00f0ff"/>
  <circle cx="35" cy="40" r="2" fill="#ff0080"/>
