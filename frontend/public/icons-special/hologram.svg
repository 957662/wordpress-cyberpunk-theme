<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="holoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.8" />
    </linearGradient>
    <filter id="holoGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Circle -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#holoGradient)" stroke-width="2" opacity="0.5"/>

  <!-- Holographic Rings -->
  <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.3" transform="rotate(-30 50 50)"/>
  <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="#9d00ff" stroke-width="1" opacity="0.3" transform="rotate(30 50 50)"/>
  <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.3" transform="rotate(90 50 50)"/>

  <!-- Center Icon -->
  <g filter="url(#holoGlow)">
    <!-- Cube/Box -->
    <path d="M 50 25 L 65 32.5 L 65 47.5 L 50 55 L 35 47.5 L 35 32.5 Z" fill="none" stroke="url(#holoGradient)" stroke-width="2"/>
    <path d="M 50 25 L 50 40" stroke="url(#holoGradient)" stroke-width="1"/>
    <path d="M 35 32.5 L 50 40 L 65 32.5" stroke="url(#holoGradient)" stroke-width="1"/>
    <path d="M 50 40 L 50 55" stroke="url(#holoGradient)" stroke-width="1"/>
  </g>

  <!-- Scanning Lines -->
  <g opacity="0.5">
    <line x1="20" y1="30" x2="80" y2="30" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="20" y1="50" x2="80" y2="50" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="20" y1="70" x2="80" y2="70" stroke="#00f0ff" stroke-width="0.5"/>
  </g>

  <!-- Floating Particles -->
  <g opacity="0.6">
    <circle cx="25" cy="25" r="1.5" fill="#00f0ff">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="25" r="1.5" fill="#9d00ff">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="75" r="1.5" fill="#9d00ff">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="75" r="1.5" fill="#00f0ff">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
