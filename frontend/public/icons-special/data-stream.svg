<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="streamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0" />
    </linearGradient>
    <filter id="streamGlow">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Grid -->
  <g opacity="0.1">
    <line x1="0" y1="20" x2="100" y2="20" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="100" y2="40" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="100" y2="60" stroke="#00f0ff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="100" y2="80" stroke="#00f0ff" stroke-width="0.5"/>
  </g>

  <!-- Data Streams -->
  <g filter="url(#streamGlow)">
    <!-- Stream 1 -->
    <path d="M 0 25 Q 25 20, 50 25 T 100 25" stroke="url(#streamGradient)" stroke-width="2" fill="none">
      <animate attributeName="d" values="M 0 25 Q 25 20, 50 25 T 100 25;M 0 25 Q 25 30, 50 25 T 100 25;M 0 25 Q 25 20, 50 25 T 100 25" dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- Stream 2 -->
    <path d="M 0 45 Q 25 40, 50 45 T 100 45" stroke="#9d00ff" stroke-width="2" fill="none" opacity="0.7">
      <animate attributeName="d" values="M 0 45 Q 25 40, 50 45 T 100 45;M 0 45 Q 25 50, 50 45 T 100 45;M 0 45 Q 25 40, 50 45 T 100 45" dur="2.5s" repeatCount="indefinite"/>
    </path>

    <!-- Stream 3 -->
    <path d="M 0 65 Q 25 60, 50 65 T 100 65" stroke="#ff0080" stroke-width="1.5" fill="none" opacity="0.5">
      <animate attributeName="d" values="M 0 65 Q 25 60, 50 65 T 100 65;M 0 65 Q 25 70, 50 65 T 100 65;M 0 65 Q 25 60, 50 65 T 100 65" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Data Packets -->
  <g>
    <circle cx="10" cy="25" r="3" fill="#00f0ff">
      <animate attributeName="cx" values="10;90;10" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="45" r="2.5" fill="#9d00ff">
      <animate attributeName="cx" values="20;80;20" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="15" cy="65" r="2" fill="#ff0080">
      <animate attributeName="cx" values="15;85;15" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Nodes -->
  <g>
    <circle cx="50" cy="25" r="4" fill="none" stroke="#00f0ff" stroke-width="1"/>
    <circle cx="50" cy="45" r="4" fill="none" stroke="#9d00ff" stroke-width="1"/>
    <circle cx="50" cy="65" r="4" fill="none" stroke="#ff0080" stroke-width="1"/>
  </g>
</svg>
