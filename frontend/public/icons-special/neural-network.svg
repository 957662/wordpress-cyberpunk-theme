<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="neuralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="neuralGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Neural Network Connections -->
  <g stroke-width="1" opacity="0.4">
    <!-- Input to Hidden -->
    <line x1="20" y1="30" x2="50" y2="20" stroke="#00f0ff"/>
    <line x1="20" y1="30" x2="50" y2="50" stroke="#00f0ff"/>
    <line x1="20" y1="30" x2="50" y2="80" stroke="#00f0ff"/>
    <line x1="20" y1="50" x2="50" y2="20" stroke="#00f0ff"/>
    <line x1="20" y1="50" x2="50" y2="50" stroke="#00f0ff"/>
    <line x1="20" y1="50" x2="50" y2="80" stroke="#00f0ff"/>
    <line x1="20" y1="70" x2="50" y2="20" stroke="#00f0ff"/>
    <line x1="20" y1="70" x2="50" y2="50" stroke="#00f0ff"/>
    <line x1="20" y1="70" x2="50" y2="80" stroke="#00f0ff"/>

    <!-- Hidden to Output -->
    <line x1="50" y1="20" x2="80" y2="40" stroke="#9d00ff"/>
    <line x1="50" y1="20" x2="80" y2="60" stroke="#9d00ff"/>
    <line x1="50" y1="50" x2="80" y2="40" stroke="#9d00ff"/>
    <line x1="50" y1="50" x2="80" y2="60" stroke="#9d00ff"/>
    <line x1="50" y1="80" x2="80" y2="40" stroke="#9d00ff"/>
    <line x1="50" y1="80" x2="80" y2="60" stroke="#9d00ff"/>
  </g>

  <!-- Input Nodes -->
  <g filter="url(#neuralGlow)">
    <circle cx="20" cy="30" r="6" fill="#00f0ff" opacity="0.3"/>
    <circle cx="20" cy="30" r="3" fill="#00f0ff"/>

    <circle cx="20" cy="50" r="6" fill="#00f0ff" opacity="0.3"/>
    <circle cx="20" cy="50" r="3" fill="#00f0ff"/>

    <circle cx="20" cy="70" r="6" fill="#00f0ff" opacity="0.3"/>
    <circle cx="20" cy="70" r="3" fill="#00f0ff"/>
  </g>

  <!-- Hidden Nodes -->
  <g filter="url(#neuralGlow)">
    <circle cx="50" cy="20" r="7" fill="#9d00ff" opacity="0.3"/>
    <circle cx="50" cy="20" r="3.5" fill="#9d00ff">
      <animate attributeName="r" values="3.5;4;3.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="50" cy="50" r="7" fill="#9d00ff" opacity="0.3"/>
    <circle cx="50" cy="50" r="3.5" fill="#9d00ff">
      <animate attributeName="r" values="3.5;4;3.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="50" cy="80" r="7" fill="#9d00ff" opacity="0.3"/>
    <circle cx="50" cy="80" r="3.5" fill="#9d00ff">
      <animate attributeName="r" values="3.5;4;3.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Output Nodes -->
  <g filter="url(#neuralGlow)">
    <circle cx="80" cy="40" r="6" fill="#ff0080" opacity="0.3"/>
    <circle cx="80" cy="40" r="3" fill="#ff0080"/>

    <circle cx="80" cy="60" r="6" fill="#ff0080" opacity="0.3"/>
    <circle cx="80" cy="60" r="3" fill="#ff0080"/>
  </g>

  <!-- Labels -->
  <g font-family="Arial, sans-serif" font-size="8" fill="#a0a0b0" text-anchor="middle">
    <text x="20" y="90">Input</text>
    <text x="50" y="95">Hidden</text>
    <text x="80" y="85">Output</text>
  </g>
</svg>
