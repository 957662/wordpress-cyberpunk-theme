<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ogGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0ff00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16162a;stop-opacity:1" />
    </linearGradient>
    <filter id="ogGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <pattern id="ogGrid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#ogGrid)"/>

  <!-- Scanlines effect -->
  <g opacity="0.03">
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="250" x2="1200" y2="250" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="350" x2="1200" y2="350" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="550" x2="1200" y2="550" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#00f0ff" stroke-width="1"/>
  </g>

  <!-- Decorative hexagon frame -->
  <path d="M600 80 L800 200 L800 450 L600 570 L400 450 L400 200 Z"
        stroke="url(#ogGradient)"
        stroke-width="2"
        fill="none"
        opacity="0.3"/>

  <!-- Central hexagon logo -->
  <g transform="translate(520, 215)">
    <path d="M80 0 L160 46.4 L160 139.2 L80 185.6 L0 139.2 L0 46.4 Z"
          stroke="url(#ogGradient)"
          stroke-width="3"
          fill="none"
          filter="url(#ogGlow)"/>
    <circle cx="80" cy="92.8" r="40"
            stroke="#00f0ff"
            stroke-width="2"
            fill="none"
            opacity="0.8"/>
    <circle cx="80" cy="92.8" r="24"
            fill="#9d00ff"
            opacity="0.6"/>
    <circle cx="80" cy="92.8" r="12"
            fill="#00f0ff"
            filter="url(#ogGlow)"/>
  </g>

  <!-- Main title -->
  <text x="600" y="380"
        font-family="'Orbitron', 'Arial Black', sans-serif"
        font-size="72"
        font-weight="bold"
        fill="url(#ogGradient)"
        text-anchor="middle"
        filter="url(#textGlow)">
    CYBERPRESS
  </text>

  <!-- Subtitle -->
  <text x="600" y="430"
        font-family="'Orbitron', sans-serif"
        font-size="24"
        fill="#00f0ff"
        text-anchor="middle"
        opacity="0.8"
        letter-spacing="12">
    NEXT-GEN BLOGGING PLATFORM
  </text>

  <!-- Tagline -->
  <text x="600" y="480"
        font-family="'JetBrains Mono', monospace"
        font-size="16"
        fill="#9d00ff"
        text-anchor="middle"
        opacity="0.6"
        letter-spacing="4">
    WORDPRESS REST API + NEXT.JS 14
  </text>

  <!-- Corner accents -->
  <g opacity="0.6">
    <circle cx="100" cy="100" r="4" fill="#00f0ff"/>
    <circle cx="1100" cy="100" r="4" fill="#9d00ff"/>
    <circle cx="1100" cy="530" r="4" fill="#ff0080"/>
    <circle cx="100" cy="530" r="4" fill="#f0ff00"/>
  </g>

  <!-- Data particles -->
  <g opacity="0.4">
    <circle cx="200" cy="150" r="3" fill="#00f0ff"/>
    <circle cx="1000" cy="180" r="3" fill="#9d00ff"/>
    <circle cx="1050" cy="450" r="3" fill="#ff0080"/>
    <circle cx="150" cy="480" r="3" fill="#f0ff00"/>
    <circle cx="350" cy="520" r="2" fill="#00f0ff"/>
    <circle cx="850" cy="100" r="2" fill="#9d00ff"/>
  </g>
</svg>