<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon background -->
  <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" fill="#0a0a0f" stroke="url(#iconGradient)" stroke-width="2" filter="url(#iconGlow)"/>

  <!-- Circuit pattern inside -->
  <path d="M 30 50 L 40 50 L 45 45 L 55 45 L 60 50 L 70 50" stroke="#00f0ff" stroke-width="2" fill="none"/>
  <path d="M 50 30 L 50 40" stroke="#9d00ff" stroke-width="2" fill="none"/>
  <path d="M 50 60 L 50 70" stroke="#ff0080" stroke-width="2" fill="none"/>

  <!-- Center node -->
  <circle cx="50" cy="50" r="8" fill="#00f0ff" opacity="0.3"/>
  <circle cx="50" cy="50" r="4" fill="#00f0ff"/>

  <!-- Corner nodes -->
  <circle cx="30" cy="50" r="3" fill="#9d00ff"/>
  <circle cx="70" cy="50" r="3" fill="#9d00ff"/>
  <circle cx="50" cy="30" r="3" fill="#ff0080"/>
  <circle cx="50" cy="70" r="3" fill="#ff0080"/>

  <!-- Tech dots -->
  <circle cx="45" cy="45" r="2" fill="#00f0ff"/>
  <circle cx="55" cy="45" r="2" fill="#00f0ff"/>
  <circle cx="45" cy="55" r="2" fill="#ff0080"/>
  <circle cx="55" cy="55" r="2" fill="#ff0080"/>
</svg>
