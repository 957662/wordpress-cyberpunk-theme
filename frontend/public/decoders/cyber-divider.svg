<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 40" width="400" height="40">
  <defs>
    <linearGradient id="dividerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </linearGradient>
    <filter id="dividerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 赛博朋克分隔线 -->
  <g filter="url(#dividerGlow)">
    <!-- 主线 -->
    <line x1="0" y1="20" x2="400" y2="20" stroke="url(#dividerGradient)" stroke-width="2"/>

    <!-- 左侧装饰 -->
    <polygon points="50,15 60,20 50,25" fill="#00f0ff"/>
    <polygon points="40,12 55,20 40,28" fill="#00f0ff" opacity="0.6"/>

    <!-- 右侧装饰 -->
    <polygon points="350,15 340,20 350,25" fill="#00f0ff"/>
    <polygon points="360,12 345,20 360,28" fill="#00f0ff" opacity="0.6"/>

    <!-- 中心装饰 -->
    <rect x="195" y="15" width="10" height="10" stroke="#9d00ff" stroke-width="2" fill="none"/>
    <rect x="198" y="18" width="4" height="4" fill="#9d00ff"/>

    <!-- 装饰点 -->
    <circle cx="100" cy="20" r="2" fill="#00f0ff"/>
    <circle cx="150" cy="20" r="2" fill="#9d00ff"/>
    <circle cx="250" cy="20" r="2" fill="#9d00ff"/>
    <circle cx="300" cy="20" r="2" fill="#00f0ff"/>

    <!-- 小装饰点 -->
    <circle cx="125" cy="20" r="1" fill="#00f0ff" opacity="0.5"/>
    <circle cx="175" cy="20" r="1" fill="#9d00ff" opacity="0.5"/>
    <circle cx="225" cy="20" r="1" fill="#9d00ff" opacity="0.5"/>
    <circle cx="275" cy="20" r="1" fill="#00f0ff" opacity="0.5"/>
  </g>
</svg>
