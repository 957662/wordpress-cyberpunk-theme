<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="circuitGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 赛博朋克电路板装饰 -->
  <g filter="url(#circuitGlow)">
    <!-- 电路路径 -->
    <path d="M20 40 L50 40 L50 80 L80 80" stroke="#00f0ff" stroke-width="2" fill="none"/>
    <path d="M180 40 L150 40 L150 80 L120 80" stroke="#9d00ff" stroke-width="2" fill="none"/>
    <path d="M20 160 L50 160 L50 120 L80 120" stroke="#00f0ff" stroke-width="2" fill="none"/>
    <path d="M180 160 L150 160 L150 120 L120 120" stroke="#9d00ff" stroke-width="2" fill="none"/>

    <!-- 垂直连接 -->
    <path d="M100 20 L100 50" stroke="url(#circuitGradient)" stroke-width="2"/>
    <path d="M100 150 L100 180" stroke="url(#circuitGradient)" stroke-width="2"/>

    <!-- 中央芯片 -->
    <rect x="75" y="75" width="50" height="50" rx="3" stroke="url(#circuitGradient)" stroke-width="2" fill="none"/>
    <rect x="85" y="85" width="30" height="30" rx="2" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.7"/>
    <circle cx="100" cy="100" r="5" fill="#9d00ff"/>

    <!-- 芯片引脚 -->
    <line x1="80" y1="85" x2="70" y2="85" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="80" y1="95" x2="70" y2="95" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="80" y1="105" x2="70" y2="105" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="80" y1="115" x2="70" y2="115" stroke="#00f0ff" stroke-width="1.5"/>

    <line x1="120" y1="85" x2="130" y2="85" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="120" y1="95" x2="130" y2="95" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="120" y1="105" x2="130" y2="105" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="120" y1="115" x2="130" y2="115" stroke="#00f0ff" stroke-width="1.5"/>

    <line x1="85" y1="70" x2="85" y2="60" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="95" y1="70" x2="95" y2="60" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="105" y1="70" x2="105" y2="60" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="115" y1="70" x2="115" y2="60" stroke="#00f0ff" stroke-width="1.5"/>

    <line x1="85" y1="130" x2="85" y2="140" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="95" y1="130" x2="95" y2="140" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="105" y1="130" x2="105" y2="140" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="115" y1="130" x2="115" y2="140" stroke="#00f0ff" stroke-width="1.5"/>

    <!-- 角落节点 -->
    <circle cx="20" cy="40" r="3" fill="#00f0ff"/>
    <circle cx="180" cy="40" r="3" fill="#9d00ff"/>
    <circle cx="20" cy="160" r="3" fill="#00f0ff"/>
    <circle cx="180" cy="160" r="3" fill="#9d00ff"/>
    <circle cx="80" cy="80" r="2.5" fill="#00f0ff"/>
    <circle cx="120" cy="80" r="2.5" fill="#9d00ff"/>
    <circle cx="80" cy="120" r="2.5" fill="#00f0ff"/>
    <circle cx="120" cy="120" r="2.5" fill="#9d00ff"/>

    <!-- 顶部和底部节点 -->
    <circle cx="100" cy="20" r="3" fill="url(#circuitGradient)"/>
    <circle cx="100" cy="180" r="3" fill="url(#circuitGradient)"/>
  </g>
</svg>
