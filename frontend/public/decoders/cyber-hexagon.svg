<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="hexGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 赛博朋克六边形装饰 -->
  <g filter="url(#hexGlow)">
    <!-- 外圈六边形 -->
    <polygon points="60,5 95,25 95,65 60,85 25,65 25,25"
             stroke="url(#hexGradient)" stroke-width="2" fill="none"/>

    <!-- 内圈六边形 -->
    <polygon points="60,20 80,32 80,55 60,67 40,55 40,32"
             stroke="#00f0ff" stroke-width="1.5" fill="none" opacity="0.7"/>

    <!-- 中心点 -->
    <circle cx="60" cy="45" r="4" fill="#9d00ff"/>
    <circle cx="60" cy="45" r="2" fill="#00f0ff"/>

    <!-- 装饰电路 -->
    <line x1="60" y1="5" x2="60" y2="20" stroke="#00f0ff" stroke-width="1"/>
    <line x1="95" y1="25" x2="80" y2="32" stroke="#00f0ff" stroke-width="1"/>
    <line x1="95" y1="65" x2="80" y2="55" stroke="#00f0ff" stroke-width="1"/>
    <line x1="60" y1="85" x2="60" y2="67" stroke="#00f0ff" stroke-width="1"/>
    <line x1="25" y1="65" x2="40" y2="55" stroke="#00f0ff" stroke-width="1"/>
    <line x1="25" y1="25" x2="40" y2="32" stroke="#00f0ff" stroke-width="1"/>
  </g>
</svg>
