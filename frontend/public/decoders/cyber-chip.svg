<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="chipGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 赛博朋克芯片装饰 -->
  <g filter="url(#chipGlow)">
    <!-- 主芯片体 -->
    <rect x="30" y="30" width="40" height="40" rx="3"
          stroke="url(#chipGradient)" stroke-width="2" fill="none"/>

    <!-- 内部电路 -->
    <rect x="38" y="38" width="24" height="24" rx="2"
          stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.8"/>
    <rect x="45" y="45" width="10" height="10" fill="#9d00ff" opacity="0.6"/>

    <!-- 芯片引脚 - 上方 -->
    <line x1="35" y1="30" x2="35" y2="22" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="45" y1="30" x2="45" y2="22" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="55" y1="30" x2="55" y2="22" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="65" y1="30" x2="65" y2="22" stroke="url(#chipGradient)" stroke-width="2"/>

    <!-- 芯片引脚 - 下方 -->
    <line x1="35" y1="70" x2="35" y2="78" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="45" y1="70" x2="45" y2="78" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="55" y1="70" x2="55" y2="78" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="65" y1="70" x2="65" y2="78" stroke="url(#chipGradient)" stroke-width="2"/>

    <!-- 芯片引脚 - 左方 -->
    <line x1="30" y1="35" x2="22" y2="35" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="30" y1="45" x2="22" y2="45" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="30" y1="55" x2="22" y2="55" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="30" y1="65" x2="22" y2="65" stroke="url(#chipGradient)" stroke-width="2"/>

    <!-- 芯片引脚 - 右方 -->
    <line x1="70" y1="35" x2="78" y2="35" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="70" y1="45" x2="78" y2="45" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="70" y1="55" x2="78" y2="55" stroke="url(#chipGradient)" stroke-width="2"/>
    <line x1="70" y1="65" x2="78" y2="65" stroke="url(#chipGradient)" stroke-width="2"/>

    <!-- 装饰点 -->
    <circle cx="50" cy="50" r="3" fill="#00f0ff"/>
  </g>
</svg>
