<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <defs>
    <linearGradient id="streamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0" />
    </linearGradient>
    <filter id="streamGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 赛博朋克数据流装饰 -->
  <g filter="url(#streamGlow)">
    <!-- 数据包流 -->
    <rect x="20" y="20" width="30" height="8" rx="2" fill="#00f0ff" opacity="0.8"/>
    <rect x="70" y="35" width="40" height="8" rx="2" fill="#00f0ff" opacity="0.6"/>
    <rect x="130" y="25" width="25" height="8" rx="2" fill="#9d00ff" opacity="0.7"/>
    <rect x="30" y="50" width="35" height="8" rx="2" fill="#9d00ff" opacity="0.5"/>
    <rect x="90" y="65" width="45" height="8" rx="2" fill="#ff0080" opacity="0.6"/>
    <rect x="150" y="45" width="30" height="8" rx="2" fill="#ff0080" opacity="0.4"/>

    <!-- 连接线 -->
    <line x1="50" y1="24" x2="70" y2="39" stroke="url(#streamGradient)" stroke-width="1"/>
    <line x1="110" y1="39" x2="130" y2="29" stroke="url(#streamGradient)" stroke-width="1"/>
    <line x1="65" y1="54" x2="90" y2="69" stroke="url(#streamGradient)" stroke-width="1"/>
    <line x1="155" y1="29" x2="150" y2="49" stroke="url(#streamGradient)" stroke-width="1"/>

    <!-- 节点 -->
    <circle cx="20" cy="24" r="3" fill="#00f0ff"/>
    <circle cx="70" cy="39" r="3" fill="#00f0ff"/>
    <circle cx="130" cy="29" r="3" fill="#9d00ff"/>
    <circle cx="30" cy="54" r="3" fill="#9d00ff"/>
    <circle cx="90" cy="69" r="3" fill="#ff0080"/>
    <circle cx="150" cy="49" r="3" fill="#ff0080"/>

    <!-- 装饰数据点 -->
    <circle cx="60" cy="24" r="1.5" fill="#00f0ff" opacity="0.5"/>
    <circle cx="100" cy="39" r="1.5" fill="#00f0ff" opacity="0.5"/>
    <circle cx="140" cy="29" r="1.5" fill="#9d00ff" opacity="0.5"/>
    <circle cx="60" cy="54" r="1.5" fill="#9d00ff" opacity="0.5"/>
    <circle cx="120" cy="69" r="1.5" fill="#ff0080" opacity="0.5"/>
    <circle cx="165" cy="49" r="1.5" fill="#ff0080" opacity="0.5"/>
  </g>
</svg>
