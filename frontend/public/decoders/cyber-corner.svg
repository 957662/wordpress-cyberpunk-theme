<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cornerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 赛博朋克风格角落装饰 -->
  <g filter="url(#neonGlow)">
    <!-- 主线条 -->
    <path d="M10 10 L10 40 L40 40" stroke="url(#cornerGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M10 10 L40 10" stroke="url(#cornerGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- 装饰点 -->
    <circle cx="10" cy="10" r="3" fill="#00f0ff"/>
    <circle cx="40" cy="10" r="2" fill="#9d00ff"/>
    <circle cx="10" cy="40" r="2" fill="#9d00ff"/>

    <!-- 电路元素 -->
    <rect x="25" y="8" width="8" height="4" fill="url(#cornerGradient)" opacity="0.6"/>
    <rect x="8" y="25" width="4" height="8" fill="url(#cornerGradient)" opacity="0.6"/>
  </g>
</svg>
