<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="waveGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 赛博朋克波形装饰 -->
  <g filter="url(#waveGlow)">
    <!-- 主波形线 -->
    <path d="M0,30 Q25,10 50,30 T100,30 T150,30 T200,30"
          stroke="url(#waveGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- 次波形线 -->
    <path d="M0,30 Q25,45 50,30 T100,30 T150,30 T200,30"
          stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.5" stroke-dasharray="5,5"/>

    <!-- 波峰点 -->
    <circle cx="25" cy="20" r="2.5" fill="#00f0ff"/>
    <circle cx="75" cy="40" r="2.5" fill="#9d00ff"/>
    <circle cx="125" cy="20" r="2.5" fill="#ff0080"/>
    <circle cx="175" cy="40" r="2.5" fill="#00f0ff"/>

    <!-- 装饰网格 -->
    <line x1="50" y1="15" x2="50" y2="45" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="100" y1="15" x2="100" y2="45" stroke="#9d00ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="150" y1="15" x2="150" y2="45" stroke="#ff0080" stroke-width="0.5" opacity="0.3"/>

    <!-- 底部装饰线 -->
    <line x1="0" y1="55" x2="200" y2="55" stroke="url(#waveGradient)" stroke-width="1" opacity="0.3"/>
  </g>
</svg>
