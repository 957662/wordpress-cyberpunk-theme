<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 20" width="200" height="20">
  <defs>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </linearGradient>
    <filter id="lineGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 赛博朋克装饰线 -->
  <g filter="url(#lineGlow)">
    <!-- 主线条 -->
    <line x1="0" y1="10" x2="200" y2="10" stroke="url(#lineGradient)" stroke-width="2" stroke-linecap="round"/>

    <!-- 装饰节点 -->
    <rect x="50" y="8" width="4" height="4" fill="#00f0ff"/>
    <rect x="100" y="7" width="6" height="6" fill="#9d00ff"/>
    <rect x="150" y="8" width="4" height="4" fill="#00f0ff"/>

    <!-- 小装饰点 -->
    <circle cx="25" cy="10" r="1.5" fill="#00f0ff" opacity="0.7"/>
    <circle cx="75" cy="10" r="1.5" fill="#00f0ff" opacity="0.7"/>
    <circle cx="125" cy="10" r="1.5" fill="#9d00ff" opacity="0.7"/>
    <circle cx="175" cy="10" r="1.5" fill="#00f0ff" opacity="0.7"/>
  </g>
</svg>
