<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="targetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="targetGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 赛博朋克目标瞄准装饰 -->
  <g filter="url(#targetGlow)">
    <!-- 外圈 -->
    <circle cx="50" cy="50" r="40" stroke="url(#targetGradient)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <circle cx="50" cy="50" r="32" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="50" cy="50" r="24" stroke="#9d00ff" stroke-width="1" fill="none" opacity="0.7"/>
    <circle cx="50" cy="50" r="16" stroke="url(#targetGradient)" stroke-width="1.5" fill="none"/>

    <!-- 中心十字 -->
    <line x1="50" y1="34" x2="50" y2="66" stroke="url(#targetGradient)" stroke-width="1.5"/>
    <line x1="34" y1="50" x2="66" y2="50" stroke="url(#targetGradient)" stroke-width="1.5"/>

    <!-- 中心点 -->
    <circle cx="50" cy="50" r="3" fill="#00f0ff"/>
    <circle cx="50" cy="50" r="1.5" fill="#ffffff"/>

    <!-- 角落标记 -->
    <path d="M45 5 L50 5 L50 10" stroke="url(#targetGradient)" stroke-width="1.5" fill="none"/>
    <path d="M50 5 L55 5 L55 10" stroke="url(#targetGradient)" stroke-width="1.5" fill="none"/>

    <path d="M95 45 L95 50 L90 50" stroke="url(#targetGradient)" stroke-width="1.5" fill="none"/>
    <path d="M95 55 L95 50 L90 50" stroke="url(#targetGradient)" stroke-width="1.5" fill="none"/>

    <path d="M55 95 L50 95 L50 90" stroke="url(#targetGradient)" stroke-width="1.5" fill="none"/>
    <path d="M45 95 L50 95 L50 90" stroke="url(#targetGradient)" stroke-width="1.5" fill="none"/>

    <path d="M5 55 L5 50 L10 50" stroke="url(#targetGradient)" stroke-width="1.5" fill="none"/>
    <path d="M5 45 L5 50 L10 50" stroke="url(#targetGradient)" stroke-width="1.5" fill="none"/>

    <!-- 装饰点 -->
    <circle cx="50" cy="10" r="1.5" fill="#9d00ff"/>
    <circle cx="90" cy="50" r="1.5" fill="#9d00ff"/>
    <circle cx="50" cy="90" r="1.5" fill="#9d00ff"/>
    <circle cx="10" cy="50" r="1.5" fill="#9d00ff"/>
  </g>
</svg>
