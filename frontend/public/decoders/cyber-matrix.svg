<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="matrixGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="matrixGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 赛博朋克矩阵数字装饰 -->
  <g filter="url(#matrixGlow)">
    <!-- 数字列 -->
    <text x="10" y="15" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="10" y="30" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="10" y="45" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="10" y="60" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="10" y="75" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="10" y="90" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>

    <text x="25" y="15" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="25" y="30" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="25" y="45" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="25" y="60" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="25" y="75" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="25" y="90" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>

    <text x="40" y="15" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="40" y="30" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="40" y="45" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="40" y="60" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="40" y="75" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="40" y="90" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>

    <text x="55" y="15" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="55" y="30" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="55" y="45" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="55" y="60" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="55" y="75" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="55" y="90" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>

    <text x="70" y="15" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="70" y="30" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="70" y="45" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="70" y="60" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="70" y="75" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="70" y="90" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>

    <text x="85" y="15" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="85" y="30" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>
    <text x="85" y="45" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="85" y="60" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="85" y="75" fill="url(#matrixGradient)" font-size="8" font-family="monospace">0</text>
    <text x="85" y="90" fill="url(#matrixGradient)" font-size="8" font-family="monospace">1</text>

    <!-- 装饰框 -->
    <rect x="5" y="5" width="90" height="90" stroke="url(#matrixGradient)" stroke-width="1" fill="none" opacity="0.3"/>
  </g>
</svg>
