<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="cyber-grid" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Grid lines -->
      <path d="M 50 0 L 50 100 M 0 50 L 100 50" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>
      <circle cx="50" cy="50" r="2" fill="#00f0ff" opacity="0.2"/>

      <!-- Corner accents -->
      <path d="M 0 0 L 20 0 L 20 2 L 2 2 L 2 20 L 0 20 Z" fill="#00f0ff" opacity="0.1"/>
      <path d="M 80 0 L 100 0 L 100 20 L 98 20 L 98 2 L 80 2 Z" fill="#9d00ff" opacity="0.1"/>
      <path d="M 0 80 L 0 100 L 20 100 L 20 98 L 2 98 L 2 80 Z" fill="#ff0080" opacity="0.1"/>
      <path d="M 100 80 L 100 100 L 80 100 L 80 98 L 98 98 L 98 80 Z" fill="#f0ff00" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#cyber-grid)"/>
</svg>
