<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <pattern id="grid-pattern-enhanced" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <!-- Grid Lines -->
      <path d="M 20 0 L 0 0 0 20"
            stroke="#00f0ff"
            stroke-width="0.3"
            fill="none"
            opacity="0.2"/>
    </pattern>
    <radialGradient id="grid-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0f"/>

  <!-- Grid Pattern -->
  <rect width="100" height="100" fill="url(#grid-pattern-enhanced)"/>

  <!-- Center Glow -->
  <rect width="100" height="100" fill="url(#grid-glow)"/>

  <!-- Grid Intersection Points -->
  <g fill="#00f0ff">
    <circle cx="0" cy="0" r="0.8" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="0" r="0.8" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="0" r="0.8" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="0" r="0.8" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="0" r="0.8" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="0" r="0.8" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Horizontal Line Animation -->
  <line x1="0" y1="50" x2="100" y2="50"
        stroke="#00f0ff"
        stroke-width="0.5"
        opacity="0.4">
    <animate attributeName="y1" values="0;100;0" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;100;0" dur="10s" repeatCount="indefinite"/>
  </line>
</svg>
