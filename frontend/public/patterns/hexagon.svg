<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="cyber-hexagon" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Hexagon grid -->
      <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.1"/>
      <polygon points="50,15 80,32.5 80,67.5 50,85 20,67.5 20,32.5" stroke="#9d00ff" stroke-width="0.5" fill="none" opacity="0.08"/>

      <!-- Center node -->
      <circle cx="50" cy="50" r="3" fill="#00f0ff" opacity="0.15"/>
      <circle cx="50" cy="50" r="6" stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.1"/>

      <!-- Satellite nodes -->
      <circle cx="50" cy="20" r="2" fill="#9d00ff" opacity="0.12"/>
      <circle cx="80" cy="32.5" r="2" fill="#ff0080" opacity="0.12"/>
      <circle cx="80" cy="67.5" r="2" fill="#f0ff00" opacity="0.12"/>
      <circle cx="50" cy="80" r="2" fill="#00f0ff" opacity="0.12"/>
      <circle cx="20" cy="67.5" r="2" fill="#9d00ff" opacity="0.12"/>
      <circle cx="20" cy="32.5" r="2" fill="#ff0080" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#cyber-hexagon)"/>
</svg>
