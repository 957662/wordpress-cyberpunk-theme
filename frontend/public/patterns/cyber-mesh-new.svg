<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <pattern id="meshPatternNew" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Grid -->
      <path d="M0 0 L60 0 M0 0 L0 60 M30 0 L30 60 M0 30 L60 30" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>

      <!-- Nodes -->
      <circle cx="0" cy="0" r="2" fill="#00f0ff" opacity="0.2"/>
      <circle cx="30" cy="0" r="1.5" fill="#9d00ff" opacity="0.2"/>
      <circle cx="60" cy="0" r="2" fill="#00f0ff" opacity="0.2"/>
      <circle cx="0" cy="30" r="1.5" fill="#9d00ff" opacity="0.2"/>
      <circle cx="30" cy="30" r="1" fill="#ff0080" opacity="0.3">
        <animate attributeName="r" values="1;2;1" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="60" cy="30" r="1.5" fill="#9d00ff" opacity="0.2"/>
      <circle cx="0" cy="60" r="2" fill="#00f0ff" opacity="0.2"/>
      <circle cx="30" cy="60" r="1.5" fill="#9d00ff" opacity="0.2"/>
      <circle cx="60" cy="60" r="2" fill="#00f0ff" opacity="0.2"/>
    </pattern>

    <linearGradient id="meshGradientNew" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0f"/>

  <!-- Mesh Pattern -->
  <rect width="800" height="600" fill="url(#meshPatternNew)"/>

  <!-- Gradient Overlay -->
  <rect width="800" height="600" fill="url(#meshGradientNew)"/>

  <!-- Floating Nodes -->
  <g fill="#00f0ff" opacity="0.6">
    <circle cx="150" cy="150" r="3">
      <animate attributeName="cy" values="150;130;150" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="450" r="3">
      <animate attributeName="cy" values="450;470;450" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="400" r="2">
      <animate attributeName="cy" values="400;380;400" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="200" r="2">
      <animate attributeName="cy" values="200;220;200" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="4" fill="#9d00ff">
      <animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connection Lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.2">
    <line x1="150" y1="150" x2="400" y2="300">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="600" y1="200" x2="400" y2="300">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="400" x2="400" y2="300">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="650" y1="450" x2="400" y2="300">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>