<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <pattern id="circuit-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Circuit Path 1 -->
      <path d="M0 20h30v20h-30z"
            stroke="#00f0ff"
            stroke-width="0.5"
            fill="none"
            opacity="0.3"/>

      <!-- Circuit Path 2 -->
      <path d="M70 0v30h20v-30z"
            stroke="#9d00ff"
            stroke-width="0.5"
            fill="none"
            opacity="0.3"/>

      <!-- Circuit Path 3 -->
      <path d="M0 70h20v30h-20z"
            stroke="#ff0080"
            stroke-width="0.5"
            fill="none"
            opacity="0.3"/>

      <!-- Circuit Path 4 -->
      <path d="M70 80h30v20h-30z"
            stroke="#00f0ff"
            stroke-width="0.5"
            fill="none"
            opacity="0.3"/>

      <!-- Connection Nodes -->
      <circle cx="30" cy="20" r="1.5" fill="#00f0ff" opacity="0.5"/>
      <circle cx="70" cy="30" r="1.5" fill="#9d00ff" opacity="0.5"/>
      <circle cx="20" cy="70" r="1.5" fill="#ff0080" opacity="0.5"/>
      <circle cx="70" cy="80" r="1.5" fill="#00f0ff" opacity="0.5"/>

      <!-- Data Lines -->
      <line x1="30" y1="20" x2="70" y2="30" stroke="#00f0ff" stroke-width="0.3" opacity="0.2"/>
      <line x1="20" y1="70" x2="70" y2="80" stroke="#9d00ff" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a0f"/>

  <!-- Circuit Pattern -->
  <rect width="200" height="200" fill="url(#circuit-pattern)"/>

  <!-- Animated Data Flow -->
  <circle cx="30" cy="20" r="2" fill="#f0ff00">
    <animate attributeName="cx" values="0;100;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="20;80;20" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
