<svg xmlns="http://www.w3.org/2000/svg" width="50" height="100" viewBox="0 0 50 100">
  <defs>
    <pattern id="dataStreamPattern" width="50" height="100" patternUnits="userSpaceOnUse">
      <!-- Vertical data streams -->
      <g opacity="0.3">
        <!-- Stream 1 -->
        <rect x="5" y="0" width="2" height="10" fill="#00f0ff">
          <animate attributeName="y" from="0" to="100" dur="2s" repeatCount="indefinite" />
        </rect>
        <rect x="5" y="20" width="2" height="15" fill="#00f0ff">
          <animate attributeName="y" from="20" to="120" dur="2.5s" repeatCount="indefinite" />
        </rect>
        <rect x="5" y="40" width="2" height="8" fill="#00f0ff">
          <animate attributeName="y" from="40" to="140" dur="1.8s" repeatCount="indefinite" />
        </rect>

        <!-- Stream 2 -->
        <rect x="15" y="10" width="2" height="12" fill="#9d00ff">
          <animate attributeName="y" from="10" to="110" dur="2.2s" repeatCount="indefinite" />
        </rect>
        <rect x="15" y="30" width="2" height="9" fill="#9d00ff">
          <animate attributeName="y" from="30" to="130" dur="1.9s" repeatCount="indefinite" />
        </rect>

        <!-- Stream 3 -->
        <rect x="25" y="5" width="2" height="14" fill="#ff0080">
          <animate attributeName="y" from="5" to="105" dur="2.3s" repeatCount="indefinite" />
        </rect>
        <rect x="25" y="25" width="2" height="11" fill="#ff0080">
          <animate attributeName="y" from="25" to="125" dur="2.1s" repeatCount="indefinite" />
        </rect>
        <rect x="25" y="45" width="2" height="7" fill="#ff0080">
          <animate attributeName="y" from="45" to="145" dur="1.7s" repeatCount="indefinite" />
        </rect>

        <!-- Stream 4 -->
        <rect x="35" y="15" width="2" height="13" fill="#f0ff00">
          <animate attributeName="y" from="15" to="115" dur="2.4s" repeatCount="indefinite" />
        </rect>
        <rect x="35" y="35" width="2" height="10" fill="#f0ff00">
          <animate attributeName="y" from="35" to="135" dur="2.0s" repeatCount="indefinite" />
        </rect>

        <!-- Stream 5 -->
        <rect x="45" y="8" width="2" height="11" fill="#00ff88">
          <animate attributeName="y" from="8" to="108" dur="2.6s" repeatCount="indefinite" />
        </rect>
        <rect x="45" y="28" width="2" height="14" fill="#00ff88">
          <animate attributeName="y" from="28" to="128" dur="1.8s" repeatCount="indefinite" />
        </rect>
        <rect x="45" y="48" width="2" height="9" fill="#00ff88">
          <animate attributeName="y" from="48" to="148" dur="2.2s" repeatCount="indefinite" />
        </rect>
      </g>

      <!-- Floating particles -->
      <g fill="#00f0ff" opacity="0.4">
        <circle cx="10" cy="0" r="1">
          <animate attributeName="cy" from="0" to="100" dur="3s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
        </circle>
        <circle cx="30" cy="0" r="1.5">
          <animate attributeName="cy" from="0" to="100" dur="4s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
        </circle>
        <circle cx="40" cy="0" r="1">
          <animate attributeName="cy" from="0" to="100" dur="3.5s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite" />
        </circle>
      </g>
    </pattern>
  </defs>
  <rect width="50" height="100" fill="url(#dataStreamPattern)" />
</svg>
