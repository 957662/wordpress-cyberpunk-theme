<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="matrix-rain" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <!-- Random matrix characters -->
      <text x="0" y="10" font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.1">0</text>
      <text x="20" y="10" font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.15">1</text>
      <text x="40" y="10" font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.08">0</text>
      <text x="60" y="10" font-family="monospace" font-size="10" fill="#00ff88" opacity="0.12">1</text>
      <text x="80" y="10" font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.1">0</text>
      <text x="100" y="10" font-family="monospace" font-size="10" fill="#9d00ff" opacity="0.09">1</text>
      <text x="120" y="10" font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.11">0</text>
      <text x="140" y="10" font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.1">1</text>
      <text x="160" y="10" font-family="monospace" font-size="10" fill="#00ff88" opacity="0.13">0</text>
      <text x="180" y="10" font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.1">1</text>
    </pattern>

    <!-- Glow filter -->
    <filter id="matrix-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a0f"/>

  <!-- Matrix pattern overlay -->
  <rect width="200" height="200" fill="url(#matrix-rain)" opacity="0.3"/>

  <!-- Vertical lines (rain effect) -->
  <g opacity="0.15" filter="url(#matrix-glow)">
    <line x1="20" y1="0" x2="20" y2="200" stroke="#00f0ff" stroke-width="1">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="60" y1="0" x2="60" y2="200" stroke="#00f0ff" stroke-width="1">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#00ff88" stroke-width="1">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="140" y1="0" x2="140" y2="200" stroke="#00f0ff" stroke-width="1">
      <animate attributeName="opacity" values="0.12;0.28;0.12" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="180" y1="0" x2="180" y2="200" stroke="#9d00ff" stroke-width="1">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Falling characters -->
  <g font-family="monospace" font-size="14" opacity="0.4">
    <text x="20" y="50" fill="#00f0ff">
      0
      <animate attributeName="y" values="0;200" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="60" y="100" fill="#00ff88">
      1
      <animate attributeName="y" values="0;200" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="100" y="150" fill="#00f0ff">
      0
      <animate attributeName="y" values="0;200" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite"/>
    </text>
    <text x="140" y="75" fill="#9d00ff">
      1
      <animate attributeName="y" values="0;200" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>