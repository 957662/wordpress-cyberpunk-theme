<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="holoGrid" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Grid lines with gradient -->
      <line x1="0" y1="0" x2="0" y2="100" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>
      <line x1="25" y1="0" x2="25" y2="100" stroke="#9d00ff" stroke-width="0.5" opacity="0.08"/>
      <line x1="50" y1="0" x2="50" y2="100" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>
      <line x1="75" y1="0" x2="75" y2="100" stroke="#9d00ff" stroke-width="0.5" opacity="0.08"/>

      <line x1="0" y1="0" x2="100" y2="0" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>
      <line x1="0" y1="25" x2="100" y2="25" stroke="#9d00ff" stroke-width="0.5" opacity="0.08"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>
      <line x1="0" y1="75" x2="100" y2="75" stroke="#9d00ff" stroke-width="0.5" opacity="0.08"/>

      <!-- Intersection dots -->
      <circle cx="0" cy="0" r="1" fill="#00f0ff" opacity="0.3"/>
      <circle cx="25" cy="0" r="1" fill="#9d00ff" opacity="0.2"/>
      <circle cx="50" cy="0" r="1" fill="#00f0ff" opacity="0.3"/>
      <circle cx="75" cy="0" r="1" fill="#9d00ff" opacity="0.2"/>

      <circle cx="0" cy="25" r="1" fill="#9d00ff" opacity="0.2"/>
      <circle cx="25" cy="25" r="1.5" fill="#ff0080" opacity="0.3">
        <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="50" cy="25" r="1" fill="#9d00ff" opacity="0.2"/>
      <circle cx="75" cy="25" r="1" fill="#00f0ff" opacity="0.3"/>

      <circle cx="0" cy="50" r="1" fill="#00f0ff" opacity="0.3"/>
      <circle cx="25" cy="50" r="1" fill="#9d00ff" opacity="0.2"/>
      <circle cx="50" cy="50" r="1.5" fill="#00f0ff" opacity="0.4">
        <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="75" cy="50" r="1" fill="#9d00ff" opacity="0.2"/>

      <circle cx="0" cy="75" r="1" fill="#9d00ff" opacity="0.2"/>
      <circle cx="25" cy="75" r="1" fill="#00f0ff" opacity="0.3"/>
      <circle cx="50" cy="75" r="1" fill="#9d00ff" opacity="0.2"/>
      <circle cx="75" cy="75" r="1.5" fill="#ff0080" opacity="0.3">
        <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" repeatCount="indefinite"/>
      </circle>

      <!-- Holographic shimmer -->
      <rect x="20" y="20" width="10" height="60" fill="url(#holoShimmer)" opacity="0.1">
        <animate attributeName="x" values="20;70;20" dur="5s" repeatCount="indefinite"/>
      </rect>

      <linearGradient id="holoShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
        <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
      </linearGradient>
    </pattern>
  </defs>

  <rect width="100" height="100" fill="url(#holoGrid)"/>
</svg>