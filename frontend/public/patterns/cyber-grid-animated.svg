<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="cyberGridPattern" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Grid lines -->
      <g stroke="#00f0ff" stroke-width="0.5" opacity="0.2">
        <line x1="0" y1="0" x2="100" y2="0" />
        <line x1="0" y1="20" x2="100" y2="20" />
        <line x1="0" y1="40" x2="100" y2="40" />
        <line x1="0" y1="60" x2="100" y2="60" />
        <line x1="0" y1="80" x2="100" y2="80" />
        <line x1="0" y1="100" x2="100" y2="100" />
      </g>
      <g stroke="#00f0ff" stroke-width="0.5" opacity="0.2">
        <line x1="0" y1="0" x2="0" y2="100" />
        <line x1="20" y1="0" x2="20" y2="100" />
        <line x1="40" y1="0" x2="40" y2="100" />
        <line x1="60" y1="0" x2="60" y2="100" />
        <line x1="80" y1="0" x2="80" y2="100" />
        <line x1="100" y1="0" x2="100" y2="100" />
      </g>
      <!-- Glowing nodes -->
      <g fill="#00f0ff" opacity="0.4">
        <circle cx="20" cy="20" r="1" />
        <circle cx="60" cy="20" r="1" />
        <circle cx="20" cy="60" r="1" />
        <circle cx="60" cy="60" r="1" />
      </g>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#cyberGridPattern)" />
</svg>
