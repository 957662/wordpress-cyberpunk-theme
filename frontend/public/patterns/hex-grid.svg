<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="hexagons" width="60" height="52" patternUnits="userSpaceOnUse" patternTransform="scale(1)">
      <path d="M 30 0 L 60 17 L 60 52 L 30 69 L 0 52 L 0 17 Z"
            fill="none"
            stroke="#00f0ff"
            stroke-width="0.3"
            opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0f"/>

  <!-- Hexagon Pattern -->
  <rect width="400" height="400" fill="url(#hexagons)"/>

  <!-- Accent Hexagons (random highlights) -->
  <g fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.3">
    <path d="M 60 52 L 90 69 L 90 104 L 60 121 L 30 104 L 30 69 Z"/>
    <path d="M 180 104 L 210 121 L 210 156 L 180 173 L 150 156 L 150 121 Z"/>
    <path d="M 300 52 L 330 69 L 330 104 L 300 121 L 270 104 L 270 69 Z"/>
  </g>

  <g fill="none" stroke="#9d00ff" stroke-width="0.5" opacity="0.3">
    <path d="M 120 156 L 150 173 L 150 208 L 120 225 L 90 208 L 90 173 Z"/>
    <path d="M 240 208 L 270 225 L 270 260 L 240 277 L 210 260 L 210 225 Z"/>
    <path d="M 360 156 L 390 173 L 390 208 L 360 225 L 330 208 L 330 173 Z"/>
  </g>

  <!-- Glowing Nodes -->
  <g>
    <circle cx="60" cy="87" r="2" fill="#00f0ff" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="139" r="2" fill="#00f0ff" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="87" r="2" fill="#00f0ff" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="191" r="2" fill="#9d00ff" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="243" r="2" fill="#9d00ff" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="191" r="2" fill="#9d00ff" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
