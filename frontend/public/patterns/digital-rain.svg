<svg xmlns="http://www.w3.org/2000/svg" width="50" height="100" viewBox="0 0 50 100">
  <defs>
    <pattern id="digitalRainPattern" width="50" height="100" patternUnits="userSpaceOnUse">
      <style>
        .matrix-char {
          font-family: monospace;
          font-size: 12px;
          fill: #00f0ff;
          opacity: 0.7;
        }
      </style>

      <!-- Column 1 -->
      <g class="matrix-char">
        <text x="0" y="0">1</text>
        <animate attributeName="y" from="0" to="100" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
      </g>
      <g class="matrix-char">
        <text x="0" y="20">0</text>
        <animate attributeName="y" from="20" to="120" dur="2.5s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" />
      </g>
      <g class="matrix-char">
        <text x="0" y="40">1</text>
        <animate attributeName="y" from="40" to="140" dur="1.8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" />
      </g>

      <!-- Column 2 -->
      <g class="matrix-char">
        <text x="10" y="10">0</text>
        <animate attributeName="y" from="10" to="110" dur="2.2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" />
      </g>
      <g class="matrix-char">
        <text x="10" y="30">1</text>
        <animate attributeName="y" from="30" to="130" dur="1.9s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="1.9s" repeatCount="indefinite" />
      </g>

      <!-- Column 3 -->
      <g class="matrix-char">
        <text x="20" y="5">1</text>
        <animate attributeName="y" from="5" to="105" dur="2.3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="2.3s" repeatCount="indefinite" />
      </g>
      <g class="matrix-char">
        <text x="20" y="25">0</text>
        <animate attributeName="y" from="25" to="125" dur="2.1s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="2.1s" repeatCount="indefinite" />
      </g>
      <g class="matrix-char">
        <text x="20" y="45">1</text>
        <animate attributeName="y" from="45" to="145" dur="1.7s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="1.7s" repeatCount="indefinite" />
      </g>

      <!-- Column 4 -->
      <g class="matrix-char">
        <text x="30" y="15">0</text>
        <animate attributeName="y" from="15" to="115" dur="2.4s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite" />
      </g>
      <g class="matrix-char">
        <text x="30" y="35">1</text>
        <animate attributeName="y" from="35" to="135" dur="2.0s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="2.0s" repeatCount="indefinite" />
      </g>

      <!-- Column 5 -->
      <g class="matrix-char">
        <text x="40" y="8">1</text>
        <animate attributeName="y" from="8" to="108" dur="2.6s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite" />
      </g>
      <g class="matrix-char">
        <text x="40" y="28">0</text>
        <animate attributeName="y" from="28" to="128" dur="1.8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" />
      </g>
      <g class="matrix-char">
        <text x="40" y="48">1</text>
        <animate attributeName="y" from="48" to="148" dur="2.2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" />
      </g>
    </pattern>
  </defs>
  <rect width="50" height="100" fill="url(#digitalRainPattern)" />
</svg>
