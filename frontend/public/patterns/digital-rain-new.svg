    <!-- Column 1 -->
    <g transform="translate(50, 0)">
      <rect x="0" y="0" width="2" height="100" fill="url(#rainGradNew)">
        <animate attributeName="y" from="-100" to="600" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="150" width="2" height="150" fill="url(#rainGradNew)">
        <animate attributeName="y" from="-150" to="600" dur="5s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="350" width="2" height="120" fill="url(#rainGradNew)">
        <animate attributeName="y" from="-120" to="600" dur="4.5s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Column 2 -->
    <g transform="translate(100, 0)">
      <rect x="0" y="50" width="2" height="80" fill="url(#rainGradNew)">
        <animate attributeName="y" from="-80" to="600" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="200" width="2" height="130" fill="url(#rainGradNew)">
        <animate attributeName="y" from="-130" to="600" dur="4.2s" repeatCount="indefinite"/>
