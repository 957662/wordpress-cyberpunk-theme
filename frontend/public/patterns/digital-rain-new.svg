        <animate attributeName="y" from="-140" to="600" dur="5.2s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Column 4 -->
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="2" height="110" fill="url(#rainGradNew)">
        <animate attributeName="y" from="-110" to="600" dur="4.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="180" width="2" height="100" fill="url(#rainGradNew)">
