        <animate attributeName="y" from="-98" to="600" dur="4.1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Column 15 -->
    <g transform="translate(750, 0)">
      <rect x="0" y="80" width="2" height="104" fill="url(#rainGradNew)">
        <animate attributeName="y" from="-104" to="600" dur="4.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="260" width="2" height="121" fill="url(#rainGradNew)">
        <animate attributeName="y" from="-121" to="600" dur="5s" repeatCount="indefinite"/>
