<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Neon dot grid pattern -->
  <g>
    <!-- Row 1 -->
    <circle cx="10" cy="10" r="2" fill="#00f0ff" opacity="0.4"/>
    <circle cx="30" cy="10" r="2" fill="#9d00ff" opacity="0.4"/>
    <circle cx="50" cy="10" r="2" fill="#00f0ff" opacity="0.4"/>
    <circle cx="70" cy="10" r="2" fill="#9d00ff" opacity="0.4"/>
    <circle cx="90" cy="10" r="2" fill="#00f0ff" opacity="0.4"/>

    <!-- Row 2 -->
    <circle cx="10" cy="30" r="2" fill="#9d00ff" opacity="0.4"/>
    <circle cx="30" cy="30" r="2" fill="#00f0ff" opacity="0.4"/>
    <circle cx="50" cy="30" r="2" fill="#9d00ff" opacity="0.4"/>
    <circle cx="70" cy="30" r="2" fill="#00f0ff" opacity="0.4"/>
    <circle cx="90" cy="30" r="2" fill="#9d00ff" opacity="0.4"/>

    <!-- Row 3 -->
    <circle cx="10" cy="50" r="2" fill="#00f0ff" opacity="0.4"/>
    <circle cx="30" cy="50" r="2" fill="#9d00ff" opacity="0.4"/>
    <circle cx="50" cy="50" r="3" fill="#ff0080" opacity="0.5"/>
    <circle cx="70" cy="50" r="2" fill="#9d00ff" opacity="0.4"/>
    <circle cx="90" cy="50" r="2" fill="#00f0ff" opacity="0.4"/>

    <!-- Row 4 -->
    <circle cx="10" cy="70" r="2" fill="#9d00ff" opacity="0.4"/>
    <circle cx="30" cy="70" r="2" fill="#00f0ff" opacity="0.4"/>
    <circle cx="50" cy="70" r="2" fill="#9d00ff" opacity="0.4"/>
    <circle cx="70" cy="70" r="2" fill="#00f0ff" opacity="0.4"/>
    <circle cx="90" cy="70" r="2" fill="#9d00ff" opacity="0.4"/>

    <!-- Row 5 -->
    <circle cx="10" cy="90" r="2" fill="#00f0ff" opacity="0.4"/>
    <circle cx="30" cy="90" r="2" fill="#9d00ff" opacity="0.4"/>
    <circle cx="50" cy="90" r="2" fill="#00f0ff" opacity="0.4"/>
    <circle cx="70" cy="90" r="2" fill="#9d00ff" opacity="0.4"/>
    <circle cx="90" cy="90" r="2" fill="#00f0ff" opacity="0.4"/>
  </g>
</svg>