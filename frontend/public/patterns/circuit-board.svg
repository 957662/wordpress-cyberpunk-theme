<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="circuitBoardPattern" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Circuit traces -->
      <g fill="none" stroke="#9d00ff" stroke-width="1" opacity="0.3">
        <!-- Horizontal traces -->
        <path d="M0,25 L40,25 L40,50 L80,50" />
        <path d="M0,75 L30,75 L30,100 L60,100" />
        <path d="M0,125 L50,125 L50,150 L90,150" />
        <path d="M0,175 L35,175 L35,200 L65,200" />

        <!-- Vertical traces -->
        <path d="M100,0 L100,40 L125,40 L125,80" />
        <path d="M150,0 L150,30 L175,30 L175,70" />
        <path d="M125,100 L125,140 L100,140 L100,180" />
        <path d="M175,100 L175,130 L150,130 L150,170" />

        <!-- Corner connections -->
        <path d="M120,25 L160,25 L160,60 L200,60" />
        <path d="M80,75 L120,75 L120,110 L160,110" />
      </g>

      <!-- Nodes/joints -->
      <g fill="#00f0ff" opacity="0.5">
        <circle cx="40" cy="25" r="2" />
        <circle cx="40" cy="50" r="2" />
        <circle cx="80" cy="50" r="2" />
        <circle cx="30" cy="75" r="2" />
        <circle cx="30" cy="100" r="2" />
        <circle cx="60" cy="100" r="2" />
        <circle cx="50" cy="125" r="2" />
        <circle cx="50" cy="150" r="2" />
        <circle cx="90" cy="150" r="2" />
        <circle cx="100" cy="40" r="2" />
        <circle cx="125" cy="40" r="2" />
        <circle cx="125" cy="80" r="2" />
        <circle cx="150" cy="30" r="2" />
        <circle cx="175" cy="30" r="2" />
        <circle cx="175" cy="70" r="2" />
        <circle cx="125" cy="140" r="2" />
        <circle cx="100" cy="140" r="2" />
        <circle cx="100" cy="180" r="2" />
        <circle cx="175" cy="130" r="2" />
        <circle cx="150" cy="130" r="2" />
        <circle cx="150" cy="170" r="2" />
        <circle cx="160" cy="25" r="2" />
        <circle cx="160" cy="60" r="2" />
        <circle cx="120" cy="75" r="2" />
        <circle cx="120" cy="110" r="2" />
      </g>

      <!-- Component symbols -->
      <g fill="#ff0080" opacity="0.4">
        <rect x="38" y="23" width="4" height="4" />
        <rect x="123" y="38" width="4" height="4" />
        <rect x="173" y="28" width="4" height="4" />
        <rect x="58" y="98" width="4" height="4" />
        <rect x="148" y="128" width="4" height="4" />
      </g>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#circuitBoardPattern)" />
</svg>
