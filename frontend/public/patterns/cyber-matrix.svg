<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="matrix-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0f"/>

  <!-- Matrix Columns -->
  <g font-family="monospace" font-size="10" fill="url(#matrix-gradient)">
    <!-- Column 1 -->
    <text x="10" y="15" opacity="0.3">1</text>
    <text x="10" y="27" opacity="0.5">0</text>
    <text x="10" y="39" opacity="0.7">1</text>
    <text x="10" y="51" opacity="0.9">1</text>
    <text x="10" y="63" opacity="1">0</text>
    <text x="10" y="75" opacity="0.8">1</text>
    <text x="10" y="87" opacity="0.4">0</text>

    <!-- Column 2 -->
    <text x="25" y="15" opacity="0.4">0</text>
    <text x="25" y="27" opacity="0.6">1</text>
    <text x="25" y="39" opacity="0.8">0</text>
    <text x="25" y="51" opacity="1">1</text>
    <text x="25" y="63" opacity="0.9">0</text>
    <text x="25" y="75" opacity="0.7">1</text>
    <text x="25" y="87" opacity="0.3">0</text>

    <!-- Column 3 -->
    <text x="40" y="15" opacity="0.5">1</text>
    <text x="40" y="27" opacity="0.7">0</text>
    <text x="40" y="39" opacity="0.9">1</text>
    <text x="40" y="51" opacity="1">0</text>
    <text x="40" y="63" opacity="0.8">1</text>
    <text x="40" y="75" opacity="0.6">0</text>
    <text x="40" y="87" opacity="0.4">1</text>

    <!-- Column 4 -->
    <text x="55" y="15" opacity="0.3">0</text>
    <text x="55" y="27" opacity="0.5">1</text>
    <text x="55" y="39" opacity="0.7">0</text>
    <text x="55" y="51" opacity="0.9">1</text>
    <text x="55" y="63" opacity="1">0</text>
    <text x="55" y="75" opacity="0.7">1</text>
    <text x="55" y="87" opacity="0.4">0</text>

    <!-- Column 5 -->
    <text x="70" y="15" opacity="0.4">1</text>
    <text x="70" y="27" opacity="0.6">0</text>
    <text x="70" y="39" opacity="0.8">1</text>
    <text x="70" y="51" opacity="1">0</text>
    <text x="70" y="63" opacity="0.9">1</text>
    <text x="70" y="75" opacity="0.6">0</text>
    <text x="70" y="87" opacity="0.3">1</text>

    <!-- Column 6 -->
    <text x="85" y="15" opacity="0.3">0</text>
    <text x="85" y="27" opacity="0.5">1</text>
    <text x="85" y="39" opacity="0.7">0</text>
    <text x="85" y="51" opacity="0.9">1</text>
    <text x="85" y="63" opacity="1">0</text>
    <text x="85" y="75" opacity="0.8">1</text>
    <text x="85" y="87" opacity="0.4">0</text>
  </g>

  <!-- Animated Falling Characters -->
  <text x="10" y="0" font-family="monospace" font-size="10" fill="#00f0ff">
    <animate attributeName="y" values="0;100;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="5s" repeatCount="indefinite"/>
    1
  </text>
  <text x="40" y="0" font-family="monospace" font-size="10" fill="#00ff88">
    <animate attributeName="y" values="0;100;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="4s" repeatCount="indefinite"/>
    0
  </text>
  <text x="70" y="0" font-family="monospace" font-size="10" fill="#00f0ff">
    <animate attributeName="y" values="0;100;0" dur="6s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="6s" repeatCount="indefinite"/>
    1
  </text>
</svg>
