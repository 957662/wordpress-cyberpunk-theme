<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Circuit board pattern -->
  <g stroke="url(#circuitGradient)" stroke-width="1" fill="none" opacity="0.5">
    <!-- Horizontal lines with nodes -->
    <line x1="0" y1="10" x2="30" y2="10"/>
    <circle cx="30" cy="10" r="2" fill="#00f0ff"/>
    <line x1="30" y1="10" x2="30" y2="25"/>
    <line x1="30" y1="25" x2="60" y2="25"/>
    <circle cx="60" cy="25" r="2" fill="#9d00ff"/>
    <line x1="60" y1="25" x2="60" y2="40"/>
    <line x1="60" y1="40" x2="100" y2="40"/>

    <line x1="0" y1="30" x2="20" y2="30"/>
    <circle cx="20" cy="30" r="2" fill="#00f0ff"/>
    <line x1="20" y1="30" x2="20" y2="50"/>
    <line x1="20" y1="50" x2="50" y2="50"/>
    <circle cx="50" cy="50" r="2" fill="#ff0080"/>
    <line x1="50" y1="50" x2="50" y2="70"/>
    <line x1="50" y1="70" x2="80" y2="70"/>
    <circle cx="80" cy="70" r="2" fill="#9d00ff"/>
    <line x1="80" y1="70" x2="80" y2="90"/>
    <line x1="80" y1="90" x2="100" y2="90"/>

    <line x1="10" y1="60" x2="40" y2="60"/>
    <circle cx="40" cy="60" r="2" fill="#00f0ff"/>
    <line x1="40" y1="60" x2="40" y2="80"/>
    <line x1="40" y1="80" x2="70" y2="80"/>
    <circle cx="70" cy="80" r="2" fill="#9d00ff"/>

    <line x1="90" y1="20" x2="70" y2="20"/>
    <circle cx="70" cy="20" r="2" fill="#ff0080"/>
    <line x1="70" y1="20" x2="70" y2="35"/>
    <line x1="70" y1="35" x2="40" y2="35"/>
    <circle cx="40" cy="35" r="2" fill="#00f0ff"/>
    <line x1="40" y1="35" x2="40" y2="45"/>
  </g>
</svg>