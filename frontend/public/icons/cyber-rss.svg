<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="rss-gradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
    <filter id="rss-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- RSS Arcs -->
  <path d="M4 11a9 9 0 0 1 9 9"
        stroke="url(#rss-gradient)"
        stroke-width="2.5"
        stroke-linecap="round"
        filter="url(#rss-glow)">
    <animate attributeName="stroke-opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </path>

  <path d="M4 4a16 16 0 0 1 16 16"
        stroke="url(#rss-gradient)"
        stroke-width="2.5"
        stroke-linecap="round"
        opacity="0.6">
    <animate attributeName="stroke-opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Center Dot -->
  <circle cx="5" cy="19" r="3"
          stroke="url(#rss-gradient)"
          stroke-width="2"
          fill="rgba(255,136,0,0.2)"/>
  <circle cx="5" cy="19" r="1.5" fill="#ff8800">
    <animate attributeName="r" values="1.5;2;1.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Signal Pulse -->
  <circle cx="5" cy="19" r="4" stroke="#ff0080" stroke-width="0.5" fill="none" opacity="0.3">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
