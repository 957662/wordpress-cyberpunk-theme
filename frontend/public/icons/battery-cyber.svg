<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="batteryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g>
    <!-- Battery body -->
    <rect x="2" y="8" width="18" height="8" rx="1" stroke="url(#batteryGrad)" stroke-width="1.5" fill="none"/>
    <!-- Battery terminal -->
    <rect x="20" y="10" width="2" height="4" rx="0.5" fill="#00f0ff"/>
    <!-- Charge level (75%) -->
    <rect x="4" y="10" width="12" height="4" rx="0.5" fill="url(#batteryGrad)">
      <animate attributeName="width" values="12;14;12" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Charge indicator -->
    <path d="M7 12L10 12M7 12L9 10M7 12L9 14" stroke="#0a0a0f" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Glow -->
    <rect x="4" y="10" width="12" height="4" rx="0.5" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.5">
      <animate attributeName="width" values="12;14;12" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>