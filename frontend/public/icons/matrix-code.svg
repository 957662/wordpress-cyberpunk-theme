    <text x="8" y="8" font-family="monospace" font-size="7" fill="#00ff88" opacity="0.7">1</text>
    <text x="14" y="8" font-family="monospace" font-size="7" fill="#00ff88" opacity="0.5">0</text>
    <text x="2" y="15" font-family="monospace" font-size="7" fill="#00ff88" opacity="0.6">1</text>
