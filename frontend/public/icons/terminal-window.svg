<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g>
    <!-- Window frame -->
    <rect x="2" y="4" width="20" height="16" rx="2" stroke="url(#termGrad)" stroke-width="1.5" fill="none"/>
    <!-- Title bar -->
    <line x1="2" y1="8" x2="22" y2="8" stroke="#00f0ff" stroke-width="1"/>
    <!-- Window controls -->
    <circle cx="5" cy="6" r="1" fill="#ff0080"/>
    <circle cx="8" cy="6" r="1" fill="#f0ff00"/>
    <circle cx="11" cy="6" r="1" fill="#00ff88"/>
    <!-- Terminal prompt -->
    <text x="5" y="14" fill="#00f0ff" font-family="monospace" font-size="6">&gt;_</text>
    <!-- Cursor -->
    <rect x="10" y="11" width="1" height="1" fill="#00f0ff">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>