<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="quantumGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="quantumGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0ff00;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0" />
    </radialGradient>
    <filter id="quantumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景光晕 -->
  <circle cx="50" cy="50" r="40" fill="url(#coreGlow)" opacity="0.3"/>

  <!-- 外层量子环 -->
  <ellipse cx="50" cy="50" rx="42" ry="42"
           stroke="url(#quantumGradient1)"
           stroke-width="1.5"
           fill="none"
           transform="rotate(0, 50, 50)">
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="0 50 50"
                      to="360 50 50"
                      dur="20s"
                      repeatCount="indefinite"/>
  </ellipse>

  <!-- 中层量子环 -->
  <ellipse cx="50" cy="50" rx="35" ry="35"
           stroke="url(#quantumGradient2)"
           stroke-width="1.5"
           fill="none"
           transform="rotate(45, 50, 50)">
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="45 50 50"
                      to="-315 50 50"
                      dur="15s"
                      repeatCount="indefinite"/>
  </ellipse>

  <!-- 内层量子环 -->
  <ellipse cx="50" cy="50" rx="28" ry="28"
           stroke="#00f0ff"
           stroke-width="1"
           fill="none"
           opacity="0.8"
           transform="rotate(-30, 50, 50)">
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="-30 50 50"
                      to="330 50 50"
                      dur="10s"
                      repeatCount="indefinite"/>
  </ellipse>

  <!-- 量子核心 -->
  <g filter="url(#quantumGlow)">
    <!-- 核心六边形 -->
    <path d="M50 35 L58 40 L58 50 L50 55 L42 50 L42 40 Z"
          fill="url(#quantumGradient1)"
          opacity="0.9"/>

    <!-- 中心能量点 -->
    <circle cx="50" cy="45" r="3" fill="#fff">
      <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 轨道粒子 -->
  <g fill="#00f0ff">
    <circle r="1.5">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#orbit1"/>
      </animateMotion>
    </circle>
    <circle r="1.5" fill="#9d00ff">
      <animateMotion dur="5s" repeatCount="indefinite" begin="1s">
        <mpath href="#orbit2"/>
      </animateMotion>
    </circle>
    <circle r="1.5" fill="#ff0080">
      <animateMotion dur="6s" repeatCount="indefinite" begin="2s">
        <mpath href="#orbit3"/>
      </animateMotion>
    </circle>
  </g>

  <!-- 轨道路径（隐形） -->
  <path id="orbit1" d="M50 8 A42 42 0 0 1 92 50 A42 42 0 0 1 50 92 A42 42 0 0 1 8 50 A42 42 0 0 1 50 8" fill="none" stroke="none"/>
  <path id="orbit2" d="M50 15 A35 35 0 0 1 85 50 A35 35 0 0 1 50 85 A35 35 0 0 1 15 50 A35 35 0 0 1 50 15" fill="none" stroke="none"/>
  <path id="orbit3" d="M50 22 A28 28 0 0 1 78 50 A28 28 0 0 1 50 78 A28 28 0 0 1 22 50 A28 28 0 0 1 50 22" fill="none" stroke="none"/>

  <!-- 量子纠缠线 -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.4">
    <line x1="50" y1="35" x2="50" y2="8"/>
    <line x1="58" y1="40" x2="75" y2="20"/>
    <line x1="58" y1="50" x2="85" y2="50"/>
    <line x1="50" y1="55" x2="50" y2="92"/>
    <line x1="42" y1="50" x2="15" y2="50"/>
    <line x1="42" y1="40" x2="25" y2="20"/>
  </g>

  <!-- 波动效果 -->
  <g stroke="url(#quantumGradient1)" stroke-width="1" fill="none" opacity="0.3">
    <path d="M30 50 Q35 45, 40 50 T50 50 T60 50 T70 50">
      <animate attributeName="d"
               values="M30 50 Q35 45, 40 50 T50 50 T60 50 T70 50;M30 50 Q35 55, 40 50 T50 50 T60 50 T70 50;M30 50 Q35 45, 40 50 T50 50 T60 50 T70 50"
               dur="3s"
               repeatCount="indefinite"/>
    </path>
  </g>
</svg>
