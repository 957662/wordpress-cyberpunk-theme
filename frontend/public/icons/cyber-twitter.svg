<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="twitter-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
    <filter id="twitter-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Twitter/X Logo -->
  <path d="M4 4l11.733 16h4.267l-11.733 -16z"
        stroke="url(#twitter-gradient)"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#twitter-glow)"/>

  <!-- Secondary Lines -->
  <path d="M4 20l6.267 -8.733L16.733 4"
        stroke="#0080ff"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.5"/>

  <!-- Pulse Effect -->
  <circle cx="12" cy="12" r="8" stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.3">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
