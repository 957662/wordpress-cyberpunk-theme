<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g>
    <!-- Lock body -->
    <rect x="6" y="10" width="12" height="10" rx="2" stroke="url(#lockGrad)" stroke-width="2" fill="none"/>
    <!-- Lock shackle -->
    <path d="M9 10V7C9 5.3 10.3 4 12 4C13.7 4 15 5.3 15 7V10" stroke="url(#lockGrad)" stroke-width="2" fill="none"/>
    <!-- Keyhole -->
    <circle cx="12" cy="15" r="1.5" fill="#00f0ff"/>
    <line x1="12" y1="16.5" x2="12" y2="18" stroke="#00f0ff" stroke-width="1"/>
    <!-- Security indicators -->
    <circle cx="4" cy="8" r="1" fill="#00ff88">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="8" r="1" fill="#00ff88">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="4" cy="18" r="1" fill="#00ff88">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="20" cy="18" r="1" fill="#00ff88">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
  </g>
</svg>