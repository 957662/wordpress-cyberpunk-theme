<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Chip body -->
  <g filter="url(#neonGlow)">
    <rect x="6" y="6" width="12" height="12" rx="1" fill="#0a0a0f" stroke="url(#chipGradient)" stroke-width="1.5"/>
  </g>

  <!-- Inner circuits -->
  <g stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.6">
    <rect x="8" y="8" width="3" height="3"/>
    <rect x="13" y="8" width="3" height="3"/>
    <rect x="8" y="13" width="3" height="3"/>
    <rect x="13" y="13" width="3" height="3"/>
    <!-- Center connection -->
    <line x1="11" y1="9.5" x2="13" y2="9.5"/>
    <line x1="11" y1="14.5" x2="13" y2="14.5"/>
    <line x1="9.5" y1="11" x2="9.5" y2="13"/>
    <line x1="14.5" y1="11" x2="14.5" y2="13"/>
  </g>

  <!-- Pins - Top -->
  <g stroke="#9d00ff" stroke-width="1" filter="url(#neonGlow)">
    <line x1="8" y1="6" x2="8" y2="3">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="10" y1="6" x2="10" y2="3">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="12" y1="6" x2="12" y2="3">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="14" y1="6" x2="14" y2="3">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="16" y1="6" x2="16" y2="3">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Pins - Bottom -->
  <g stroke="#9d00ff" stroke-width="1" filter="url(#neonGlow)">
    <line x1="8" y1="18" x2="8" y2="21">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/>
    </line>
    <line x1="10" y1="18" x2="10" y2="21">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <line x1="12" y1="18" x2="12" y2="21">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.9s" repeatCount="indefinite"/>
    </line>
    <line x1="14" y1="18" x2="14" y2="21">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="16" y1="18" x2="16" y2="21">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Pins - Left -->
  <g stroke="#ff0080" stroke-width="1" filter="url(#neonGlow)">
    <line x1="6" y1="8" x2="3" y2="8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.1s" repeatCount="indefinite"/>
    </line>
    <line x1="6" y1="10" x2="3" y2="10">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="6" y1="12" x2="3" y2="12">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.7s" repeatCount="indefinite"/>
    </line>
    <line x1="6" y1="14" x2="3" y2="14">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="6" y1="16" x2="3" y2="16">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Pins - Right -->
  <g stroke="#ff0080" stroke-width="1" filter="url(#neonGlow)">
    <line x1="18" y1="8" x2="21" y2="8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="18" y1="10" x2="21" y2="10">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="18" y1="12" x2="21" y2="12">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="18" y1="14" x2="21" y2="14">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.1s" repeatCount="indefinite"/>
    </line>
    <line x1="18" y1="16" x2="21" y2="16">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Pin nodes -->
  <g fill="#00f0ff" filter="url(#neonGlow)">
    <circle cx="8" cy="3" r="0.8"/>
    <circle cx="10" cy="3" r="0.8"/>
    <circle cx="12" cy="3" r="0.8"/>
    <circle cx="14" cy="3" r="0.8"/>
    <circle cx="16" cy="3" r="0.8"/>
    <circle cx="8" cy="21" r="0.8"/>
    <circle cx="10" cy="21" r="0.8"/>
    <circle cx="12" cy="21" r="0.8"/>
    <circle cx="14" cy="21" r="0.8"/>
    <circle cx="16" cy="21" r="0.8"/>
    <circle cx="3" cy="8" r="0.8"/>
    <circle cx="3" cy="10" r="0.8"/>
    <circle cx="3" cy="12" r="0.8"/>
    <circle cx="3" cy="14" r="0.8"/>
    <circle cx="3" cy="16" r="0.8"/>
    <circle cx="21" cy="8" r="0.8"/>
    <circle cx="21" cy="10" r="0.8"/>
    <circle cx="21" cy="12" r="0.8"/>
    <circle cx="21" cy="14" r="0.8"/>
    <circle cx="21" cy="16" r="0.8"/>
  </g>

  <!-- Center core -->
  <circle cx="12" cy="12" r="2" fill="#00f0ff" filter="url(#neonGlow)">
    <animate attributeName="r" values="2;2.5;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>