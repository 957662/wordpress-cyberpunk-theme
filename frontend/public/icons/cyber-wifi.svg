<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="wifi-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Point -->
  <circle cx="12" cy="20" r="2" fill="#00f0ff">
    <animate attributeName="r" values="2;2.5;2" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Signal Waves -->
  <path d="M12 14a8 8 0 0 1 8-8"
        stroke="#9d00ff"
        stroke-width="2"
        stroke-linecap="round"
        filter="url(#wifi-glow)">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </path>

  <path d="M12 10a4 4 0 0 1 4-4"
        stroke="#ff0080"
        stroke-width="2"
        stroke-linecap="round"
        filter="url(#wifi-glow)">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </path>

  <path d="M12 6a2 2 0 0 1 2-2"
        stroke="#00f0ff"
        stroke-width="2"
        stroke-linecap="round"
        filter="url(#wifi-glow)">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </path>

  <!-- Left Side Waves -->
  <path d="M4 6a8 8 0 0 1 8 8"
        stroke="#9d00ff"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.6"/>
  <path d="M8 6a4 4 0 0 1 4 4"
        stroke="#ff0080"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.4"/>
</svg>
