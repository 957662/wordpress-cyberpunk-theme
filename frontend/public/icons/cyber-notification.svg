<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="notification-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Bell Body -->
  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"
        stroke="url(#notification-gradient)"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="rgba(0,240,255,0.05)"/>

  <!-- Bell Clapper -->
  <path d="M13.73 21a2 2 0 0 1-3.46 0"
        stroke="#ff0080"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- Notification Badge -->
  <circle cx="18" cy="6" r="5"
          stroke="#ff0080"
          stroke-width="2"
          fill="rgba(255,0,128,0.2)"/>
  <text x="18" y="8"
        text-anchor="middle"
        font-size="8"
        font-weight="bold"
        fill="#ff0080">!</text>

  <!-- Bell Animation -->
  <animateTransform attributeName="transform"
                    type="rotate"
                    values="-10 12 12;10 12 12;-10 12 12"
                    dur="1s"
                    repeatCount="indefinite"/>

  <!-- Badge Pulse -->
  <circle cx="18" cy="6" r="6"
          stroke="#ff0080"
          stroke-width="0.5"
          fill="none"
          opacity="0.5">
    <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
