<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="trash-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080"/>
      <stop offset="100%" style="stop-color:#ff4444"/>
    </linearGradient>
  </defs>

  <!-- Trash Body -->
  <polyline points="3 6 5 6 21 6"
            stroke="url(#trash-gradient)"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
        stroke="url(#trash-gradient)"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="rgba(255,0,128,0.05)"/>

  <!-- Lid Lines -->
  <line x1="10" y1="11" x2="10" y2="17" stroke="#ff0080" stroke-width="1.5" stroke-linecap="round">
    <animate attributeName="y2" values="17;11;17" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="14" y1="11" x2="14" y2="17" stroke="#ff0080" stroke-width="1.5" stroke-linecap="round">
    <animate attributeName="y2" values="17;11;17" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </line>

  <!-- Delete Indicator -->
  <circle cx="12" cy="6" r="1.5" fill="#ff0080">
    <animate attributeName="r" values="1.5;2;1.5" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
