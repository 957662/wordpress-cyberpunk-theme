<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="download-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>

  <!-- Arrow -->
  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"
        stroke="#9d00ff"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <polyline points="7 10 12 15 17 10"
            stroke="url(#download-gradient)"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round">
    <animate attributeName="points" values="7 10 12 15 17 10;7 12 12 17 17 12;7 10 12 15 17 10" dur="1.5s" repeatCount="indefinite"/>
  </polyline>

  <line x1="12" y1="15" x2="12" y2="3"
        stroke="url(#download-gradient)"
        stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Progress Indicator -->
  <circle cx="12" cy="3" r="2" fill="#00f0ff">
    <animate attributeName="cy" values="3;15;3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Data Packets -->
  <rect x="8" y="20" width="2" height="2" fill="#00ff88" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="0.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="11" y="20" width="2" height="2" fill="#00ff88" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="0.5s" begin="0.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="14" y="20" width="2" height="2" fill="#00ff88" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="0.5s" begin="0.2s" repeatCount="indefinite"/>
  </rect>
</svg>
