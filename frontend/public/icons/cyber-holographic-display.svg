<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="holoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </linearGradient>
    <filter id="holoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="screenClip">
      <rect x="20" y="20" width="60" height="45" rx="2"/>
    </clipPath>
  </defs>

  <!-- 全息投影基座 -->
  <ellipse cx="50" cy="85" rx="30" ry="5"
           fill="#12121a"
           stroke="url(#holoGradient)"
           stroke-width="1"/>

  <!-- 全息屏幕框架 -->
  <rect x="15" y="15" width="70" height="55"
        stroke="url(#holoGradient)"
        stroke-width="1.5"
        fill="none"
        rx="3"
        filter="url(#holoGlow)"/>

  <!-- 屏幕内边框 -->
  <rect x="20" y="20" width="60" height="45"
        stroke="#00f0ff"
        stroke-width="0.5"
        fill="rgba(0, 240, 255, 0.05)"
        rx="2"/>

  <!-- 全息内容区域 -->
  <g clip-path="url(#screenClip)">
    <!-- 数据网格 -->
    <g stroke="#00f0ff" stroke-width="0.3" opacity="0.3">
      <line x1="20" y1="27.5" x2="80" y2="27.5"/>
      <line x1="20" y1="35" x2="80" y2="35"/>
      <line x1="20" y1="42.5" x2="80" y2="42.5"/>
      <line x1="20" y1="50" x2="80" y2="50"/>
      <line x1="20" y1="57.5" x2="80" y2="57.5"/>

      <line x1="30" y1="20" x2="30" y2="65"/>
      <line x1="40" y1="20" x2="40" y2="65"/>
      <line x1="50" y1="20" x2="50" y2="65"/>
      <line x1="60" y1="20" x2="60" y2="65"/>
      <line x1="70" y1="20" x2="70" y2="65"/>
    </g>

    <!-- 数据点 -->
    <g fill="#00f0ff" opacity="0.6">
      <circle cx="25" cy="25" r="1">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="35" cy="30" r="1">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite" begin="0.2s"/>
      </circle>
      <circle cx="45" cy="28" r="1">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite" begin="0.4s"/>
      </circle>
      <circle cx="55" cy="32" r="1">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite" begin="0.6s"/>
      </circle>
      <circle cx="65" cy="26" r="1">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite" begin="0.8s"/>
      </circle>
      <circle cx="75" cy="29" r="1">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite" begin="1s"/>
      </circle>
    </g>

    <!-- 波形图 -->
    <path d="M20 50 Q30 45, 40 50 T60 50 T80 50"
          stroke="#9d00ff"
          stroke-width="1"
          fill="none"
          opacity="0.5">
      <animate attributeName="d"
               values="M20 50 Q30 45, 40 50 T60 50 T80 50;M20 50 Q30 55, 40 50 T60 50 T80 50;M20 50 Q30 45, 40 50 T60 50 T80 50"
               dur="3s"
               repeatCount="indefinite"/>
    </path>

    <!-- 扫描线 -->
    <rect x="20" y="20" width="60" height="3"
          fill="url(#scanGradient)"
          opacity="0.5">
      <animate attributeName="y" values="20;62;20" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- 全息光束 -->
  <g opacity="0.3">
    <path d="M30 70 L25 85"
          stroke="#00f0ff"
          stroke-width="1"
          fill="none"/>
    <path d="M50 70 L50 85"
          stroke="#00f0ff"
          stroke-width="1"
          fill="none"/>
    <path d="M70 70 L75 85"
          stroke="#00f0ff"
          stroke-width="1"
          fill="none"/>
  </g>

  <!-- 角落装饰 -->
  <g stroke="#9d00ff" stroke-width="1" fill="none" opacity="0.7">
    <path d="M12 20 L12 12 L20 12"/>
    <path d="M80 12 L88 12 L88 20"/>
    <path d="M88 80 L88 88 L80 88"/>
    <path d="M20 88 L12 88 L12 80"/>
  </g>

  <!-- 状态指示灯 -->
  <circle cx="83" cy="17" r="2" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- 数据流动效果 -->
  <g fill="#00f0ff" opacity="0.4">
    <circle r="1">
      <animateMotion dur="2s" repeatCount="indefinite">
        <mpath href="#dataFlow1"/>
      </animateMotion>
    </circle>
    <circle r="1">
      <animateMotion dur="2s" repeatCount="indefinite" begin="0.5s">
        <mpath href="#dataFlow2"/>
      </animateMotion>
    </circle>
  </g>

  <!-- 数据流路径（隐形） -->
  <path id="dataFlow1" d="M15 50 L85 50" fill="none" stroke="none"/>
  <path id="dataFlow2" d="M85 50 L15 50" fill="none" stroke="none"/>

  <!-- 全息闪烁效果 -->
  <rect x="20" y="20" width="60" height="45"
        fill="#00f0ff"
        opacity="0">
    <animate attributeName="opacity" values="0;0.05;0" dur="0.1s" repeatCount="indefinite" begin="2s"/>
  </rect>
</svg>
