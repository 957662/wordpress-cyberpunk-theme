<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g filter="url(#neonGlow)">
    <!-- Connection Lines -->
    <line x1="12" y1="4" x2="6" y2="10" stroke="url(#cyberGradient)" opacity="0.6"/>
    <line x1="12" y1="4" x2="18" y2="10" stroke="url(#cyberGradient)" opacity="0.6"/>
    <line x1="6" y1="10" x2="12" y2="16" stroke="url(#cyberGradient)" opacity="0.6"/>
    <line x1="18" y1="10" x2="12" y2="16" stroke="url(#cyberGradient)" opacity="0.6"/>
    <line x1="6" y1="10" x2="6" y2="20" stroke="url(#cyberGradient)" opacity="0.4"/>
    <line x1="18" y1="10" x2="18" y2="20" stroke="url(#cyberGradient)" opacity="0.4"/>

    <!-- Network Nodes -->
    <circle cx="12" cy="4" r="2.5" fill="#0a0a0f" stroke="#00f0ff"/>
    <circle cx="6" cy="10" r="2.5" fill="#0a0a0f" stroke="#9d00ff"/>
    <circle cx="18" cy="10" r="2.5" fill="#0a0a0f" stroke="#ff0080"/>
    <circle cx="12" cy="16" r="2.5" fill="#0a0a0f" stroke="#00f0ff"/>
    <circle cx="6" cy="20" r="2.5" fill="#0a0a0f" stroke="#9d00ff"/>
    <circle cx="18" cy="20" r="2.5" fill="#0a0a0f" stroke="#ff0080"/>
  </g>
</svg>