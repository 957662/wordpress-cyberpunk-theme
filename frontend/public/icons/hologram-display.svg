<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="holoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Hologram cone -->
  <g opacity="0.3">
    <polygon points="12,2 4,22 20,22" fill="url(#holoGradient)" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Display frame -->
  <g filter="url(#neonGlow)">
    <!-- Top arc -->
    <path d="M 6 6 Q 12 2 18 6" stroke="#00f0ff" stroke-width="1.5" fill="none"/>
    <!-- Bottom arc -->
    <path d="M 4 22 Q 12 18 20 22" stroke="#9d00ff" stroke-width="1.5" fill="none"/>
    <!-- Side lines -->
    <line x1="6" y1="6" x2="4" y2="22" stroke="#00f0ff" stroke-width="1"/>
    <line x1="18" y1="6" x2="20" y2="22" stroke="#9d00ff" stroke-width="1"/>
  </g>

  <!-- Scanning lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.4">
    <line x1="7" y1="8" x2="17" y2="8">
      <animate attributeName="y1" values="8;18;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="8;18;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Content placeholders -->
  <g stroke="url(#holoGradient)" stroke-width="0.5" fill="none" opacity="0.6">
    <!-- Header bar -->
    <rect x="8" y="9" width="8" height="1.5" rx="0.5"/>
    <!-- Content lines -->
    <rect x="8" y="12" width="8" height="0.5" rx="0.25"/>
    <rect x="8" y="14" width="6" height="0.5" rx="0.25"/>
    <rect x="8" y="16" width="7" height="0.5" rx="0.25"/>
  </g>

  <!-- Corner markers -->
  <g stroke="#ff0080" stroke-width="1" fill="none" filter="url(#neonGlow)">
    <!-- Top left -->
    <path d="M 7 7 L 7 9 L 9 9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Top right -->
    <path d="M 17 7 L 17 9 L 15 9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <!-- Bottom left -->
    <path d="M 5 21 L 5 19 L 7 19">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <!-- Bottom right -->
    <path d="M 19 21 L 19 19 L 17 19">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Projection source -->
  <g filter="url(#neonGlow)">
    <circle cx="12" cy="22" r="1.5" fill="#00f0ff">
      <animate attributeName="r" values="1.5;2;1.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating particles -->
  <g fill="#9d00ff" filter="url(#neonGlow)">
    <circle r="0.5" cx="10" cy="12">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="0.5" cx="14" cy="14">
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="0.5" cx="11" cy="16">
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>