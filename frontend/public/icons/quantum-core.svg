<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="quantumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff"/>
      <stop offset="50%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
  </defs>

  <!-- Outer rotating ring -->
  <g filter="url(#neonGlow)">
    <circle cx="12" cy="12" r="10" stroke="url(#quantumGradient)" stroke-width="1" stroke-dasharray="2 2" fill="none">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="20s" repeatCount="indefinite"/>
    </circle>

    <!-- Middle ring -->
    <circle cx="12" cy="12" r="7" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="3 3" fill="none" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="360 12 12" to="0 12 12" dur="15s" repeatCount="indefinite"/>
    </circle>

    <!-- Inner ring -->
    <circle cx="12" cy="12" r="4" stroke="#9d00ff" stroke-width="1" stroke-dasharray="1.5 1.5" fill="none" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Core -->
  <g filter="url(#neonGlow)">
    <circle cx="12" cy="12" r="2.5" fill="#00f0ff">
      <animate attributeName="r" values="2.5;3;2.5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="12" r="1.5" fill="#ffffff">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Orbital particles -->
  <g fill="#ff0080" filter="url(#neonGlow)">
    <circle r="1">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#orbit1"/>
      </animateMotion>
    </circle>
    <circle r="1" fill="#9d00ff">
      <animateMotion dur="5s" repeatCount="indefinite">
        <mpath href="#orbit2"/>
      </animateMotion>
    </circle>
    <circle r="1" fill="#00f0ff">
      <animateMotion dur="6s" repeatCount="indefinite">
        <mpath href="#orbit3"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Orbital paths (hidden) -->
  <path id="orbit1" d="M 12 2 A 10 10 0 0 1 12 22 A 10 10 0 0 1 12 2" fill="none" stroke="none"/>
  <path id="orbit2" d="M 12 5 A 7 7 0 0 1 12 19 A 7 7 0 0 1 12 5" fill="none" stroke="none"/>
  <path id="orbit3" d="M 12 8 A 4 4 0 0 1 12 16 A 4 4 0 0 1 12 8" fill="none" stroke="none"/>

  <!-- Energy pulses -->
  <circle cx="12" cy="12" r="4" stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0">
    <animate attributeName="r" values="4;8;12" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.3;0" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>