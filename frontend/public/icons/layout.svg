<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="layoutGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="layoutGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g filter="url(#layoutGlow)">
    <rect x="3" y="3" width="18" height="18" rx="2" stroke="url(#layoutGradient)" stroke-width="2" fill="none"/>
    <line x1="3" y1="9" x2="21" y2="9" stroke="url(#layoutGradient)" stroke-width="2"/>
    <line x1="9" y1="9" x2="9" y2="21" stroke="url(#layoutGradient)" stroke-width="2"/>

    <!-- Tech dots -->
    <circle cx="6" cy="6" r="1" fill="#00f0ff" opacity="0.8"/>
    <circle cx="18" cy="6" r="1" fill="#ff0080" opacity="0.8"/>
    <circle cx="6" cy="15" r="1" fill="#9d00ff" opacity="0.7"/>
    <circle cx="15" cy="18" r="1" fill="#00f0ff" opacity="0.7"/>
  </g>
</svg>