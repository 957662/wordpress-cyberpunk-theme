<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="volumeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="volumeGlow">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Speaker Body -->
  <polygon points="3,9 3,15 8,15 14,20 14,4 8,9" fill="url(#volumeGradient)" filter="url(#volumeGlow)"/>

  <!-- Sound Waves -->
  <path d="M17.5 7.5a8 8 0 0 1 0 9" stroke="url(#volumeGradient)" stroke-width="2" stroke-linecap="round" fill="none" filter="url(#volumeGlow)"/>
  <path d="M20 5a12 12 0 0 1 0 14" stroke="url(#volumeGradient)" stroke-width="2" stroke-linecap="round" fill="none" filter="url(#volumeGlow)"/>
</svg>
