<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="close-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080"/>
      <stop offset="100%" style="stop-color:#ff4444"/>
    </linearGradient>
    <filter id="close-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- X Shape -->
  <line x1="18" y1="6" x2="6" y2="18"
        stroke="url(#close-gradient)"
        stroke-width="2.5"
        stroke-linecap="round"
        filter="url(#close-glow)"/>

  <line x1="6" y1="6" x2="18" y2="18"
        stroke="url(#close-gradient)"
        stroke-width="2.5"
        stroke-linecap="round"
        filter="url(#close-glow)"/>

  <!-- Center Glow -->
  <circle cx="12" cy="12" r="3" fill="rgba(255,0,128,0.2)">
    <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner Dots -->
  <circle cx="6" cy="6" r="1" fill="#ff0080" opacity="0.6"/>
  <circle cx="18" cy="6" r="1" fill="#ff0080" opacity="0.6"/>
  <circle cx="6" cy="18" r="1" fill="#ff0080" opacity="0.6"/>
  <circle cx="18" cy="18" r="1" fill="#ff0080" opacity="0.6"/>
</svg>
