<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="upload-gradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Arrow -->
  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"
        stroke="#9d00ff"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <polyline points="17 8 12 3 7 8"
            stroke="url(#upload-gradient)"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round">
    <animate attributeName="points" values="17 8 12 3 7 8;17 6 12 1 7 6;17 8 12 3 7 8" dur="1.5s" repeatCount="indefinite"/>
  </polyline>

  <line x1="12" y1="3" x2="12" y2="15"
        stroke="url(#upload-gradient)"
        stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Upload Indicator -->
  <circle cx="12" cy="3" r="2" fill="#00f0ff">
    <animate attributeName="r" values="2;3;2" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Signal Waves -->
  <path d="M8 20c0-2.21 1.79-4 4-4s4 1.79 4 4"
        stroke="#00f0ff"
        stroke-width="1"
        fill="none"
        opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="1s" repeatCount="indefinite"/>
  </path>
</svg>
