<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neonGlow)">
    <!-- Base Point -->
    <circle cx="12" cy="20" r="2" fill="#00f0ff"/>

    <!-- Signal Waves -->
    <path d="M12 14a6 6 0 0 1 6 6" stroke="#00f0ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M12 10a10 10 0 0 1 10 10" stroke="#9d00ff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </path>
    <path d="M12 6a14 14 0 0 1 14 14" stroke="#ff0080" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </path>

    <!-- Connection Nodes -->
    <circle cx="18" cy="14" r="1" fill="#00f0ff" opacity="0.6"/>
    <circle cx="22" cy="10" r="1" fill="#9d00ff" opacity="0.4"/>
    <circle cx="26" cy="6" r="1" fill="#ff0080" opacity="0.2"/>
  </g>
</svg>