<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="lock-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
  </defs>

  <!-- Lock Body -->
  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"
        stroke="url(#lock-gradient)"
        stroke-width="2"
        fill="rgba(157,0,255,0.1)"/>

  <!-- Lock Shackle -->
  <path d="M7 11V7a5 5 0 0 1 10 0v4"
        stroke="url(#lock-gradient)"
        stroke-width="2"
        stroke-linecap="round"
        fill="none"/>

  <!-- Keyhole -->
  <circle cx="12" cy="16" r="1" fill="#ff0080">
    <animate attributeName="r" values="1;1.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <line x1="12" y1="17" x2="12" y2="19" stroke="#ff0080" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Lock Indicator -->
  <circle cx="19" cy="14" r="1.5" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
