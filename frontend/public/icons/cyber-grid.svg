<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g filter="url(#neonGlow)">
    <rect x="3" y="3" width="7" height="7" stroke="url(#cyberGradient)"/>
    <rect x="14" y="3" width="7" height="7" stroke="url(#cyberGradient)"/>
    <rect x="14" y="14" width="7" height="7" stroke="url(#cyberGradient)"/>
    <rect x="3" y="14" width="7" height="7" stroke="url(#cyberGradient)"/>
    <circle cx="6.5" cy="6.5" r="1.5" fill="#00f0ff"/>
    <circle cx="17.5" cy="6.5" r="1.5" fill="#9d00ff"/>
    <circle cx="17.5" cy="17.5" r="1.5" fill="#ff0080"/>
    <circle cx="6.5" cy="17.5" r="1.5" fill="#00f0ff"/>
  </g>
</svg>