<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cpu-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cpu-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="16" height="16" rx="2" stroke="url(#cpu-gradient)" stroke-width="2" fill="none"/>
  <rect x="8" y="8" width="8" height="8" rx="1" fill="url(#cpu-gradient)" fill-opacity="0.3" stroke="url(#cpu-gradient)" stroke-width="1"/>
  <line x1="8" y1="2" x2="8" y2="4" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="2" x2="12" y2="4" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="2" x2="16" y2="4" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="20" x2="8" y2="22" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="20" x2="12" y2="22" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="20" x2="16" y2="22" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="8" x2="4" y2="8" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="12" x2="4" y2="12" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="16" x2="4" y2="16" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="8" x2="22" y2="8" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="12" x2="22" y2="12" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="16" x2="22" y2="16" stroke="url(#cpu-gradient)" stroke-width="2" stroke-linecap="round"/>
</svg>