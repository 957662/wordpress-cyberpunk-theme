<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Connection lines -->
  <g stroke-width="1.5" opacity="0.4" filter="url(#neonGlow)">
    <!-- Center to nodes -->
    <line x1="12" y1="12" x2="12" y2="4" stroke="#00f0ff">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="12" y1="12" x2="19" y2="8" stroke="#9d00ff">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="12" y1="12" x2="19" y2="16" stroke="#ff0080">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="12" y1="12" x2="12" y2="20" stroke="#00f0ff">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="12" y1="12" x2="5" y2="16" stroke="#9d00ff">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="12" y1="12" x2="5" y2="8" stroke="#ff0080">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.2s" repeatCount="indefinite"/>
    </line>

    <!-- Outer connections -->
    <path d="M 12 4 Q 15.5 6 19 8" stroke="#00f0ff" fill="none" stroke-width="1"/>
    <path d="M 19 8 Q 20 12 19 16" stroke="#9d00ff" fill="none" stroke-width="1"/>
    <path d="M 19 16 Q 15.5 18 12 20" stroke="#ff0080" fill="none" stroke-width="1"/>
    <path d="M 12 20 Q 8.5 18 5 16" stroke="#00f0ff" fill="none" stroke-width="1"/>
    <path d="M 5 16 Q 4 12 5 8" stroke="#9d00ff" fill="none" stroke-width="1"/>
    <path d="M 5 8 Q 8.5 6 12 4" stroke="#ff0080" fill="none" stroke-width="1"/>
  </g>

  <!-- Data packets -->
  <g fill="#00f0ff" filter="url(#neonGlow)">
    <circle r="1">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath href="#path1"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="1" fill="#9d00ff">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#path2"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="1" fill="#ff0080">
      <animateMotion dur="3.5s" repeatCount="indefinite">
        <mpath href="#path3"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Data paths (hidden) -->
  <path id="path1" d="M 12 4 L 12 12" fill="none" stroke="none"/>
  <path id="path2" d="M 19 8 L 12 12" fill="none" stroke="none"/>
  <path id="path3" d="M 5 16 L 12 12" fill="none" stroke="none"/>

  <!-- Center node -->
  <g filter="url(#neonGlow)">
    <circle cx="12" cy="12" r="4" fill="#0a0a0f" stroke="url(#nodeGradient)" stroke-width="2">
      <animate attributeName="r" values="4;4.5;4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="12" r="2" fill="#00f0ff">
      <animate attributeName="r" values="2;2.5;2" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Outer nodes -->
  <g filter="url(#neonGlow)">
    <!-- Top -->
    <circle cx="12" cy="4" r="2.5" fill="#0a0a0f" stroke="#00f0ff" stroke-width="1.5">
      <animate attributeName="r" values="2.5;3;2.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Top right -->
    <circle cx="19" cy="8" r="2.5" fill="#0a0a0f" stroke="#9d00ff" stroke-width="1.5">
      <animate attributeName="r" values="2.5;3;2.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Bottom right -->
    <circle cx="19" cy="16" r="2.5" fill="#0a0a0f" stroke="#ff0080" stroke-width="1.5">
      <animate attributeName="r" values="2.5;3;2.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <!-- Bottom -->
    <circle cx="12" cy="20" r="2.5" fill="#0a0a0f" stroke="#00f0ff" stroke-width="1.5">
      <animate attributeName="r" values="2.5;3;2.5" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <!-- Bottom left -->
    <circle cx="5" cy="16" r="2.5" fill="#0a0a0f" stroke="#9d00ff" stroke-width="1.5">
      <animate attributeName="r" values="2.5;3;2.5" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Top left -->
    <circle cx="5" cy="8" r="2.5" fill="#0a0a0f" stroke="#ff0080" stroke-width="1.5">
      <animate attributeName="r" values="2.5;3;2.5" dur="2.9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node indicators -->
  <g fill="#ffffff">
    <circle cx="12" cy="4" r="1">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="19" cy="8" r="1">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="19" cy="16" r="1">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="20" r="1">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="5" cy="16" r="1">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="5" cy="8" r="1">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Pulse rings -->
  <g stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0">
    <circle cx="12" cy="12" r="4">
      <animate attributeName="r" values="4;8;12" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>