<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#pulseGlow)">
    <path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="url(#pulseGrad)" stroke-width="2.5" />
    <circle cx="12" cy="12" r="3" fill="none" stroke="url(#pulseGrad)" opacity="0.5" />
    <circle cx="12" cy="12" r="5" fill="none" stroke="url(#pulseGrad)" opacity="0.3" />
    <circle cx="12" cy="12" r="7" fill="none" stroke="url(#pulseGrad)" opacity="0.2" />
  </g>
</svg>
