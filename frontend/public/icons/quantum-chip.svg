<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g filter="url(#neonGlow)">
    <!-- Chip Frame -->
    <rect x="4" y="4" width="16" height="16" rx="2" stroke="url(#chipGradient)"/>

    <!-- Inner Circuit -->
    <rect x="7" y="7" width="10" height="10" rx="1" stroke="#00f0ff" opacity="0.6"/>

    <!-- Connection Points -->
    <circle cx="12" cy="12" r="2" fill="#9d00ff">
      <animate attributeName="r" values="2;2.5;2" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Circuit Lines -->
    <line x1="12" y1="7" x2="12" y2="10" stroke="#00f0ff"/>
    <line x1="12" y1="14" x2="12" y2="17" stroke="#ff0080"/>
    <line x1="7" y1="12" x2="10" y2="12" stroke="#00f0ff"/>
    <line x1="14" y1="12" x2="17" y2="12" stroke="#9d00ff"/>

    <!-- External Pins -->
    <line x1="8" y1="4" x2="8" y2="2" stroke="#00f0ff" opacity="0.5"/>
    <line x1="12" y1="4" x2="12" y2="2" stroke="#9d00ff" opacity="0.5"/>
    <line x1="16" y1="4" x2="16" y2="2" stroke="#ff0080" opacity="0.5"/>
    <line x1="8" y1="20" x2="8" y2="22" stroke="#ff0080" opacity="0.5"/>
    <line x1="12" y1="20" x2="12" y2="22" stroke="#9d00ff" opacity="0.5"/>
    <line x1="16" y1="20" x2="16" y2="22" stroke="#00f0ff" opacity="0.5"/>
    <line x1="4" y1="8" x2="2" y2="8" stroke="#00f0ff" opacity="0.5"/>
    <line x1="4" y1="12" x2="2" y2="12" stroke="#9d00ff" opacity="0.5"/>
    <line x1="4" y1="16" x2="2" y2="16" stroke="#ff0080" opacity="0.5"/>
    <line x1="20" y1="8" x2="22" y2="8" stroke="#ff0080" opacity="0.5"/>
    <line x1="20" y1="12" x2="22" y2="12" stroke="#9d00ff" opacity="0.5"/>
    <line x1="20" y1="16" x2="22" y2="16" stroke="#00f0ff" opacity="0.5"/>
  </g>
</svg>