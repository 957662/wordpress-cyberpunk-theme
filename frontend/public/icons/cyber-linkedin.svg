<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="linkedin-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#0066ff"/>
    </linearGradient>
    <filter id="linkedin-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- LinkedIn Frame -->
  <rect x="2" y="2" width="20" height="20" rx="3"
        stroke="url(#linkedin-gradient)"
        stroke-width="2"
        fill="rgba(0,240,255,0.05)"
        filter="url(#linkedin-glow)"/>

  <!-- 'in' Text -->
  <text x="5" y="17"
        font-family="Arial, sans-serif"
        font-size="12"
        font-weight="bold"
        fill="url(#linkedin-gradient)"
        filter="url(#linkedin-glow)">in</text>

  <!-- Connection Nodes -->
  <circle cx="17" cy="7" r="2" stroke="#00f0ff" stroke-width="1.5" fill="none">
    <animate attributeName="r" values="2;2.5;2" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="17" cy="7" r="1" fill="#00f0ff"/>

  <!-- Network Lines -->
  <line x1="17" y1="9" x2="17" y2="13" stroke="#00f0ff" stroke-width="1"/>
  <line x1="17" y1="13" x2="14" y2="16" stroke="#00f0ff" stroke-width="1"/>
  <circle cx="14" cy="16" r="1" fill="#0066ff"/>
</svg>
