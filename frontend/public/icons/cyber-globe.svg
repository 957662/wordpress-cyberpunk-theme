<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="globe-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Globe Circle -->
  <circle cx="12" cy="12" r="9"
          stroke="url(#globe-gradient)"
          stroke-width="2"
          fill="rgba(0,240,255,0.05)"/>

  <!-- Longitude Lines -->
  <ellipse cx="12" cy="12" rx="3" ry="9"
           stroke="#9d00ff"
           stroke-width="1"
           fill="none"
           opacity="0.6"/>
  <ellipse cx="12" cy="12" rx="6" ry="9"
           stroke="#9d00ff"
           stroke-width="1"
           fill="none"
           opacity="0.4"/>

  <!-- Latitude Lines -->
  <line x1="3" y1="12" x2="21" y2="12" stroke="#9d00ff" stroke-width="1" opacity="0.6"/>
  <line x1="3" y1="8" x2="21" y2="8" stroke="#9d00ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="3" y1="16" x2="21" y2="16" stroke="#9d00ff" stroke-width="0.5" opacity="0.3"/>

  <!-- Network Nodes -->
  <circle cx="12" cy="12" r="2" fill="#00f0ff">
    <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="6" cy="8" r="1" fill="#ff0080"/>
  <circle cx="18" cy="8" r="1" fill="#ff0080"/>
  <circle cx="6" cy="16" r="1" fill="#ff0080"/>
  <circle cx="18" cy="16" r="1" fill="#ff0080"/>

  <!-- Connection Lines -->
  <line x1="12" y1="12" x2="6" y2="8" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>
  <line x1="12" y1="12" x2="18" y2="8" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>
  <line x1="12" y1="12" x2="6" y2="16" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>
  <line x1="12" y1="12" x2="18" y2="16" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>

  <!-- Orbiting Element -->
  <circle cx="12" cy="3" r="1" fill="#f0ff00">
    <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
