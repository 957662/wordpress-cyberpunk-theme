<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="cloud-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Cloud Shape -->
  <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"
        stroke="url(#cloud-gradient)"
        stroke-width="2"
        fill="rgba(0,240,255,0.1)"/>

  <!-- Inner Cloud Detail -->
  <path d="M6 12a3 3 0 0 1 3-3h1a4 4 0 0 1 4-4h2a4 4 0 0 1 4 4h1a3 3 0 0 1 0 6H6a3 3 0 0 1 0-6z"
        stroke="#9d00ff"
        stroke-width="1"
        fill="rgba(157,0,255,0.1)"
        opacity="0.6"/>

  <!-- Connection Points -->
  <circle cx="10" cy="10" r="1" fill="#00f0ff">
    <animate attributeName="r" values="1;1.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="14" cy="8" r="1" fill="#ff0080">
    <animate attributeName="r" values="1;1.5;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="12" r="1" fill="#f0ff00">
    <animate attributeName="r" values="1;1.5;1" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Data Stream Lines -->
  <line x1="10" y1="10" x2="8" y2="14" stroke="#00f0ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="14" y1="8" x2="12" y2="14" stroke="#ff0080" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="12" x2="16" y2="16" stroke="#f0ff00" stroke-width="0.5" opacity="0.4"/>
</svg>
