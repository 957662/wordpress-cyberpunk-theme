<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="settings-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Center Circle -->
  <circle cx="12" cy="12" r="3"
          stroke="url(#settings-gradient)"
          stroke-width="2"
          fill="rgba(0,240,255,0.1)"/>

  <!-- Gear Teeth -->
  <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"
        stroke="url(#settings-gradient)"
        stroke-width="2"
        stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="10s" repeatCount="indefinite"/>
  </path>

  <!-- Inner Details -->
  <circle cx="12" cy="12" r="1" fill="#9d00ff">
    <animate attributeName="r" values="1;1.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting Element -->
  <circle cx="12" cy="3" r="1.5" fill="#ff0080">
    <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
