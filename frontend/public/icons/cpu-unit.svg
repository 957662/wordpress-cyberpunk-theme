<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g filter="url(#neonGlow)">
    <!-- CPU Frame -->
    <rect x="4" y="4" width="16" height="16" rx="2" stroke="url(#cpuGradient)" fill="none"/>

    <!-- Inner Core -->
    <rect x="8" y="8" width="8" height="8" rx="1" stroke="#00f0ff" fill="rgba(0, 240, 255, 0.05)"/>

    <!-- Processing Core -->
    <circle cx="12" cy="12" r="2" fill="#9d00ff">
      <animate attributeName="r" values="2;2.5;2" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Heat Sink Lines -->
    <line x1="6" y1="6" x2="6" y2="8" stroke="#00f0ff" opacity="0.5"/>
    <line x1="18" y1="6" x2="18" y2="8" stroke="#00f0ff" opacity="0.5"/>
    <line x1="6" y1="16" x2="6" y2="18" stroke="#ff0080" opacity="0.5"/>
    <line x1="18" y1="16" x2="18" y2="18" stroke="#ff0080" opacity="0.5"/>
    <line x1="6" y1="12" x2="8" y2="12" stroke="#9d00ff" opacity="0.5"/>
    <line x1="16" y1="12" x2="18" y2="12" stroke="#9d00ff" opacity="0.5"/>

    <!-- External Pins -->
    <line x1="8" y1="2" x2="8" y2="4" stroke="#00f0ff" opacity="0.4"/>
    <line x1="12" y1="2" x2="12" y2="4" stroke="#9d00ff" opacity="0.4"/>
    <line x1="16" y1="2" x2="16" y2="4" stroke="#ff0080" opacity="0.4"/>
    <line x1="8" y1="20" x2="8" y2="22" stroke="#ff0080" opacity="0.4"/>
    <line x1="12" y1="20" x2="12" y2="22" stroke="#9d00ff" opacity="0.4"/>
    <line x1="16" y1="20" x2="16" y2="22" stroke="#00f0ff" opacity="0.4"/>
    <line x1="2" y1="8" x2="4" y2="8" stroke="#00f0ff" opacity="0.4"/>
    <line x1="2" y1="12" x2="4" y2="12" stroke="#9d00ff" opacity="0.4"/>
    <line x1="2" y1="16" x2="4" y2="16" stroke="#ff0080" opacity="0.4"/>
    <line x1="20" y1="8" x2="22" y2="8" stroke="#ff0080" opacity="0.4"/>
    <line x1="20" y1="12" x2="22" y2="12" stroke="#9d00ff" opacity="0.4"/>
    <line x1="20" y1="16" x2="22" y2="16" stroke="#00f0ff" opacity="0.4"/>
  </g>
</svg>