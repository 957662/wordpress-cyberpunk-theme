<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="layerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#layerGlow)">
    <polygon points="12 2 2 7 12 12 22 7 12 2" stroke="url(#layerGrad)" fill="rgba(157,0,255,0.1)"/>
    <polygon points="2 17 12 22 22 17" stroke="url(#layerGrad)" fill="rgba(0,240,255,0.1)"/>
    <polygon points="2 12 12 17 22 12" stroke="url(#layerGrad)" fill="rgba(157,0,255,0.1)"/>
  </g>
</svg>
