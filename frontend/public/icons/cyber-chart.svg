<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="chart-gradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Chart Frame -->
  <line x1="3" y1="3" x2="3" y2="21" stroke="#00f0ff" stroke-width="1.5"/>
  <line x1="3" y1="21" x2="21" y2="21" stroke="#00f0ff" stroke-width="1.5"/>

  <!-- Bar Chart -->
  <rect x="5" y="14" width="3" height="5" fill="url(#chart-gradient)" opacity="0.8">
    <animate attributeName="height" values="5;7;5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="14;12;14" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="10" y="10" width="3" height="9" fill="url(#chart-gradient)" opacity="0.8">
    <animate attributeName="height" values="9;11;9" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="y" values="10;8;10" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="15" y="6" width="3" height="13" fill="url(#chart-gradient)" opacity="0.8">
    <animate attributeName="height" values="13;15;13" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="6;4;6" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Line Chart -->
  <path d="M3 18l5-4 4 2 4-5 5 2"
        stroke="#ff0080"
        stroke-width="2"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round">
    <animate attributeName="d"
             values="M3 18l5-4 4 2 4-5 5 2;M3 16l5-3 4 3 4-4 5 1;M3 18l5-4 4 2 4-5 5 2"
             dur="4s"
             repeatCount="indefinite"/>
  </path>

  <!-- Data Points -->
  <circle cx="8" cy="14" r="1.5" fill="#f0ff00">
    <animate attributeName="cy" values="14;13;14" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="12" cy="16" r="1.5" fill="#f0ff00">
    <animate attributeName="cy" values="16;15;16" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="11" r="1.5" fill="#f0ff00">
    <animate attributeName="cy" values="11;12;11" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
