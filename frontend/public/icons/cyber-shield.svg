<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="shield-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
    <filter id="shield-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield Shape -->
  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
        stroke="url(#shield-gradient)"
        stroke-width="2"
        fill="rgba(0,240,255,0.1)"
        filter="url(#shield-glow)"/>

  <!-- Inner Shield -->
  <path d="M12 18s5-2.5 5-6V7l-5-2-5 2v5c0 3.5 5 6 5 6z"
        stroke="#9d00ff"
        stroke-width="1"
        fill="rgba(157,0,255,0.1)"/>

  <!-- Lock Symbol -->
  <rect x="10" y="11" width="4" height="5" rx="0.5" fill="#00f0ff" opacity="0.8"/>
  <path d="M11 11V9a1 1 0 0 1 2 0v2" stroke="#00f0ff" stroke-width="1.5" fill="none"/>
  <circle cx="12" cy="13.5" r="1" fill="#0a0a0f"/>

  <!-- Security Indicators -->
  <circle cx="7" cy="8" r="1" fill="#ff0080">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="17" cy="8" r="1" fill="#ff0080">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
</svg>
