<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="chipset-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="chipset-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g filter="url(#chipset-glow)">
    <rect x="6" y="6" width="12" height="12" rx="1" stroke="url(#chipset-gradient)" stroke-width="2" fill="none"/>
    <rect x="8" y="8" width="8" height="8" rx="1" fill="url(#chipset-gradient)" fill-opacity="0.2"/>
    <circle cx="10" cy="10" r="1" fill="#00f0ff"/>
    <circle cx="14" cy="10" r="1" fill="#00f0ff"/>
    <circle cx="10" cy="14" r="1" fill="#9d00ff"/>
    <circle cx="14" cy="14" r="1" fill="#9d00ff"/>
    <circle cx="12" cy="12" r="1.5" fill="#ff0080"/>
    <line x1="12" y1="2" x2="12" y2="4" stroke="url(#chipset-gradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="20" x2="12" y2="22" stroke="url(#chipset-gradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="12" x2="4" y2="12" stroke="url(#chipset-gradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="12" x2="22" y2="12" stroke="url(#chipset-gradient)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>