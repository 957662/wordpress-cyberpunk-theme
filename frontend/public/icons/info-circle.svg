<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="infoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g>
    <!-- Circle outline -->
    <circle cx="12" cy="12" r="10" stroke="url(#infoGrad)" stroke-width="2" fill="none"/>
    <!-- Dot (i) -->
    <circle cx="12" cy="8" r="1.5" fill="#00f0ff"/>
    <!-- Line (i) -->
    <line x1="12" y1="12" x2="12" y2="17" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
    <!-- Orbiting dots -->
    <circle cx="12" cy="2" r="1" fill="#9d00ff">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>