<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="chip-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#9d00ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
  </defs>

  <!-- Outer Frame -->
  <rect x="6" y="6" width="12" height="12" rx="1"
        stroke="url(#chip-gradient)"
        stroke-width="2"
        fill="rgba(0,240,255,0.05)"/>

  <!-- Inner Square -->
  <rect x="9" y="9" width="6" height="6"
        stroke="#9d00ff"
        stroke-width="1.5"
        fill="rgba(157,0,255,0.2)"/>

  <!-- Center Core -->
  <rect x="11" y="11" width="2" height="2" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Top Pins -->
  <line x1="8" y1="6" x2="8" y2="4" stroke="#00f0ff" stroke-width="1.5"/>
  <line x1="10" y1="6" x2="10" y2="4" stroke="#00f0ff" stroke-width="1.5"/>
  <line x1="12" y1="6" x2="12" y2="4" stroke="#00f0ff" stroke-width="1.5"/>
  <line x1="14" y1="6" x2="14" y2="4" stroke="#00f0ff" stroke-width="1.5"/>
  <line x1="16" y1="6" x2="16" y2="4" stroke="#00f0ff" stroke-width="1.5"/>

  <!-- Bottom Pins -->
  <line x1="8" y1="18" x2="8" y2="20" stroke="#00f0ff" stroke-width="1.5"/>
  <line x1="10" y1="18" x2="10" y2="20" stroke="#00f0ff" stroke-width="1.5"/>
  <line x1="12" y1="18" x2="12" y2="20" stroke="#00f0ff" stroke-width="1.5"/>
  <line x1="14" y1="18" x2="14" y2="20" stroke="#00f0ff" stroke-width="1.5"/>
  <line x1="16" y1="18" x2="16" y2="20" stroke="#00f0ff" stroke-width="1.5"/>

  <!-- Left Pins -->
  <line x1="6" y1="8" x2="4" y2="8" stroke="#9d00ff" stroke-width="1.5"/>
  <line x1="6" y1="10" x2="4" y2="10" stroke="#9d00ff" stroke-width="1.5"/>
  <line x1="6" y1="12" x2="4" y2="12" stroke="#9d00ff" stroke-width="1.5"/>
  <line x1="6" y1="14" x2="4" y2="14" stroke="#9d00ff" stroke-width="1.5"/>
  <line x1="6" y1="16" x2="4" y2="16" stroke="#9d00ff" stroke-width="1.5"/>

  <!-- Right Pins -->
  <line x1="18" y1="8" x2="20" y2="8" stroke="#9d00ff" stroke-width="1.5"/>
  <line x1="18" y1="10" x2="20" y2="10" stroke="#9d00ff" stroke-width="1.5"/>
  <line x1="18" y1="12" x2="20" y2="12" stroke="#9d00ff" stroke-width="1.5"/>
  <line x1="18" y1="14" x2="20" y2="14" stroke="#9d00ff" stroke-width="1.5"/>
  <line x1="18" y1="16" x2="20" y2="16" stroke="#9d00ff" stroke-width="1.5"/>

  <!-- Circuit Traces -->
  <path d="M9 9l-2-2M15 9l2-2M9 15l-2 2M15 15l2 2" stroke="#ff0080" stroke-width="0.5" opacity="0.6"/>
</svg>
