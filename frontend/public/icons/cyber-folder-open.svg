<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="folder-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Back Folder -->
  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
        stroke="url(#folder-gradient)"
        stroke-width="2"
        stroke-linejoin="round"
        fill="rgba(0,240,255,0.05)"/>

  <!-- Front Folder (Open) -->
  <path d="M2 12h20"
        stroke="#9d00ff"
        stroke-width="2"
        stroke-linecap="round"/>

  <!-- Folder Contents -->
  <rect x="6" y="14" width="5" height="4" rx="1" fill="#00f0ff" opacity="0.4"/>
  <rect x="13" y="14" width="5" height="4" rx="1" fill="#9d00ff" opacity="0.4"/>

  <!-- Data Glow -->
  <circle cx="8" cy="16" r="1" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="15" cy="16" r="1" fill="#9d00ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
</svg>
