<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Hexagon -->
  <path d="M32 4 L56 18 L56 46 L32 60 L8 46 L8 18 Z"
        fill="rgba(10, 10, 15, 0.9)"
        stroke="url(#iconGradient)"
        stroke-width="2"
        filter="url(#iconGlow)"/>

  <!-- Inner Circuit -->
  <path d="M20 32 L32 32 L44 22"
        fill="none"
        stroke="#00f0ff"
        stroke-width="2"
        filter="url(#iconGlow)"/>
  <path d="M32 32 L44 42"
        fill="none"
        stroke="#9d00ff"
        stroke-width="2"
        filter="url(#iconGlow)"/>

  <!-- Core Circle -->
  <circle cx="32" cy="32" r="6"
          fill="#0a0a0f"
          stroke="#ff0080"
          stroke-width="2.5"
          filter="url(#iconGlow)"/>

  <!-- Data Points -->
  <circle cx="20" cy="32" r="2" fill="#00f0ff" filter="url(#iconGlow)"/>
  <circle cx="44" cy="22" r="2" fill="#00f0ff" filter="url(#iconGlow)"/>
  <circle cx="44" cy="42" r="2" fill="#9d00ff" filter="url(#iconGlow)"/>
</svg>
