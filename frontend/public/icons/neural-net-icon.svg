<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neural-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="neural-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0ff00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g filter="url(#neural-glow)">
    <circle cx="12" cy="4" r="3" fill="url(#neural-gradient)" fill-opacity="0.8"/>
    <circle cx="4" cy="20" r="3" fill="url(#neural-gradient)" fill-opacity="0.8"/>
    <circle cx="20" cy="20" r="3" fill="url(#neural-gradient)" fill-opacity="0.8"/>
    <circle cx="12" cy="12" r="2" fill="#00f0ff" fill-opacity="0.9"/>
    <line x1="12" y1="7" x2="12" y2="10" stroke="url(#neural-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
    <line x1="10" y1="11" x2="6.5" y2="18" stroke="url(#neural-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
    <line x1="14" y1="11" x2="17.5" y2="18" stroke="url(#neural-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
    <line x1="6.5" y1="18" x2="17.5" y2="18" stroke="url(#neural-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  </g>
</svg>