<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="file-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- File Body -->
  <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"
        stroke="url(#file-gradient)"
        stroke-width="2"
        stroke-linejoin="round"
        fill="rgba(0,240,255,0.05)"/>

  <!-- Folded Corner -->
  <polyline points="13 2 13 9 20 9"
            stroke="url(#file-gradient)"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="rgba(157,0,255,0.1)"/>

  <!-- File Content Lines -->
  <line x1="8" y1="13" x2="16" y2="13" stroke="#00f0ff" stroke-width="1" stroke-linecap="round"/>
  <line x1="8" y1="17" x2="16" y2="17" stroke="#00f0ff" stroke-width="1" stroke-linecap="round"/>

  <!-- Code Indicator -->
  <text x="10" y="11" font-family="monospace" font-size="6" fill="#9d00ff">&lt;/&gt;</text>

  <!-- File Type Badge -->
  <circle cx="16" cy="18" r="3" fill="#ff0080" opacity="0.8"/>
  <text x="16" y="20" text-anchor="middle" font-size="6" font-weight="bold" fill="#0a0a0f">JS</text>

  <!-- Glow Effect -->
  <circle cx="16" cy="18" r="4" stroke="#ff0080" stroke-width="0.5" fill="none" opacity="0.5">
    <animate attributeName="r" values="4;5;4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
