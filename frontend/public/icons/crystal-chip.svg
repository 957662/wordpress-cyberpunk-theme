<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g>
    <!-- Chip body -->
    <rect x="8" y="8" width="8" height="8" stroke="url(#chipGrad)" stroke-width="1.5" fill="none"/>
    <!-- Inner circuit -->
    <rect x="10" y="10" width="4" height="4" fill="#00f0ff"/>
    <!-- Top pins -->
    <line x1="10" y1="8" x2="10" y2="6" stroke="#9d00ff" stroke-width="1"/>
    <line x1="12" y1="8" x2="12" y2="6" stroke="#9d00ff" stroke-width="1"/>
    <line x1="14" y1="8" x2="14" y2="6" stroke="#9d00ff" stroke-width="1"/>
    <!-- Bottom pins -->
    <line x1="10" y1="16" x2="10" y2="18" stroke="#9d00ff" stroke-width="1"/>
    <line x1="12" y1="16" x2="12" y2="18" stroke="#9d00ff" stroke-width="1"/>
    <line x1="14" y1="16" x2="14" y2="18" stroke="#9d00ff" stroke-width="1"/>
    <!-- Left pins -->
    <line x1="8" y1="10" x2="6" y2="10" stroke="#ff0080" stroke-width="1"/>
    <line x1="8" y1="12" x2="6" y2="12" stroke="#ff0080" stroke-width="1"/>
    <line x1="8" y1="14" x2="6" y2="14" stroke="#ff0080" stroke-width="1"/>
    <!-- Right pins -->
    <line x1="16" y1="10" x2="18" y2="10" stroke="#ff0080" stroke-width="1"/>
    <line x1="16" y1="12" x2="18" y2="12" stroke="#ff0080" stroke-width="1"/>
    <line x1="16" y1="14" x2="18" y2="14" stroke="#ff0080" stroke-width="1"/>
    <!-- Glow effect -->
    <circle cx="12" cy="12" r="6" stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.3">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>