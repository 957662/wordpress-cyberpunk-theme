<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#9d00ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
  </defs>

  <!-- Top Cylinder -->
  <ellipse cx="12" cy="5" rx="9" ry="3"
           stroke="url(#db-gradient)"
           stroke-width="2"
           fill="rgba(0,240,255,0.1)"/>

  <!-- Middle Section -->
  <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"
        stroke="url(#db-gradient)"
        stroke-width="2"
        fill="rgba(157,0,255,0.05)"/>

  <!-- Divider Lines -->
  <ellipse cx="12" cy="10" rx="9" ry="3"
           stroke="#9d00ff"
           stroke-width="1"
           fill="none"
           opacity="0.5"/>
  <ellipse cx="12" cy="15" rx="9" ry="3"
           stroke="#ff0080"
           stroke-width="1"
           fill="none"
           opacity="0.5"/>

  <!-- Data Points -->
  <circle cx="8" cy="6" r="1" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="12" cy="11" r="1" fill="#9d00ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="16" r="1" fill="#ff0080">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Connection Lines -->
  <path d="M8 6v9M12 11v4" stroke="#00f0ff" stroke-width="0.5" opacity="0.4"/>
</svg>
