<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="alertGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g>
    <!-- Triangle outline -->
    <path d="M12 3L22 21H2L12 3Z" stroke="url(#alertGrad)" stroke-width="2" fill="none"/>
    <!-- Exclamation mark -->
    <line x1="12" y1="8" x2="12" y2="15" stroke="#f0ff00" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </line>
    <circle cx="12" cy="18" r="1.5" fill="#f0ff00">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Glow effect -->
    <path d="M12 3L22 21H2L12 3Z" stroke="#f0ff00" stroke-width="1" fill="none" opacity="0.3">
      <animate attributeName="stroke-width" values="1;4;1" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>