<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0ff00;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#f0ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0ff00;stop-opacity:0" />
    </linearGradient>
  </defs>
  <g>
    <!-- Pulse waves -->
    <circle cx="12" cy="12" r="8" stroke="url(#pulseGrad)" stroke-width="1" fill="none" opacity="0.3">
      <animate attributeName="r" values="4;12;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="12" r="5" stroke="#f0ff00" stroke-width="1.5" fill="none">
      <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <!-- Center core -->
    <circle cx="12" cy="12" r="2" fill="#f0ff00">
      <animate attributeName="r" values="2;2.5;2" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>