<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="zap-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="zap-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ff00"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
  </defs>

  <!-- Lightning Bolt -->
  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"
        stroke="url(#zap-gradient)"
        stroke-width="2"
        stroke-linejoin="round"
        fill="rgba(240,255,0,0.1)"
        filter="url(#zap-glow)">
    <animate attributeName="opacity" values="1;0.7;1" dur="0.5s" repeatCount="indefinite"/>
  </path>

  <!-- Inner Highlight -->
  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"
        stroke="#f0ff00"
        stroke-width="0.5"
        fill="none"
        opacity="0.5"/>

  <!-- Spark Particles -->
  <circle cx="6" cy="8" r="0.8" fill="#f0ff00">
    <animate attributeName="r" values="0.8;0;0.8" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="12" r="0.8" fill="#ff0080">
    <animate attributeName="r" values="0.8;0;0.8" dur="0.8s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="8" cy="16" r="0.6" fill="#00f0ff">
    <animate attributeName="r" values="0.6;0;0.6" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
</svg>
