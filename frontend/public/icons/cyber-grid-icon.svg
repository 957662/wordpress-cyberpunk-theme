<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grid-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grid-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <g filter="url(#grid-glow)">
    <line x1="4" y1="4" x2="4" y2="20" stroke="url(#grid-gradient)" stroke-width="1"/>
    <line x1="12" y1="4" x2="12" y2="20" stroke="url(#grid-gradient)" stroke-width="1"/>
    <line x1="20" y1="4" x2="20" y2="20" stroke="url(#grid-gradient)" stroke-width="1"/>
    <line x1="4" y1="4" x2="20" y2="4" stroke="url(#grid-gradient)" stroke-width="1"/>
    <line x1="4" y1="12" x2="20" y2="12" stroke="url(#grid-gradient)" stroke-width="1"/>
    <line x1="4" y1="20" x2="20" y2="20" stroke="url(#grid-gradient)" stroke-width="1"/>
    <circle cx="4" cy="4" r="1.5" fill="#00f0ff"/>
    <circle cx="12" cy="4" r="1.5" fill="#9d00ff"/>
    <circle cx="20" cy="4" r="1.5" fill="#00f0ff"/>
    <circle cx="4" cy="12" r="1.5" fill="#9d00ff"/>
    <circle cx="12" cy="12" r="2" fill="#ff0080"/>
    <circle cx="20" cy="12" r="1.5" fill="#9d00ff"/>
    <circle cx="4" cy="20" r="1.5" fill="#00f0ff"/>
    <circle cx="12" cy="20" r="1.5" fill="#9d00ff"/>
    <circle cx="20" cy="20" r="1.5" fill="#00f0ff"/>
  </g>
</svg>