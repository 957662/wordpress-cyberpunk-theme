<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="holoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <g filter="url(#neonGlow)">
    <!-- Holographic Projection Base -->
    <ellipse cx="12" cy="20" rx="8" ry="2" stroke="url(#holoGradient)" opacity="0.4"/>

    <!-- Projection Cone -->
    <path d="M4 20 L8 8 L16 8 L20 20" stroke="url(#holoGradient)" opacity="0.3" fill="none"/>

    <!-- Floating Screen -->
    <rect x="8" y="4" width="8" height="10" rx="1" stroke="url(#holoGradient)" fill="rgba(0, 240, 255, 0.05)"/>

    <!-- Screen Content Lines -->
    <line x1="10" y1="6" x2="14" y2="6" stroke="#00f0ff" opacity="0.6"/>
    <line x1="10" y1="8" x2="14" y2="8" stroke="#9d00ff" opacity="0.6"/>
    <line x1="10" y1="10" x2="13" y2="10" stroke="#ff0080" opacity="0.6"/>
    <line x1="10" y1="12" x2="14" y2="12" stroke="#00f0ff" opacity="0.4"/>

    <!-- Scanning Effect -->
    <line x1="8" y1="5" x2="16" y2="5" stroke="#00f0ff" opacity="0.8">
      <animate attributeName="y1" values="4;14;4" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="4;14;4" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>