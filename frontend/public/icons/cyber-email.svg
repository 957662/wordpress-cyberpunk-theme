<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="email-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
    <filter id="email-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Envelope Outline -->
  <rect x="2" y="4" width="20" height="16" rx="2"
        stroke="url(#email-gradient)"
        stroke-width="2"
        fill="rgba(0,240,255,0.05)"
        filter="url(#email-glow)"/>

  <!-- Envelope Flap -->
  <path d="M2 4l10 8 10-8"
        stroke="#9d00ff"
        stroke-width="2"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Inner Detail -->
  <path d="M2 20l10-8 10 8"
        stroke="#00f0ff"
        stroke-width="1"
        stroke-linejoin="round"
        opacity="0.5"
        fill="none"/>

  <!-- Mail Indicator -->
  <circle cx="20" cy="6" r="2" fill="#ff0080">
    <animate attributeName="r" values="2;3;2" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
