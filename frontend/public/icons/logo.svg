<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cyber Hexagon -->
  <path d="M30 5 L55 17.5 L55 42.5 L30 55 L5 42.5 L5 17.5 Z"
        fill="none"
        stroke="url(#neonGradient)"
        stroke-width="2"
        filter="url(#glow)"/>

  <!-- Inner Circuit Lines -->
  <path d="M20 30 L30 30 L40 20"
        fill="none"
        stroke="#00f0ff"
        stroke-width="1.5"
        filter="url(#glow)"/>
  <path d="M30 30 L40 40"
        fill="none"
        stroke="#9d00ff"
        stroke-width="1.5"
        filter="url(#glow)"/>

  <!-- Center Node -->
  <circle cx="30" cy="30" r="4"
          fill="#0a0a0f"
          stroke="#ff0080"
          stroke-width="2"
          filter="url(#glow)"/>

  <!-- CYBERPRESS Text -->
  <text x="70" y="32"
        font-family="monospace"
        font-size="22"
        font-weight="bold"
        fill="url(#neonGradient)"
        filter="url(#glow)"
        letter-spacing="3">CYBERPRESS</text>

  <!-- Tagline -->
  <text x="72" y="48"
        font-family="monospace"
        font-size="10"
        fill="#a0a0b0"
        letter-spacing="2">FUTURE OF BLOGGING</text>
</svg>
