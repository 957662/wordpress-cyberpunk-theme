<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Brain outline -->
  <g filter="url(#neonGlow)">
    <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" stroke="url(#aiGradient)"/>
    <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" stroke="url(#aiGradient)"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#00f0ff">
    <circle cx="8" cy="8" r="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="16" cy="8" r="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="12" r="1.5" fill="#9d00ff">
      <animate attributeName="r" values="1.5;2;1.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="16" r="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="16" cy="16" r="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connection lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.6">
    <line x1="8" y1="8" x2="12" y2="12"/>
    <line x1="16" y1="8" x2="12" y2="12"/>
    <line x1="8" y1="16" x2="12" y2="12"/>
    <line x1="16" y1="16" x2="12" y2="12"/>
  </g>
</svg>