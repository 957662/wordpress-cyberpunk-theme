<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="copy-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Back Rectangle -->
  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"
        stroke="url(#copy-gradient)"
        stroke-width="2"
        fill="rgba(0,240,255,0.05)"/>

  <!-- Front Rectangle -->
  <rect x="5" y="5" width="13" height="13" rx="2" ry="2"
        stroke="url(#copy-gradient)"
        stroke-width="2"
        fill="rgba(157,0,255,0.1)"/>

  <!-- Copy Animation -->
  <rect x="9" y="9" width="8" height="8" fill="rgba(0,240,255,0.1)" opacity="0.5">
    <animate attributeName="x" values="9;11;9" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="9;11;9" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Connection Dots -->
  <circle cx="9" cy="9" r="1" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
