<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g>
    <!-- Circle background -->
    <circle cx="12" cy="12" r="10" stroke="url(#checkGrad)" stroke-width="2" fill="none"/>
    <!-- Check mark -->
    <path d="M8 12L11 15L16 9" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <animate attributeName="stroke-dasharray" values="0,20;20,0" dur="0.5s" fill="freeze"/>
    </path>
    <!-- Success particles -->
    <circle cx="5" cy="5" r="1" fill="#00ff88" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="19" cy="5" r="1" fill="#00ff88" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="5" cy="19" r="1" fill="#00ff88" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="19" cy="19" r="1" fill="#00ff88" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.5s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
  </g>
</svg>