<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="quantumGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="quantumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#quantumGlow)">
    <!-- Entangled particles -->
    <circle cx="6" cy="12" r="3" stroke="url(#quantumGradient)" stroke-width="1.5"/>
    <circle cx="6" cy="12" r="1.5" fill="#9d00ff"/>
    <circle cx="18" cy="12" r="3" stroke="url(#quantumGradient)" stroke-width="1.5"/>
    <circle cx="18" cy="12" r="1.5" fill="#ff0080"/>
    <!-- Connection wave -->
    <path d="M 9 12 Q 12 8 15 12" stroke="url(#quantumGradient)" stroke-width="1.5" fill="none"/>
    <path d="M 9 12 Q 12 16 15 12" stroke="url(#quantumGradient)" stroke-width="1.5" fill="none"/>
    <!-- Orbital rings -->
    <ellipse cx="6" cy="12" rx="4" ry="2" stroke="url(#quantumGradient)" stroke-width="0.8" fill="none" transform="rotate(-30 6 12)"/>
    <ellipse cx="18" cy="12" rx="4" ry="2" stroke="url(#quantumGradient)" stroke-width="0.8" fill="none" transform="rotate(30 18 12)"/>
    <!-- Energy flow -->
    <circle cx="12" cy="10" r="0.8" fill="#00f0ff"/>
    <circle cx="12" cy="14" r="0.8" fill="#00f0ff"/>
  </g>
</svg>