  <!-- 锁孔 -->
  <circle cx="12" cy="16" r="1.5" fill="url(#lockGradient)"/>
  <line x1="12" y1="17.5" x2="12" y2="19" stroke="url(#lockGradient)" stroke-linecap="round"/>

  <!-- 装饰点 -->
