<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="optGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ff00"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>

  <!-- 速度计外圈 -->
  <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9"
        stroke="url(#optGradient)" fill="none"/>

  <!-- 刻度线 -->
  <line x1="12" y1="5" x2="12" y2="6" stroke="url(#optGradient)" stroke-width="2"/>
  <line x1="5.5" y1="9" x2="6.5" y2="9.5" stroke="url(#optGradient)" stroke-width="1.5"/>
  <line x1="5.5" y1="15" x2="6.5" y2="14.5" stroke="url(#optGradient)" stroke-width="1.5"/>
  <line x1="18.5" y1="9" x2="17.5" y2="9.5" stroke="url(#optGradient)" stroke-width="1.5"/>
  <line x1="18.5" y1="15" x2="17.5" y2="14.5" stroke="url(#optGradient)" stroke-width="1.5"/>

  <!-- 闪电符号 -->
  <path d="M13 6l-4 6h3l-1 4 4-6h-3l1-4z"
        fill="url(#optGradient)" stroke="none"/>

  <!-- 优化箭头 -->
  <path d="M16 18l2 2 2-2" stroke="url(#optGradient)" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="18" y1="14" x2="18" y2="20" stroke="url(#optGradient)" stroke-linecap="round"/>
</svg>
