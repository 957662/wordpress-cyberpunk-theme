<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="neuralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="neuralGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neuralGlow)">
    <!-- Neural network nodes -->
    <circle cx="12" cy="4" r="2" stroke="url(#neuralGradient)" stroke-width="1.5"/>
    <circle cx="6" cy="8" r="2" stroke="url(#neuralGradient)" stroke-width="1.5"/>
    <circle cx="18" cy="8" r="2" stroke="url(#neuralGradient)" stroke-width="1.5"/>
    <circle cx="4" cy="14" r="2" stroke="url(#neuralGradient)" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="2.5" stroke="url(#neuralGradient)" stroke-width="1.5"/>
    <circle cx="20" cy="14" r="2" stroke="url(#neuralGradient)" stroke-width="1.5"/>
    <circle cx="8" cy="18" r="2" stroke="url(#neuralGradient)" stroke-width="1.5"/>
    <circle cx="16" cy="18" r="2" stroke="url(#neuralGradient)" stroke-width="1.5"/>
    <!-- Neural connections -->
    <line x1="12" y1="6" x2="7" y2="8" stroke="url(#neuralGradient)" stroke-width="0.8" opacity="0.6"/>
    <line x1="12" y1="6" x2="17" y2="8" stroke="url(#neuralGradient)" stroke-width="0.8" opacity="0.6"/>
    <line x1="6" y1="10" x2="5" y2="12" stroke="url(#neuralGradient)" stroke-width="0.8" opacity="0.6"/>
    <line x1="18" y1="10" x2="19" y2="12" stroke="url(#neuralGradient)" stroke-width="0.8" opacity="0.6"/>
    <line x1="6" y1="8" x2="10" y2="11" stroke="url(#neuralGradient)" stroke-width="0.8" opacity="0.6"/>
    <line x1="18" y1="8" x2="14" y2="11" stroke="url(#neuralGradient)" stroke-width="0.8" opacity="0.6"/>
    <line x1="10" y1="13" x2="9" y2="17" stroke="url(#neuralGradient)" stroke-width="0.8" opacity="0.6"/>
    <line x1="14" y1="13" x2="15" y2="17" stroke="url(#neuralGradient)" stroke-width="0.8" opacity="0.6"/>
    <line x1="5" y1="16" x2="10" y2="14" stroke="url(#neuralGradient)" stroke-width="0.8" opacity="0.6"/>
    <line x1="19" y1="16" x2="14" y2="14" stroke="url(#neuralGradient)" stroke-width="0.8" opacity="0.6"/>
    <!-- Active node -->
    <circle cx="12" cy="12" r="1" fill="#ff0080"/>
    <!-- Data pulses -->
    <circle cx="7" cy="8" r="0.5" fill="#9d00ff"/>
    <circle cx="17" cy="8" r="0.5" fill="#9d00ff"/>
    <circle cx="9" cy="17" r="0.5" fill="#ff0080"/>
    <circle cx="15" cy="17" r="0.5" fill="#ff0080"/>
  </g>
</svg>