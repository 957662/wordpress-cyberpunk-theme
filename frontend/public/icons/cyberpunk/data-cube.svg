<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cube-face-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="cube-face-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="cube-face-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0.3" />
    </linearGradient>
    <filter id="cube-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Isometric Cube -->
  <g filter="url(#cube-glow)">
    <!-- Top Face -->
    <path d="M 32 16 L 48 24 L 32 32 L 16 24 Z"
          fill="url(#cube-face-1)" stroke="#00f0ff" stroke-width="1.5"/>

    <!-- Left Face -->
    <path d="M 16 24 L 16 44 L 32 52 L 32 32 Z"
          fill="url(#cube-face-2)" stroke="#9d00ff" stroke-width="1.5"/>

    <!-- Right Face -->
    <path d="M 32 32 L 32 52 L 48 44 L 48 24 Z"
          fill="url(#cube-face-3)" stroke="#ff0080" stroke-width="1.5"/>
  </g>

  <!-- Data Streams -->
  <g stroke="#00f0ff" stroke-width="1" opacity="0.6">
    <line x1="32" y1="32" x2="32" y2="8">
      <animate attributeName="y2" values="8;6;8" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="16" y1="24" x2="8" y2="20">
      <animate attributeName="x2" values="8;6;8" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="48" y1="24" x2="56" y2="20">
      <animate attributeName="x2" values="56;58;56" dur="2.3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Connection Points -->
  <g fill="#00f0ff">
    <circle cx="32" cy="8" r="2">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="20" r="2">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="56" cy="20" r="2">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating Particles -->
  <g fill="#9d00ff" opacity="0.5">
    <circle cx="24" cy="12" r="1">
      <animate attributeName="cy" values="12;10;12" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="14" r="1">
      <animate attributeName="cy" values="14;12;14" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="28" cy="56" r="1">
      <animate attributeName="cy" values="56;58;56" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
