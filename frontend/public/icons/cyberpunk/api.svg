<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="apiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- API 文档图标 -->
  <rect x="4" y="2" width="16" height="20" rx="2"
        stroke="url(#apiGradient)" fill="none"/>

  <!-- 页面线条 -->
  <line x1="7" y1="6" x2="17" y2="6" stroke="url(#apiGradient)" stroke-width="1.5"/>
  <line x1="7" y1="9" x2="17" y2="9" stroke="url(#apiGradient)" stroke-width="1.5"/>
  <line x1="7" y1="12" x2="14" y2="12" stroke="url(#apiGradient)" stroke-width="1.5"/>

  <!-- API 括号 -->
  <path d="M7 16c-1 0-2 1-2 2s1 2 2 2" stroke="url(#apiGradient)" fill="none"/>
  <path d="M17 16c1 0 2 1 2 2s-1 2-2 2" stroke="url(#apiGradient)" fill="none"/>

  <!-- 连接点 -->
  <circle cx="12" cy="18" r="1" fill="#ff0080"/>
  <line x1="9" y1="18" x2="11" y2="18" stroke="url(#apiGradient)" stroke-width="1"/>
  <line x1="13" y1="18" x2="15" y2="18" stroke="url(#apiGradient)" stroke-width="1"/>
</svg>
