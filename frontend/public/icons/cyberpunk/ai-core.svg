<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="ai-core-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="ai-core-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="ai-core-radial">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="32" cy="32" r="28" fill="url(#ai-core-radial)">
    <animate attributeName="r" values="28;32;28" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Core center -->
  <g transform="translate(32, 32)">
    <!-- Core sphere -->
    <circle cx="0" cy="0" r="8"
            fill="url(#ai-core-gradient)"
            filter="url(#ai-core-glow)">
      <animate attributeName="r" values="8;9;8" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Inner core -->
    <circle cx="0" cy="0" r="4"
            fill="#fff"
            opacity="0.8">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Orbiting rings -->
  <g transform="translate(32, 32)">
    <!-- Outer ring -->
    <ellipse cx="0" cy="0" rx="24" ry="8"
             stroke="url(#ai-core-gradient)"
             stroke-width="1.5"
             fill="none"
             filter="url(#ai-core-glow)"
             transform="rotate(0)">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0 0 0"
                        to="360 0 0"
                        dur="10s"
                        repeatCount="indefinite"/>
    </ellipse>

    <!-- Middle ring -->
    <ellipse cx="0" cy="0" rx="20" ry="6"
             stroke="url(#ai-core-gradient)"
             stroke-width="1"
             fill="none"
             opacity="0.7"
             transform="rotate(60)">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="60 0 0"
                        to="420 0 0"
                        dur="8s"
                        repeatCount="indefinite"/>
    </ellipse>

    <!-- Inner ring -->
    <ellipse cx="0" cy="0" rx="16" ry="4"
             stroke="url(#ai-core-gradient)"
             stroke-width="0.8"
             fill="none"
             opacity="0.5"
             transform="rotate(120)">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="120 0 0"
                        to="480 0 0"
                        dur="6s"
                        repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Orbiting particles -->
  <g fill="url(#ai-core-gradient)" filter="url(#ai-core-glow)">
    <circle cx="32" cy="32" r="2">
      <animateMotion dur="10s" repeatCount="indefinite">
        <mpath href="#orbit1"/>
      </animateMotion>
    </circle>
    <circle cx="32" cy="32" r="1.5">
      <animateMotion dur="8s" repeatCount="indefinite">
        <mpath href="#orbit2"/>
      </animateMotion>
    </circle>
    <circle cx="32" cy="32" r="1">
      <animateMotion dur="6s" repeatCount="indefinite">
        <mpath href="#orbit3"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Orbit paths (invisible) -->
  <g transform="translate(32, 32)" fill="none" stroke="none">
    <ellipse id="orbit1" cx="0" cy="0" rx="24" ry="8"/>
    <ellipse id="orbit2" cx="0" cy="0" rx="20" ry="6" transform="rotate(60)"/>
    <ellipse id="orbit3" cx="0" cy="0" rx="16" ry="4" transform="rotate(120)"/>
  </g>

  <!-- Energy bursts -->
  <g stroke="url(#ai-core-gradient)" stroke-width="1" fill="none" opacity="0.3">
    <line x1="32" y1="8" x2="32" y2="16">
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="32" y1="48" x2="32" y2="56">
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite" begin="1s"/>
    </line>
    <line x1="8" y1="32" x2="16" y2="32">
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite" begin="2s"/>
    </line>
    <line x1="48" y1="32" x2="56" y2="32">
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </line>
  </g>
</svg>
