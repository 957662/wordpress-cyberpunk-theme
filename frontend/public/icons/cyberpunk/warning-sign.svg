<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="warning-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
    <filter id="warning-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Triangle -->
  <path d="M 32 8 L 58 52 L 6 52 Z"
        fill="rgba(240,255,0,0.1)" stroke="url(#warning-gradient)"
        stroke-width="2" stroke-linejoin="round" filter="url(#warning-glow)"/>

  <!-- Exclamation Mark -->
  <g fill="url(#warning-gradient)" filter="url(#warning-glow)">
    <!-- Top bar -->
    <rect x="29" y="20" width="6" height="16" rx="1">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <!-- Bottom dot -->
    <circle cx="32" cy="44" r="3">
      <animate attributeName="r" values="3;4;3" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner Accents -->
  <g stroke="#f0ff00" stroke-width="1" fill="none" opacity="0.5">
    <path d="M 10 50 L 6 50 L 6 46"/>
    <path d="M 54 50 L 58 50 L 58 46"/>
    <path d="M 10 14 L 6 14 L 6 18"/>
    <path d="M 54 14 L 58 14 L 58 18"/>
  </g>

  <!-- Radiation Lines -->
  <g stroke="#f0ff00" stroke-width="0.5" opacity="0.3">
    <line x1="32" y1="4" x2="32" y2="0">
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="62" y1="32" x2="58" y2="32">
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </line>
    <line x1="2" y1="32" x2="6" y2="32">
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite" begin="1s"/>
    </line>
  </g>
</svg>
