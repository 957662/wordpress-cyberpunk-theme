<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="quantum-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </radialGradient>
    <filter id="quantum-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Quantum State Rings -->
  <g filter="url(#quantum-glow)">
    <!-- Outer probability cloud -->
    <ellipse cx="32" cy="32" rx="28" ry="24" fill="none" stroke="#00f0ff" stroke-width="1"
             opacity="0.4" stroke-dasharray="3 2">
      <animateTransform attributeName="transform" type="rotate"
                        from="0 32 32" to="360 32 32" dur="20s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Middle orbit -->
    <ellipse cx="32" cy="32" rx="20" ry="16" fill="none" stroke="#9d00ff" stroke-width="1.5"
             opacity="0.6" stroke-dasharray="4 3">
      <animateTransform attributeName="transform" type="rotate"
                        from="360 32 32" to="0 32 32" dur="15s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Inner orbit -->
    <ellipse cx="32" cy="32" rx="12" ry="8" fill="none" stroke="#ff0080" stroke-width="1.5"
             opacity="0.8">
      <animateTransform attributeName="transform" type="rotate"
                        from="0 32 32" to="360 32 32" dur="10s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Core Qubit -->
  <g filter="url(#quantum-glow)">
    <!-- Superposition states -->
    <circle cx="32" cy="32" r="6" fill="url(#quantum-core)">
      <animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.7;1" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Secondary state (ghost) -->
    <circle cx="32" cy="32" r="4" fill="none" stroke="#9d00ff" stroke-width="1"
            opacity="0.5">
      <animate attributeName="r" values="4;10;4" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Spin Indicators -->
  <g>
    <!-- Up spin -->
    <path d="M 32 8 L 34 14 L 32 12 L 30 14 Z" fill="#00f0ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Down spin -->
    <path d="M 32 56 L 30 50 L 32 52 L 34 50 Z" fill="#ff0080" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite" begin="1s"/>
    </path>
  </g>

  <!-- Phase Lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.4">
    <line x1="4" y1="32" x2="60" y2="32">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="32" y1="4" x2="32" y2="60">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite" begin="2s"/>
    </line>
  </g>

  <!-- Entangled Particles -->
  <g fill="#9d00ff" opacity="0.7">
    <circle cx="8" cy="32" r="2">
      <animate attributeName="cx" values="8;56;8" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="56" cy="32" r="2">
      <animate attributeName="cx" values="56;8;56" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
