<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff0080"/>
    </linearGradient>
    <radialGradient id="eyeGlow">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g filter="url(#neonGlow)">
    <!-- 外框 -->
    <path d="M2 12C2 12 5 6 12 6C19 6 22 12 22 12C22 12 19 18 12 18C5 18 2 12 2 12Z" stroke="url(#eyeGrad)" fill="none"/>
    <!-- 虹膜 -->
    <circle cx="12" cy="12" r="4" stroke="url(#eyeGrad)" fill="none"/>
    <!-- 瞳孔 -->
    <circle cx="12" cy="12" r="2" fill="url(#eyeGrad)"/>
    <!-- 扫描线 -->
    <line x1="4" y1="12" x2="20" y2="12" stroke="#00f0ff" stroke-width="0.5" opacity="0.4"/>
    <!-- 装饰点 -->
    <circle cx="8" cy="9" r="0.5" fill="#00f0ff" opacity="0.7"/>
    <circle cx="16" cy="9" r="0.5" fill="#9d00ff" opacity="0.7"/>
  </g>
</svg>
