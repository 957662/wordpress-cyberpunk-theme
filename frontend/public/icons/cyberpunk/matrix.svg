<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="matrixGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
  </defs>
  <g filter="url(#neonGlow)">
    <!-- 数字流 -->
    <text x="4" y="8" font-family="monospace" font-size="8" fill="url(#matrixGrad)">0</text>
    <text x="10" y="12" font-family="monospace" font-size="8" fill="url(#matrixGrad)">1</text>
    <text x="16" y="8" font-family="monospace" font-size="8" fill="url(#matrixGrad)">0</text>
    <text x="4" y="16" font-family="monospace" font-size="8" fill="url(#matrixGrad)">1</text>
    <text x="10" y="20" font-family="monospace" font-size="8" fill="url(#matrixGrad)">0</text>
    <text x="16" y="16" font-family="monospace" font-size="8" fill="url(#matrixGrad)">1</text>
    <!-- 边框 -->
    <rect x="2" y="2" width="20" height="20" rx="2" stroke="url(#matrixGrad)" fill="none" opacity="0.5"/>
  </g>
</svg>
