<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="dashGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- 仪表盘外框 -->
  <rect x="3" y="3" width="18" height="18" rx="2"
        stroke="url(#dashGradient)" fill="none"/>

  <!-- 左侧面板 -->
  <rect x="5" y="5" width="6" height="6" rx="1"
        stroke="url(#dashGradient)" fill="rgba(0,240,255,0.1)"/>

  <!-- 右上角图表 -->
  <rect x="13" y="5" width="6" height="6" rx="1"
        stroke="url(#dashGradient)" fill="rgba(157,0,255,0.1)"/>
  <line x1="14" y1="9" x2="16" y2="7" stroke="url(#dashGradient)" stroke-width="1"/>
  <line x1="16" y1="7" x2="18" y2="8" stroke="url(#dashGradient)" stroke-width="1"/>

  <!-- 底部数据条 -->
  <rect x="5" y="13" width="14" height="2" rx="1"
        stroke="url(#dashGradient)" fill="rgba(0,240,255,0.2)"/>
  <rect x="5" y="17" width="10" height="2" rx="1"
        stroke="url(#dashGradient)" fill="rgba(157,0,255,0.2)"/>
</svg>
