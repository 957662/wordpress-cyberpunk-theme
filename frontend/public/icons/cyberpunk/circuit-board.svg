<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="circuit-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="circuit-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circuit Paths -->
  <g stroke="url(#circuit-gradient)" stroke-width="1.5" fill="none"
     stroke-linecap="round" stroke-linejoin="round" filter="url(#circuit-glow)">
    <!-- Main horizontal line -->
    <path d="M 4 32 L 20 32 L 24 28 L 40 28 L 44 32 L 60 32"/>

    <!-- Top branch -->
    <path d="M 24 28 L 24 20 L 28 16 L 44 16 L 48 20"/>

    <!-- Bottom branch -->
    <path d="M 40 28 L 40 36 L 44 40 L 56 40"/>

    <!-- Left branch -->
    <path d="M 20 32 L 16 36 L 16 48 L 20 52"/>

    <!-- Vertical connection -->
    <path d="M 32 8 L 32 20"/>
  </g>

  <!-- Connection Nodes -->
  <g fill="#00f0ff">
    <circle cx="4" cy="32" r="2"/>
    <circle cx="60" cy="32" r="2"/>
    <circle cx="32" cy="8" r="2"/>
    <circle cx="20" cy="52" r="2"/>
    <circle cx="56" cy="40" r="2"/>
  </g>

  <!-- Data Packets -->
  <g fill="#9d00ff">
    <circle cx="32" cy="32" r="3">
      <animate attributeName="cx" values="4;60" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- IC Chips -->
  <rect x="26" y="20" width="12" height="8" rx="1"
        fill="rgba(0,240,255,0.1)" stroke="#00f0ff" stroke-width="1"/>
  <rect x="26" y="36" width="12" height="8" rx="1"
        fill="rgba(157,0,255,0.1)" stroke="#9d00ff" stroke-width="1"/>
</svg>
