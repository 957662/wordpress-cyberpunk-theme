<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0.8" />
    </linearGradient>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Shield outline -->
  <path d="M 12 3 L 4 6 L 4 12 C 4 16 7.5 20 12 21 C 16.5 20 20 16 20 12 L 20 6 Z"
    stroke="url(#shield-grad)"
    stroke-width="2"
    fill="none"
    filter="url(#neon-glow)"
  />

  <!-- Inner shield -->
  <path d="M 12 5 L 6 7.5 L 6 12 C 6 15 8.5 18 12 19 C 15.5 18 18 15 18 12 L 18 7.5 Z"
    stroke="url(#shield-grad)"
    stroke-width="1"
    fill="none"
    opacity="0.5"
  />

  <!-- Circuit lines -->
  <circle cx="12" cy="12" r="2" fill="none" stroke="#00f0ff" stroke-width="1" />
  <line x1="12" y1="10" x2="12" y2="8" stroke="#00f0ff" stroke-width="1" opacity="0.6" />
  <line x1="12" y1="14" x2="12" y2="16" stroke="#00f0ff" stroke-width="1" opacity="0.6" />
  <line x1="10" y1="12" x2="8" y2="12" stroke="#00f0ff" stroke-width="1" opacity="0.6" />
  <line x1="14" y1="12" x2="16" y2="12" stroke="#00f0ff" stroke-width="1" opacity="0.6" />

  <!-- Corner dots -->
  <circle cx="8" cy="9" r="0.5" fill="#9d00ff" opacity="0.8" />
  <circle cx="16" cy="9" r="0.5" fill="#9d00ff" opacity="0.8" />
  <circle cx="12" cy="17" r="0.5" fill="#ff0080" opacity="0.8" />
</svg>