<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="flux-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="flux-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Flux Core -->
  <circle cx="32" cy="32" r="8" fill="none" stroke="url(#flux-gradient)"
          stroke-width="2" filter="url(#flux-glow)">
    <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="2;1;2" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner Energy -->
  <circle cx="32" cy="32" r="4" fill="#00f0ff" filter="url(#flux-glow)">
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Energy Streams -->
  <g stroke="url(#flux-gradient)" stroke-width="1.5" fill="none" filter="url(#flux-glow)">
    <!-- Spiral streams -->
    <path d="M 32 24 Q 40 28 40 32 Q 40 36 32 40">
      <animate attributeName="d" values="M 32 24 Q 40 28 40 32 Q 40 36 32 40;M 32 20 Q 44 28 44 32 Q 44 36 32 44;M 32 24 Q 40 28 40 32 Q 40 36 32 40" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 32 40 Q 24 36 24 32 Q 24 28 32 24">
      <animate attributeName="d" values="M 32 40 Q 24 36 24 32 Q 24 28 32 24;M 32 44 Q 20 36 20 32 Q 20 28 32 20;M 32 40 Q 24 36 24 32 Q 24 28 32 24" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Orbiting Particles -->
  <g fill="#ff0080" filter="url(#flux-glow)">
    <circle cx="32" cy="12" r="2">
      <animateTransform attributeName="transform" type="rotate"
                        from="0 32 32" to="360 32 32" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="52" r="2">
      <animateTransform attributeName="transform" type="rotate"
                        from="180 32 32" to="540 32 32" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="32" r="2">
      <animateTransform attributeName="transform" type="rotate"
                        from="90 32 32" to="450 32 32" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52" cy="32" r="2">
      <animateTransform attributeName="transform" type="rotate"
                        from="270 32 32" to="630 32 32" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Flux Lines -->
  <g stroke="#00f0ff" stroke-width="1" opacity="0.4">
    <line x1="8" y1="32" x2="24" y2="32">
      <animate attributeName="x2" values="24;20;24" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="40" y1="32" x2="56" y2="32">
      <animate attributeName="x1" values="40;44;40" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
