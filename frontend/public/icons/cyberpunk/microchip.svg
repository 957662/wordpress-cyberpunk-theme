<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="chip-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="chip-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Chip Body -->
  <rect x="16" y="16" width="32" height="32" rx="4" fill="rgba(0,240,255,0.05)"
        stroke="url(#chip-gradient)" stroke-width="2" filter="url(#chip-glow)"/>

  <!-- Inner Grid -->
  <rect x="20" y="20" width="24" height="24" rx="2" fill="none"
        stroke="#00f0ff" stroke-width="1" opacity="0.5"/>

  <!-- Circuit Lines -->
  <g stroke="#00f0ff" stroke-width="1.5" opacity="0.8">
    <!-- Top connections -->
    <line x1="24" y1="16" x2="24" y2="8"/>
    <line x1="32" y1="16" x2="32" y2="8"/>
    <line x1="40" y1="16" x2="40" y2="8"/>

    <!-- Bottom connections -->
    <line x1="24" y1="48" x2="24" y2="56"/>
    <line x1="32" y1="48" x2="32" y2="56"/>
    <line x1="40" y1="48" x2="40" y2="56"/>

    <!-- Left connections -->
    <line x1="16" y1="24" x2="8" y2="24"/>
    <line x1="16" y1="32" x2="8" y2="32"/>
    <line x1="16" y1="40" x2="8" y2="40"/>

    <!-- Right connections -->
    <line x1="48" y1="24" x2="56" y2="24"/>
    <line x1="48" y1="32" x2="56" y2="32"/>
    <line x1="48" y1="40" x2="56" y2="40"/>
  </g>

  <!-- Connection Points -->
  <g fill="#00f0ff">
    <circle cx="24" cy="8" r="2"/>
    <circle cx="32" cy="8" r="2"/>
    <circle cx="40" cy="8" r="2"/>
    <circle cx="24" cy="56" r="2"/>
    <circle cx="32" cy="56" r="2"/>
    <circle cx="40" cy="56" r="2"/>
    <circle cx="8" cy="24" r="2"/>
    <circle cx="8" cy="32" r="2"/>
    <circle cx="8" cy="40" r="2"/>
    <circle cx="56" cy="24" r="2"/>
    <circle cx="56" cy="32" r="2"/>
    <circle cx="56" cy="40" r="2"/>
  </g>

  <!-- Central Processor -->
  <rect x="28" y="28" width="8" height="8" rx="1" fill="#9d00ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
