<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="signalGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="signalGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Tower Base -->
  <rect x="10" y="14" width="4" height="8" rx="1" fill="url(#signalGradient)" filter="url(#signalGlow)"/>

  <!-- Tower Top -->
  <polygon points="12,4 9,14 15,14" stroke="url(#signalGradient)" stroke-width="2" fill="none" filter="url(#signalGlow)"/>

  <!-- Signal Waves -->
  <path d="M12 2 Q8 6 8 12" stroke="#00f0ff" stroke-width="1.5" fill="none" opacity="0.8" stroke-linecap="round" filter="url(#signalGlow)">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M12 2 Q8 6 8 12;M12 2 Q6 6 6 14;M12 2 Q8 6 8 12" dur="3s" repeatCount="indefinite"/>
  </path>

  <path d="M12 2 Q16 6 16 12" stroke="#9d00ff" stroke-width="1.5" fill="none" opacity="0.8" stroke-linecap="round" filter="url(#signalGlow)">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="d" values="M12 2 Q16 6 16 12;M12 2 Q18 6 18 14;M12 2 Q16 6 16 12" dur="3s" repeatCount="indefinite"/>
  </path>

  <path d="M12 2 Q12 6 12 12" stroke="#ff0080" stroke-width="1.5" fill="none" opacity="0.8" stroke-linecap="round" filter="url(#signalGlow)">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
  </path>

  <!-- Tower Light -->
  <circle cx="12" cy="4" r="1.5" fill="#f0ff00" filter="url(#signalGlow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Tech Elements -->
  <circle cx="10" cy="16" r="0.8" fill="#00f0ff" opacity="0.6"/>
  <circle cx="14" cy="16" r="0.8" fill="#00f0ff" opacity="0.6"/>
  <circle cx="10" cy="19" r="0.8" fill="#9d00ff" opacity="0.6"/>
  <circle cx="14" cy="19" r="0.8" fill="#9d00ff" opacity="0.6"/>
</svg>
