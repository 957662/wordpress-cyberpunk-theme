<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="analyticsGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- 坐标轴 -->
  <line x1="3" y1="20" x2="21" y2="20" stroke="url(#analyticsGradient)" stroke-linecap="round"/>
  <line x1="3" y1="20" x2="3" y2="4" stroke="url(#analyticsGradient)" stroke-linecap="round"/>

  <!-- 数据柱 -->
  <rect x="5" y="12" width="3" height="8" rx="1" fill="url(#analyticsGradient)" opacity="0.6"/>
  <rect x="10" y="8" width="3" height="12" rx="1" fill="url(#analyticsGradient)" opacity="0.8"/>
  <rect x="15" y="14" width="3" height="6" rx="1" fill="url(#analyticsGradient)" opacity="0.7"/>

  <!-- 趋势线 -->
  <polyline points="6.5,12 11.5,8 16.5,14"
            stroke="url(#analyticsGradient)" fill="none" stroke-width="2"/>

  <!-- 数据点 -->
  <circle cx="6.5" cy="12" r="1.5" fill="#00f0ff"/>
  <circle cx="11.5" cy="8" r="1.5" fill="#9d00ff"/>
  <circle cx="16.5" cy="14" r="1.5" fill="#00ff88"/>
</svg>
