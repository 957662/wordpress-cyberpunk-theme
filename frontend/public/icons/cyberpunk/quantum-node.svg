<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="node-glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Circle -->
  <circle cx="32" cy="32" r="25" stroke="#00f0ff" stroke-width="1.5" fill="none" opacity="0.6" filter="url(#node-glow)">
    <animate attributeName="r" values="24;26;24" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner Circle -->
  <circle cx="32" cy="32" r="18" stroke="#9d00ff" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Core -->
  <circle cx="32" cy="32" r="10" fill="#00f0ff" opacity="0.7">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Center Dot -->
  <circle cx="32" cy="32" r="4" fill="#ffffff"/>

  <!-- Connection Lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.4">
    <line x1="32" y1="7" x2="32" y2="22"/>
    <line x1="32" y1="42" x2="32" y2="57"/>
    <line x1="7" y1="32" x2="22" y2="32"/>
    <line x1="42" y1="32" x2="57" y2="32"/>
  </g>

  <!-- Orbiting Particles -->
  <circle r="2" fill="#ff0080">
    <animateMotion dur="3s" repeatCount="indefinite">
      <mpath href="#orbit-path"/>
    </animateMotion>
  </circle>

  <!-- Orbit Path (hidden) -->
  <path id="orbit-path" d="M 32 7 A 25 25 0 0 1 57 32" fill="none" stroke="none"/>
</svg>
