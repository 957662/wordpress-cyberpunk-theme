<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="binary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="binary-glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Binary numbers with animation -->
  <g font-family="monospace" font-size="8" font-weight="bold" fill="url(#binary-gradient)" filter="url(#binary-glow)">
    <!-- Column 1 -->
    <text x="8" y="12" opacity="0.3">0</text>
    <text x="8" y="20" opacity="0.5">1</text>
    <text x="8" y="28" opacity="0.7">1</text>
    <text x="8" y="36" opacity="0.5">0</text>
    <text x="8" y="44" opacity="0.3">1</text>
    <text x="8" y="52" opacity="0.4">0</text>

    <!-- Column 2 -->
    <text x="16" y="12" opacity="0.4">1</text>
    <text x="16" y="20" opacity="0.6">0</text>
    <text x="16" y="28" opacity="0.8">1</text>
    <text x="16" y="36" opacity="0.6">0</text>
    <text x="16" y="44" opacity="0.4">1</text>
    <text x="16" y="52" opacity="0.5">1</text>

    <!-- Column 3 -->
    <text x="24" y="12" opacity="0.5">0</text>
    <text x="24" y="20" opacity="0.7">1</text>
    <text x="24" y="28" opacity="0.9">0</text>
    <text x="24" y="36" opacity="0.7">1</text>
    <text x="24" y="44" opacity="0.5">0</text>
    <text x="24" y="52" opacity="0.6">0</text>

    <!-- Column 4 -->
    <text x="32" y="12" opacity="0.6">1</text>
    <text x="32" y="20" opacity="0.8">0</text>
    <text x="32" y="28" opacity="1">1</text>
    <text x="32" y="36" opacity="0.8">0</text>
    <text x="32" y="44" opacity="0.6">1</text>
    <text x="32" y="52" opacity="0.7">1</text>

    <!-- Column 5 -->
    <text x="40" y="12" opacity="0.5">0</text>
    <text x="40" y="20" opacity="0.7">1</text>
    <text x="40" y="28" opacity="0.9">0</text>
    <text x="40" y="36" opacity="0.7">1</text>
    <text x="40" y="44" opacity="0.5">0</text>
    <text x="40" y="52" opacity="0.6">0</text>

    <!-- Column 6 -->
    <text x="48" y="12" opacity="0.4">1</text>
    <text x="48" y="20" opacity="0.6">0</text>
    <text x="48" y="28" opacity="0.8">1</text>
    <text x="48" y="36" opacity="0.6">0</text>
    <text x="48" y="44" opacity="0.4">1</text>
    <text x="48" y="52" opacity="0.5">1</text>
  </g>

  <!-- Grid lines -->
  <g stroke="url(#binary-gradient)" stroke-width="0.5" fill="none" opacity="0.2">
    <line x1="4" y1="16" x2="60" y2="16"/>
    <line x1="4" y1="24" x2="60" y2="24"/>
    <line x1="4" y1="32" x2="60" y2="32"/>
    <line x1="4" y1="40" x2="60" y2="40"/>
    <line x1="4" y1="48" x2="60" y2="48"/>
  </g>

  <!-- Animated scan line -->
  <line x1="4" y1="0" x2="60" y2="0"
        stroke="url(#binary-gradient)"
        stroke-width="1"
        opacity="0.5">
    <animate attributeName="y1" values="0;64;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;64;0" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Corner brackets -->
  <g stroke="url(#binary-gradient)" stroke-width="1.5" fill="none" filter="url(#binary-glow)">
    <!-- Top left -->
    <path d="M8 8 L8 14 L14 14"/>
    <!-- Top right -->
    <path d="M56 8 L56 14 L50 14"/>
    <!-- Bottom left -->
    <path d="M8 56 L8 50 L14 50"/>
    <!-- Bottom right -->
    <path d="M56 56 L56 50 L50 50"/>
  </g>
</svg>
