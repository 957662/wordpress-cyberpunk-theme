<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Base line -->
  <line x1="2" y1="12" x2="22" y2="12" stroke="#2a2a4a" stroke-width="1" />

  <!-- Pulse wave -->
  <polyline points="2,12 6,12 8,6 10,18 12,12 14,9 16,15 18,12 22,12"
    stroke="url(#pulse-grad)"
    stroke-width="2"
    fill="none"
    stroke-linejoin="round"
  />

  <!-- Data points -->
  <circle cx="8" cy="6" r="1.5" fill="#00f0ff" opacity="0.8" />
  <circle cx="10" cy="18" r="1.5" fill="#00f0ff" opacity="0.8" />
  <circle cx="14" cy="9" r="1.5" fill="#00f0ff" opacity="0.8" />
  <circle cx="16" cy="15" r="1.5" fill="#00f0ff" opacity="0.8" />

  <!-- Grid lines -->
  <line x1="2" y1="6" x2="22" y2="6" stroke="#2a2a4a" stroke-width="0.5" opacity="0.5" />
  <line x1="2" y1="18" x2="22" y2="18" stroke="#2a2a4a" stroke-width="0.5" opacity="0.5" />

  <!-- Vertical markers -->
  <line x1="8" y1="6" x2="8" y2="12" stroke="#00f0ff" stroke-width="0.5" opacity="0.3" />
  <line x1="10" y1="12" x2="10" y2="18" stroke="#00f0ff" stroke-width="0.5" opacity="0.3" />
  <line x1="14" y1="9" x2="14" y2="12" stroke="#00f0ff" stroke-width="0.5" opacity="0.3" />
  <line x1="16" y1="12" x2="16" y2="15" stroke="#00f0ff" stroke-width="0.5" opacity="0.3" />
</svg>