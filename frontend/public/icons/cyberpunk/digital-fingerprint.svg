<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="fingerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="fingerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#fingerGlow)">
    <!-- Digital fingerprint pattern -->
    <path d="M 12 2 C 7.5 2 4 5.5 4 10" stroke="url(#fingerGradient)" stroke-width="1.5"/>
    <path d="M 12 4 C 8.5 4 6 6.5 6 10" stroke="url(#fingerGradient)" stroke-width="1.5"/>
    <path d="M 12 6 C 9.5 6 8 7.5 8 10" stroke="url(#fingerGradient)" stroke-width="1.5"/>
    <path d="M 12 8 C 10.5 8 10 8.5 10 10" stroke="url(#fingerGradient)" stroke-width="1.5"/>
    <path d="M 12 10 L 12 12" stroke="url(#fingerGradient)" stroke-width="1.5"/>
    <circle cx="12" cy="14" r="2" stroke="url(#fingerGradient)" stroke-width="1.5"/>
    <path d="M 10 16 C 9 17 8 18 8 19" stroke="url(#fingerGradient)" stroke-width="1.5"/>
    <path d="M 14 16 C 15 17 16 18 16 19" stroke="url(#fingerGradient)" stroke-width="1.5"/>
    <!-- Data points -->
    <circle cx="12" cy="12" r="1" fill="#00f0ff"/>
    <circle cx="9" cy="10" r="0.5" fill="#00ff88"/>
    <circle cx="15" cy="10" r="0.5" fill="#00ff88"/>
  </g>
</svg>