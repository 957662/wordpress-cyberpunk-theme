<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="neuralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#9d00ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
  </defs>

  <!-- 神经网络节点 -->
  <circle cx="12" cy="4" r="2" fill="url(#neuralGradient)"/>
  <circle cx="4" cy="12" r="2" fill="url(#neuralGradient)"/>
  <circle cx="20" cy="12" r="2" fill="url(#neuralGradient)"/>
  <circle cx="8" cy="20" r="2" fill="url(#neuralGradient)"/>
  <circle cx="16" cy="20" r="2" fill="url(#neuralGradient)"/>

  <!-- 中心节点 -->
  <circle cx="12" cy="12" r="3" fill="url(#neuralGradient)" opacity="0.8"/>
  <circle cx="12" cy="12" r="1.5" fill="#ffffff"/>

  <!-- 连接线 -->
  <line x1="12" y1="6" x2="12" y2="9" stroke="url(#neuralGradient)" opacity="0.5"/>
  <line x1="6" y1="12" x2="9" y2="12" stroke="url(#neuralGradient)" opacity="0.5"/>
  <line x1="15" y1="12" x2="18" y2="12" stroke="url(#neuralGradient)" opacity="0.5"/>
  <line x1="9" y1="19" x2="10.5" y2="14.5" stroke="url(#neuralGradient)" opacity="0.5"/>
  <line x1="15" y1="19" x2="13.5" y2="14.5" stroke="url(#neuralGradient)" opacity="0.5"/>

  <!-- 装饰点 -->
  <circle cx="12" cy="4" r="0.5" fill="#ffffff"/>
  <circle cx="4" cy="12" r="0.5" fill="#ffffff"/>
  <circle cx="20" cy="12" r="0.5" fill="#ffffff"/>
  <circle cx="8" cy="20" r="0.5" fill="#ffffff"/>
  <circle cx="16" cy="20" r="0.5" fill="#ffffff"/>
</svg>
