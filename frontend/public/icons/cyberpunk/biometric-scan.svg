<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="bioGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="bioGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#bioGlow)">
    <!-- Scanning frame -->
    <rect x="6" y="6" width="12" height="12" rx="1" stroke="url(#bioGradient)" stroke-width="1.5" fill="none"/>
    <!-- Scan lines -->
    <line x1="6" y1="8" x2="18" y2="8" stroke="url(#bioGradient)" stroke-width="0.5" opacity="0.6"/>
    <line x1="6" y1="10" x2="18" y2="10" stroke="url(#bioGradient)" stroke-width="0.5" opacity="0.6"/>
    <line x1="6" y1="12" x2="18" y2="12" stroke="url(#bioGradient)" stroke-width="0.5" opacity="0.6"/>
    <line x1="6" y1="14" x2="18" y2="14" stroke="url(#bioGradient)" stroke-width="0.5" opacity="0.6"/>
    <line x1="6" y1="16" x2="18" y2="16" stroke="url(#bioGradient)" stroke-width="0.5" opacity="0.6"/>
    <!-- Corner markers -->
    <path d="M 6 6 L 9 6 L 9 7" stroke="#00ff88" stroke-width="1.5" fill="none"/>
    <path d="M 18 6 L 15 6 L 15 7" stroke="#00ff88" stroke-width="1.5" fill="none"/>
    <path d="M 6 18 L 9 18 L 9 17" stroke="#00f0ff" stroke-width="1.5" fill="none"/>
    <path d="M 18 18 L 15 18 L 15 17" stroke="#00f0ff" stroke-width="1.5" fill="none"/>
    <!-- Central eye -->
    <ellipse cx="12" cy="12" rx="3" ry="2" stroke="url(#bioGradient)" stroke-width="1.5" fill="none"/>
    <circle cx="12" cy="12" r="1" fill="#00ff88"/>
    <!-- Scan beam -->
    <line x1="9" y1="6" x2="9" y2="18" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  </g>
</svg>