<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glitch-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="glitch-filter">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" result="turbulence" />
      <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Main shape -->
  <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"
    fill="none"
    stroke="url(#glitch-grad)"
    stroke-width="2"
    filter="url(#glitch-filter)"
  />

  <!-- Glitch lines -->
  <line x1="8" y1="10" x2="16" y2="10" stroke="#00f0ff" stroke-width="1" opacity="0.7" />
  <line x1="7" y1="12" x2="17" y2="12" stroke="#9d00ff" stroke-width="1" opacity="0.5" />
  <line x1="9" y1="14" x2="15" y2="14" stroke="#ff0080" stroke-width="1" opacity="0.6" />

  <!-- Pixel dots -->
  <rect x="10" y="11" width="1" height="1" fill="#00f0ff" opacity="0.8" />
  <rect x="12" y="11" width="1" height="1" fill="#9d00ff" opacity="0.8" />
  <rect x="14" y="11" width="1" height="1" fill="#ff0080" opacity="0.8" />
</svg>