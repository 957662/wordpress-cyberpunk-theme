<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="quantumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="quantumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g filter="url(#quantumGlow)">
    <!-- Core chip -->
    <rect x="7" y="7" width="10" height="10" rx="1" stroke="url(#quantumGradient)" fill="none"/>

    <!-- Quantum bits -->
    <circle cx="12" cy="12" r="2" fill="#00f0ff" opacity="0.8"/>
    <circle cx="12" cy="8" r="1.5" fill="#9d00ff" opacity="0.6"/>
    <circle cx="12" cy="16" r="1.5" fill="#9d00ff" opacity="0.6"/>
    <circle cx="8" cy="12" r="1.5" fill="#9d00ff" opacity="0.6"/>
    <circle cx="16" cy="12" r="1.5" fill="#9d00ff" opacity="0.6"/>

    <!-- Connections -->
    <line x1="12" y1="10" x2="12" y2="8" stroke="#00f0ff" stroke-width="1"/>
    <line x1="12" y1="14" x2="12" y2="16" stroke="#00f0ff" stroke-width="1"/>
    <line x1="10" y1="12" x2="8" y2="12" stroke="#00f0ff" stroke-width="1"/>
    <line x1="14" y1="12" x2="16" y2="12" stroke="#00f0ff" stroke-width="1"/>

    <!-- Circuit lines -->
    <path d="M 7 9 L 5 9 L 5 11" stroke="#00f0ff" stroke-width="1.5" opacity="0.7"/>
    <path d="M 17 9 L 19 9 L 19 11" stroke="#ff0080" stroke-width="1.5" opacity="0.7"/>
    <path d="M 7 15 L 5 15 L 5 13" stroke="#00f0ff" stroke-width="1.5" opacity="0.7"/>
    <path d="M 17 15 L 19 15 L 19 13" stroke="#ff0080" stroke-width="1.5" opacity="0.7"/>

    <!-- Tech points -->
    <circle cx="5" cy="9" r="1" fill="#00f0ff" opacity="0.8"/>
    <circle cx="19" cy="9" r="1" fill="#ff0080" opacity="0.8"/>
    <circle cx="5" cy="15" r="1" fill="#00f0ff" opacity="0.8"/>
    <circle cx="19" cy="15" r="1" fill="#ff0080" opacity="0.8"/>
  </g>
</svg>