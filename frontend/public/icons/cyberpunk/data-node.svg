<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Center Node -->
  <circle cx="12" cy="12" r="3" fill="url(#nodeGradient)" filter="url(#nodeGlow)">
    <animate attributeName="r" values="3;3.5;3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Connection Lines -->
  <line x1="12" y1="12" x2="12" y2="4" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
  <line x1="12" y1="12" x2="19" y2="16" stroke="#9d00ff" stroke-width="1" opacity="0.6"/>
  <line x1="12" y1="12" x2="5" y2="16" stroke="#ff0080" stroke-width="1" opacity="0.6"/>
  <line x1="12" y1="12" x2="19" y2="8" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
  <line x1="12" y1="12" x2="5" y2="8" stroke="#9d00ff" stroke-width="1" opacity="0.6"/>

  <!-- Satellite Nodes -->
  <circle cx="12" cy="4" r="2" stroke="#00f0ff" stroke-width="1.5" fill="#0a0a0f" filter="url(#nodeGlow)"/>
  <circle cx="19" cy="16" r="2" stroke="#9d00ff" stroke-width="1.5" fill="#0a0a0f" filter="url(#nodeGlow)"/>
  <circle cx="5" cy="16" r="2" stroke="#ff0080" stroke-width="1.5" fill="#0a0a0f" filter="url(#nodeGlow)"/>
  <circle cx="19" cy="8" r="2" stroke="#00f0ff" stroke-width="1.5" fill="#0a0a0f" filter="url(#nodeGlow)"/>
  <circle cx="5" cy="8" r="2" stroke="#9d00ff" stroke-width="1.5" fill="#0a0a0f" filter="url(#nodeGlow)"/>

  <!-- Data Particles -->
  <circle r="0.8" fill="#00f0ff">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M12,12 L12,4"/>
  </circle>
  <circle r="0.8" fill="#9d00ff">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.3s" path="M12,12 L19,16"/>
  </circle>
  <circle r="0.8" fill="#ff0080">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.6s" path="M12,12 L5,16"/>
  </circle>
</svg>
