<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="matrixGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ff88;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.2" />
    </linearGradient>
    <filter id="matrixGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#matrixGlow)">
    <!-- Matrix columns -->
    <g fill="url(#matrixGradient)">
      <!-- Column 1 -->
      <text x="4" y="6" font-family="monospace" font-size="3" fill="#00ff88">1</text>
      <text x="4" y="9" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.8">0</text>
      <text x="4" y="12" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.6">1</text>
      <text x="4" y="15" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.4">1</text>
      <text x="4" y="18" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.2">0</text>
      <text x="4" y="21" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.1">1</text>

      <!-- Column 2 -->
      <text x="8" y="5" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.9">0</text>
      <text x="8" y="8" font-family="monospace" font-size="3" fill="#00ff88">1</text>
      <text x="8" y="11" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.7">0</text>
      <text x="8" y="14" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.5">1</text>
      <text x="8" y="17" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.3">0</text>
      <text x="8" y="20" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.1">1</text>

      <!-- Column 3 -->
      <text x="12" y="4" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.8">1</text>
      <text x="12" y="7" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.6">1</text>
      <text x="12" y="10" font-family="monospace" font-size="3" fill="#00ff88">0</text>
      <text x="12" y="13" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.8">1</text>
      <text x="12" y="16" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.6">0</text>
      <text x="12" y="19" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.4">1</text>

      <!-- Column 4 -->
      <text x="16" y="6" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.7">0</text>
      <text x="16" y="9" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.9">1</text>
      <text x="16" y="12" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.6">0</text>
      <text x="16" y="15" font-family="monospace" font-size="3" fill="#00ff88">1</text>
      <text x="16" y="18" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.8">1</text>
      <text x="16" y="21" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.2">0</text>

      <!-- Column 5 -->
      <text x="20" y="5" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.6">1</text>
      <text x="20" y="8" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.8">0</text>
      <text x="20" y="11" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.5">1</text>
      <text x="20" y="14" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.7">0</text>
      <text x="20" y="17" font-family="monospace" font-size="3" fill="#00ff88">1</text>
      <text x="20" y="20" font-family="monospace" font-size="3" fill="#00ff88" opacity="0.3">0</text>
    </g>

    <!-- Highlighted character -->
    <circle cx="8" cy="8" r="2" fill="none" stroke="#f0ff00" stroke-width="0.5" opacity="0.6"/>
  </g>
</svg>