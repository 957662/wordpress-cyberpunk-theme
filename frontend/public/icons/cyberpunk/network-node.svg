<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="node-glow-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </radialGradient>
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Connection Lines -->
  <g stroke="url(#synth-gradient)" stroke-width="1" opacity="0.6">
    <!-- Center to satellites -->
    <line x1="32" y1="32" x2="12" y2="12"/>
    <line x1="32" y1="32" x2="52" y2="12"/>
    <line x1="32" y1="32" x2="12" y2="52"/>
    <line x1="32" y1="32" x2="52" y2="52"/>
    <line x1="32" y1="32" x2="32" y2="8"/>

    <!-- Outer connections -->
    <line x1="12" y1="12" x2="52" y2="12" stroke-dasharray="2 2"/>
    <line x1="12" y1="52" x2="52" y2="52" stroke-dasharray="2 2"/>
    <line x1="12" y1="12" x2="12" y2="52" stroke-dasharray="2 2"/>
    <line x1="52" y1="12" x2="52" y2="52" stroke-dasharray="2 2"/>
  </g>

  <!-- Central Node -->
  <g filter="url(#node-glow)">
    <circle cx="32" cy="32" r="10" fill="rgba(0,240,255,0.2)" stroke="#00f0ff" stroke-width="2"/>
    <circle cx="32" cy="32" r="5" fill="#00f0ff">
      <animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Satellite Nodes -->
  <g filter="url(#node-glow)">
    <!-- Top Left -->
    <circle cx="12" cy="12" r="6" fill="rgba(157,0,255,0.2)" stroke="#9d00ff" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="3" fill="#9d00ff"/>

    <!-- Top Right -->
    <circle cx="52" cy="12" r="6" fill="rgba(255,0,128,0.2)" stroke="#ff0080" stroke-width="1.5"/>
    <circle cx="52" cy="12" r="3" fill="#ff0080"/>

    <!-- Bottom Left -->
    <circle cx="12" cy="52" r="6" fill="rgba(255,0,128,0.2)" stroke="#ff0080" stroke-width="1.5"/>
    <circle cx="12" cy="52" r="3" fill="#ff0080"/>

    <!-- Bottom Right -->
    <circle cx="52" cy="52" r="6" fill="rgba(157,0,255,0.2)" stroke="#9d00ff" stroke-width="1.5"/>
    <circle cx="52" cy="52" r="3" fill="#9d00ff"/>

    <!-- Top Center -->
    <circle cx="32" cy="8" r="4" fill="rgba(240,255,0,0.2)" stroke="#f0ff00" stroke-width="1.5"/>
    <circle cx="32" cy="8" r="2" fill="#f0ff00"/>
  </g>

  <!-- Data Packets -->
  <g fill="#00f0ff" opacity="0.8">
    <circle r="2">
      <animateMotion dur="3s" repeatCount="indefinite"
                    path="M 32 32 L 12 12"/>
    </circle>
    <circle r="2" fill="#9d00ff">
      <animateMotion dur="2.5s" repeatCount="indefinite"
                    path="M 32 32 L 52 52"/>
    </circle>
    <circle r="2" fill="#ff0080">
      <animateMotion dur="2.8s" repeatCount="indefinite"
                    path="M 12 12 L 52 12"/>
    </circle>
  </g>
</svg>
