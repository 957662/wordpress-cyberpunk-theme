<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cyber-brain-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="cyber-brain-glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Brain outline -->
  <path d="M32 8 C20 8 12 16 12 28 C12 32 13 36 15 39 C13 42 12 46 14 50 C16 54 20 56 24 56 C26 56 28 55 30 54 C31 55 32 56 32 56 C32 56 33 55 34 54 C36 55 38 56 40 56 C44 56 48 54 50 50 C52 46 51 42 49 39 C51 36 52 32 52 28 C52 16 44 8 32 8"
        stroke="url(#cyber-brain-gradient)"
        stroke-width="2"
        fill="none"
        filter="url(#cyber-brain-glow)"/>

  <!-- Neural network lines -->
  <g stroke="url(#cyber-brain-gradient)" stroke-width="1" fill="none" opacity="0.6">
    <line x1="20" y1="24" x2="28" y2="32">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="24" x2="24" y2="40">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.3s" repeatCount="indefinite"/>
    </line>
    <line x1="28" y1="32" x2="32" y2="48">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/>
    </line>
    <line x1="32" y1="48" x2="40" y2="44">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="40" y1="44" x2="44" y2="28">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="44" y1="28" x2="36" y2="20">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="36" y1="20" x2="28" y2="32">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <line x1="32" y1="16" x2="32" y2="24">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Neural nodes -->
  <g fill="url(#cyber-brain-gradient)" filter="url(#cyber-brain-glow)">
    <circle cx="20" cy="24" r="2">
      <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="28" cy="32" r="2">
      <animate attributeName="r" values="2;3;2" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="24" cy="40" r="2">
      <animate attributeName="r" values="2;3;2" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="48" r="2">
      <animate attributeName="r" values="2;3;2" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="44" r="2">
      <animate attributeName="r" values="2;3;2" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="44" cy="28" r="2">
      <animate attributeName="r" values="2;3;2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="36" cy="20" r="2">
      <animate attributeName="r" values="2;3;2" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="16" r="2">
      <animate attributeName="r" values="2;3;2" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="24" r="2">
      <animate attributeName="r" values="2;3;2" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Tech decorations -->
  <g stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.4">
    <line x1="8" y1="32" x2="12" y2="32"/>
    <line x1="52" y1="32" x2="56" y2="32"/>
    <line x1="32" y1="4" x2="32" y2="8"/>
    <line x1="32" y1="56" x2="32" y2="60"/>
  </g>
</svg>
