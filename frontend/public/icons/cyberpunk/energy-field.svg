<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="energy-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#9d00ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0" />
    </radialGradient>
    <filter id="energy-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#00f0ff" stroke-width="1.5"
          opacity="0.4" stroke-dasharray="4 2">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 32 32" to="360 32 32" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- Middle Ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#9d00ff" stroke-width="1.5"
          opacity="0.6" stroke-dasharray="6 3">
    <animateTransform attributeName="transform" type="rotate"
                      from="360 32 32" to="0 32 32" dur="15s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner Ring -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#ff0080" stroke-width="1.5"
          opacity="0.8" stroke-dasharray="3 2">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 32 32" to="360 32 32" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Energy Core -->
  <circle cx="32" cy="32" r="10" fill="url(#energy-core)" filter="url(#energy-glow)">
    <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Energy Particles -->
  <g fill="#00f0ff" opacity="0.8">
    <circle cx="32" cy="4" r="1.5">
      <animateTransform attributeName="transform" type="rotate"
                        from="0 32 32" to="360 32 32" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="60" r="1.5">
      <animateTransform attributeName="transform" type="rotate"
                        from="180 32 32" to="540 32 32" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Orbiting Dots -->
  <circle cx="32" cy="8" r="2" fill="#9d00ff" filter="url(#energy-glow)">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 32 32" to="360 32 32" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="56" r="2" fill="#ff0080" filter="url(#energy-glow)">
    <animateTransform attributeName="transform" type="rotate"
                      from="180 32 32" to="540 32 32" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>
