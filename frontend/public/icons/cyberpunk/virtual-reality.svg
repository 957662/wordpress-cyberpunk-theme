<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="vr-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="vr-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- VR Headset Frame -->
  <g filter="url(#vr-glow)">
    <!-- Main body -->
    <path d="M 8 32 Q 8 20 20 20 L 44 20 Q 56 20 56 32 L 56 40 Q 56 44 52 44 L 12 44 Q 8 44 8 40 Z"
          fill="rgba(10,10,15,0.8)" stroke="url(#vr-gradient)" stroke-width="2"/>

    <!-- Lens areas -->
    <ellipse cx="24" cy="32" rx="10" ry="8" fill="rgba(0,240,255,0.1)" stroke="#00f0ff" stroke-width="1.5"/>
    <ellipse cx="40" cy="32" rx="10" ry="8" fill="rgba(157,0,255,0.1)" stroke="#9d00ff" stroke-width="1.5"/>
  </g>

  <!-- Lens Reflections -->
  <g opacity="0.6">
    <path d="M 20 28 Q 24 26 28 28" stroke="#ffffff" stroke-width="1" fill="none"/>
    <path d="M 36 28 Q 40 26 44 28" stroke="#ffffff" stroke-width="1" fill="none"/>
  </g>

  <!-- Strap -->
  <g stroke="url(#vr-gradient)" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 8 24 Q 4 24 4 28 L 4 36 Q 4 40 8 40"/>
    <path d="M 56 24 Q 60 24 60 28 L 60 36 Q 60 40 56 40"/>
  </g>

  <!-- Holographic Display Lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.4">
    <line x1="14" y1="24" x2="34" y2="24">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="14" y1="32" x2="34" y2="32">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </line>
    <line x1="14" y1="40" x2="34" y2="40">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="1s"/>
    </line>
  </g>

  <!-- Power Indicator -->
  <circle cx="32" cy="42" r="2" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Wireless Waves -->
  <g stroke="#9d00ff" stroke-width="1" fill="none" opacity="0.5">
    <path d="M 60 32 Q 62 32 62 30">
      <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 60 32 Q 64 32 64 28">
      <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <path d="M 60 32 Q 66 32 66 26">
      <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite" begin="1s"/>
    </path>
  </g>
</svg>
