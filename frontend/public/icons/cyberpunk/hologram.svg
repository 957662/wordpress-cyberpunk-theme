<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="holoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#9d00ff"/>
    </linearGradient>
  </defs>
  <g filter="url(#neonGlow)">
    <!-- 外六边形 -->
    <polygon points="12,2 20,6 20,18 12,22 4,18 4,6" stroke="url(#holoGrad)" fill="none" opacity="0.9"/>
    <!-- 内六边形 -->
    <polygon points="12,6 16,8 16,16 12,18 8,16 8,8" stroke="url(#holoGrad)" fill="none" opacity="0.6"/>
    <!-- 中心圆 -->
    <circle cx="12" cy="12" r="2" fill="url(#holoGrad)" opacity="0.8"/>
    <!-- 扫描线 -->
    <line x1="4" y1="12" x2="20" y2="12" stroke="url(#holoGrad)" stroke-width="0.5" opacity="0.3"/>
  </g>
</svg>
