<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="stream-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </linearGradient>
    <filter id="stream-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Data Streams -->
  <g stroke="url(#stream-gradient)" stroke-width="2" fill="none"
     stroke-linecap="round" filter="url(#stream-glow)">
    <!-- Stream 1 -->
    <path d="M 0 16 Q 32 12 64 16">
      <animate attributeName="d"
               values="M 0 16 Q 32 12 64 16;M 0 16 Q 32 20 64 16;M 0 16 Q 32 12 64 16"
               dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Stream 2 -->
    <path d="M 0 32 Q 32 28 64 32">
      <animate attributeName="d"
               values="M 0 32 Q 32 28 64 32;M 0 32 Q 32 36 64 32;M 0 32 Q 32 28 64 32"
               dur="2.5s" repeatCount="indefinite"/>
    </path>

    <!-- Stream 3 -->
    <path d="M 0 48 Q 32 44 64 48">
      <animate attributeName="d"
               values="M 0 48 Q 32 44 64 48;M 0 48 Q 32 52 64 48;M 0 48 Q 32 44 64 48"
               dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Data Packets -->
  <g fill="#00f0ff">
    <circle cx="0" cy="16" r="2">
      <animate attributeName="cx" values="0;64" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="32" r="2">
      <animate attributeName="cx" values="0;64" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="48" r="2">
      <animate attributeName="cx" values="0;64" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
