<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="data-vault-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="data-vault-glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Vault door -->
  <rect x="8" y="8" width="48" height="48" rx="4"
        stroke="url(#data-vault-gradient)"
        stroke-width="2"
        fill="none"
        filter="url(#data-vault-glow)"/>

  <!-- Inner frame -->
  <rect x="14" y="14" width="36" height="36" rx="2"
        stroke="url(#data-vault-gradient)"
        stroke-width="1"
        fill="none"
        opacity="0.5"/>

  <!-- Locking mechanism -->
  <g transform="translate(32, 32)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="12"
            stroke="url(#data-vault-gradient)"
            stroke-width="1.5"
            fill="none"
            filter="url(#data-vault-glow)">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0 0 0"
                        to="360 0 0"
                        dur="8s"
                        repeatCount="indefinite"/>
    </circle>

    <!-- Middle ring -->
    <circle cx="0" cy="0" r="8"
            stroke="url(#data-vault-gradient)"
            stroke-width="1"
            fill="none"
            opacity="0.7">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="360 0 0"
                        to="0 0 0"
                        dur="6s"
                        repeatCount="indefinite"/>
    </circle>

    <!-- Inner circle -->
    <circle cx="0" cy="0" r="4"
            fill="url(#data-vault-gradient)"
            filter="url(#data-vault-glow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Lock icon -->
    <g transform="translate(0, 0)">
      <rect x="-2" y="-1" width="4" height="4" rx="0.5"
            stroke="#fff"
            stroke-width="0.5"
            fill="url(#data-vault-gradient)"/>
      <path d="M-1.5 -1 L-1.5 -3 A1.5 1.5 0 0 1 1.5 -3 L1.5 -1"
            stroke="#fff"
            stroke-width="0.5"
            fill="none"/>
    </g>
  </g>

  <!-- Data streams -->
  <g stroke="url(#data-vault-gradient)" stroke-width="1" fill="none" opacity="0.4">
    <!-- Left stream -->
    <path d="M16 24 L16 40">
      <animate attributeName="stroke-dasharray" values="0,16;16,0;0,16" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Right stream -->
    <path d="M48 24 L48 40">
      <animate attributeName="stroke-dasharray" values="0,16;16,0;0,16" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </path>

    <!-- Top stream -->
    <path d="M24 16 L40 16">
      <animate attributeName="stroke-dasharray" values="0,16;16,0;0,16" dur="2s" repeatCount="indefinite" begin="1s"/>
    </path>

    <!-- Bottom stream -->
    <path d="M24 48 L40 48">
      <animate attributeName="stroke-dasharray" values="0,16;16,0;0,16" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </path>
  </g>

  <!-- Corner decorations -->
  <g fill="url(#data-vault-gradient)" filter="url(#data-vault-glow)">
    <rect x="10" y="10" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="10" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect x="10" y="50" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <rect x="50" y="50" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </rect>
  </g>
</svg>
