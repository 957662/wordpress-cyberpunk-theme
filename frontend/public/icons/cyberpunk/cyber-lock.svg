<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="lockGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Lock Body -->
  <rect x="6" y="10" width="12" height="10" rx="2" stroke="url(#lockGradient)" stroke-width="2" fill="none" filter="url(#lockGlow)"/>

  <!-- Lock Shackle -->
  <path d="M8 10V7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7V10" stroke="url(#lockGradient)" stroke-width="2" stroke-linecap="round" fill="none" filter="url(#lockGlow)"/>

  <!-- Keyhole -->
  <circle cx="12" cy="15" r="2" stroke="#9d00ff" stroke-width="1.5" fill="none" filter="url(#lockGlow)"/>
  <line x1="12" y1="17" x2="12" y2="19" stroke="#9d00ff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tech Decorations -->
  <circle cx="6" cy="10" r="1" fill="#00f0ff" filter="url(#lockGlow)"/>
  <circle cx="18" cy="10" r="1" fill="#00f0ff" filter="url(#lockGlow)"/>
  <circle cx="6" cy="20" r="1" fill="#9d00ff" filter="url(#lockGlow)"/>
  <circle cx="18" cy="20" r="1" fill="#9d00ff" filter="url(#lockGlow)"/>

  <!-- Circuit Lines -->
  <line x1="4" y1="15" x2="6" y2="15" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
  <line x1="18" y1="15" x2="20" y2="15" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
</svg>
