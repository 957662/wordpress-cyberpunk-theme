<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="holo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.5" />
    </linearGradient>
  </defs>

  <!-- Outer hexagon -->
  <polygon points="12,2 20,7 20,17 12,22 4,17 4,7"
    stroke="url(#holo-grad)"
    stroke-width="1.5"
    fill="none"
    opacity="0.8"
  />

  <!-- Inner hexagon -->
  <polygon points="12,6 16,9 16,15 12,18 8,15 8,9"
    stroke="url(#holo-grad)"
    stroke-width="1"
    fill="none"
    opacity="0.6"
  />

  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.5" fill="#00f0ff" opacity="0.9" />

  <!-- Scan lines -->
  <line x1="6" y1="7" x2="18" y2="7" stroke="#00f0ff" stroke-width="0.5" opacity="0.3" />
  <line x1="5" y1="12" x2="19" y2="12" stroke="#9d00ff" stroke-width="0.5" opacity="0.3" />
  <line x1="6" y1="17" x2="18" y2="17" stroke="#00f0ff" stroke-width="0.5" opacity="0.3" />

  <!-- Corner accents -->
  <circle cx="12" cy="2" r="1" fill="#00f0ff" opacity="0.6" />
  <circle cx="20" cy="7" r="1" fill="#9d00ff" opacity="0.6" />
  <circle cx="20" cy="17" r="1" fill="#9d00ff" opacity="0.6" />
  <circle cx="12" cy="22" r="1" fill="#00f0ff" opacity="0.6" />
  <circle cx="4" cy="17" r="1" fill="#9d00ff" opacity="0.6" />
  <circle cx="4" cy="7" r="1" fill="#9d00ff" opacity="0.6" />
</svg>