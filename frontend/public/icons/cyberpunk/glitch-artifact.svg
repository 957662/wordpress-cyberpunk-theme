<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="glitch-gradient-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="glitch-gradient-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0" />
    </linearGradient>
    <filter id="glitch-glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main shape (diamond) -->
  <path d="M32 4 L56 32 L32 60 L8 32 Z"
        stroke="#00f0ff"
        stroke-width="2"
        fill="none"
        opacity="0.8"
        filter="url(#glitch-glow)">
    <animate attributeName="opacity" values="0.8;1;0.8;0.6;0.8" dur="0.3s" repeatCount="indefinite"/>
  </path>

  <!-- Inner diamond -->
  <path d="M32 16 L44 32 L32 48 L20 32 Z"
        stroke="#9d00ff"
        stroke-width="1"
        fill="none"
        opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.7;0.5;0.3;0.5" dur="0.3s" repeatCount="indefinite" begin="0.1s"/>
  </path>

  <!-- Glitch lines - horizontal -->
  <g stroke="url(#glitch-gradient-1)" stroke-width="1" opacity="0.7">
    <line x1="8" y1="20" x2="56" y2="20">
      <animate attributeName="opacity" values="0;0.7;0;0.4;0" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="x1" values="8;12;8;10;8" dur="0.1s" repeatCount="indefinite"/>
    </line>
    <line x1="8" y1="28" x2="56" y2="28">
      <animate attributeName="opacity" values="0;0.5;0;0.3;0" dur="0.4s" repeatCount="indefinite" begin="0.1s"/>
      <animate attributeName="x1" values="8;10;8;12;8" dur="0.1s" repeatCount="indefinite"/>
    </line>
    <line x1="8" y1="36" x2="56" y2="36">
      <animate attributeName="opacity" values="0;0.6;0;0.4;0" dur="0.45s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="x1" values="8;14;8;10;8" dur="0.1s" repeatCount="indefinite"/>
    </line>
    <line x1="8" y1="44" x2="56" y2="44">
      <animate attributeName="opacity" values="0;0.7;0;0.5;0" dur="0.55s" repeatCount="indefinite" begin="0.15s"/>
      <animate attributeName="x1" values="8;10;8;12;8" dur="0.1s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Glitch lines - vertical (pink) -->
  <g stroke="url(#glitch-gradient-2)" stroke-width="1" opacity="0.5">
    <line x1="20" y1="8" x2="20" y2="56">
      <animate attributeName="opacity" values="0;0.5;0;0.3;0" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="8;12;8;10;8" dur="0.1s" repeatCount="indefinite"/>
    </line>
    <line x1="28" y1="8" x2="28" y2="56">
      <animate attributeName="opacity" values="0;0.4;0;0.2;0" dur="0.5s" repeatCount="indefinite" begin="0.1s"/>
      <animate attributeName="y1" values="8;10;8;12;8" dur="0.1s" repeatCount="indefinite"/>
    </line>
    <line x1="36" y1="8" x2="36" y2="56">
      <animate attributeName="opacity" values="0;0.6;0;0.4;0" dur="0.55s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="y1" values="8;14;8;10;8" dur="0.1s" repeatCount="indefinite"/>
    </line>
    <line x1="44" y1="8" x2="44" y2="56">
      <animate attributeName="opacity" values="0;0.5;0;0.3;0" dur="0.65s" repeatCount="indefinite" begin="0.15s"/>
      <animate attributeName="y1" values="8;10;8;12;8" dur="0.1s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Data fragments -->
  <g fill="#00f0ff" opacity="0.8" filter="url(#glitch-glow)">
    <rect x="24" y="24" width="2" height="2">
      <animate attributeName="opacity" values="0.8;0.3;0.8;1;0.8" dur="0.3s" repeatCount="indefinite"/>
      <animate attributeName="x" values="24;26;24;25;24" dur="0.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="38" y="32" width="2" height="2">
      <animate attributeName="opacity" values="0.6;0.9;0.6;0.4;0.6" dur="0.3s" repeatCount="indefinite" begin="0.1s"/>
      <animate attributeName="x" values="38;40;38;39;38" dur="0.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="30" y="40" width="2" height="2">
      <animate attributeName="opacity" values="0.7;0.4;0.7;0.9;0.7" dur="0.3s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="x" values="30;32;30;31;30" dur="0.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Center core -->
  <circle cx="32" cy="32" r="4"
          fill="#9d00ff"
          filter="url(#glitch-glow)">
    <animate attributeName="r" values="4;5;4;3;4" dur="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8;0.6;0.8" dur="0.3s" repeatCount="indefinite"/>
  </circle>
</svg>
