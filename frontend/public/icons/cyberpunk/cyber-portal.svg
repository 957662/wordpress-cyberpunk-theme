<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="portalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="portalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#portalGlow)">
    <!-- Outer ring -->
    <ellipse cx="12" cy="12" rx="9" ry="9" stroke="url(#portalGradient)" stroke-width="1.5" stroke-dasharray="3 2"/>
    <!-- Inner ring -->
    <ellipse cx="12" cy="12" rx="6" ry="6" stroke="url(#portalGradient)" stroke-width="1.5" stroke-dasharray="2 1"/>
    <!-- Core -->
    <ellipse cx="12" cy="12" rx="3" ry="3" fill="url(#portalGradient)" opacity="0.8"/>
    <!-- Data particles -->
    <circle cx="12" cy="8" r="0.5" fill="#00f0ff"/>
    <circle cx="15" cy="12" r="0.5" fill="#9d00ff"/>
    <circle cx="12" cy="16" r="0.5" fill="#ff0080"/>
    <circle cx="9" cy="12" r="0.5" fill="#00f0ff"/>
    <!-- Circuit lines -->
    <path d="M 3 12 L 1 12 L 0.5 11" stroke="#00f0ff" stroke-width="0.8" fill="none" opacity="0.6"/>
    <path d="M 21 12 L 23 12 L 23.5 13" stroke="#ff0080" stroke-width="0.8" fill="none" opacity="0.6"/>
  </g>
</svg>