<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vortexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="vortexGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rotating Spiral Arms -->
  <g filter="url(#vortexGlow)">
    <path d="M12 12 L12 2" stroke="url(#vortexGradient)" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="3s" repeatCount="indefinite"/>
    </path>

    <path d="M12 12 L19.39 4.61" stroke="url(#vortexGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="3s" repeatCount="indefinite"/>
    </path>

    <path d="M12 12 L22 12" stroke="url(#vortexGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="3s" repeatCount="indefinite"/>
    </path>

    <path d="M12 12 L19.39 19.39" stroke="url(#vortexGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="3s" repeatCount="indefinite"/>
    </path>

    <path d="M12 12 L12 22" stroke="url(#vortexGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="3s" repeatCount="indefinite"/>
    </path>

    <path d="M12 12 L4.61 19.39" stroke="url(#vortexGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="3s" repeatCount="indefinite"/>
    </path>

    <path d="M12 12 L2 12" stroke="url(#vortexGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="3s" repeatCount="indefinite"/>
    </path>

    <path d="M12 12 L4.61 4.61" stroke="url(#vortexGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Center Core -->
  <circle cx="12" cy="12" r="2" fill="#00f0ff" filter="url(#vortexGlow)">
    <animate attributeName="r" values="2;2.5;2" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
