<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="core-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </radialGradient>
    <filter id="core-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Rings -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#00f0ff"
          stroke-width="1" opacity="0.3" stroke-dasharray="4 2">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 32 32" to="360 32 32" dur="20s" repeatCount="indefinite"/>
  </circle>

  <circle cx="32" cy="32" r="24" fill="none" stroke="#9d00ff"
          stroke-width="1.5" opacity="0.5" stroke-dasharray="8 4">
    <animateTransform attributeName="transform" type="rotate"
                      from="360 32 32" to="0 32 32" dur="15s" repeatCount="indefinite"/>
  </circle>

  <circle cx="32" cy="32" r="20" fill="none" stroke="#ff0080"
          stroke-width="2" opacity="0.6" stroke-dasharray="6 3">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 32 32" to="360 32 32" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Data Streams -->
  <g stroke="url(#core-gradient)" stroke-width="2" opacity="0.8">
    <line x1="32" y1="12" x2="32" y2="20">
      <animate attributeName="y1" values="12;14;12" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="32" y1="44" x2="32" y2="52">
      <animate attributeName="y2" values="52;50;52" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="12" y1="32" x2="20" y2="32">
      <animate attributeName="x1" values="12;14;12" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="44" y1="32" x2="52" y2="32">
      <animate attributeName="x2" values="52;50;52" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Central Core -->
  <circle cx="32" cy="32" r="10" fill="url(#core-glow)" filter="url(#core-blur)"/>
  <circle cx="32" cy="32" r="6" fill="none" stroke="url(#core-gradient)"
          stroke-width="2" filter="url(#core-blur)"/>

  <!-- Core Pulse -->
  <circle cx="32" cy="32" r="3" fill="#00f0ff">
    <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting Particles -->
  <circle cx="32" cy="16" r="2" fill="#9d00ff">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 32 32" to="360 32 32" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="48" r="2" fill="#ff0080">
    <animateTransform attributeName="transform" type="rotate"
                      from="180 32 32" to="540 32 32" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner Data Points -->
  <g fill="#00f0ff" opacity="0.6">
    <circle cx="8" cy="8" r="1.5"/>
    <circle cx="56" cy="8" r="1.5"/>
    <circle cx="8" cy="56" r="1.5"/>
    <circle cx="56" cy="56" r="1.5"/>
  </g>
</svg>
