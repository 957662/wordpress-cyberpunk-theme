<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="rocket-gradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="rocket-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rocket Body -->
  <g filter="url(#rocket-glow)">
    <!-- Main body -->
    <path d="M 32 8 L 44 32 L 44 48 Q 44 52 40 52 L 24 52 Q 20 52 20 48 L 20 32 Z"
          fill="rgba(0,240,255,0.1)" stroke="url(#rocket-gradient)" stroke-width="2"/>

    <!-- Nose cone -->
    <path d="M 32 8 L 38 20 L 26 20 Z"
          fill="rgba(0,240,255,0.2)" stroke="#00f0ff" stroke-width="1"/>
  </g>

  <!-- Window -->
  <circle cx="32" cy="28" r="6" fill="rgba(0,0,0,0.5)" stroke="#00f0ff" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="28" r="3" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Fins -->
  <g fill="rgba(157,0,255,0.3)" stroke="#9d00ff" stroke-width="1">
    <!-- Left fin -->
    <path d="M 20 40 L 12 52 L 20 48 Z"/>
    <!-- Right fin -->
    <path d="M 44 40 L 52 52 L 44 48 Z"/>
  </g>

  <!-- Engine Glow -->
  <ellipse cx="32" cy="52" rx="6" ry="3" fill="#ff0080" opacity="0.6">
    <animate attributeName="ry" values="3;5;3" dur="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="0.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Flame Particles -->
  <g fill="#ff0080">
    <circle cx="30" cy="56" r="1.5">
      <animate attributeName="cy" values="56;62;56" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="58" r="1">
      <animate attributeName="cy" values="58;64;58" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="34" cy="56" r="1.5">
      <animate attributeName="cy" values="56;62;56" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Motion Lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.3">
    <line x1="8" y1="20" x2="16" y2="20"/>
    <line x1="6" y1="28" x2="14" y2="28"/>
    <line x1="8" y1="36" x2="16" y2="36"/>
  </g>
</svg>
