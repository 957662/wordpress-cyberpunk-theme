<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="energyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#9d00ff"/>
      <stop offset="100%" stop-color="#ff0080"/>
    </linearGradient>
  </defs>
  <g filter="url(#neonGlow)">
    <!-- 外六边形 -->
    <path d="M12 2L20 6.5V17.5L12 22L4 17.5V6.5L12 2Z" stroke="url(#energyGrad)" fill="none"/>
    <!-- 内六边形 -->
    <path d="M12 7L16 9.5V14.5L12 17L8 14.5V9.5L12 7Z" stroke="url(#energyGrad)" fill="none" opacity="0.6"/>
    <!-- 核心 -->
    <circle cx="12" cy="12" r="3" fill="url(#energyGrad)"/>
    <!-- 能量线 -->
    <path d="M12 2V5M12 19V22M20 6.5L17.5 8M6.5 16L4 17.5" stroke="#00f0ff" stroke-width="1" opacity="0.7"/>
  </g>
</svg>
