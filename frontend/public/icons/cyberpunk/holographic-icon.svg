<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="holoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="holoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g filter="url(#holoGlow)">
    <!-- Holographic base -->
    <ellipse cx="12" cy="18" rx="8" ry="2" stroke="url(#holoGradient)" fill="none" opacity="0.5"/>
    <ellipse cx="12" cy="18" rx="6" ry="1.5" stroke="#00f0ff" fill="none" opacity="0.3"/>

    <!-- Projection cone -->
    <path d="M 4 18 L 12 4 L 20 18" stroke="url(#holoGradient)" fill="none" opacity="0.4"/>
    <path d="M 6 18 L 12 6 L 18 18" stroke="#00f0ff" fill="none" opacity="0.3"/>

    <!-- Holographic image -->
    <rect x="9" y="7" width="6" height="8" rx="1" stroke="url(#holoGradient)" fill="none" opacity="0.8"/>
    <circle cx="12" cy="11" r="2" stroke="#9d00ff" fill="none" opacity="0.7"/>
    <line x1="9" y1="14" x2="15" y2="14" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>

    <!-- Scan lines -->
    <line x1="8" y1="8" x2="16" y2="8" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="8" y1="10" x2="16" y2="10" stroke="#9d00ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="8" y1="12" x2="16" y2="12" stroke="#ff0080" stroke-width="0.5" opacity="0.3"/>
    <line x1="8" y1="14" x2="16" y2="14" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>

    <!-- Tech dots -->
    <circle cx="12" cy="4" r="1" fill="#00f0ff" opacity="0.8"/>
    <circle cx="4" cy="18" r="1" fill="#00f0ff" opacity="0.8"/>
    <circle cx="20" cy="18" r="1" fill="#ff0080" opacity="0.8"/>
  </g>
</svg>