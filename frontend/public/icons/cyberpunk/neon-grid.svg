<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <pattern id="grid-pattern" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#00f0ff"
            stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="grid-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="grid-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Grid -->
  <rect width="64" height="64" fill="url(#grid-pattern)" opacity="0.5"/>

  <!-- Perspective Lines -->
  <g stroke="url(#grid-gradient)" stroke-width="1" opacity="0.6">
    <!-- Horizontal lines with perspective -->
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>

    <!-- Vertical lines with perspective -->
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
  </g>

  <!-- Intersection Points -->
  <g fill="#00f0ff" filter="url(#grid-glow)">
    <circle cx="16" cy="16" r="1.5"/>
    <circle cx="32" cy="16" r="1.5"/>
    <circle cx="48" cy="16" r="1.5"/>
    <circle cx="16" cy="32" r="1.5"/>
    <circle cx="32" cy="32" r="2"/>
    <circle cx="48" cy="32" r="1.5"/>
    <circle cx="16" cy="48" r="1.5"/>
    <circle cx="32" cy="48" r="1.5"/>
    <circle cx="48" cy="48" r="1.5"/>
  </g>

  <!-- Animated Pulse -->
  <circle cx="32" cy="32" r="2" fill="#9d00ff" opacity="0.8">
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
