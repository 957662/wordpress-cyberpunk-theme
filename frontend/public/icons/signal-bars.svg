<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="signalGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g>
    <!-- Bar 1 -->
    <rect x="4" y="16" width="3" height="4" rx="0.5" fill="url(#signalGrad)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
    </rect>
    <!-- Bar 2 -->
    <rect x="9" y="12" width="3" height="8" rx="0.5" fill="url(#signalGrad)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <!-- Bar 3 -->
    <rect x="14" y="8" width="3" height="12" rx="0.5" fill="url(#signalGrad)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <!-- Bar 4 -->
    <rect x="19" y="4" width="3" height="16" rx="0.5" fill="url(#signalGrad)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
  </g>
</svg>