<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#9d00ff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Eye outer frame -->
  <g filter="url(#neonGlow)">
    <circle cx="12" cy="12" r="10" stroke="#00f0ff" stroke-width="1.5" fill="none"/>
    <circle cx="12" cy="12" r="9" stroke="#9d00ff" stroke-width="0.5" fill="none" opacity="0.5">
      <animate attributeName="r" values="9;9.5;9" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Iris -->
  <circle cx="12" cy="12" r="6" fill="url(#eyeGlow)" filter="url(#neonGlow)">
    <animate attributeName="r" values="6;6.5;6" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Pupil -->
  <circle cx="12" cy="12" r="3" fill="#ff0080" filter="url(#neonGlow)">
    <animate attributeName="r" values="3;3.5;3" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Highlight -->
  <circle cx="10" cy="10" r="1.5" fill="#ffffff" opacity="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Scanning lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.4">
    <line x1="3" y1="12" x2="21" y2="12">
      <animate attributeName="y1" values="6;12;18;12;6" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="6;12;18;12;6" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0.6;0" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Circuit connections -->
  <g stroke="#9d00ff" stroke-width="0.5" fill="none" opacity="0.3">
    <path d="M 2 12 L 2 8 L 6 8"/>
    <path d="M 22 12 L 22 16 L 18 16"/>
    <path d="M 2 12 L 2 16 L 6 16"/>
    <path d="M 22 12 L 22 8 L 18 8"/>
  </g>

  <!-- Connection nodes -->
  <g fill="#00f0ff" filter="url(#neonGlow)">
    <circle cx="6" cy="8" r="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="8" r="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="6" cy="16" r="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="16" r="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Targeting markers -->
  <g stroke="#ff0080" stroke-width="0.5" fill="none" opacity="0.6">
    <!-- Top -->
    <path d="M 12 2 L 12 4">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Bottom -->
    <path d="M 12 20 L 12 22">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Left -->
    <path d="M 2 12 L 4 12">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Right -->
    <path d="M 20 12 L 22 12">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Rotating elements -->
  <g stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.4">
    <circle cx="12" cy="12" r="11" stroke-dasharray="1 2">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="20s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>