<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="search-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
    <filter id="search-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Search Circle -->
  <circle cx="11" cy="11" r="7"
          stroke="url(#search-gradient)"
          stroke-width="2"
          filter="url(#search-glow)"/>

  <!-- Search Handle -->
  <line x1="16" y1="16" x2="21" y2="21"
        stroke="url(#search-gradient)"
        stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Scanning Effect -->
  <line x1="6" y1="11" x2="16" y2="11"
        stroke="#00f0ff"
        stroke-width="1"
        opacity="0.5">
    <animate attributeName="y2" values="11;15;11" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- Scan Dots -->
  <circle cx="11" cy="11" r="1" fill="#9d00ff">
    <animate attributeName="r" values="1;1.5;1" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner Brackets -->
  <path d="M4 8V6h2M18 6h2v2M20 16v2h-2M6 18H4v-2"
        stroke="#ff0080"
        stroke-width="1"
        fill="none"
        opacity="0.6"/>
</svg>
