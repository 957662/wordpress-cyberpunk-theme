<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="quantum-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="quantum-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ff00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g filter="url(#quantum-glow)">
    <circle cx="12" cy="12" r="1.5" fill="#f0ff00"/>
    <circle cx="12" cy="12" r="6" stroke="url(#quantum-gradient)" stroke-width="2" fill="none" stroke-dasharray="2 2" opacity="0.8"/>
    <circle cx="12" cy="12" r="9" stroke="url(#quantum-gradient)" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M12 3 L12 5" stroke="url(#quantum-gradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M12 19 L12 21" stroke="url(#quantum-gradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M3 12 L5 12" stroke="url(#quantum-gradient)" stroke-width="2" stroke-linecap="round"/>
    <path d="M19 12 L21 12" stroke="url(#quantum-gradient)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>