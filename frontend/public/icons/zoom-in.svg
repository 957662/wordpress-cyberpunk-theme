<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="zoomInGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="zoomInGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g filter="url(#zoomInGlow)">
    <circle cx="11" cy="11" r="8" stroke="url(#zoomInGradient)" stroke-width="2" fill="none"/>
    <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="url(#zoomInGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="11" y1="8" x2="11" y2="14" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="11" x2="14" y2="11" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>

    <!-- Inner ring -->
    <circle cx="11" cy="11" r="5" stroke="#9d00ff" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- Tech dots -->
    <circle cx="11" cy="8" r="1" fill="#00f0ff" opacity="0.8"/>
    <circle cx="11" cy="14" r="1" fill="#00f0ff" opacity="0.8"/>
    <circle cx="8" cy="11" r="1" fill="#00f0ff" opacity="0.8"/>
    <circle cx="14" cy="11" r="1" fill="#00f0ff" opacity="0.8"/>
  </g>
</svg>