<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g filter="url(#neonGlow)">
    <!-- Shield Frame -->
    <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" stroke="url(#shieldGradient)" fill="none"/>

    <!-- Lock Symbol -->
    <rect x="9" y="11" width="6" height="5" rx="1" stroke="#00f0ff" fill="none"/>
    <path d="M10 11V9a2 2 0 0 1 4 0v2" stroke="#9d00ff"/>

    <!-- Lock Body -->
    <circle cx="12" cy="13.5" r="1" fill="#ff0080">
      <animate attributeName="r" values="1;1.2;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Security Scanning Line -->
    <line x1="5" y1="10" x2="19" y2="10" stroke="#00f0ff" opacity="0.3">
      <animate attributeName="y1" values="8;16;8" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="8;16;8" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>