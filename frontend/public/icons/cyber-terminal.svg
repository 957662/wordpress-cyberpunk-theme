<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="terminal-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="terminal-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
  </defs>

  <!-- Terminal Window -->
  <rect x="2" y="3" width="20" height="14" rx="2"
        stroke="url(#terminal-gradient)"
        stroke-width="2"
        fill="rgba(0,240,255,0.02)"
        filter="url(#terminal-glow)"/>

  <!-- Title Bar -->
  <rect x="2" y="3" width="20" height="4" rx="2"
        fill="rgba(157,0,255,0.1)"/>
  <line x1="2" y1="7" x2="22" y2="7" stroke="#9d00ff" stroke-width="0.5"/>

  <!-- Window Controls -->
  <circle cx="5" cy="5" r="1" fill="#ff0080"/>
  <circle cx="8" cy="5" r="1" fill="#f0ff00"/>
  <circle cx="11" cy="5" r="1" fill="#00f0ff"/>

  <!-- Terminal Prompt -->
  <path d="M6 11l3 3-3 3" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="11" y1="17" x2="18" y2="17" stroke="#00f0ff" stroke-width="2" stroke-linecap="round">
    <animate attributeName="x2" values="11;18;11" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- Blinking Cursor -->
  <rect x="19" y="15.5" width="1.5" height="3" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Terminal Bottom -->
  <rect x="2" y="19" width="20" height="2" fill="rgba(0,240,255,0.2)"/>
  <line x1="2" y1="19" x2="22" y2="19" stroke="#00f0ff" stroke-width="1"/>
</svg>
