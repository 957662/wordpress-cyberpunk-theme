<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="muteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
    <filter id="muteGlow">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Speaker Body -->
  <polygon points="3,9 3,15 8,15 14,20 14,4 8,9" fill="url(#muteGradient)" opacity="0.5" filter="url(#muteGlow)"/>

  <!-- Mute X -->
  <line x1="18" y1="6" x2="22" y2="18" stroke="url(#muteGradient)" stroke-width="2.5" stroke-linecap="round" filter="url(#muteGlow)"/>
  <line x1="22" y1="6" x2="18" y2="18" stroke="url(#muteGradient)" stroke-width="2.5" stroke-linecap="round" filter="url(#muteGlow)"/>
</svg>
