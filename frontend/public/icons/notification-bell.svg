<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g>
    <!-- Bell body -->
    <path d="M12 2C10.3 2 9 3.3 9 5V9C9 10.7 7.3 12 6 12V14H18V12C16.7 12 15 10.7 15 9V5C15 3.3 13.7 2 12 2Z"
          stroke="url(#bellGrad)" stroke-width="1.5" fill="none"/>
    <!-- Bell clapper -->
    <path d="M12 14V16" stroke="#9d00ff" stroke-width="1.5"/>
    <circle cx="12" cy="17" r="1.5" fill="#9d00ff"/>
    <!-- Notification badge -->
    <circle cx="18" cy="6" r="5" fill="#ff0080"/>
    <text x="18" y="7" fill="white" font-size="6" text-anchor="middle" font-weight="bold">3</text>
    <!-- Ring animation -->
    <circle cx="18" cy="6" r="6" stroke="#ff0080" stroke-width="1" fill="none" opacity="0.5">
      <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>