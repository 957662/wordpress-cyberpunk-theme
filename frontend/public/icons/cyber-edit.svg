<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="edit-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>
  </defs>

  <!-- Pen Body -->
  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
        stroke="#9d00ff"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="rgba(157,0,255,0.05)"/>

  <!-- Pen Tip -->
  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
        stroke="url(#edit-gradient)"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="rgba(0,240,255,0.1)"/>

  <!-- Writing Effect -->
  <path d="M12 15l-2 2" stroke="#00f0ff" stroke-width="1" opacity="0.5">
    <animate attributeName="d" values="M12 15l-2 2;M12 15l-1 1;M12 15l-2 2" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Sparkle -->
  <circle cx="18.5" cy="2.5" r="1" fill="#f0ff00">
    <animate attributeName="r" values="1;1.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
