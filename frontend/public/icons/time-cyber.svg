<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="timeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g>
    <!-- Clock face -->
    <circle cx="12" cy="12" r="9" stroke="url(#timeGrad)" stroke-width="2" fill="none"/>
    <!-- Hour markers -->
    <g stroke="#00f0ff" stroke-width="1">
      <line x1="12" y1="3" x2="12" y2="4"/>
      <line x1="12" y1="20" x2="12" y2="21"/>
      <line x1="3" y1="12" x2="4" y2="12"/>
      <line x1="20" y1="12" x2="21" y2="12"/>
    </g>
    <!-- Hour hand -->
    <line x1="12" y1="12" x2="12" y2="7" stroke="#9d00ff" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="12s" repeatCount="indefinite"/>
    </line>
    <!-- Minute hand -->
    <line x1="12" y1="12" x2="16" y2="12" stroke="#00f0ff" stroke-width="1.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="60s" repeatCount="indefinite"/>
    </line>
    <!-- Center dot -->
    <circle cx="12" cy="12" r="1.5" fill="#00f0ff"/>
    <!-- Digital decoration -->
    <text x="12" y="17" font-size="4" fill="#ff0080" text-anchor="middle" font-family="monospace">00:00</text>
  </g>
</svg>