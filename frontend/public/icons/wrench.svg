<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wrenchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="wrenchGlow">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wrench Head -->
  <circle cx="7" cy="7" r="5" stroke="url(#wrenchGradient)" stroke-width="2" fill="none" filter="url(#wrenchGlow)"/>

  <!-- Wrench Handle -->
  <rect x="8" y="8" width="3" height="14" rx="1.5" transform="rotate(45 9.5 15)" fill="url(#wrenchGradient)" filter="url(#wrenchGlow)"/>

  <!-- Opening -->
  <circle cx="7" cy="7" r="2" stroke="url(#wrenchGradient)" stroke-width="1.5" fill="none" filter="url(#wrenchGlow)"/>
</svg>
