<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="holo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="holo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <g filter="url(#holo-glow)">
    <ellipse cx="12" cy="18" rx="8" ry="2" stroke="url(#holo-gradient)" stroke-width="2" fill="none"/>
    <ellipse cx="12" cy="14" rx="8" ry="2" stroke="url(#holo-gradient)" stroke-width="2" fill="none"/>
    <ellipse cx="12" cy="10" rx="8" ry="2" stroke="url(#holo-gradient)" stroke-width="2" fill="none"/>
    <ellipse cx="12" cy="6" rx="8" ry="2" stroke="url(#holo-gradient)" stroke-width="2" fill="none"/>
    <line x1="4" y1="6" x2="4" y2="18" stroke="url(#holo-gradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="4" x2="12" y2="8" stroke="url(#holo-gradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="6" x2="20" y2="18" stroke="url(#holo-gradient)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>