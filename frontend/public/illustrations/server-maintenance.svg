<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a0aa;stop-opacity:1" />
    </linearGradient>
    <filter id="serverGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#0a0a0f"/>

  <!-- Server rack -->
  <g transform="translate(100, 50)" filter="url(#serverGlow)">
    <!-- Server unit 1 -->
    <rect x="0" y="0" width="200" height="40" rx="3" fill="#16162a" stroke="url(#serverGrad)" stroke-width="2"/>
    <circle cx="20" cy="20" r="5" fill="#00ff88"/>
    <circle cx="35" cy="20" r="5" fill="#00f0ff"/>
    <circle cx="50" cy="20" r="5" fill="#00f0ff" opacity="0.3"/>
    <rect x="70" y="15" width="120" height="10" rx="2" fill="#2a2a4a"/>

    <!-- Server unit 2 -->
    <rect x="0" y="50" width="200" height="40" rx="3" fill="#16162a" stroke="url(#serverGrad)" stroke-width="2"/>
    <circle cx="20" cy="70" r="5" fill="#00ff88"/>
    <circle cx="35" cy="70" r="5" fill="#00f0ff"/>
    <circle cx="50" cy="70" r="5" fill="#00f0ff" opacity="0.3"/>
    <rect x="70" y="65" width="120" height="10" rx="2" fill="#2a2a4a"/>

    <!-- Server unit 3 (maintenance) -->
    <rect x="0" y="100" width="200" height="40" rx="3" fill="#16162a" stroke="#ff0080" stroke-width="2"/>
    <circle cx="20" cy="120" r="5" fill="#ff0080">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="120" r="5" fill="#ff0080" opacity="0.3">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="120" r="5" fill="#ff0080" opacity="0.3"/>
    <rect x="70" y="115" width="100" height="10" rx="2" fill="#2a2a4a"/>

    <!-- Gear icon on server 3 -->
    <g transform="translate(175, 120)">
      <circle r="8" fill="none" stroke="#ff0080" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Server unit 4 -->
    <rect x="0" y="150" width="200" height="40" rx="3" fill="#16162a" stroke="url(#serverGrad)" stroke-width="2"/>
    <circle cx="20" cy="170" r="5" fill="#00ff88"/>
    <circle cx="35" cy="170" r="5" fill="#00f0ff"/>
    <circle cx="50" cy="170" r="5" fill="#00f0ff" opacity="0.3"/>
    <rect x="70" y="165" width="120" height="10" rx="2" fill="#2a2a4a"/>
  </g>

  <!-- Text -->
  <text x="200" y="260" font-family="Arial, sans-serif" font-size="18" fill="#ff0080" text-anchor="middle" filter="url(#serverGlow)">Under Maintenance</text>
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0" text-anchor="middle">We'll be back online soon</text>
</svg>
