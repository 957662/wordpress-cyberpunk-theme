<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="coding-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#9d00ff"/>
      <stop offset="100%" style="stop-color:#ff0080"/>
    </linearGradient>
    <filter id="coding-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Monitor Frame -->
  <rect x="50" y="30" width="300" height="200" rx="10"
        stroke="url(#coding-gradient)"
        stroke-width="3"
        fill="rgba(0,240,255,0.02)"
        filter="url(#coding-glow)"/>

  <!-- Monitor Stand -->
  <rect x="180" y="230" width="40" height="30" fill="url(#coding-gradient)" opacity="0.6"/>
  <rect x="150" y="260" width="100" height="10" rx="5" fill="url(#coding-gradient)" opacity="0.4"/>

  <!-- Screen Content -->
  <rect x="70" y="50" width="260" height="160" fill="rgba(157,0,255,0.05)"/>

  <!-- Code Lines -->
  <!-- Line 1 - Import Statement -->
  <rect x="85" y="70" width="40" height="8" fill="#9d00ff" opacity="0.8"/>
  <rect x="130" y="70" width="60" height="8" fill="#00f0ff" opacity="0.6"/>
  <rect x="195" y="70" width="30" height="8" fill="#ff0080" opacity="0.6"/>

  <!-- Line 2 - Function Declaration -->
  <rect x="85" y="90" width="50" height="8" fill="#f0ff00" opacity="0.8"/>
  <rect x="140" y="90" width="80" height="8" fill="#00f0ff" opacity="0.6"/>
  <rect x="225" y="90" width="10" height="8" fill="#9d00ff" opacity="0.8"/>

  <!-- Line 3 - Indented Code -->
  <rect x="100" y="110" width="60" height="8" fill="#00f0ff" opacity="0.6"/>
  <rect x="165" y="110" width="40" height="8" fill="#ff0080" opacity="0.6"/>
  <rect x="210" y="110" width="20" height="8" fill="#9d00ff" opacity="0.8"/>

  <!-- Line 4 - More Code -->
  <rect x="100" y="130" width="30" height="8" fill="#00f0ff" opacity="0.6"/>
  <rect x="135" y="130" width="70" height="8" fill="#f0ff00" opacity="0.6"/>

  <!-- Line 5 - Closing -->
  <rect x="85" y="150" width="10" height="8" fill="#9d00ff" opacity="0.8"/>

  <!-- Blinking Cursor -->
  <rect x="85" y="170" width="8" height="12" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Syntax Highlighting Glow -->
  <circle cx="110" cy="74" r="5" fill="#9d00ff" opacity="0.3">
    <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="94" r="5" fill="#f0ff00" opacity="0.3">
    <animate attributeName="r" values="5;8;5" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating Code Symbols -->
  <text x="280" y="190" font-family="monospace" font-size="14" fill="#00f0ff" opacity="0.4">{ }</text>
  <text x="295" y="195" font-family="monospace" font-size="12" fill="#9d00ff" opacity="0.4">&lt;/&gt;</text>

  <!-- Window Controls -->
  <circle cx="70" cy="40" r="5" fill="#ff0080"/>
  <circle cx="85" cy="40" r="5" fill="#f0ff00"/>
  <circle cx="100" cy="40" r="5" fill="#00f0ff"/>
</svg>
