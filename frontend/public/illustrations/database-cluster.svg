<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="dbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Connection Lines -->
  <g stroke="url(#dbGrad)" stroke-width="1.5" opacity="0.6">
    <line x1="100" y1="200" x2="200" y2="200" />
    <line x1="300" y1="200" x2="200" y2="200" />
    <line x1="200" y1="200" x2="200" y2="100" />
    <line x1="200" y1="200" x2="200" y2="300" />
  </g>

  <!-- Central Hub -->
  <g filter="url(#dbGlow)">
    <circle cx="200" cy="200" r="40" fill="rgba(157,0,255,0.1)"
            stroke="url(#dbGrad)" stroke-width="2" />
    <circle cx="200" cy="200" r="25" fill="rgba(157,0,255,0.2)" />
    <circle cx="200" cy="200" r="10" fill="#9d00ff" />
    <circle cx="200" cy="200" r="4" fill="#00f0ff" />
  </g>

  <!-- Database 1 - Top -->
  <g filter="url(#dbGlow)">
    <ellipse cx="200" cy="80" rx="35" ry="12" fill="rgba(0,240,255,0.1)"
             stroke="url(#dbGrad)" stroke-width="2" />
    <path d="M165 80 v40 a35 12 0 0 0 70 0 v-40" fill="rgba(0,240,255,0.1)"
          stroke="url(#dbGrad)" stroke-width="2" />
    <ellipse cx="200" cy="120" rx="35" ry="12" fill="rgba(0,240,255,0.2)"
             stroke="url(#dbGrad)" stroke-width="1.5" />
  </g>

  <!-- Database 2 - Left -->
  <g filter="url(#dbGlow)">
    <ellipse cx="80" cy="180" rx="30" ry="10" fill="rgba(0,240,255,0.1)"
             stroke="url(#dbGrad)" stroke-width="2" />
    <path d="M50 180 v40 a30 10 0 0 0 60 0 v-40" fill="rgba(0,240,255,0.1)"
          stroke="url(#dbGrad)" stroke-width="2" />
    <ellipse cx="80" cy="220" rx="30" ry="10" fill="rgba(0,240,255,0.2)"
             stroke="url(#dbGrad)" stroke-width="1.5" />
  </g>

  <!-- Database 3 - Right -->
  <g filter="url(#dbGlow)">
    <ellipse cx="320" cy="180" rx="30" ry="10" fill="rgba(0,240,255,0.1)"
             stroke="url(#dbGrad)" stroke-width="2" />
    <path d="M290 180 v40 a30 10 0 0 0 60 0 v-40" fill="rgba(0,240,255,0.1)"
          stroke="url(#dbGrad)" stroke-width="2" />
    <ellipse cx="320" cy="220" rx="30" ry="10" fill="rgba(0,240,255,0.2)"
             stroke="url(#dbGrad)" stroke-width="1.5" />
  </g>

  <!-- Database 4 - Bottom -->
  <g filter="url(#dbGlow)">
    <ellipse cx="200" cy="300" rx="35" ry="12" fill="rgba(0,240,255,0.1)"
             stroke="url(#dbGrad)" stroke-width="2" />
    <path d="M165 300 v40 a35 12 0 0 0 70 0 v-40" fill="rgba(0,240,255,0.1)"
          stroke="url(#dbGrad)" stroke-width="2" />
    <ellipse cx="200" cy="340" rx="35" ry="12" fill="rgba(0,240,255,0.2)"
             stroke="url(#dbGrad)" stroke-width="1.5" />
  </g>

  <!-- Data Flow Indicators -->
  <g fill="#00f0ff">
    <circle cx="200" cy="150" r="3" />
    <circle cx="120" cy="200" r="3" />
    <circle cx="280" cy="200" r="3" />
    <circle cx="200" cy="250" r="3" />
  </g>

  <!-- Connection Points -->
  <g fill="#9d00ff" filter="url(#dbGlow)">
    <circle cx="200" cy="130" r="4" />
    <circle cx="110" cy="200" r="4" />
    <circle cx="290" cy="200" r="4" />
    <circle cx="200" cy="270" r="4" />
  </g>

  <!-- Labels -->
  <g fill="#00f0ff" font-family="monospace" font-size="10" opacity="0.7">
    <text x="200" y="55" text-anchor="middle">PRIMARY</text>
    <text x="80" y="170" text-anchor="middle">REPLICA 1</text>
    <text x="320" y="170" text-anchor="middle">REPLICA 2</text>
    <text x="200" y="375" text-anchor="middle">BACKUP</text>
  </g>
</svg>
