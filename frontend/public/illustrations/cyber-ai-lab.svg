<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="aiLabGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="aiLabGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Hexagon Frame -->
  <polygon points="200,30 360,120 360,280 200,370 40,280 40,120"
           fill="none" stroke="url(#aiLabGrad)" stroke-width="1"
           opacity="0.3" />

  <!-- Lab Table -->
  <rect x="100" y="280" width="200" height="10" fill="rgba(0,240,255,0.1)"
        stroke="url(#aiLabGrad)" stroke-width="1" />

  <!-- Central AI Core -->
  <g filter="url(#aiLabGlow)">
    <circle cx="200" cy="200" r="60" fill="rgba(0,240,255,0.05)"
            stroke="url(#aiLabGrad)" stroke-width="2" />
    <circle cx="200" cy="200" r="40" fill="rgba(157,0,255,0.1)"
            stroke="url(#aiLabGrad)" stroke-width="1.5" />
    <circle cx="200" cy="200" r="20" fill="rgba(255,0,128,0.2)"
            stroke="url(#aiLabGrad)" stroke-width="1" />
    <circle cx="200" cy="200" r="8" fill="#ff0080" />
  </g>

  <!-- Data Streams -->
  <g stroke="url(#aiLabGrad)" stroke-width="1" opacity="0.6">
    <path d="M140 200 L200 200 L260 200" />
    <path d="M200 140 L200 200 L200 260" />
    <path d="M160 160 L200 200 L240 240" />
    <path d="M240 160 L200 200 L160 240" />
  </g>

  <!-- Floating Nodes -->
  <g fill="#00f0ff" filter="url(#aiLabGlow)">
    <circle cx="140" cy="200" r="5" />
    <circle cx="260" cy="200" r="5" />
    <circle cx="200" cy="140" r="5" />
    <circle cx="200" cy="260" r="5" />
    <circle cx="160" cy="160" r="3" />
    <circle cx="240" cy="160" r="3" />
    <circle cx="160" cy="240" r="3" />
    <circle cx="240" cy="240" r="3" />
  </g>

  <!-- Holographic Display -->
  <g filter="url(#aiLabGlow)">
    <rect x="80" y="80" width="100" height="80" fill="rgba(0,240,255,0.05)"
          stroke="url(#aiLabGrad)" stroke-width="1" rx="5" />
    <line x1="90" y1="100" x2="170" y2="100" stroke="url(#aiLabGrad)" stroke-width="0.5" opacity="0.5"/>
    <line x1="90" y1="120" x2="170" y2="120" stroke="url(#aiLabGrad)" stroke-width="0.5" opacity="0.5"/>
    <line x1="90" y1="140" x2="150" y2="140" stroke="url(#aiLabGrad)" stroke-width="0.5" opacity="0.5"/>
    <circle cx="160" cy="130" r="15" fill="none" stroke="url(#aiLabGrad)" stroke-width="1" />
  </g>

  <!-- Code Panel -->
  <g filter="url(#aiLabGlow)">
    <rect x="220" y="80" width="100" height="80" fill="rgba(157,0,255,0.05)"
          stroke="url(#aiLabGrad)" stroke-width="1" rx="5" />
    <g fill="#9d00ff" font-family="monospace" font-size="8" opacity="0.7">
      <text x="230" y="100">AI.init()</text>
      <text x="230" y="115">.learn()</text>
      <text x="230" y="130">.train()</text>
      <text x="230" y="145">.deploy()</text>
    </g>
  </g>

  <!-- Tech Accents -->
  <g stroke="url(#aiLabGrad)" stroke-width="1" fill="none" opacity="0.4">
    <path d="M40 120 L30 110" />
    <path d="M360 120 L370 110" />
    <path d="M40 280 L30 290" />
    <path d="M360 280 L370 290" />
  </g>

  <!-- Status Indicators -->
  <g>
    <circle cx="100" cy="50" r="4" fill="#00ff88" filter="url(#aiLabGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="50" r="4" fill="#00f0ff" filter="url(#aiLabGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="300" cy="50" r="4" fill="#9d00ff" filter="url(#aiLabGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>

  <!-- Bottom Display -->
  <rect x="150" y="340" width="100" height="20" fill="rgba(0,240,255,0.1)"
        stroke="url(#aiLabGrad)" stroke-width="1" rx="3" />
  <text x="200" y="354" fill="#00f0ff" font-family="monospace" font-size="10"
        text-anchor="middle">AI LAB</text>
</svg>
