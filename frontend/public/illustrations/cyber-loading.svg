<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" width="400" height="300">
  <defs>
    <linearGradient id="loadingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="loadingGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background grid -->
  <g opacity="0.1">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#9d00ff" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#9d00ff" stroke-width="1"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#ff0080" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="300" stroke="#00f0ff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="300" stroke="#00f0ff" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="300" stroke="#9d00ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#9d00ff" stroke-width="1"/>
    <line x1="250" y1="0" x2="250" y2="300" stroke="#ff0080" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#ff0080" stroke-width="1"/>
    <line x1="350" y1="0" x2="350" y2="300" stroke="#00f0ff" stroke-width="1"/>
  </g>

  <!-- Central loading circle -->
  <g filter="url(#loadingGlow)">
    <circle cx="200" cy="130" r="50" stroke="url(#loadingGradient)" stroke-width="4" fill="none" opacity="0.3"/>
    <circle cx="200" cy="130" r="50" stroke="#00f0ff" stroke-width="4" fill="none" stroke-dasharray="220 314" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 200 130" to="360 200 130" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="130" r="40" stroke="#9d00ff" stroke-width="3" fill="none" opacity="0.5"/>
    <circle cx="200" cy="130" r="30" stroke="#ff0080" stroke-width="2" fill="none" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="360 200 130" to="0 200 130" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Data particles -->
  <g>
    <circle cx="200" cy="130" r="6" fill="#00f0ff" opacity="0.9" filter="url(#loadingGlow)">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="130" r="4" fill="#9d00ff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Loading bar -->
  <g filter="url(#loadingGlow)">
    <rect x="100" y="200" width="200" height="8" rx="4" stroke="#2a2a4a" stroke-width="2" fill="none"/>
    <rect x="100" y="200" width="200" height="8" rx="4" fill="url(#loadingGradient)" opacity="0.2">
      <animate attributeName="width" values="0;200;0" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Tech decorations -->
  <g>
    <rect x="90" y="198" width="8" height="12" fill="#00f0ff" opacity="0.7"/>
    <rect x="302" y="198" width="8" height="12" fill="#ff0080" opacity="0.7"/>
    <circle cx="100" cy="204" r="3" fill="#00f0ff" opacity="0.8" filter="url(#loadingGlow)"/>
    <circle cx="300" cy="204" r="3" fill="#ff0080" opacity="0.8" filter="url(#loadingGlow)"/>
  </g>

  <!-- Corner accents -->
  <g opacity="0.6">
    <path d="M 50 50 L 50 70 L 70 50" stroke="#00f0ff" stroke-width="2" fill="none"/>
    <path d="M 350 50 L 350 70 L 330 50" stroke="#ff0080" stroke-width="2" fill="none"/>
    <path d="M 50 250 L 50 230 L 70 250" stroke="#00f0ff" stroke-width="2" fill="none"/>
    <path d="M 350 250 L 350 230 L 330 250" stroke="#ff0080" stroke-width="2" fill="none"/>
  </g>

  <!-- Loading text -->
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="16" fill="#00f0ff" text-anchor="middle" opacity="0.8">
    Loading
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
  </text>
  <text x="235" y="270" font-family="Arial, sans-serif" font-size="16" fill="#9d00ff" opacity="0.8">
    .
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </text>
  <text x="245" y="270" font-family="Arial, sans-serif" font-size="16" fill="#ff0080" opacity="0.8">
    .
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.2s" repeatCount="indefinite"/>
  </text>
  <text x="255" y="270" font-family="Arial, sans-serif" font-size="16" fill="#00f0ff" opacity="0.8">
    .
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.4s" repeatCount="indefinite"/>
  </text>
</svg>