<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0f"/>

  <!-- Definitions -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff0080" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkRedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Grid Background -->
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- Central Lock Icon -->
  <g transform="translate(400, 250)">
    <!-- Outer Circle -->
    <circle cx="0" cy="0" r="160" stroke="url(#redGradient)" stroke-width="3" fill="rgba(255, 0, 128, 0.05)">
      <animate attributeName="r" values="160;165;160" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Middle Circle -->
    <circle cx="0" cy="0" r="120" stroke="#ff0080" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Lock Body -->
    <rect x="-60" y="-20" width="120" height="100" rx="10" stroke="url(#redGradient)" stroke-width="3" fill="rgba(255, 0, 128, 0.1)"/>

    <!-- Lock Shackle -->
    <path d="M-35 -20 L-35 -60 A35 35 0 0 1 35 -60 L35 -20" stroke="url(#redGradient)" stroke-width="6" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Keyhole -->
    <circle cx="0" cy="20" r="15" fill="#ff0080" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <rect x="-6" y="20" width="12" height="30" rx="2" fill="#ff0080" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
    </rect>

    <!-- X Mark (Banned) -->
    <g stroke="#ff0080" stroke-width="8" stroke-linecap="round" opacity="0.3">
      <line x1="-100" y1="-100" x2="100" y2="100">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="100" y1="-100" x2="-100" y2="100">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>

  <!-- Warning Symbols -->
  <g transform="translate(150, 150)" opacity="0.6">
    <path d="M0 -30 L26 15 L-26 15 Z" stroke="#ff6600" stroke-width="2" fill="rgba(255, 102, 0, 0.1)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <text x="0" y="5" text-anchor="middle" fill="#ff6600" font-family="Arial" font-size="20" font-weight="bold">!</text>
  </g>

  <g transform="translate(650, 150)" opacity="0.6">
    <path d="M0 -30 L26 15 L-26 15 Z" stroke="#ff6600" stroke-width="2" fill="rgba(255, 102, 0, 0.1)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <text x="0" y="5" text-anchor="middle" fill="#ff6600" font-family="Arial" font-size="20" font-weight="bold">!</text>
  </g>

  <g transform="translate(150, 450)" opacity="0.6">
    <path d="M0 -30 L26 15 L-26 15 Z" stroke="#ff6600" stroke-width="2" fill="rgba(255, 102, 0, 0.1)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="1s" repeatCount="indefinite"/>
    </path>
    <text x="0" y="5" text-anchor="middle" fill="#ff6600" font-family="Arial" font-size="20" font-weight="bold">!</text>
  </g>

  <g transform="translate(650, 450)" opacity="0.6">
    <path d="M0 -30 L26 15 L-26 15 Z" stroke="#ff6600" stroke-width="2" fill="rgba(255, 102, 0, 0.1)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </path>
    <text x="0" y="5" text-anchor="middle" fill="#ff6600" font-family="Arial" font-size="20" font-weight="bold">!</text>
  </g>

  <!-- Circuit Lines -->
  <g stroke="url(#redGradient)" stroke-width="1.5" opacity="0.4">
    <path d="M-100 100 L-100 130 L-60 130" transform="translate(400, 250)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M100 100 L100 130 L60 130" transform="translate(400, 250)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Corner Brackets (Aggressive) -->
  <g stroke="url(#redGradient)" stroke-width="3" fill="none">
    <path d="M20 120 L20 20 L120 20">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M780 120 L780 20 L680 20">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </path>
    <path d="M20 480 L20 580 L120 580">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </path>
    <path d="M780 480 L780 580 L680 580">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Glitch Effects -->
  <g opacity="0.3">
    <rect x="100" y="100" width="50" height="2" fill="#ff0080">
      <animate attributeName="x" values="100;700;100" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="0.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="600" y="300" width="80" height="2" fill="#ff6600">
      <animate attributeName="x" values="600;200;600" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="0.15s" repeatCount="indefinite"/>
    </rect>
    <rect x="300" y="500" width="60" height="2" fill="#ff0080">
      <animate attributeName="x" values="300;500;300" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Text Section -->
  <g transform="translate(400, 500)" text-anchor="middle">
    <text x="0" y="0" fill="url(#redGradient)" font-family="Orbitron, sans-serif" font-size="42" font-weight="bold" letter-spacing="4" filter="url(#glow)">
      ACCESS FORBIDDEN
      <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
    </text>
    <text x="0" y="40" fill="#ff6600" font-family="Inter, sans-serif" font-size="16" opacity="0.8">
      You don't have permission to view this resource
    </text>
  </g>

  <!-- Scanlines Overlay -->
  <rect width="800" height="600" fill="url(#grid)" opacity="0.03"/>
</svg>