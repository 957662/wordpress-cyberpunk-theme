<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 霓虹青发光滤镜 -->
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 赛博紫发光滤镜 -->
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 渐变 -->
    <linearGradient id="streamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- 背景轨道 -->
  <g stroke="#2a2a4a" stroke-width="1" fill="none">
    <!-- 水平数据线 -->
    <line x1="20" y1="50" x2="380" y2="50"/>
    <line x1="20" y1="100" x2="380" y2="100"/>
    <line x1="20" y1="150" x2="380" y2="150"/>
    <line x1="20" y1="200" x2="380" y2="200"/>
    <line x1="20" y1="250" x2="380" y2="250"/>
  </g>

  <!-- 数据包节点 -->
  <g filter="url(#glowCyan)">
    <!-- 轨道1的数据包 -->
    <rect x="50" y="45" width="30" height="10" rx="2" fill="#00f0ff" opacity="0.9">
      <animate attributeName="x" values="50;350;50" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- 轨道2的数据包 -->
    <rect x="100" y="95" width="40" height="10" rx="2" fill="#00f0ff" opacity="0.8">
      <animate attributeName="x" values="100;300;100" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>

    <!-- 轨道3的数据包 -->
    <rect x="30" y="145" width="50" height="10" rx="2" fill="#9d00ff" opacity="0.9" filter="url(#glowPurple)">
      <animate attributeName="x" values="30;370;30" dur="5s" repeatCount="indefinite" begin="1s"/>
    </rect>

    <!-- 轨道4的数据包 -->
    <rect x="80" y="195" width="35" height="10" rx="2" fill="#00f0ff" opacity="0.85">
      <animate attributeName="x" values="80;320;80" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
    </rect>

    <!-- 轨道5的数据包 -->
    <rect x="60" y="245" width="45" height="10" rx="2" fill="#9d00ff" opacity="0.9" filter="url(#glowPurple)">
      <animate attributeName="x" values="60;340;60" dur="4.5s" repeatCount="indefinite" begin="2s"/>
    </rect>
  </g>

  <!-- 数据流动效果 -->
  <g stroke="url(#streamGradient)" stroke-width="2" fill="none" opacity="0.6">
    <line x1="20" y1="50" x2="100" y2="50">
      <animate attributeName="x2" values="20;380;20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="100" x2="100" y2="100">
      <animate attributeName="x2" values="20;380;20" dur="2s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="150" x2="100" y2="150">
      <animate attributeName="x2" values="20;380;20" dur="2s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="200" x2="100" y2="200">
      <animate attributeName="x2" values="20;380;20" dur="2s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="250" x2="100" y2="250">
      <animate attributeName="x2" values="20;380;20" dur="2s" repeatCount="indefinite" begin="1.6s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- 数据粒子 -->
  <g fill="#00f0ff" filter="url(#glowCyan)">
    <!-- 粒子群1 -->
    <circle r="2" opacity="0.8">
      <animate attributeName="cx" values="20;380;20" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;50;50" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" opacity="0.8">
      <animate attributeName="cx" values="20;380;20" dur="3s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="cy" values="100;100;100" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" opacity="0.8">
      <animate attributeName="cx" values="20;380;20" dur="3s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="cy" values="150;150;150" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" opacity="0.8">
      <animate attributeName="cx" values="20;380;20" dur="3s" repeatCount="indefinite" begin="0.9s"/>
      <animate attributeName="cy" values="200;200;200" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" opacity="0.8">
      <animate attributeName="cx" values="20;380;20" dur="3s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="cy" values="250;250;250" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 垂直连接线 -->
  <g stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.3">
    <line x1="100" y1="50" x2="100" y2="250">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="50" x2="200" y2="250">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </line>
    <line x1="300" y1="50" x2="300" y2="250">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite" begin="1s"/>
    </line>
  </g>

  <!-- 数据交换点 -->
  <g fill="#f0ff00" filter="url(#glowPurple)">
    <circle cx="100" cy="50" r="3" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="150" r="4" opacity="1">
      <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="250" r="3" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
