<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <radialGradient id="quantumCoreGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0080" stop-opacity="1"/>
      <stop offset="50%" stop-color="#9d00ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.6"/>
    </radialGradient>

    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#9d00ff"/>
      <stop offset="100%" stop-color="#ff0080"/>
    </linearGradient>

    <!-- 发光滤镜 -->
    <filter id="quantumGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 背景渐变 -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0.95"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="600" height="400" fill="url(#bgGradient)"/>

  <!-- 网格背景 -->
  <g opacity="0.1">
    <defs>
      <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="600" height="400" fill="url(#gridPattern)"/>
  </g>

  <!-- 量子比特轨道系统 -->
  <g filter="url(#quantumGlow)">
    <!-- 外部轨道 -->
    <ellipse cx="300" cy="200" rx="200" ry="120" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0 300 200" to="360 300 200" dur="30s" repeatCount="indefinite"/>
    </ellipse>

    <!-- 中部轨道 -->
    <ellipse cx="300" cy="200" rx="150" ry="90" fill="none" stroke="#9d00ff" stroke-width="1.5" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="360 300 200" to="0 300 200" dur="25s" repeatCount="indefinite"/>
    </ellipse>

    <!-- 内部轨道 -->
    <ellipse cx="300" cy="200" rx="100" ry="60" fill="none" stroke="#ff0080" stroke-width="2" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0 300 200" to="-360 300 200" dur="20s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- 量子比特粒子 -->
  <g filter="url(#softGlow)">
    <!-- 外部粒子 -->
    <circle r="6" fill="#00f0ff">
      <animateMotion dur="30s" repeatCount="indefinite">
        <mpath href="#outerOrbit"/>
      </animateMotion>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- 中部粒子 -->
    <circle r="5" fill="#9d00ff">
      <animateMotion dur="25s" repeatCount="indefinite">
        <mpath href="#middleOrbit"/>
      </animateMotion>
      <animate attributeName="opacity" values="1;0.6;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- 内部粒子 -->
    <circle r="4" fill="#ff0080">
      <animateMotion dur="20s" repeatCount="indefinite">
        <mpath href="#innerOrbit"/>
      </animateMotion>
      <animate attributeName="opacity" values="1;0.7;1" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 轨道路径定义（用于动画） -->
  <defs>
    <ellipse id="outerOrbit" cx="300" cy="200" rx="200" ry="120"/>
    <ellipse id="middleOrbit" cx="300" cy="200" rx="150" ry="90"/>
    <ellipse id="innerOrbit" cx="300" cy="200" rx="100" ry="60"/>
  </defs>

  <!-- 中央量子核心 -->
  <g filter="url(#quantumGlow)">
    <!-- 核心光晕 -->
    <circle cx="300" cy="200" r="50" fill="url(#quantumCoreGradient)" opacity="0.3">
      <animate attributeName="r" values="40;50;40" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- 核心圆环 -->
    <circle cx="300" cy="200" r="35" fill="none" stroke="url(#orbitGradient)" stroke-width="2">
      <animate attributeName="r" values="35;38;35" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- 核心内部 -->
    <circle cx="300" cy="200" r="25" fill="#0a0a0f" stroke="#ff0080" stroke-width="1">
      <animate attributeName="stroke-opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>

    <!-- 量子态符号 -->
    <g fill="#00f0ff" opacity="0.8">
      <text x="295" y="205" font-family="serif" font-size="20" font-style="italic">|ψ⟩</text>
    </g>
  </g>

  <!-- 叠加态视觉效果 -->
  <g opacity="0.3">
    <circle cx="300" cy="200" r="60" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="5,5">
      <animate attributeName="r" values="60;70;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 纠缠效果线条 -->
  <g opacity="0.4" filter="url(#softGlow)">
    <!-- 上纠缠线 -->
    <path d="M300 140 Q 350 120 400 140" fill="none" stroke="#00f0ff" stroke-width="1">
      <animate attributeName="d" values="M300 140 Q 350 120 400 140;M300 140 Q 350 160 400 140;M300 140 Q 350 120 400 140" dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- 下纠缠线 -->
    <path d="M300 260 Q 250 280 200 260" fill="none" stroke="#ff0080" stroke-width="1">
      <animate attributeName="d" values="M300 260 Q 250 280 200 260;M300 260 Q 250 240 200 260;M300 260 Q 250 280 200 260" dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- 左纠缠线 -->
    <path d="M240 200 Q 220 150 240 100" fill="none" stroke="#9d00ff" stroke-width="1">
      <animate attributeName="d" values="M240 200 Q 220 150 240 100;M240 200 Q 260 150 240 100;M240 200 Q 220 150 240 100" dur="2.5s" repeatCount="indefinite"/>
    </path>

    <!-- 右纠缠线 -->
    <path d="M360 200 Q 380 250 360 300" fill="none" stroke="#00f0ff" stroke-width="1">
      <animate attributeName="d" values="M360 200 Q 380 250 360 300;M360 200 Q 340 250 360 300;M360 200 Q 380 250 360 300" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 装饰性量子门 -->
  <g opacity="0.5">
    <!-- H门 -->
    <rect x="100" y="100" width="30" height="30" fill="none" stroke="#9d00ff" stroke-width="1"/>
    <text x="108" y="120" fill="#9d00ff" font-family="monospace" font-size="14">H</text>

    <!-- X门 -->
    <rect x="470" y="270" width="30" height="30" fill="none" stroke="#00f0ff" stroke-width="1"/>
    <text x="478" y="290" fill="#00f0ff" font-family="monospace" font-size="14">X</text>

    <!-- CNOT门 -->
    <rect x="150" y="270" width="50" height="30" fill="none" stroke="#ff0080" stroke-width="1"/>
    <text x="158" y="290" fill="#ff0080" font-family="monospace" font-size="10">CNOT</text>
  </g>

  <!-- 量子干涉图案 -->
  <g opacity="0.2">
    <circle cx="300" cy="200" r="100" fill="none" stroke="url(#orbitGradient)" stroke-width="0.5">
      <animate attributeName="r" values="100;120;100" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 量子测量指示器 -->
  <g filter="url(#softGlow)">
    <circle cx="520" cy="100" r="15" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.6">
      <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="510" y="105" fill="#00ff88" font-family="monospace" font-size="12">|0⟩</text>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="80" cy="300" r="15" fill="none" stroke="#ff0080" stroke-width="2" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="70" y="305" fill="#ff0080" font-family="monospace" font-size="12">|1⟩</text>
  </g>

  <!-- 数据流装饰 -->
  <g opacity="0.3">
    <text x="20" y="380" fill="#00f0ff" font-family="monospace" font-size="10">QUANTUM STATE: SUPERPOSITION</text>
    <text x="420" y="30" fill="#9d00ff" font-family="monospace" font-size="10">ENTANGLEMENT: ACTIVE</text>
  </g>
</svg>