<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="aiGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
    <filter id="aiGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background hexagon -->
  <polygon points="200,40 340,120 340,280 200,360 60,280 60,120"
           fill="none" stroke="url(#aiGrad1)" stroke-width="1"
           opacity="0.3" />

  <!-- Central AI Core -->
  <circle cx="200" cy="200" r="80" fill="rgba(0,240,255,0.05)"
          stroke="url(#aiGrad1)" stroke-width="2" filter="url(#aiGlow)" />

  <!-- Neural Network Lines -->
  <g stroke="url(#aiGrad1)" stroke-width="1" opacity="0.6">
    <line x1="200" y1="120" x2="200" y2="200" />
    <line x1="200" y1="280" x2="200" y2="200" />
    <line x1="120" y1="200" x2="200" y2="200" />
    <line x1="280" y1="200" x2="200" y2="200" />
    <line x1="140" y1="140" x2="200" y2="200" />
    <line x1="260" y1="140" x2="200" y2="200" />
    <line x1="140" y1="260" x2="200" y2="200" />
    <line x1="260" y1="260" x2="200" y2="200" />
  </g>

  <!-- Neural Nodes -->
  <g fill="#00f0ff" filter="url(#strongGlow)">
    <circle cx="200" cy="120" r="6" />
    <circle cx="200" cy="280" r="6" />
    <circle cx="120" cy="200" r="6" />
    <circle cx="280" cy="200" r="6" />
    <circle cx="140" cy="140" r="4" />
    <circle cx="260" cy="140" r="4" />
    <circle cx="140" cy="260" r="4" />
    <circle cx="260" cy="260" r="4" />
  </g>

  <!-- Central Brain Symbol -->
  <g filter="url(#aiGlow)">
    <!-- Brain outline -->
    <path d="M170 200 Q170 170 200 170 Q230 170 230 200 Q230 230 200 230 Q170 230 170 200"
          fill="none" stroke="url(#aiGrad2)" stroke-width="2.5" />

    <!-- Brain inner circuit -->
    <path d="M185 190 L200 175 L215 190" stroke="url(#aiGrad2)" stroke-width="1.5" fill="none" />
    <path d="M185 210 L200 225 L215 210" stroke="url(#aiGrad2)" stroke-width="1.5" fill="none" />
    <circle cx="200" cy="200" r="8" fill="none" stroke="url(#aiGrad2)" stroke-width="1.5" />

    <!-- Central AI point -->
    <circle cx="200" cy="200" r="4" fill="#ff0080" />
  </g>

  <!-- Data Stream Particles -->
  <g fill="#00f0ff" opacity="0.8">
    <circle cx="100" cy="80" r="2" />
    <circle cx="300" cy="80" r="2" />
    <circle cx="80" cy="200" r="2" />
    <circle cx="320" cy="200" r="2" />
    <circle cx="100" cy="320" r="2" />
    <circle cx="300" cy="320" r="2" />
  </g>

  <!-- Corner Decorations -->
  <g stroke="url(#aiGrad1)" stroke-width="1" fill="none" opacity="0.5">
    <path d="M60 120 L60 60 L120 60" />
    <path d="M280 60 L340 60 L340 120" />
    <path d="M340 280 L340 340 L280 340" />
    <path d="M120 340 L60 340 L60 280" />
  </g>

  <!-- Binary Code Decoration -->
  <g fill="#00f0ff" font-family="monospace" font-size="10" opacity="0.4">
    <text x="80" y="100">01</text>
    <text x="310" y="100">10</text>
    <text x="80" y="300">11</text>
    <text x="310" y="300">00</text>
  </g>
</svg>
