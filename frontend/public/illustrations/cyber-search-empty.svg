<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" width="400" height="300">
  <defs>
    <linearGradient id="searchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="searchGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background grid -->
  <g opacity="0.1">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#00f0ff" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#9d00ff" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#9d00ff" stroke-width="1"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#ff0080" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="300" stroke="#00f0ff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="300" stroke="#00f0ff" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="300" stroke="#9d00ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#9d00ff" stroke-width="1"/>
    <line x1="250" y1="0" x2="250" y2="300" stroke="#ff0080" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#ff0080" stroke-width="1"/>
    <line x1="350" y1="0" x2="350" y2="300" stroke="#00f0ff" stroke-width="1"/>
  </g>

  <!-- Magnifying glass -->
  <g filter="url(#searchGlow)">
    <circle cx="200" cy="140" r="70" stroke="url(#searchGradient)" stroke-width="4" fill="none"/>
    <line x1="255" y1="195" x2="310" y2="250" stroke="url(#searchGradient)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="200" cy="140" r="55" stroke="#00f0ff" stroke-width="2" fill="none" opacity="0.5"/>
  </g>

  <!-- Search result fragments (empty) -->
  <g opacity="0.3">
    <rect x="80" y="60" width="40" height="6" rx="3" fill="#00f0ff"/>
    <rect x="280" y="60" width="40" height="6" rx="3" fill="#ff0080"/>
    <rect x="100" y="220" width="30" height="6" rx="3" fill="#9d00ff"/>
    <rect x="270" y="220" width="30" height="6" rx="3" fill="#00f0ff"/>
  </g>

  <!-- Question mark inside -->
  <g filter="url(#searchGlow)">
    <text x="200" y="160" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="url(#searchGradient)" text-anchor="middle">?</text>
  </g>

  <!-- Tech decorations -->
  <g>
    <circle cx="130" cy="140" r="5" fill="#00f0ff" opacity="0.7" filter="url(#searchGlow)"/>
    <circle cx="270" cy="140" r="5" fill="#ff0080" opacity="0.7" filter="url(#searchGlow)"/>
    <circle cx="200" cy="70" r="5" fill="#9d00ff" opacity="0.7" filter="url(#searchGlow)"/>
    <circle cx="200" cy="210" r="5" fill="#00f0ff" opacity="0.7" filter="url(#searchGlow)"/>
  </g>

  <!-- Circuit lines -->
  <g opacity="0.4">
    <path d="M 70 140 L 130 140" stroke="#00f0ff" stroke-width="2"/>
    <path d="M 270 140 L 330 140" stroke="#ff0080" stroke-width="2"/>
    <path d="M 200 70 L 200 50" stroke="#9d00ff" stroke-width="2"/>
    <path d="M 200 210 L 200 250" stroke="#00f0ff" stroke-width="2"/>
  </g>

  <!-- Text label -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="18" fill="#00f0ff" text-anchor="middle" opacity="0.8">No results found</text>
</svg>