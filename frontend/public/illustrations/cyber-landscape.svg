<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16162a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingGradient1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="buildingGradient2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="buildingGradient3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#skyGradient)"/>

  <!-- Grid Floor -->
  <g opacity="0.3">
    <line x1="0" y1="350" x2="800" y2="350" stroke="#00f0ff"/>
    <line x1="0" y1="370" x2="800" y2="370" stroke="#00f0ff"/>
    <line x1="0" y1="390" x2="800" y2="390" stroke="#00f0ff"/>
    <line x1="100" y1="350" x2="0" y2="400" stroke="#00f0ff"/>
    <line x1="300" y1="350" x2="200" y2="400" stroke="#00f0ff"/>
    <line x1="500" y1="350" x2="400" y2="400" stroke="#00f0ff"/>
    <line x1="700" y1="350" x2="600" y2="400" stroke="#00f0ff"/>
  </g>

  <!-- Background Buildings -->
  <g filter="url(#glow)">
    <!-- Building 1 -->
    <rect x="50" y="200" width="80" height="150" fill="url(#buildingGradient1)" opacity="0.3"/>
    <rect x="55" y="210" width="10" height="15" fill="#00f0ff" opacity="0.5"/>
    <rect x="70" y="210" width="10" height="15" fill="#00f0ff" opacity="0.5"/>
    <rect x="85" y="210" width="10" height="15" fill="#00f0ff" opacity="0.5"/>
    <rect x="100" y="210" width="10" height="15" fill="#00f0ff" opacity="0.5"/>
    <rect x="115" y="210" width="10" height="15" fill="#00f0ff" opacity="0.5"/>

    <!-- Building 2 - Tall -->
    <rect x="200" y="150" width="100" height="200" fill="url(#buildingGradient2)" opacity="0.4"/>
    <rect x="210" y="160" width="15" height="20" fill="#9d00ff" opacity="0.5"/>
    <rect x="235" y="160" width="15" height="20" fill="#9d00ff" opacity="0.5"/>
    <rect x="260" y="160" width="15" height="20" fill="#9d00ff" opacity="0.5"/>
    <line x1="250" y1="120" x2="250" y2="150" stroke="#9d00ff" stroke-width="3"/>
    <circle cx="250" cy="115" r="5" fill="#ff0080" filter="url(#strongGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Building 3 -->
    <rect x="400" y="180" width="90" height="170" fill="url(#buildingGradient3)" opacity="0.3"/>
    <rect x="410" y="190" width="12" height="18" fill="#ff0080" opacity="0.5"/>
    <rect x="430" y="190" width="12" height="18" fill="#ff0080" opacity="0.5"/>
    <rect x="450" y="190" width="12" height="18" fill="#ff0080" opacity="0.5"/>
    <rect x="470" y="190" width="12" height="18" fill="#ff0080" opacity="0.5"/>

    <!-- Building 4 -->
    <rect x="600" y="160" width="120" height="190" fill="url(#buildingGradient1)" opacity="0.35"/>
    <rect x="615" y="170" width="18" height="22" fill="#00f0ff" opacity="0.5"/>
    <rect x="645" y="170" width="18" height="22" fill="#00f0ff" opacity="0.5"/>
    <rect x="675" y="170" width="18" height="22" fill="#00f0ff" opacity="0.5"/>
    <rect x="705" y="170" width="18" height="22" fill="#00f0ff" opacity="0.5"/>
  </g>

  <!-- Flying Vehicles -->
  <g filter="url(#glow)">
    <ellipse cx="350" cy="100" rx="30" ry="8" fill="#00f0ff" opacity="0.6">
      <animate attributeName="cx" values="-50;850;-50" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="550" cy="130" rx="25" ry="6" fill="#9d00ff" opacity="0.5">
      <animate attributeName="cx" values="850;-50;850" dur="25s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Neon Signs -->
  <g filter="url(#strongGlow)">
    <text x="100" y="300" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00f0ff" opacity="0.7">CYBER</text>
    <text x="450" y="280" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff0080" opacity="0.6">PRESS</text>
  </g>

  <!-- Data Streams -->
  <g opacity="0.4">
    <line x1="100" y1="0" x2="100" y2="400" stroke="#00f0ff" stroke-dasharray="5,10">
      <animate attributeName="stroke-dashoffset" values="0;-30" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#9d00ff" stroke-dasharray="5,10">
      <animate attributeName="stroke-dashoffset" values="0;-30" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#ff0080" stroke-dasharray="5,10">
      <animate attributeName="stroke-dashoffset" values="0;-30" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="700" y1="0" x2="700" y2="400" stroke="#00f0ff" stroke-dasharray="5,10">
      <animate attributeName="stroke-dashoffset" values="0;-30" dur="4.5s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>