<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="emptyGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Empty box -->
  <rect x="50" y="60" width="100" height="80" rx="8"
        stroke="rgba(0,240,255,0.3)" stroke-width="2"
        fill="rgba(0,240,255,0.02)" filter="url(#emptyGlow)"/>

  <!-- Magnifying glass -->
  <circle cx="130" cy="130" r="25" stroke="#00f0ff" stroke-width="3" filter="url(#emptyGlow)"/>
  <line x1="150" y1="150" x2="165" y2="165" stroke="#00f0ff" stroke-width="4" stroke-linecap="round" filter="url(#emptyGlow)"/>

  <!-- Question mark -->
  <text x="100" y="110" text-anchor="middle" fill="#9d00ff" font-size="40" font-weight="bold" filter="url(#emptyGlow)">?</text>

  <!-- Floating particles -->
  <circle cx="60" cy="50" r="2" fill="#00f0ff" opacity="0.5">
    <animate attributeName="cy" values="50;40;50" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="55" r="2" fill="#9d00ff" opacity="0.5">
    <animate attributeName="cy" values="55;45;55" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="150" r="2" fill="#ff0080" opacity="0.5">
    <animate attributeName="cy" values="150;140;150" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
