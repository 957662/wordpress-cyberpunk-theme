<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0f"/>

  <!-- Definitions -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Grid Background -->
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- Central Flask Icon -->
  <g transform="translate(400, 250)">
    <!-- Flask Body -->
    <path d="M-60 80 L-30 -20 L30 -20 L60 80 L40 80 L-40 80 Z" stroke="url(#cyanGradient)" stroke-width="3" fill="rgba(0, 240, 255, 0.1)"/>

    <!-- Flask Neck -->
    <rect x="-30" y="-60" width="60" height="40" stroke="url(#cyanGradient)" stroke-width="3" fill="rgba(0, 240, 255, 0.1)"/>

    <!-- Flask Opening -->
    <ellipse cx="0" cy="-60" rx="35" ry="10" stroke="url(#cyanGradient)" stroke-width="3" fill="rgba(0, 240, 255, 0.1)"/>

    <!-- Liquid Level -->
    <path d="M-55 60 L-35 10 L35 10 L55 60 Z" fill="url(#purpleGradient)" opacity="0.5">
      <animate attributeName="d" values="M-55 60 L-35 10 L35 10 L55 60 Z;M-55 50 L-35 0 L35 0 L55 50 Z;M-55 60 L-35 10 L35 10 L55 60 Z" dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- Bubbles -->
    <circle cx="0" cy="40" r="6" fill="#00f0ff" opacity="0.8">
      <animate attributeName="cy" values="40;-30;40" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-20" cy="50" r="4" fill="#9d00ff" opacity="0.7">
      <animate attributeName="cy" values="50;-20;50" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="55" r="5" fill="#00f0ff" opacity="0.7">
      <animate attributeName="cy" values="55;-25;55" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Glow Effect -->
    <circle cx="0" cy="30" r="50" fill="url(#cyanGradient)" opacity="0.1">
      <animate attributeName="r" values="50;60;50" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Molecular Structure -->
  <g transform="translate(200, 150)" opacity="0.5">
    <line x1="0" y1="0" x2="50" y2="30" stroke="#00f0ff" stroke-width="2"/>
    <line x1="50" y1="30" x2="100" y2="0" stroke="#00f0ff" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#00f0ff">
      <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="30" r="8" fill="#9d00ff">
      <animate attributeName="r" values="8;10;8" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="0" r="10" fill="#00f0ff">
      <animate attributeName="r" values="10;12;10" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(500, 400)" opacity="0.5">
    <line x1="0" y1="0" x2="40" y2="-40" stroke="#9d00ff" stroke-width="2"/>
    <line x1="40" y1="-40" x2="80" y2="0" stroke="#9d00ff" stroke-width="2"/>
    <line x1="80" y1="0" x2="120" y2="-40" stroke="#9d00ff" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#9d00ff">
      <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="-40" r="6" fill="#00f0ff">
      <animate attributeName="r" values="6;8;6" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="0" r="8" fill="#9d00ff">
      <animate attributeName="r" values="8;10;8" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="-40" r="6" fill="#00f0ff">
      <animate attributeName="r" values="6;8;6" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Sparkles -->
  <g fill="#f0ff00" opacity="0.8">
    <path transform="translate(150, 300)" d="M0 -10 L2 -2 L10 0 L2 2 L0 10 L-2 2 L-10 0 L-2 -2 Z">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </path>
    <path transform="translate(650, 200)" d="M0 -8 L1.5 -1.5 L8 0 L1.5 1.5 L0 8 L-1.5 1.5 L-8 0 L-1.5 -1.5 Z">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <path transform="translate(600, 450)" d="M0 -6 L1 -1 L6 0 L1 1 L0 6 L-1 1 L-6 0 L-1 -1 Z">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path transform="translate(200, 450)" d="M0 -7 L1.5 -1.5 L7 0 L1.5 1.5 L0 7 L-1.5 1.5 L-7 0 L-1.5 -1.5 Z">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Corner Decorations -->
  <g stroke="url(#purpleGradient)" stroke-width="2" fill="none" opacity="0.5">
    <path d="M30 80 L30 30 L80 30">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M770 80 L770 30 L720 30">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M30 520 L30 570 L80 570">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path d="M770 520 L770 570 L720 570">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Text Section -->
  <g transform="translate(400, 500)" text-anchor="middle">
    <text x="0" y="0" fill="url(#cyanGradient)" font-family="Orbitron, sans-serif" font-size="48" font-weight="bold" letter-spacing="6">
      BETA
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="0" y="35" fill="#9d00ff" font-family="Inter, sans-serif" font-size="16" opacity="0.8">
      Experimental Feature - Use with caution
    </text>
  </g>

  <!-- Scanlines Overlay -->
  <rect width="800" height="600" fill="url(#grid)" opacity="0.02"/>
</svg>