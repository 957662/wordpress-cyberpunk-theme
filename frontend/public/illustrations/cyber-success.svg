<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" width="400" height="300">
  <defs>
    <linearGradient id="successGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="successGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background celebration elements -->
  <g opacity="0.2">
    <circle cx="50" cy="50" r="3" fill="#00ff88"/>
    <circle cx="350" cy="50" r="3" fill="#00f0ff"/>
    <circle cx="50" cy="250" r="3" fill="#9d00ff"/>
    <circle cx="350" cy="250" r="3" fill="#00ff88"/>
    <rect x="100" y="30" width="4" height="4" fill="#00f0ff"/>
    <rect x="300" y="30" width="4" height="4" fill="#9d00ff"/>
    <rect x="100" y="270" width="4" height="4" fill="#ff0080"/>
    <rect x="300" y="270" width="4" height="4" fill="#00ff88"/>
  </g>

  <!-- Success circle -->
  <g filter="url(#successGlow)">
    <circle cx="200" cy="130" r="70" stroke="url(#successGradient)" stroke-width="4" fill="none"/>
    <circle cx="200" cy="130" r="55" stroke="#00ff88" stroke-width="2" fill="none" opacity="0.5"/>
    <circle cx="200" cy="130" r="85" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- Checkmark -->
  <g filter="url(#successGlow)">
    <path d="M 165 130 L 190 155 L 240 105" stroke="url(#successGradient)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 165 130 L 190 155 L 240 105" stroke="#00ff88" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>

  <!-- Decorative rings -->
  <g opacity="0.4">
    <circle cx="200" cy="130" r="100" stroke="#00ff88" stroke-width="1" fill="none" stroke-dasharray="10 10"/>
    <circle cx="200" cy="130" r="115" stroke="#00f0ff" stroke-width="1" fill="none" stroke-dasharray="5 15"/>
  </g>

  <!-- Tech particles -->
  <g>
    <circle cx="130" cy="80" r="4" fill="#00ff88" opacity="0.8" filter="url(#successGlow)"/>
    <circle cx="270" cy="80" r="4" fill="#00f0ff" opacity="0.8" filter="url(#successGlow)"/>
    <circle cx="130" cy="180" r="4" fill="#9d00ff" opacity="0.8" filter="url(#successGlow)"/>
    <circle cx="270" cy="180" r="4" fill="#00ff88" opacity="0.8" filter="url(#successGlow)"/>
  </g>

  <!-- Connection lines -->
  <g opacity="0.5">
    <line x1="130" y1="80" x2="165" y2="115" stroke="#00ff88" stroke-width="2"/>
    <line x1="270" y1="80" x2="235" y2="115" stroke="#00f0ff" stroke-width="2"/>
    <line x1="130" y1="180" x2="165" y2="145" stroke="#9d00ff" stroke-width="2"/>
    <line x1="270" y1="180" x2="240" y2="115" stroke="#00ff88" stroke-width="2"/>
  </g>

  <!-- Success text -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#successGradient)" text-anchor="middle" filter="url(#successGlow)">Success!</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#00ff88" text-anchor="middle" opacity="0.8">Operation completed</text>

  <!-- Corner celebration bursts -->
  <g>
    <path d="M 70 70 L 80 60 L 90 70 L 80 80 Z" fill="#00ff88" opacity="0.6" filter="url(#successGlow)"/>
    <path d="M 310 70 L 320 60 L 330 70 L 320 80 Z" fill="#00f0ff" opacity="0.6" filter="url(#successGlow)"/>
    <path d="M 70 230 L 80 220 L 90 230 L 80 240 Z" fill="#9d00ff" opacity="0.6" filter="url(#successGlow)"/>
    <path d="M 310 230 L 320 220 L 330 230 L 320 240 Z" fill="#00ff88" opacity="0.6" filter="url(#successGlow)"/>
  </g>
</svg>