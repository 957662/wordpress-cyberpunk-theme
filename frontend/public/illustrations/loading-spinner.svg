<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spinner-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="40"
    stroke="url(#spinner-grad)"
    stroke-width="3"
    fill="none"
    stroke-linecap="round"
    stroke-dasharray="60 190"
    opacity="0.8"
  >
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="1.5s"
      repeatCount="indefinite"
    />
  </circle>

  <!-- Middle ring -->
  <circle cx="50" cy="50" r="30"
    stroke="url(#spinner-grad)"
    stroke-width="2"
    fill="none"
    stroke-linecap="round"
    stroke-dasharray="40 140"
    opacity="0.6"
  >
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="360 50 50"
      to="0 50 50"
      dur="1s"
      repeatCount="indefinite"
    />
  </circle>

  <!-- Inner ring -->
  <circle cx="50" cy="50" r="20"
    stroke="url(#spinner-grad)"
    stroke-width="1.5"
    fill="none"
    stroke-linecap="round"
    stroke-dasharray="25 100"
    opacity="0.4"
  >
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="0.7s"
      repeatCount="indefinite"
    />
  </circle>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="url(#spinner-grad)" opacity="0.8">
    <animate
      attributeName="opacity"
      values="0.8;0.3;0.8"
      dur="1s"
      repeatCount="indefinite"
    />
  </circle>

  <!-- Orbiting particles -->
  <circle cx="50" cy="10" r="2" fill="#00f0ff" opacity="0.8">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="2s"
      repeatCount="indefinite"
    />
  </circle>

  <circle cx="90" cy="50" r="2" fill="#9d00ff" opacity="0.8">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="2s"
      repeatCount="indefinite"
    />
  </circle>

  <circle cx="50" cy="90" r="2" fill="#ff0080" opacity="0.8">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="2s"
      repeatCount="indefinite"
    />
  </circle>

  <circle cx="10" cy="50" r="2" fill="#00f0ff" opacity="0.8">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="2s"
      repeatCount="indefinite"
    />
  </circle>
</svg>