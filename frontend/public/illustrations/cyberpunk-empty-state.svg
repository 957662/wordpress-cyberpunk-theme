<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emptyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="emptyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0" />
    </radialGradient>
    <filter id="emptyFilter">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="200" cy="150" r="100" fill="url(#emptyGlow)"/>

  <!-- Main Frame -->
  <rect x="100" y="80" width="200" height="140" rx="10" stroke="url(#emptyGradient)" stroke-width="2" fill="none" opacity="0.5" filter="url(#emptyFilter)"/>

  <!-- Inner Frame -->
  <rect x="120" y="100" width="160" height="100" rx="5" stroke="url(#emptyGradient)" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Tech Corners -->
  <g opacity="0.6">
    <!-- Top Left -->
    <line x1="100" y1="95" x2="100" y2="80" stroke="#00f0ff" stroke-width="2"/>
    <line x1="100" y1="80" x2="115" y2="80" stroke="#00f0ff" stroke-width="2"/>

    <!-- Top Right -->
    <line x1="285" y1="80" x2="300" y2="80" stroke="#9d00ff" stroke-width="2"/>
    <line x1="300" y1="80" x2="300" y2="95" stroke="#9d00ff" stroke-width="2"/>

    <!-- Bottom Right -->
    <line x1="300" y1="205" x2="300" y2="220" stroke="#ff0080" stroke-width="2"/>
    <line x1="285" y1="220" x2="300" y2="220" stroke="#ff0080" stroke-width="2"/>

    <!-- Bottom Left -->
    <line x1="115" y1="220" x2="100" y2="220" stroke="#00f0ff" stroke-width="2"/>
    <line x1="100" y1="220" x2="100" y2="205" stroke="#00f0ff" stroke-width="2"/>
  </g>

  <!-- Central Icon -->
  <g transform="translate(200, 150)">
    <!-- Hexagon Background -->
    <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5"
             stroke="url(#emptyGradient)" stroke-width="2" fill="none" opacity="0.4" filter="url(#emptyFilter)"/>

    <!-- Search Magnifying Glass -->
    <circle cx="-5" cy="-5" r="15" stroke="url(#emptyGradient)" stroke-width="2" fill="none" filter="url(#emptyFilter)"/>
    <line x1="7" y1="7" x2="18" y2="18" stroke="url(#emptyGradient)" stroke-width="2" stroke-linecap="round" filter="url(#emptyFilter)"/>

    <!-- Question Mark -->
    <text x="0" y="50" text-anchor="middle" fill="#9d00ff" font-family="Arial, sans-serif" font-size="14" opacity="0.6">?</text>
  </g>

  <!-- Data Particles -->
  <circle cx="130" cy="120" r="2" fill="#00f0ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="270" cy="180" r="2" fill="#ff0080" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="160" cy="190" r="1.5" fill="#9d00ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- Scanning Line -->
  <line x1="100" y1="80" x2="300" y2="80" stroke="url(#emptyGradient)" stroke-width="1" opacity="0.3">
    <animate attributeName="y1" values="80;220;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="80;220;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>
