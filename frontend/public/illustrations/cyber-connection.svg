<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="connGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="connGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circuit Pattern -->
  <g stroke="url(#connGrad)" stroke-width="0.5" opacity="0.2">
    <line x1="50" y1="200" x2="150" y2="200" />
    <line x1="250" y1="200" x2="350" y2="200" />
    <line x1="200" y1="50" x2="200" y2="150" />
    <line x1="200" y1="250" x2="200" y2="350" />
    <line x1="100" y1="100" x2="300" y2="300" />
    <line x1="300" y1="100" x2="100" y2="300" />
  </g>

  <!-- Connection Nodes -->
  <g filter="url(#connGlow)">
    <!-- Top Node -->
    <circle cx="200" cy="100" r="30" fill="rgba(0,240,255,0.1)"
            stroke="url(#connGrad)" stroke-width="2" />
    <circle cx="200" cy="100" r="12" fill="rgba(0,240,255,0.3)" />
    <circle cx="200" cy="100" r="5" fill="#00f0ff" />

    <!-- Bottom Left Node -->
    <circle cx="120" cy="280" r="25" fill="rgba(157,0,255,0.1)"
            stroke="url(#connGrad)" stroke-width="2" />
    <circle cx="120" cy="280" r="10" fill="rgba(157,0,255,0.3)" />
    <circle cx="120" cy="280" r="4" fill="#9d00ff" />

    <!-- Bottom Right Node -->
    <circle cx="280" cy="280" r="25" fill="rgba(255,0,128,0.1)"
            stroke="url(#connGrad)" stroke-width="2" />
    <circle cx="280" cy="280" r="10" fill="rgba(255,0,128,0.3)" />
    <circle cx="280" cy="280" r="4" fill="#ff0080" />
  </g>

  <!-- Connection Lines -->
  <g stroke="url(#connGrad)" stroke-width="2" fill="none">
    <path d="M200 130 Q200 200 120 250" />
    <path d="M200 130 Q200 200 280 250" />
    <path d="M120 255 Q200 220 280 255" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Data Particles -->
  <g fill="#00f0ff">
    <circle cx="200" cy="160" r="3" opacity="0.8" />
    <circle cx="180" cy="200" r="2" opacity="0.6" />
    <circle cx="220" cy="200" r="2" opacity="0.6" />
    <circle cx="160" cy="240" r="2" opacity="0.5" />
    <circle cx="240" cy="240" r="2" opacity="0.5" />
  </g>

  <!-- Pulse Rings -->
  <g stroke="url(#connGrad)" stroke-width="1" fill="none" opacity="0.4">
    <circle cx="200" cy="100" r="40" />
    <circle cx="200" cy="100" r="50" opacity="0.3" />
    <circle cx="120" cy="280" r="35" />
    <circle cx="280" cy="280" r="35" />
  </g>

  <!-- Tech Accents -->
  <g stroke="url(#connGrad)" stroke-width="1" fill="none" opacity="0.5">
    <path d="M50 200 L70 195 L70 205 Z" />
    <path d="M350 200 L330 195 L330 205 Z" />
    <path d="M200 50 L195 70 L205 70 Z" />
    <path d="M200 350 L195 330 L205 330 Z" />
  </g>
</svg>
