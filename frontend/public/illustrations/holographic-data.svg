<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="holo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0.4"/>
    </linearGradient>

    <radialGradient id="holo-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0"/>
    </radialGradient>

    <filter id="holo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="holo-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="200" cy="200" r="150" fill="url(#holo-radial)">
    <animate attributeName="r" values="140;160;140" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer Hexagon Rings -->
  <g filter="url(#holo-glow)">
    <polygon
      points="200,50 330,125 330,275 200,350 70,275 70,125"
      stroke="url(#holo-gradient)"
      stroke-width="2"
      fill="none"
      opacity="0.8"
    >
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 200 200"
        to="360 200 200"
        dur="20s"
        repeatCount="indefinite"
      />
    </polygon>

    <polygon
      points="200,80 300,140 300,260 200,320 100,260 100,140"
      stroke="url(#holo-gradient)"
      stroke-width="2"
      fill="none"
      opacity="0.6"
    >
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="360 200 200"
        to="0 200 200"
        dur="15s"
        repeatCount="indefinite"
      />
    </polygon>
  </g>

  <!-- Inner Data Visualization -->
  <g filter="url(#holo-glow)">
    <!-- Central Circle -->
    <circle cx="200" cy="200" r="60" stroke="#00f0ff" stroke-width="3" fill="rgba(0,240,255,0.1)"/>
    <circle cx="200" cy="200" r="40" stroke="#9d00ff" stroke-width="2" fill="none" opacity="0.8"/>
    <circle cx="200" cy="200" r="20" stroke="#ff0080" stroke-width="2" fill="rgba(255,0,128,0.2)"/>

    <!-- Data Points -->
    <g>
      <circle cx="200" cy="140" r="5" fill="#00f0ff">
        <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="252" cy="170" r="5" fill="#9d00ff">
        <animate attributeName="r" values="5;7;5" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="252" cy="230" r="5" fill="#ff0080">
        <animate attributeName="r" values="5;7;5" dur="2s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="200" cy="260" r="5" fill="#f0ff00">
        <animate attributeName="r" values="5;7;5" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="148" cy="230" r="5" fill="#00f0ff">
        <animate attributeName="r" values="5;7;5" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="148" cy="170" r="5" fill="#9d00ff">
        <animate attributeName="r" values="5;7;5" dur="2s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Connecting Lines -->
    <g stroke="url(#holo-gradient)" stroke-width="1.5" opacity="0.6">
      <line x1="200" y1="140" x2="252" y2="170"/>
      <line x1="252" y1="170" x2="252" y2="230"/>
      <line x1="252" y1="230" x2="200" y2="260"/>
      <line x1="200" y1="260" x2="148" y2="230"/>
      <line x1="148" y1="230" x2="148" y2="170"/>
      <line x1="148" y1="170" x2="200" y2="140"/>
      <line x1="200" y1="140" x2="200" y2="200"/>
      <line x1="252" y1="170" x2="200" y2="200"/>
      <line x1="252" y1="230" x2="200" y2="200"/>
      <line x1="200" y1="260" x2="200" y2="200"/>
      <line x1="148" y1="230" x2="200" y2="200"/>
      <line x1="148" y1="170" x2="200" y2="200"/>
    </g>
  </g>

  <!-- Floating Data Particles -->
  <g filter="url(#holo-blur)">
    <circle cx="120" cy="100" r="3" fill="#00f0ff" opacity="0.6">
      <animate attributeName="cy" values="100;90;100" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="300" r="3" fill="#ff0080" opacity="0.6">
      <animate attributeName="cy" values="300;310;300" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="180" r="2" fill="#9d00ff" opacity="0.5">
      <animate attributeName="cx" values="320;330;320" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="220" r="2" fill="#f0ff00" opacity="0.5">
      <animate attributeName="cx" values="80;70;80" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Scanline Effect -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="url(#holo-gradient)" stroke-width="2" opacity="0.3">
    <animate attributeName="y1" values="0;400;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;400;0" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>