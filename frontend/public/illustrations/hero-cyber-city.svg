<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <!-- 天空渐变 -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>

    <!-- 建筑物渐变 -->
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16162a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>

    <!-- 霓虹发光滤镜 -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 强光滤镜 -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 天空背景 -->
  <rect width="800" height="400" fill="url(#skyGradient)"/>

  <!-- 远景建筑物 -->
  <g fill="#0a0a0f" opacity="0.6">
    <rect x="50" y="150" width="60" height="250"/>
    <rect x="120" y="180" width="40" height="220"/>
    <rect x="180" y="140" width="70" height="260"/>
    <rect x="280" y="160" width="50" height="240"/>
    <rect x="550" y="170" width="45" height="230"/>
    <rect x="620" y="130" width="80" height="270"/>
    <rect x="720" y="190" width="50" height="210"/>
  </g>

  <!-- 主建筑物 -->
  <g fill="url(#buildingGradient)" stroke="#2a2a4a" stroke-width="1">
    <!-- 建筑1 -->
    <rect x="200" y="200" width="100" height="200"/>
    <!-- 建筑2 -->
    <rect x="320" y="150" width="120" height="250"/>
    <!-- 建筑3 -->
    <rect x="460" y="180" width="80" height="220"/>
  </g>

  <!-- 窗户网格 -->
  <g fill="#00f0ff" opacity="0.6" filter="url(#neonGlow)">
    <!-- 建筑1窗户 -->
    <rect x="210" y="210" width="8" height="12"/>
    <rect x="230" y="210" width="8" height="12"/>
    <rect x="250" y="210" width="8" height="12"/>
    <rect x="270" y="210" width="8" height="12"/>
    <rect x="210" y="240" width="8" height="12"/>
    <rect x="230" y="240" width="8" height="12"/>
    <rect x="250" y="240" width="8" height="12"/>
    <rect x="270" y="240" width="8" height="12"/>
  </g>

  <g fill="#9d00ff" opacity="0.6" filter="url(#neonGlow)">
    <!-- 建筑2窗户 -->
    <rect x="335" y="160" width="10" height="15"/>
    <rect x="360" y="160" width="10" height="15"/>
    <rect x="385" y="160" width="10" height="15"/>
    <rect x="410" y="160" width="10" height="15"/>
    <rect x="335" y="195" width="10" height="15"/>
    <rect x="360" y="195" width="10" height="15"/>
    <rect x="385" y="195" width="10" height="15"/>
    <rect x="410" y="195" width="10" height="15"/>
  </g>

  <g fill="#ff0080" opacity="0.6" filter="url(#neonGlow)">
    <!-- 建筑3窗户 -->
    <rect x="470" y="190" width="8" height="12"/>
    <rect x="490" y="190" width="8" height="12"/>
    <rect x="510" y="190" width="8" height="12"/>
    <rect x="470" y="220" width="8" height="12"/>
    <rect x="490" y="220" width="8" height="12"/>
    <rect x="510" y="220" width="8" height="12"/>
  </g>

  <!-- 霓虹招牌 -->
  <g filter="url(#strongGlow)">
    <!-- 霓虹文字 CYBER -->
    <text x="220" y="320" font-family="'Courier New', monospace" font-size="16" fill="#00f0ff" font-weight="bold">CYBER</text>
    <!-- 霓虹文字 PRESS -->
    <text x="340" y="280" font-family="'Courier New', monospace" font-size="20" fill="#9d00ff" font-weight="bold">PRESS</text>
    <!-- 霓虹文字 CITY -->
    <text x="470" y="300" font-family="'Courier New', monospace" font-size="14" fill="#ff0080" font-weight="bold">CITY</text>
  </g>

  <!-- 全息效果线条 -->
  <g stroke="#00f0ff" stroke-width="1" opacity="0.3" filter="url(#neonGlow)">
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="370" x2="800" y2="370"/>
  </g>

  <!-- 底部光效 -->
  <rect x="0" y="380" width="800" height="20" fill="url(#buildingGradient)" opacity="0.8"/>
  <rect x="0" y="390" width="800" height="10" fill="#0a0a0f"/>

  <!-- 装饰性数据流 -->
  <circle cx="100" cy="100" r="2" fill="#00f0ff" opacity="0.8">
    <animate attributeName="cy" values="100;350;100" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="150" r="2" fill="#9d00ff" opacity="0.8">
    <animate attributeName="cy" values="150;380;150" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="80" r="2" fill="#ff0080" opacity="0.8">
    <animate attributeName="cy" values="80;320;80" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
