<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="accessGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa0055;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6600aa;stop-opacity:1" />
    </linearGradient>
    <filter id="accessGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#0a0a0f"/>

  <!-- Danger stripes background -->
  <pattern id="dangerStripes" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
    <rect width="10" height="20" fill="#ff0080" opacity="0.05"/>
  </pattern>
  <rect width="400" height="300" fill="url(#dangerStripes)"/>

  <!-- Lock icon -->
  <g transform="translate(150, 60)" filter="url(#accessGlow)">
    <!-- Lock body -->
    <rect x="10" y="40" width="80" height="60" rx="5" fill="#16162a" stroke="url(#lockGrad)" stroke-width="3"/>
    <!-- Shackle -->
    <path d="M 25 40 L 25 25 A 25 25 0 0 1 75 25 L 75 40" fill="none" stroke="url(#lockGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="50" cy="70" r="12" fill="none" stroke="#ff0080" stroke-width="2"/>
    <line x1="50" y1="82" x2="50" y2="90" stroke="#ff0080" stroke-width="2" stroke-linecap="round"/>

    <!-- X marks -->
    <line x1="30" y1="50" x2="40" y2="60" stroke="#ff0080" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="50" x2="30" y2="60" stroke="#ff0080" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="50" x2="70" y2="60" stroke="#ff0080" stroke-width="2" stroke-linecap="round"/>
    <line x1="70" y1="50" x2="60" y2="60" stroke="#ff0080" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Access denied text -->
  <text x="200" y="200" font-family="Arial Black, sans-serif" font-size="28" fill="url(#accessGrad)" text-anchor="middle" filter="url(#accessGlow)">ACCESS DENIED</text>

  <!-- Subtitle -->
  <text x="200" y="235" font-family="Arial, sans-serif" font-size="14" fill="#a0a0b0" text-anchor="middle">You don't have permission to view this resource</text>

  <!-- Warning triangle decorations -->
  <g fill="#ff0080" opacity="0.2" filter="url(#accessGlow)">
    <polygon points="50,50 60,70 40,70" transform="translate(30, 50)"/>
    <polygon points="50,50 60,70 40,70" transform="translate(290, 150)"/>
  </g>

  <!-- Scanning line effect -->
  <line x1="0" y1="180" x2="400" y2="180" stroke="#ff0080" stroke-width="1" opacity="0.3">
    <animate attributeName="y1" values="0;300;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;300;0" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>
