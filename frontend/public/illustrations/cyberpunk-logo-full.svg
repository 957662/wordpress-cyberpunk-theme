<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyber-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff">
        <animate attributeName="stop-color" values="#00f0ff;#00a0ff;#00f0ff" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#9d00ff">
        <animate attributeName="stop-color" values="#9d00ff;#bd66ff;#9d00ff" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ff0080">
        <animate attributeName="stop-color" values="#ff0080;#ff66b3;#ff0080" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="neon-glow-large" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur5"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur10"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur20"/>
      <feMerge>
        <feMergeNode in="blur20"/>
        <feMergeNode in="blur10"/>
        <feMergeNode in="blur5"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="scanline-effect">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background Circuit Pattern -->
  <g opacity="0.1">
    <circle cx="256" cy="256" r="200" stroke="url(#cyber-gradient)" stroke-width="1" fill="none"/>
    <circle cx="256" cy="256" r="180" stroke="url(#cyber-gradient)" stroke-width="1" fill="none"/>
    <circle cx="256" cy="256" r="160" stroke="url(#cyber-gradient)" stroke-width="1" fill="none"/>
  </g>

  <!-- Hexagon Frame -->
  <g filter="url(#neon-glow-large)">
    <path
      d="M256 48L448 148V364L256 464L64 364V148L256 48Z"
      stroke="url(#cyber-gradient)"
      stroke-width="4"
      fill="none"
      stroke-linejoin="round"
    />
    <path
      d="M256 88L408 168V344L256 424L104 344V168L256 88Z"
      stroke="url(#cyber-gradient)"
      stroke-width="2"
      fill="none"
      stroke-linejoin="round"
      opacity="0.6"
    />
  </g>

  <!-- Central CP Monogram -->
  <g filter="url(#neon-glow-large)">
    <!-- Letter C -->
    <path
      d="M170 180C150 180 140 200 140 230V256C140 295 155 320 190 320C210 320 220 310 230 290"
      stroke="url(#cyber-gradient)"
      stroke-width="12"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Letter P -->
    <path
      d="M260 170V330M260 170C260 170 270 170 280 170C310 170 320 190 320 215C320 245 300 260 275 260H260"
      stroke="url(#cyber-gradient)"
      stroke-width="12"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Circuit Lines -->
    <path
      d="M120 380H160M352 380H392M256 64V104"
      stroke="url(#cyber-gradient)"
      stroke-width="3"
      stroke-linecap="round"
    />
    <circle cx="160" cy="380" r="6" fill="url(#cyber-gradient)"/>
    <circle cx="392" cy="380" r="6" fill="url(#cyber-gradient)"/>
    <circle cx="256" cy="64" r="6" fill="url(#cyber-gradient)"/>
    <circle cx="256" cy="104" r="4" fill="url(#cyber-gradient)"/>
  </g>

  <!-- Tech Decorations -->
  <g filter="url(#neon-glow-large)">
    <!-- Corner Brackets -->
    <path d="M80 140V100H120" stroke="#00f0ff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M432 140V100H392" stroke="#00f0ff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M80 372V412H120" stroke="#ff0080" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M432 372V412H392" stroke="#ff0080" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Data Dots -->
    <circle cx="80" cy="256" r="4" fill="#9d00ff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="432" cy="256" r="4" fill="#9d00ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Animated Pulse Ring -->
  <circle
    cx="256"
    cy="256"
    r="120"
    stroke="url(#cyber-gradient)"
    stroke-width="2"
    fill="none"
    opacity="0.5"
  >
    <animate attributeName="r" values="120;140;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>