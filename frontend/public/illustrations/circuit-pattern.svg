<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="circuit-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>

    <filter id="circuit-glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="node-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0f"/>

  <!-- Circuit Grid -->
  <g stroke="url(#circuit-gradient)" stroke-width="1.5" fill="none" filter="url(#circuit-glow)" opacity="0.6">
    <!-- Horizontal lines -->
    <line x1="0" y1="100" x2="800" y2="100" stroke-dasharray="5 5"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke-dasharray="5 5"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke-dasharray="5 5"/>

    <!-- Vertical lines -->
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke-dasharray="5 5"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke-dasharray="5 5"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke-dasharray="5 5"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Circuit Paths -->
  <g stroke="url(#circuit-gradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#circuit-glow)">
    <!-- Main circuits -->
    <path d="M 0 200 L 100 200 L 100 150 L 200 150 L 200 300 L 300 300 L 300 200 L 400 200"/>
    <path d="M 800 400 L 700 400 L 700 450 L 600 450 L 600 300 L 500 300 L 500 400 L 400 400"/>
    <path d="M 0 100 L 150 100 L 150 250 L 250 250 L 250 500 L 400 500 L 400 550 L 500 550"/>
    <path d="M 800 500 L 650 500 L 650 350 L 550 350 L 550 100 L 400 100 L 400 50 L 300 50"/>
  </g>

  <!-- Connection Nodes -->
  <g fill="#00f0ff" filter="url(#node-glow)">
    <circle cx="100" cy="200" r="4">
      <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="150" r="4"/>
    <circle cx="300" cy="300" r="4">
      <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="200" r="4"/>
    <circle cx="700" cy="400" r="4"/>
    <circle cx="600" cy="450" r="4">
      <animate attributeName="r" values="4;5;4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="300" r="4"/>
    <circle cx="150" cy="100" r="4"/>
    <circle cx="250" cy="250" r="4">
      <animate attributeName="r" values="4;5;4" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="500" r="4"/>
    <circle cx="650" cy="500" r="4"/>
    <circle cx="550" cy="350" r="4">
      <animate attributeName="r" values="4;6;4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="100" r="4"/>
  </g>

  <!-- Secondary Nodes (Purple) -->
  <g fill="#9d00ff" filter="url(#node-glow)">
    <circle cx="100" cy="150" r="3"/>
    <circle cx="200" cy="300" r="3">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="200" r="3"/>
    <circle cx="700" cy="450" r="3"/>
    <circle cx="600" cy="300" r="3">
      <animate attributeName="opacity" values="1;0.6;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="400" r="3"/>
    <circle cx="150" cy="250" r="3"/>
    <circle cx="250" cy="500" r="3">
      <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="550" r="3"/>
    <circle cx="650" cy="350" r="3"/>
    <circle cx="550" cy="100" r="3">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="50" r="3"/>
  </g>

  <!-- Data Packets -->
  <g fill="#ff0080">
    <circle r="3">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#path1"/>
      </animateMotion>
    </circle>
    <circle r="3">
      <animateMotion dur="5s" repeatCount="indefinite" begin="1s">
        <mpath href="#path2"/>
      </animateMotion>
    </circle>
    <circle r="3">
      <animateMotion dur="4.5s" repeatCount="indefinite" begin="2s">
        <mpath href="#path3"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Hidden paths for animation -->
  <path id="path1" d="M 0 200 L 100 200 L 100 150 L 200 150 L 200 300 L 300 300 L 300 200 L 400 200" fill="none"/>
  <path id="path2" d="M 800 400 L 700 400 L 700 450 L 600 450 L 600 300 L 500 300 L 500 400 L 400 400" fill="none"/>
  <path id="path3" d="M 0 100 L 150 100 L 150 250 L 250 250 L 250 500 L 400 500 L 400 550 L 500 550" fill="none"/>

  <!-- Corner Decorations -->
  <g stroke="#00f0ff" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 0 0 L 50 0 L 50 50"/>
    <path d="M 800 0 L 750 0 L 750 50"/>
    <path d="M 0 600 L 50 600 L 50 550"/>
    <path d="M 800 600 L 750 600 L 750 550"/>
  </g>

  <!-- Tech Text -->
  <text x="50" y="580" font-family="monospace" font-size="12" fill="#00f0ff" opacity="0.3">
    CIRCUIT NETWORK v2.0
  </text>
  <text x="650" y="580" font-family="monospace" font-size="12" fill="#9d00ff" opacity="0.3">
    DATA FLOW ACTIVE
  </text>
</svg>
