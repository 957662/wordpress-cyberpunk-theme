<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hoodie-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screen-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.2" />
    </linearGradient>
    <filter id="hacker-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#0a0a0f"/>

  <!-- Matrix Rain Background -->
  <g font-family="monospace" font-size="12" opacity="0.15">
    <text x="50" y="50" fill="#00f0ff">0 1 0 1 1 0</text>
    <text x="400" y="80" fill="#00ff88">1 0 1 0 0 1</text>
    <text x="30" y="150" fill="#00f0ff">0 1 1 0 1 0</text>
    <text x="420" y="200" fill="#00ff88">1 0 0 1 0 1</text>
    <text x="50" y="300" fill="#00f0ff">1 1 0 0 1 0</text>
    <text x="380" y="350" fill="#00ff88">0 0 1 1 0 1</text>
    <text x="40" y="420" fill="#00f0ff">1 0 1 1 0 0</text>
    <text x="400" y="450" fill="#00ff88">0 1 0 0 1 1</text>
  </g>

  <!-- Hooded Figure Silhouette -->
  <g transform="translate(150, 100)">
    <!-- Hood -->
    <path d="M 50 0 Q 100 -20 150 0 L 160 100 Q 100 120 40 100 Z" fill="url(#hoodie-gradient)" stroke="#00f0ff" stroke-width="1" opacity="0.9"/>

    <!-- Face Shadow -->
    <ellipse cx="100" cy="80" rx="40" ry="50" fill="#050508" opacity="0.95"/>

    <!-- Glowing Eyes -->
    <g filter="url(#hacker-glow)">
      <!-- Left Eye -->
      <ellipse cx="80" cy="70" rx="12" ry="8" fill="#00f0ff" opacity="0.8">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="80" cy="70" rx="6" ry="4" fill="#ffffff" opacity="0.9"/>
      <circle cx="80" cy="70" r="2" fill="#00f0ff">
        <animate attributeName="r" values="1.5;2.5;1.5" dur="2s" repeatCount="indefinite"/>
      </circle>

      <!-- Right Eye -->
      <ellipse cx="120" cy="70" rx="12" ry="8" fill="#00f0ff" opacity="0.8">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="120" cy="70" rx="6" ry="4" fill="#ffffff" opacity="0.9"/>
      <circle cx="120" cy="70" r="2" fill="#00f0ff">
        <animate attributeName="r" values="1.5;2.5;1.5" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- HUD Display on Face -->
    <g stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.4">
      <!-- Targeting Reticle -->
      <circle cx="100" cy="80" r="35" stroke-dasharray="5,3"/>
      <line x1="65" y1="80" x2="75" y2="80"/>
      <line x1="125" y1="80" x2="135" y2="80"/>
      <line x1="100" y1="45" x2="100" y2="55"/>
      <line x1="100" y1="105" x2="100" y2="115"/>
    </g>

    <!-- Data Streams from Eyes -->
    <g stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.3">
      <path d="M 80 78 Q 60 100 40 150">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M 120 78 Q 140 100 160 150">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.3s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Floating Code Snippets -->
  <g font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.6" filter="url(#hacker-glow)">
    <text x="50" y="250">
      <tspan x="50" dy="0">&gt; sudo access_granted</tspan>
      <tspan x="50" dy="15">&gt; decrypting...</tspan>
      <tspan x="50" dy="15">&gt; ████░░░░ 50%</tspan>
    </text>

    <text x="320" y="280" fill="#9d00ff">
      <tspan x="320" dy="0">system.breached</tspan>
      <tspan x="320" dy="15">uploading data...</tspan>
    </text>

    <text x="50" y="380" fill="#00ff88">
      <tspan x="50" dy="0">&gt; connection secure</tspan>
      <tspan x="50" dy="15">&gt; proxy: active</tspan>
    </text>
  </g>

  <!-- Laptop/Glowing Rectangle -->
  <g transform="translate(125, 280)">
    <rect x="0" y="0" width="250" height="150" rx="5" fill="url(#screen-gradient)" stroke="#00f0ff" stroke-width="2" filter="url(#hacker-glow)"/>

    <!-- Screen Content -->
    <g font-family="monospace" font-size="8" opacity="0.8">
      <!-- Terminal Text -->
      <text x="15" y="25" fill="#00f0ff">$ ./hack_the_planet.sh</text>
      <text x="15" y="40" fill="#e0e0e0">[*] Initializing...</text>
      <text x="15" y="55" fill="#00ff88">[+] Target acquired</text>
      <text x="15" y="70" fill="#e0e0e0">[*] Brute forcing...</text>
      <text x="15" y="85" fill="#9d00ff">[~] 34% complete</text>
      <text x="15" y="100" fill="#ff0080">[!] Firewall detected</text>
      <text x="15" y="115" fill="#00ff88">[+] Bypassed!</text>
      <text x="15" y="130" fill="#f0ff00">[_] Access granted</text>
    </g>

    <!-- Blinking Cursor -->
    <rect x="15" y="138" width="8" height="10" fill="#00f0ff" opacity="0.8">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Keyboard Silhouette -->
  <g transform="translate(150, 440)" opacity="0.4">
    <rect x="0" y="0" width="200" height="15" rx="2" fill="#1a1a2e" stroke="#00f0ff" stroke-width="0.5"/>
    <g fill="#0a0a0f">
      <rect x="5" y="3" width="8" height="4" rx="0.5"/>
      <rect x="18" y="3" width="8" height="4" rx="0.5"/>
      <rect x="31" y="3" width="8" height="4" rx="0.5"/>
      <rect x="44" y="3" width="8" height="4" rx="0.5"/>
      <rect x="57" y="3" width="8" height="4" rx="0.5"/>
      <rect x="70" y="3" width="8" height="4" rx="0.5"/>
      <rect x="83" y="3" width="8" height="4" rx="0.5"/>
      <rect x="96" y="3" width="8" height="4" rx="0.5"/>
      <rect x="109" y="3" width="8" height="4" rx="0.5"/>
      <rect x="122" y="3" width="8" height="4" rx="0.5"/>
      <rect x="135" y="3" width="8" height="4" rx="0.5"/>
      <rect x="148" y="3" width="8" height="4" rx="0.5"/>
      <rect x="161" y="3" width="8" height="4" rx="0.5"/>
      <rect x="174" y="3" width="8" height="4" rx="0.5"/>
      <rect x="187" y="3" width="8" height="4" rx="0.5"/>
    </g>
  </g>

  <!-- Cyber Decorations -->
  <g stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.5">
    <!-- Circuit Lines -->
    <path d="M 20 100 L 40 100 L 50 110 L 50 150"/>
    <path d="M 480 100 L 460 100 L 450 110 L 450 150"/>
    <circle cx="20" cy="100" r="3" fill="#00f0ff"/>
    <circle cx="480" cy="100" r="3" fill="#00f0ff"/>
  </g>

  <!-- Status Indicators -->
  <g font-family="monospace" font-size="10">
    <text x="20" y="480" fill="#00ff88">STATUS: ONLINE</text>
    <text x="350" y="480" fill="#00f0ff">PING: 12ms</text>
    <text x="20" y="495" fill="#9d00ff">ENCRYPTION: AES-256</text>
    <text x="350" y="495" fill="#f0ff00">UPTIME: 99.9%</text>
  </g>
</svg>
