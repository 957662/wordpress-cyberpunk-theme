<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="building-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#12121a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <filter id="neon-glow-city">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sky Background -->
  <rect width="800" height="400" fill="url(#sky-gradient)"/>

  <!-- Stars -->
  <g fill="#00f0ff" opacity="0.3">
    <circle cx="100" cy="50" r="1"/>
    <circle cx="200" cy="80" r="0.8"/>
    <circle cx="300" cy="40" r="1.2"/>
    <circle cx="400" cy="60" r="1"/>
    <circle cx="500" cy="30" r="0.8"/>
    <circle cx="600" cy="70" r="1"/>
    <circle cx="700" cy="45" r="0.9"/>
    <circle cx="150" cy="100" r="0.7"/>
    <circle cx="250" cy="120" r="1"/>
    <circle cx="350" cy="90" r="0.8"/>
    <circle cx="450" cy="110" r="1.1"/>
    <circle cx="550" cy="85" r="0.9"/>
    <circle cx="650" cy="95" r="1"/>
  </g>

  <!-- Moon -->
  <circle cx="700" cy="60" r="25" fill="#f0ff00" opacity="0.1" filter="url(#neon-glow-city)"/>
  <circle cx="700" cy="60" r="20" fill="#f0ff00" opacity="0.2"/>

  <!-- Far Buildings (Background) -->
  <g fill="#0a0a0f" opacity="0.5">
    <rect x="50" y="200" width="60" height="200"/>
    <rect x="150" y="180" width="50" height="220"/>
    <rect x="250" y="220" width="70" height="180"/>
    <rect x="350" y="190" width="55" height="210"/>
    <rect x="450" y="210" width="65" height="190"/>
    <rect x="550" y="195" width="50" height="205"/>
    <rect x="650" y="205" width="70" height="195"/>
  </g>

  <!-- Main Buildings -->
  <g fill="url(#building-gradient)" stroke="#00f0ff" stroke-width="0.5" opacity="0.8">
    <!-- Building 1 -->
    <rect x="80" y="150" width="80" height="250"/>
    <g fill="#00f0ff" opacity="0.3">
      <rect x="90" y="160" width="8" height="8"/>
      <rect x="105" y="160" width="8" height="8"/>
      <rect x="120" y="160" width="8" height="8"/>
      <rect x="135" y="160" width="8" height="8"/>
      <rect x="90" y="180" width="8" height="8"/>
      <rect x="105" y="180" width="8" height="8"/>
      <rect x="120" y="180" width="8" height="8"/>
      <rect x="135" y="180" width="8" height="8"/>
    </g>

    <!-- Building 2 -->
    <rect x="200" y="120" width="100" height="280"/>
    <g fill="#9d00ff" opacity="0.3">
      <rect x="210" y="130" width="10" height="10"/>
      <rect x="230" y="130" width="10" height="10"/>
      <rect x="250" y="130" width="10" height="10"/>
      <rect x="270" y="130" width="10" height="10"/>
      <rect x="210" y="150" width="10" height="10"/>
      <rect x="230" y="150" width="10" height="10"/>
      <rect x="250" y="150" width="10" height="10"/>
      <rect x="270" y="150" width="10" height="10"/>
    </g>

    <!-- Building 3 (Tallest) -->
    <rect x="340" y="80" width="90" height="320"/>
    <g fill="#ff0080" opacity="0.3">
      <rect x="350" y="90" width="9" height="9"/>
      <rect x="368" y="90" width="9" height="9"/>
      <rect x="386" y="90" width="9" height="9"/>
      <rect x="404" y="90" width="9" height="9"/>
      <rect x="350" y="110" width="9" height="9"/>
      <rect x="368" y="110" width="9" height="9"/>
      <rect x="386" y="110" width="9" height="9"/>
      <rect x="404" y="110" width="9" height="9"/>
    </g>

    <!-- Building 4 -->
    <rect x="470" y="140" width="85" height="260"/>
    <g fill="#f0ff00" opacity="0.3">
      <rect x="480" y="150" width="8" height="8"/>
      <rect x="497" y="150" width="8" height="8"/>
      <rect x="514" y="150" width="8" height="8"/>
      <rect x="531" y="150" width="8" height="8"/>
      <rect x="480" y="170" width="8" height="8"/>
      <rect x="497" y="170" width="8" height="8"/>
      <rect x="514" y="170" width="8" height="8"/>
      <rect x="531" y="170" width="8" height="8"/>
    </g>

    <!-- Building 5 -->
    <rect x="600" y="160" width="95" height="240"/>
    <g fill="#00f0ff" opacity="0.3">
      <rect x="610" y="170" width="9" height="9"/>
      <rect x="628" y="170" width="9" height="9"/>
      <rect x="646" y="170" width="9" height="9"/>
      <rect x="664" y="170" width="9" height="9"/>
      <rect x="682" y="170" width="9" height="9"/>
      <rect x="610" y="190" width="9" height="9"/>
      <rect x="628" y="190" width="9" height="9"/>
      <rect x="646" y="190" width="9" height="9"/>
      <rect x="664" y="190" width="9" height="9"/>
      <rect x="682" y="190" width="9" height="9"/>
    </g>
  </g>

  <!-- Neon Signs -->
  <g filter="url(#neon-glow-city)">
    <!-- Sign 1 -->
    <rect x="85" y="250" width="70" height="30" fill="none" stroke="#00f0ff" stroke-width="2"/>
    <text x="120" y="270" fill="#00f0ff" font-size="10" font-family="monospace" text-anchor="middle">TECH</text>

    <!-- Sign 2 -->
    <rect x="210" y="220" width="80" height="35" fill="none" stroke="#9d00ff" stroke-width="2"/>
    <text x="250" y="243" fill="#9d00ff" font-size="10" font-family="monospace" text-anchor="middle">CYBER</text>

    <!-- Sign 3 -->
    <rect x="355" y="180" width="70" height="30" fill="none" stroke="#ff0080" stroke-width="2"/>
    <text x="390" y="200" fill="#ff0080" font-size="10" font-family="monospace" text-anchor="middle">NEON</text>

    <!-- Sign 4 -->
    <rect x="485" y="240" width="65" height="30" fill="none" stroke="#f0ff00" stroke-width="2"/>
    <text x="517" y="260" fill="#f0ff00" font-size="10" font-family="monospace" text-anchor="middle">WAVE</text>
  </g>

  <!-- Ground Line -->
  <rect x="0" y="395" width="800" height="5" fill="#0a0a0f"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>

  <!-- Flying Cars/Lights -->
  <g filter="url(#neon-glow-city)">
    <rect x="100" y="60" width="15" height="3" fill="#ff0080" opacity="0.6">
      <animate attributeName="x" from="100" to="700" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="500" y="100" width="12" height="2" fill="#00f0ff" opacity="0.6">
      <animate attributeName="x" from="500" to="0" dur="10s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Holographic Ads -->
  <g opacity="0.15">
    <rect x="160" y="100" width="30" height="40" fill="#9d00ff" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="440" y="70" width="35" height="45" fill="#00f0ff" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Scanline Overlay -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="800" y2="0" stroke="#00f0ff" stroke-width="1">
      <animate attributeName="y1" from="0" to="400" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="y2" from="0" to="400" dur="10s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
