<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="rocketGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rocket body -->
  <path d="M100 40 L120 80 L120 120 L100 140 L80 120 L80 80 Z"
        stroke="#00f0ff" stroke-width="2" fill="rgba(0,240,255,0.1)" filter="url(#rocketGlow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Window -->
  <circle cx="100" cy="80" r="10" stroke="#9d00ff" stroke-width="2" fill="rgba(157,0,255,0.2)" filter="url(#rocketGlow)"/>

  <!-- Fins -->
  <path d="M80 120 L70 140 L85 130" stroke="#ff0080" stroke-width="2" fill="rgba(255,0,128,0.2)" filter="url(#rocketGlow)"/>
  <path d="M120 120 L130 140 L115 130" stroke="#ff0080" stroke-width="2" fill="rgba(255,0,128,0.2)" filter="url(#rocketGlow)"/>

  <!-- Flame -->
  <path d="M90 140 L100 170 L110 140" fill="#f0ff00" filter="url(#rocketGlow)">
    <animate attributeName="d" values="M90 140 L100 170 L110 140;M90 140 L100 160 L110 140;M90 140 L100 170 L110 140" dur="0.5s" repeatCount="indefinite"/>
  </path>

  <!-- Trail particles -->
  <circle r="2" fill="#f0ff00">
    <animateMotion dur="1s" repeatCount="indefinite" path="M100 170 Q90 180 85 190"/>
    <animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#f0ff00">
    <animateMotion dur="1.2s" repeatCount="indefinite" path="M100 170 Q90 180 85 190"/>
    <animate attributeName="opacity" values="1;0" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#f0ff00">
    <animateMotion dur="1.4s" repeatCount="indefinite" path="M100 170 Q90 180 85 190"/>
    <animate attributeName="opacity" values="1;0" dur="1.4s" repeatCount="indefinite"/>
  </circle>
</svg>
