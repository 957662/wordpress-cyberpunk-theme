<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <defs>
    <!-- 云渐变 -->
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>

    <!-- 霓虹发光滤镜 -->
    <filter id="cloudGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="#0a0a0f"/>

  <!-- 网格线 -->
  <g stroke="#2a2a4a" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="50" y1="0" x2="50" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="250"/>
    <line x1="150" y1="0" x2="150" y2="250"/>
    <line x1="200" y1="0" x2="200" y2="250"/>
    <line x1="250" y1="0" x2="250" y2="250"/>
    <line x1="300" y1="0" x2="300" y2="250"/>
    <line x1="350" y1="0" x2="350" y2="250"/>
  </g>

  <!-- 云服务器1 -->
  <g transform="translate(80, 80)" filter="url(#cloudGlow)">
    <!-- 云形状 -->
    <ellipse cx="40" cy="35" rx="30" ry="15" fill="url(#cloudGradient)" stroke="#00f0ff" stroke-width="2"/>
    <ellipse cx="20" cy="40" rx="15" ry="12" fill="url(#cloudGradient)" stroke="#00f0ff" stroke-width="2"/>
    <ellipse cx="60" cy="40" rx="15" ry="12" fill="url(#cloudGradient)" stroke="#00f0ff" stroke-width="2"/>
    <rect x="20" y="40" width="40" height="15" fill="url(#cloudGradient)" stroke="#00f0ff" stroke-width="2"/>

    <!-- 数据图标 -->
    <g fill="#00f0ff">
      <rect x="30" y="38" width="4" height="4" rx="1">
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
      </rect>
      <rect x="38" y="38" width="4" height="4" rx="1">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
      </rect>
      <rect x="46" y="38" width="4" height="4" rx="1">
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- 同步圆环 -->
    <circle cx="70" cy="25" r="8" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="40" stroke-dashoffset="0">
      <animateTransform attributeName="transform" type="rotate" from="0 70 25" to="360 70 25" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 云服务器2 -->
  <g transform="translate(200, 60)" filter="url(#cloudGlow)">
    <!-- 云形状 -->
    <ellipse cx="50" cy="40" rx="35" ry="18" fill="url(#cloudGradient)" stroke="#9d00ff" stroke-width="2"/>
    <ellipse cx="25" cy="45" rx="18" ry="14" fill="url(#cloudGradient)" stroke="#9d00ff" stroke-width="2"/>
    <ellipse cx="75" cy="45" rx="18" ry="14" fill="url(#cloudGradient)" stroke="#9d00ff" stroke-width="2"/>
    <rect x="25" y="45" width="50" height="18" fill="url(#cloudGradient)" stroke="#9d00ff" stroke-width="2"/>

    <!-- 数据图标 -->
    <g fill="#9d00ff">
      <rect x="38" y="43" width="5" height="5" rx="1">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="0.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="43" width="5" height="5" rx="1">
        <animate attributeName="opacity" values="1;0.5;1" dur="0.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="58" y="43" width="5" height="5" rx="1">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="0.8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- 同步圆环 -->
    <circle cx="85" cy="30" r="10" fill="none" stroke="#9d00ff" stroke-width="1.5" stroke-dasharray="50" stroke-dashoffset="0">
      <animateTransform attributeName="transform" type="rotate" from="360 85 30" to="0 85 30" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 云服务器3 -->
  <g transform="translate(140, 150)" filter="url(#cloudGlow)">
    <!-- 云形状 -->
    <ellipse cx="45" cy="38" rx="32" ry="16" fill="url(#cloudGradient)" stroke="#ff0080" stroke-width="2"/>
    <ellipse cx="22" cy="42" rx="16" ry="13" fill="url(#cloudGradient)" stroke="#ff0080" stroke-width="2"/>
    <ellipse cx="68" cy="42" rx="16" ry="13" fill="url(#cloudGradient)" stroke="#ff0080" stroke-width="2"/>
    <rect x="22" y="42" width="46" height="16" fill="url(#cloudGradient)" stroke="#ff0080" stroke-width="2"/>

    <!-- 数据图标 -->
    <g fill="#ff0080">
      <rect x="35" y="40" width="4" height="4" rx="1">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="44" y="40" width="4" height="4" rx="1">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="53" y="40" width="4" height="4" rx="1">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- 同步圆环 -->
    <circle cx="75" cy="28" r="9" fill="none" stroke="#ff0080" stroke-width="1.5" stroke-dasharray="45" stroke-dashoffset="0">
      <animateTransform attributeName="transform" type="rotate" from="0 75 28" to="360 75 28" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 数据流连接线 -->
  <g stroke-width="1" fill="none" opacity="0.6">
    <!-- 连接线1 -->
    <path d="M120 100 Q150 120 160 150" stroke="#00f0ff" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="1s" repeatCount="indefinite"/>
    </path>
    <!-- 连接线2 -->
    <path d="M250 100 Q220 130 200 160" stroke="#9d00ff" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="1s" repeatCount="indefinite"/>
    </path>
    <!-- 连接线3 -->
    <path d="M160 100 Q200 80 230 90" stroke="#ff0080" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 数据包 -->
  <g>
    <circle r="3" fill="#00f0ff">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath href="#dataPath1"/>
      </animateMotion>
    </circle>
    <path id="dataPath1" d="M120 100 Q150 120 160 150" fill="none" stroke="none"/>
  </g>

  <g>
    <circle r="3" fill="#9d00ff">
      <animateMotion dur="2.5s" repeatCount="indefinite">
        <mpath href="#dataPath2"/>
      </animateMotion>
    </circle>
    <path id="dataPath2" d="M250 100 Q220 130 200 160" fill="none" stroke="none"/>
  </g>

  <g>
    <circle r="3" fill="#ff0080">
      <animateMotion dur="2s" repeatCount="indefinite">
        <mpath href="#dataPath3"/>
      </animateMotion>
    </circle>
    <path id="dataPath3" d="M160 100 Q200 80 230 90" fill="none" stroke="none"/>
  </g>
</svg>
