<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0f"/>

  <!-- Definitions -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Grid Overlay -->
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- Main Construction Icon Group -->
  <g transform="translate(400, 250)">
    <!-- Warning Triangle Base -->
    <path d="M0 -120 L104 60 L-104 60 Z" stroke="url(#yellowGradient)" stroke-width="4" fill="rgba(240, 255, 0, 0.1)">
      <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Inner Triangle -->
    <path d="M0 -90 L78 45 L-78 45 Z" stroke="#f0ff00" stroke-width="2" fill="none" opacity="0.5"/>

    <!-- Exclamation Mark -->
    <rect x="-10" y="-60" width="20" height="60" rx="10" fill="url(#yellowGradient)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <circle cx="0" cy="20" r="10" fill="url(#yellowGradient)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>

    <!-- Rotating Gear Left -->
    <g transform="translate(-150, 0)">
      <circle cx="0" cy="0" r="50" stroke="#00f0ff" stroke-width="3" fill="none" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </circle>
      <g stroke="#00f0ff" stroke-width="2" opacity="0.6">
        <line x1="-60" y1="0" x2="-40" y2="0">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
        </line>
        <line x1="60" y1="0" x2="40" y2="0">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="-60" x2="0" y2="-40">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="60" x2="0" y2="40">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
        </line>
      </g>
      <circle cx="0" cy="0" r="20" fill="#00f0ff" opacity="0.3">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Rotating Gear Right (Reverse) -->
    <g transform="translate(150, 0)">
      <circle cx="0" cy="0" r="40" stroke="#9d00ff" stroke-width="3" fill="none" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/>
      </circle>
      <g stroke="#9d00ff" stroke-width="2" opacity="0.6">
        <line x1="-50" y1="0" x2="-30" y2="0">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/>
        </line>
        <line x1="50" y1="0" x2="30" y2="0">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="-50" x2="0" y2="-30">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="50" x2="0" y2="30">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/>
        </line>
      </g>
      <circle cx="0" cy="0" r="15" fill="#9d00ff" opacity="0.3">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Circuit Lines -->
    <g stroke="url(#cyanGradient)" stroke-width="1.5" opacity="0.4">
      <path d="M-120 80 L-120 100 L-80 100">
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M120 80 L120 100 L80 100">
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Progress Bar -->
  <g transform="translate(200, 400)">
    <rect x="0" y="0" width="400" height="8" rx="4" fill="#16162a" stroke="#2a2a4a" stroke-width="1"/>
    <rect x="0" y="0" width="200" height="8" rx="4" fill="url(#cyanGradient)">
      <animate attributeName="width" values="0;200;180;220;200" dur="4s" repeatCount="indefinite"/>
    </rect>
    <g fill="#00f0ff" font-family="Orbitron, sans-serif" font-size="12">
      <text x="400" y="25" text-anchor="end" opacity="0.8">CONSTRUCTION IN PROGRESS...</text>
    </g>
  </g>

  <!-- Floating Data Particles -->
  <g fill="#00f0ff" opacity="0.4">
    <circle cx="100" cy="100" r="2">
      <animate attributeName="cx" values="100;120;100" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;80;100" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="150" r="3">
      <animate attributeName="cx" values="700;680;700" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;170;150" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="500" r="2.5">
      <animate attributeName="cx" values="150;170;150" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="500;480;500" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="480" r="2">
      <animate attributeName="cx" values="650;630;650" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="480;500;480" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner Tech Brackets -->
  <g stroke="url(#yellowGradient)" stroke-width="2" fill="none" opacity="0.4">
    <!-- Top Left -->
    <path d="M30 80 L30 30 L80 30">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- Top Right -->
    <path d="M770 80 L770 30 L720 30">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <!-- Bottom Left -->
    <path d="M30 520 L30 570 L80 570">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" begin="1s" repeatCount="indefinite"/>
    </path>
    <!-- Bottom Right -->
    <path d="M770 520 L770 570 L720 570">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Bottom Text -->
  <g transform="translate(400, 540)" text-anchor="middle">
    <text x="0" y="0" fill="url(#cyanGradient)" font-family="Orbitron, sans-serif" font-size="20" font-weight="bold" letter-spacing="4">
      UNDER CONSTRUCTION
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Scanlines -->
  <rect width="800" height="600" fill="url(#grid)" opacity="0.02"/>
</svg>