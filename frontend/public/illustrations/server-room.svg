<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <!-- 服务器机柜渐变 -->
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>

    <!-- LED 发光滤镜 -->
    <filter id="ledGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="300" fill="#0a0a0f"/>

  <!-- 服务器机柜1 -->
  <g transform="translate(50, 50)">
    <!-- 机柜外框 -->
    <rect x="0" y="0" width="80" height="200" rx="4" fill="url(#serverGradient)" stroke="#2a2a4a" stroke-width="2"/>

    <!-- 服务器单元 -->
    <g fill="#16162a" stroke="#2a2a4a" stroke-width="1">
      <rect x="8" y="10" width="64" height="20" rx="2"/>
      <rect x="8" y="35" width="64" height="20" rx="2"/>
      <rect x="8" y="60" width="64" height="20" rx="2"/>
      <rect x="8" y="85" width="64" height="20" rx="2"/>
      <rect x="8" y="110" width="64" height="20" rx="2"/>
      <rect x="8" y="135" width="64" height="20" rx="2"/>
      <rect x="8" y="160" width="64" height="20" rx="2"/>
    </g>

    <!-- LED 指示灯 -->
    <g filter="url(#ledGlow)">
      <!-- 绿色正常灯 -->
      <circle cx="18" cy="20" r="2" fill="#00ff88"/>
      <circle cx="18" cy="45" r="2" fill="#00ff88"/>
      <circle cx="18" cy="70" r="2" fill="#00ff88"/>
      <circle cx="18" cy="95" r="2" fill="#00ff88"/>
      <circle cx="18" cy="120" r="2" fill="#00ff88"/>
      <circle cx="18" cy="145" r="2" fill="#00ff88"/>
      <circle cx="18" cy="170" r="2" fill="#00ff88"/>

      <!-- 活动指示灯 -->
      <circle cx="26" cy="20" r="2" fill="#00f0ff">
        <animate attributeName="opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="26" cy="45" r="2" fill="#00f0ff">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="0.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="26" cy="70" r="2" fill="#00f0ff">
        <animate attributeName="opacity" values="1;0.3;1" dur="0.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- 服务器机柜2 -->
  <g transform="translate(160, 50)">
    <!-- 机柜外框 -->
    <rect x="0" y="0" width="80" height="200" rx="4" fill="url(#serverGradient)" stroke="#2a2a4a" stroke-width="2"/>

    <!-- 服务器单元 -->
    <g fill="#16162a" stroke="#2a2a4a" stroke-width="1">
      <rect x="8" y="10" width="64" height="20" rx="2"/>
      <rect x="8" y="35" width="64" height="20" rx="2"/>
      <rect x="8" y="60" width="64" height="20" rx="2"/>
      <rect x="8" y="85" width="64" height="20" rx="2"/>
      <rect x="8" y="110" width="64" height="20" rx="2"/>
      <rect x="8" y="135" width="64" height="20" rx="2"/>
      <rect x="8" y="160" width="64" height="20" rx="2"/>
    </g>

    <!-- LED 指示灯 -->
    <g filter="url(#ledGlow)">
      <circle cx="18" cy="20" r="2" fill="#00ff88"/>
      <circle cx="18" cy="45" r="2" fill="#00ff88"/>
      <circle cx="18" cy="70" r="2" fill="#00ff88"/>
      <circle cx="18" cy="95" r="2" fill="#ff0080">
        <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="18" cy="120" r="2" fill="#00ff88"/>
      <circle cx="18" cy="145" r="2" fill="#00ff88"/>
      <circle cx="18" cy="170" r="2" fill="#00ff88"/>

      <circle cx="26" cy="20" r="2" fill="#9d00ff">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="0.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="26" cy="70" r="2" fill="#9d00ff">
        <animate attributeName="opacity" values="1;0.5;1" dur="0.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="26" cy="120" r="2" fill="#9d00ff">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.1s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- 服务器机柜3 -->
  <g transform="translate(270, 50)">
    <!-- 机柜外框 -->
    <rect x="0" y="0" width="80" height="200" rx="4" fill="url(#serverGradient)" stroke="#2a2a4a" stroke-width="2"/>

    <!-- 服务器单元 -->
    <g fill="#16162a" stroke="#2a2a4a" stroke-width="1">
      <rect x="8" y="10" width="64" height="20" rx="2"/>
      <rect x="8" y="35" width="64" height="20" rx="2"/>
      <rect x="8" y="60" width="64" height="20" rx="2"/>
      <rect x="8" y="85" width="64" height="20" rx="2"/>
      <rect x="8" y="110" width="64" height="20" rx="2"/>
      <rect x="8" y="135" width="64" height="20" rx="2"/>
      <rect x="8" y="160" width="64" height="20" rx="2"/>
    </g>

    <!-- LED 指示灯 -->
    <g filter="url(#ledGlow)">
      <circle cx="18" cy="20" r="2" fill="#00ff88"/>
      <circle cx="18" cy="45" r="2" fill="#00ff88"/>
      <circle cx="18" cy="70" r="2" fill="#00ff88"/>
      <circle cx="18" cy="95" r="2" fill="#00ff88"/>
      <circle cx="18" cy="120" r="2" fill="#00ff88"/>
      <circle cx="18" cy="145" r="2" fill="#00ff88"/>
      <circle cx="18" cy="170" r="2" fill="#00ff88"/>

      <circle cx="26" cy="45" r="2" fill="#ff0080">
        <animate attributeName="opacity" values="1;0.3;1" dur="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="26" cy="95" r="2" fill="#ff0080">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="26" cy="145" r="2" fill="#ff0080">
        <animate attributeName="opacity" values="1;0.3;1" dur="0.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- 地面反射 -->
  <rect x="0" y="270" width="400" height="30" fill="#050508" opacity="0.5"/>
  <ellipse cx="90" cy="280" rx="35" ry="5" fill="#00f0ff" opacity="0.1"/>
  <ellipse cx="200" cy="280" rx="35" ry="5" fill="#9d00ff" opacity="0.1"/>
  <ellipse cx="310" cy="280" rx="35" ry="5" fill="#ff0080" opacity="0.1"/>
</svg>
