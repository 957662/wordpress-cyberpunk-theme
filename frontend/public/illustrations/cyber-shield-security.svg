<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="security-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
  </defs>

  <!-- Shield Shape -->
  <path d="M200 250c0 0 120-60 120-150V50L200 20 80 50v50c0 90 120 150 120 150z"
        stroke="url(#security-gradient)"
        stroke-width="4"
        fill="rgba(0,240,255,0.05)"/>

  <!-- Inner Shield -->
  <path d="M200 220c0 0 90-45 90-120V70L200 45 110 70v30c0 75 90 120 90 120z"
        stroke="#9d00ff"
        stroke-width="2"
        fill="rgba(157,0,255,0.1)"/>

  <!-- Lock Symbol -->
  <rect x="180" y="120" width="40" height="45" rx="5"
        stroke="#00f0ff"
        stroke-width="3"
        fill="rgba(0,240,255,0.1)"/>
  <path d="M190 120v-20a10 10 0 0 1 20 0v20"
        stroke="#00f0ff"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"/>
  <circle cx="200" cy="142" r="4" fill="#00f0ff">
    <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Security Scan Lines -->
  <line x1="100" y1="70" x2="300" y2="70"
        stroke="#00f0ff"
        stroke-width="1"
        opacity="0.3">
    <animate attributeName="y1" values="70;200;70" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="70;200;70" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Protection Nodes -->
  <circle cx="120" cy="90" r="5" stroke="#9d00ff" stroke-width="2" fill="none">
    <animate attributeName="r" values="5;7;5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="90" r="5" stroke="#9d00ff" stroke-width="2" fill="none">
    <animate attributeName="r" values="5;7;5" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="200" r="5" stroke="#ff0080" stroke-width="2" fill="none">
    <animate attributeName="r" values="5;7;5" dur="1.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="200" r="5" stroke="#ff0080" stroke-width="2" fill="none">
    <animate attributeName="r" values="5;7;5" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Data Flow Lines -->
  <path d="M120 90L200 142L280 90"
        stroke="#00f0ff"
        stroke-width="1"
        fill="none"
        opacity="0.3"/>
  <path d="M120 200L200 142L280 200"
        stroke="#00f0ff"
        stroke-width="1"
        fill="none"
        opacity="0.3"/>

  <!-- Pulse Effect -->
  <circle cx="200" cy="142" r="60"
          stroke="#00f0ff"
          stroke-width="0.5"
          fill="none"
          opacity="0.2">
    <animate attributeName="r" values="60;70;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
