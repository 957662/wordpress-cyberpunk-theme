<svg width="500" height="350" viewBox="0 0 500 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="editor-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#9d00ff"/>
    </linearGradient>

    <filter id="editor-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Window Frame -->
  <rect x="25" y="25" width="450" height="300" rx="8" stroke="url(#editor-gradient)" stroke-width="3" fill="#0a0a0f"/>

  <!-- Title Bar -->
  <rect x="25" y="25" width="450" height="35" rx="8" fill="rgba(0,240,255,0.1)"/>
  <rect x="25" y="50" width="450" height="10" fill="rgba(0,240,255,0.1)"/>
  <circle cx="50" cy="42" r="6" fill="#ff0080"/>
  <circle cx="70" cy="42" r="6" fill="#f0ff00"/>
  <circle cx="90" cy="42" r="6" fill="#00f0ff"/>
  <text x="250" y="47" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="12">cyberpress.tsx</text>

  <!-- Line Numbers -->
  <g fill="#606070" font-family="monospace" font-size="11">
    <text x="45" y="85">1</text>
    <text x="45" y="105">2</text>
    <text x="45" y="125">3</text>
    <text x="45" y="145">4</text>
    <text x="45" y="165">5</text>
    <text x="45" y="185">6</text>
    <text x="45" y="205">7</text>
    <text x="45" y="225">8</text>
    <text x="45" y="245">9</text>
    <text x="45" y="265">10</text>
    <text x="45" y="285">11</text>
  </g>

  <!-- Code Content -->
  <g font-family="monospace" font-size="12" filter="url(#editor-glow)">
    <!-- Line 1 -->
    <text x="75" y="85" fill="#9d00ff">import</text>
    <text x="135" y="85" fill="#e0e0e0"> {</text>
    <text x="75" y="85" fill="#00f0ff">BlogCard</text>
    <text x="155" y="85" fill="#e0e0e0">} </text>
    <text x="175" y="85" fill="#9d00ff">from</text>
    <text x="215" y="85" fill="#00ff88">'@/components'</text>
    <text x="305" y="85" fill="#e0e0e0">;</text>

    <!-- Line 2 -->
    <text x="75" y="105" fill="#e0e0e0"></text>

    <!-- Line 3 -->
    <text x="75" y="125" fill="#9d00ff">export</text>
    <text x="125" y="125" fill="#9d00ff"> default</text>
    <text x="185" y="125" fill="#9d00ff"> function</text>
    <text x="275" y="125" fill="#ffcc00">BlogPage</text>
    <text x="345" y="125" fill="#e0e0e0">() {</text>

    <!-- Line 4 -->
    <text x="85" y="145" fill="#9d00ff"> const</text>
    <text x="145" y="145" fill="#e0e0e0"> posts = </text>
    <text x="205" y="145" fill="#00f0ff">useBlogPosts</text>
    <text x="295" y="145" fill="#e0e0e0">();</text>

    <!-- Line 5 -->
    <text x="85" y="165" fill="#9d00ff"> return</text>
    <text x="145" y="165" fill="#e0e0e0"> (</text>

    <!-- Line 6 -->
    <text x="95" y="185" fill="#e0e0e0">&lt;</text>
    <text x="105" y="185" fill="#00ff88">div</text>
    <text x="135" y="185" fill="#00f0ff"> className</text>
    <text x="205" y="185" fill="#e0e0e0">=</text>
    <text x="215" y="185" fill="#00ff88">"grid"</text>
    <text x="265" y="185" fill="#e0e0e0">&gt;</text>

    <!-- Line 7 -->
    <text x="105" y="205" fill="#e0e0e0">{posts.</text>
    <text x="175" y="205" fill="#ffcc00">map</text>
    <text x="205" y="205" fill="#e0e0e0">((</text>
    <text x="220" y="205" fill="#e0e0e0">post</text>
    <text x="255" y="205" fill="#e0e0e0">) =&gt; (</text>

    <!-- Line 8 -->
    <text x="115" y="225" fill="#e0e0e0">&lt;</text>
    <text x="125" y="225" fill="#00ff88">BlogCard</text>
    <text x="195" y="225" fill="#00f0ff"> key</text>
    <text x="225" y="225" fill="#e0e0e0">={post.</text>
    <text x="285" y="225" fill="#ffcc00">id</text>
    <text x="305" y="225" fill="#e0e0e0">} {...post} /&gt;</text>

    <!-- Line 9 -->
    <text x="105" y="245" fill="#e0e0e0">))}</text>

    <!-- Line 10 -->
    <text x="95" y="265" fill="#e0e0e0">&lt;/</text>
    <text x="105" y="265" fill="#00ff88">div</text>
    <text x="135" y="265" fill="#e0e0e0">&gt;</text>

    <!-- Line 11 -->
    <text x="75" y="285" fill="#e0e0e0">);</text>
  </g>

  <!-- Cursor -->
  <rect x="320" y="273" width="8" height="14" fill="#00f0ff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Syntax Highlighting Glow -->
  <circle cx="300" cy="200" r="80" fill="url(#editor-gradient)" opacity="0.1"/>
</svg>