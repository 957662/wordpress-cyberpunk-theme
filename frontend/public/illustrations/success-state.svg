<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="successGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Success circle -->
  <circle cx="100" cy="100" r="50" stroke="#00f0ff" stroke-width="3"
          fill="rgba(0,240,255,0.1)" filter="url(#successGlow)"/>

  <!-- Animated ripple -->
  <circle cx="100" cy="100" r="50" stroke="#00f0ff" stroke-width="2" fill="none" opacity="0">
    <animate attributeName="r" values="50;80" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Checkmark -->
  <polyline points="75 100 92 118 125 82" stroke="#00f0ff" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#successGlow)"/>

  <!-- Sparkles -->
  <circle cx="60" cy="60" r="3" fill="#f0ff00" filter="url(#successGlow)">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="60" r="3" fill="#f0ff00" filter="url(#successGlow)">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="100" cy="50" r="3" fill="#f0ff00" filter="url(#successGlow)">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
</svg>
