<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="devopsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="devopsGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- CI/CD Pipeline -->
  <g stroke="url(#devopsGrad)" stroke-width="2" fill="none">
    <!-- Pipeline Lines -->
    <path d="M80 200 L150 200" opacity="0.6"/>
    <path d="M200 200 L250 200" opacity="0.6"/>
    <path d="M300 200 L350 200" opacity="0.6"/>
  </g>

  <!-- Stage 1: Code -->
  <g filter="url(#devopsGlow)">
    <circle cx="80" cy="200" r="35" fill="rgba(0,255,136,0.1)"
            stroke="url(#devopsGrad)" stroke-width="2" />
    <text x="80" y="195" fill="#00ff88" font-family="monospace" font-size="12"
          text-anchor="middle" font-weight="bold">CODE</text>
    <text x="80" y="215" fill="#00ff88" font-family="monospace" font-size="8"
          text-anchor="middle" opacity="0.7">PUSH</text>
  </g>

  <!-- Stage 2: Build -->
  <g filter="url(#devopsGlow)">
    <circle cx="200" cy="200" r="35" fill="rgba(0,240,255,0.1)"
            stroke="url(#devopsGrad)" stroke-width="2" />
    <text x="200" y="195" fill="#00f0ff" font-family="monospace" font-size="12"
          text-anchor="middle" font-weight="bold">BUILD</text>
    <text x="200" y="215" fill="#00f0ff" font-family="monospace" font-size="8"
          text-anchor="middle" opacity="0.7">DOCKER</text>
  </g>

  <!-- Stage 3: Test -->
  <g filter="url(#devopsGlow)">
    <circle cx="320" cy="200" r="35" fill="rgba(157,0,255,0.1)"
            stroke="url(#devopsGrad)" stroke-width="2" />
    <text x="320" y="195" fill="#9d00ff" font-family="monospace" font-size="12"
          text-anchor="middle" font-weight="bold">TEST</text>
    <text x="320" y="215" fill="#9d00ff" font-family="monospace" font-size="8"
          text-anchor="middle" opacity="0.7">CI/CD</text>
  </g>

  <!-- Flow Arrows -->
  <g fill="#00f0ff">
    <polygon points="140,195 150,200 140,205" />
    <polygon points="240,195 250,200 240,205" />
  </g>

  <!-- Code Symbols -->
  <g font-family="monospace" font-size="10" fill="#00ff88" opacity="0.6">
    <text x="80" y="260">&lt;/&gt;</text>
    <text x="200" y="260">{ }</text>
    <text x="320" y="260">✓</text>
  </g>

  <!-- Server Rack -->
  <g filter="url(#devopsGlow)">
    <rect x="50" y="100" width="300" height="60" fill="rgba(0,240,255,0.05)"
          stroke="url(#devopsGrad)" stroke-width="1" rx="5" />
    <rect x="60" y="110" width="80" height="15" fill="rgba(0,255,136,0.2)"
          stroke="url(#devopsGrad)" stroke-width="0.5" rx="2" />
    <rect x="60" y="135" width="80" height="15" fill="rgba(0,240,255,0.2)"
          stroke="url(#devopsGrad)" stroke-width="0.5" rx="2" />
    <rect x="260" y="110" width="80" height="15" fill="rgba(157,0,255,0.2)"
          stroke="url(#devopsGrad)" stroke-width="0.5" rx="2" />
    <rect x="260" y="135" width="80" height="15" fill="rgba(255,0,128,0.2)"
          stroke="url(#devopsGrad)" stroke-width="0.5" rx="2" />
  </g>

  <!-- Status Lights -->
  <g>
    <circle cx="70" cy="118" r="3" fill="#00ff88" filter="url(#devopsGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="143" r="3" fill="#00f0ff" filter="url(#devopsGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="330" cy="118" r="3" fill="#9d00ff" filter="url(#devopsGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="330" cy="143" r="3" fill="#ff0080" filter="url(#devopsGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>

  <!-- Connection Lines -->
  <g stroke="url(#devopsGrad)" stroke-width="0.5" opacity="0.3">
    <line x1="200" y1="165" x2="200" y2="100" />
    <line x1="80" y1="165" x2="80" y2="100" />
    <line x1="320" y1="165" x2="320" y2="100" />
  </g>

  <!-- Bottom Info -->
  <rect x="100" y="320" width="200" height="30" fill="rgba(0,240,255,0.05)"
        stroke="url(#devopsGrad)" stroke-width="1" rx="5" />
  <text x="200" y="340" fill="#00f0ff" font-family="monospace" font-size="12"
        text-anchor="middle">DEVOPS PIPELINE</text>

  <!-- Decorative Elements -->
  <g stroke="url(#devopsGrad)" stroke-width="1" fill="none" opacity="0.3">
    <path d="M30 200 L40 195" />
    <path d="M30 200 L40 205" />
    <path d="M370 200 L360 195" />
    <path d="M370 200 L360 205" />
  </g>
</svg>
