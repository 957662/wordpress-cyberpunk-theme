<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hero-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="hero-grad-2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background circles -->
  <circle cx="200" cy="200" r="150" fill="url(#hero-grad-1)" opacity="0.5" />
  <circle cx="200" cy="200" r="100" fill="url(#hero-grad-2)" opacity="0.3" />

  <!-- Circuit pattern -->
  <g stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.3">
    <!-- Horizontal lines -->
    <line x1="50" y1="100" x2="150" y2="100" />
    <line x1="150" y1="100" x2="150" y2="150" />
    <circle cx="150" cy="100" r="3" fill="#00f0ff" />

    <line x1="250" y1="100" x2="350" y2="100" />
    <line x1="250" y1="100" x2="250" y2="150" />
    <circle cx="250" cy="100" r="3" fill="#00f0ff" />

    <line x1="50" y1="300" x2="150" y2="300" />
    <line x1="150" y1="300" x2="150" y2="250" />
    <circle cx="150" cy="300" r="3" fill="#9d00ff" />

    <line x1="250" y1="300" x2="350" y2="300" />
    <line x1="250" y1="300" x2="250" y2="250" />
    <circle cx="250" cy="300" r="3" fill="#9d00ff" />

    <!-- Vertical lines -->
    <line x1="100" y1="50" x2="100" y2="150" />
    <line x1="100" y1="150" x2="150" y2="150" />
    <circle cx="100" cy="150" r="3" fill="#ff0080" />

    <line x1="300" y1="50" x2="300" y2="150" />
    <line x1="300" y1="150" x2="250" y2="150" />
    <circle cx="300" cy="150" r="3" fill="#ff0080" />

    <line x1="100" y1="250" x2="100" y2="350" />
    <line x1="100" y1="250" x2="150" y2="250" />
    <circle cx="100" cy="250" r="3" fill="#00f0ff" />

    <line x1="300" y1="250" x2="300" y2="350" />
    <line x1="300" y1="250" x2="250" y2="250" />
    <circle cx="300" cy="250" r="3" fill="#00f0ff" />
  </g>

  <!-- Hexagon decorations -->
  <g stroke="#9d00ff" stroke-width="1" fill="none" opacity="0.2">
    <polygon points="60,60 75,52 90,60 90,76 75,84 60,76" />
    <polygon points="310,60 325,52 340,60 340,76 325,84 310,76" />
    <polygon points="60,310 75,302 90,310 90,326 75,334 60,326" />
    <polygon points="310,310 325,302 340,310 340,326 325,334 310,326" />
  </g>

  <!-- Center element -->
  <g transform="translate(200, 200)">
    <circle cx="0" cy="0" r="50" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.4" />
    <circle cx="0" cy="0" r="35" stroke="#9d00ff" stroke-width="1" fill="none" opacity="0.3" />
    <circle cx="0" cy="0" r="20" fill="url(#hero-grad-1)" opacity="0.5" />

    <!-- Orbiting dots -->
    <circle cx="0" cy="-50" r="2" fill="#00f0ff" opacity="0.8" />
    <circle cx="50" cy="0" r="2" fill="#9d00ff" opacity="0.8" />
    <circle cx="0" cy="50" r="2" fill="#ff0080" opacity="0.8" />
    <circle cx="-50" cy="0" r="2" fill="#00f0ff" opacity="0.8" />
  </g>

  <!-- Corner accents -->
  <g opacity="0.3">
    <path d="M 20 20 L 20 50 L 50 20" stroke="#00f0ff" stroke-width="2" fill="none" />
    <path d="M 380 20 L 380 50 L 350 20" stroke="#00f0ff" stroke-width="2" fill="none" />
    <path d="M 20 380 L 20 350 L 50 380" stroke="#ff0080" stroke-width="2" fill="none" />
    <path d="M 380 380 L 380 350 L 350 380" stroke="#ff0080" stroke-width="2" fill="none" />
  </g>
</svg>