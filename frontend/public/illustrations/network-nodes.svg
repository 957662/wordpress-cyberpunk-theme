<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="node-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <filter id="node-glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="line-glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#0a0a0f"/>

  <!-- Network Lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.3" filter="url(#line-glow)">
    <!-- Central connections -->
    <line x1="300" y1="200" x2="150" y2="100"/>
    <line x1="300" y1="200" x2="450" y2="100"/>
    <line x1="300" y1="200" x2="150" y2="300"/>
    <line x1="300" y1="200" x2="450" y2="300"/>
    <line x1="300" y1="200" x2="100" y2="200"/>
    <line x1="300" y1="200" x2="500" y2="200"/>

    <!-- Outer connections -->
    <line x1="150" y1="100" x2="450" y2="100"/>
    <line x1="150" y1="100" x2="100" y2="200"/>
    <line x1="450" y1="100" x2="500" y2="200"/>
    <line x1="150" y1="300" x2="100" y2="200"/>
    <line x1="450" y1="300" x2="500" y2="200"/>
    <line x1="150" y1="300" x2="450" y2="300"/>
  </g>

  <!-- Data Packets (Animated) -->
  <g filter="url(#node-glow)">
    <circle r="3" fill="#00f0ff">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath href="#path1"/>
      </animateMotion>
    </circle>
    <circle r="3" fill="#9d00ff">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#path2"/>
      </animateMotion>
    </circle>
    <circle r="3" fill="#ff0080">
      <animateMotion dur="3.5s" repeatCount="indefinite">
        <mpath href="#path3"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Motion Paths (invisible) -->
  <path id="path1" d="M 150 100 L 300 200 L 450 100" fill="none" stroke="none"/>
  <path id="path2" d="M 450 300 L 300 200 L 150 300" fill="none" stroke="none"/>
  <path id="path3" d="M 100 200 L 300 200 L 500 200" fill="none" stroke="none"/>

  <!-- Central Node -->
  <g filter="url(#node-glow)">
    <!-- Outer ring -->
    <circle cx="300" cy="200" r="40" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.5">
      <animate attributeName="r" values="40;45;40" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Middle ring -->
    <circle cx="300" cy="200" r="30" stroke="#9d00ff" stroke-width="1.5" fill="none" opacity="0.7">
      <animate attributeName="r" values="30;35;30" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner circle -->
    <circle cx="300" cy="200" r="20" fill="url(#node-gradient)" opacity="0.8"/>
    <!-- Core -->
    <circle cx="300" cy="200" r="8" fill="#00f0ff">
      <animate attributeName="r" values="8;10;8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Satellite Nodes -->
  <g filter="url(#node-glow)">
    <!-- Top Left -->
    <g>
      <circle cx="150" cy="100" r="15" fill="#0a0a0f" stroke="#00f0ff" stroke-width="1"/>
      <circle cx="150" cy="100" r="6" fill="#00f0ff" opacity="0.8"/>
    </g>

    <!-- Top Right -->
    <g>
      <circle cx="450" cy="100" r="15" fill="#0a0a0f" stroke="#9d00ff" stroke-width="1"/>
      <circle cx="450" cy="100" r="6" fill="#9d00ff" opacity="0.8"/>
    </g>

    <!-- Bottom Left -->
    <g>
      <circle cx="150" cy="300" r="15" fill="#0a0a0f" stroke="#ff0080" stroke-width="1"/>
      <circle cx="150" cy="300" r="6" fill="#ff0080" opacity="0.8"/>
    </g>

    <!-- Bottom Right -->
    <g>
      <circle cx="450" cy="300" r="15" fill="#0a0a0f" stroke="#f0ff00" stroke-width="1"/>
      <circle cx="450" cy="300" r="6" fill="#f0ff00" opacity="0.8"/>
    </g>

    <!-- Left -->
    <g>
      <circle cx="100" cy="200" r="12" fill="#0a0a0f" stroke="#00f0ff" stroke-width="1"/>
      <circle cx="100" cy="200" r="5" fill="#00f0ff" opacity="0.8"/>
    </g>

    <!-- Right -->
    <g>
      <circle cx="500" cy="200" r="12" fill="#0a0a0f" stroke="#9d00ff" stroke-width="1"/>
      <circle cx="500" cy="200" r="5" fill="#9d00ff" opacity="0.8"/>
    </g>
  </g>

  <!-- Tiny Data Particles -->
  <g fill="#00f0ff" opacity="0.5">
    <circle cx="200" cy="150" r="1"/>
    <circle cx="250" cy="125" r="1.5"/>
    <circle cx="350" cy="125" r="1"/>
    <circle cx="400" cy="150" r="1.5"/>
    <circle cx="200" cy="250" r="1.5"/>
    <circle cx="250" cy="275" r="1"/>
    <circle cx="350" cy="275" r="1.5"/>
    <circle cx="400" cy="250" r="1"/>
  </g>

  <!-- Orbiting Elements -->
  <g>
    <circle r="3" fill="#9d00ff" opacity="0.8">
      <animateMotion dur="6s" repeatCount="indefinite">
        <mpath href="#orbit1"/>
      </animateMotion>
    </circle>
  </g>
  <path id="orbit1" d="M 300 200 m -60, 0 a 60,60 0 1,0 120,0 a 60,60 0 1,0 -120,0" fill="none" stroke="none"/>

  <!-- Binary Code Background -->
  <g font-family="monospace" font-size="8" fill="#00f0ff" opacity="0.1">
    <text x="50" y="50">01001</text>
    <text x="530" y="50">11010</text>
    <text x="50" y="370">10110</text>
    <text x="530" y="370">01101</text>
    <text x="280" y="30">11001</text>
    <text x="280" y="380">00111</text>
  </g>

  <!-- Pulse Rings -->
  <circle cx="300" cy="200" r="60" stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0">
    <animate attributeName="r" values="60;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
