<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0f"/>

  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- Central Holographic Circle -->
  <g transform="translate(400, 250)">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="180" stroke="url(#cyanGradient)" stroke-width="2" opacity="0.3">
      <animate attributeName="r" values="180;185;180" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Middle Ring -->
    <circle cx="0" cy="0" r="140" stroke="url(#purpleGradient)" stroke-width="2" opacity="0.4">
      <animate attributeName="r" values="140;145;140" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Inner Ring -->
    <circle cx="0" cy="0" r="100" stroke="#00f0ff" stroke-width="2" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Core -->
    <circle cx="0" cy="0" r="60" fill="url(#cyanGradient)" opacity="0.2">
      <animate attributeName="r" values="60;65;60" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Circuit Lines -->
    <g stroke="#00f0ff" stroke-width="1.5" opacity="0.6">
      <path d="M-80 -40 L-40 -40 L-40 -80">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M80 -40 L40 -40 L40 -80">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
      </path>
      <path d="M-80 40 L-40 40 L-40 80">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
      </path>
      <path d="M80 40 L40 40 L40 80">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Center Node -->
    <circle cx="0" cy="0" r="20" fill="#00f0ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating Particles -->
  <g fill="#00f0ff" opacity="0.6">
    <circle cx="150" cy="150" r="3">
      <animate attributeName="cy" values="150;130;150" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="150" r="4">
      <animate attributeName="cy" values="150;170;150" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="450" r="2">
      <animate attributeName="cy" values="450;430;450" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="450" r="3">
      <animate attributeName="cy" values="450;470;450" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="350" r="2.5">
      <animate attributeName="cy" values="350;330;350" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="350" r="3.5">
      <animate attributeName="cy" values="350;370;350" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner Decorations -->
  <g stroke="url(#purpleGradient)" stroke-width="2" fill="none" opacity="0.5">
    <!-- Top Left -->
    <path d="M50 100 L50 50 L100 50">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Top Right -->
    <path d="M750 100 L750 50 L700 50">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <!-- Bottom Left -->
    <path d="M50 500 L50 550 L100 550">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" begin="1s" repeatCount="indefinite"/>
    </path>
    <!-- Bottom Right -->
    <path d="M750 500 L750 550 L700 550">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- "COMING SOON" Text -->
  <g transform="translate(400, 520)" text-anchor="middle">
    <text x="0" y="0" fill="url(#cyanGradient)" font-family="Orbitron, sans-serif" font-size="48" font-weight="bold" letter-spacing="8">
      COMING SOON
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="0" y="35" fill="#9d00ff" font-family="Inter, sans-serif" font-size="18" opacity="0.8">
      Preparing something extraordinary...
    </text>
  </g>

  <!-- Scanlines Effect -->
  <rect width="800" height="600" fill="url(#grid)" opacity="0.03"/>
</svg>