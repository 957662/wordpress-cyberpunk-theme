<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#9d00ff;stop-opacity:0.8" />
    </linearGradient>
    <filter id="serverGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Server Rack Frame -->
  <rect x="50" y="30" width="300" height="240" rx="5"
        stroke="url(#serverGradient)"
        strokeWidth="2"
        fill="#0a0a0f"
        filter="url(#serverGlow)"/>

  <!-- Server Unit 1 -->
  <g transform="translate(60, 45)">
    <rect width="280" height="50" rx="3"
          stroke="#00f0ff"
          strokeWidth="1"
          fill="#0a0a0f"
          opacity="0.8"/>
    <circle cx="20" cy="25" r="6" fill="#00f0ff" opacity="0.8" filter="url(#serverGlow)"/>
    <circle cx="40" cy="25" r="6" fill="#9d00ff" opacity="0.6"/>
    <circle cx="60" cy="25" r="6" fill="#00f0ff" opacity="0.6"/>
    <rect x="80" y="20" width="180" height="10" rx="2" fill="#00f0ff" opacity="0.3"/>
    <text x="85" y="28" fill="#00f0ff" font-family="monospace" font-size="8" opacity="0.8">SERVER_01_ACTIVE</text>
  </g>

  <!-- Server Unit 2 -->
  <g transform="translate(60, 105)">
    <rect width="280" height="50" rx="3"
          stroke="#9d00ff"
          strokeWidth="1"
          fill="#0a0a0f"
          opacity="0.8"/>
    <circle cx="20" cy="25" r="6" fill="#00f0ff" opacity="0.6"/>
    <circle cx="40" cy="25" r="6" fill="#9d00ff" opacity="0.8" filter="url(#serverGlow)"/>
    <circle cx="60" cy="25" r="6" fill="#ff0080" opacity="0.6"/>
    <rect x="80" y="20" width="180" height="10" rx="2" fill="#9d00ff" opacity="0.3"/>
    <text x="85" y="28" fill="#9d00ff" font-family="monospace" font-size="8" opacity="0.8">SERVER_02_STANDBY</text>
  </g>

  <!-- Server Unit 3 -->
  <g transform="translate(60, 165)">
    <rect width="280" height="50" rx="3"
          stroke="#ff0080"
          strokeWidth="1"
          fill="#0a0a0f"
          opacity="0.8"/>
    <circle cx="20" cy="25" r="6" fill="#ff0080" opacity="0.8" filter="url(#serverGlow)"/>
    <circle cx="40" cy="25" r="6" fill="#00f0ff" opacity="0.6"/>
    <circle cx="60" cy="25" r="6" fill="#9d00ff" opacity="0.6"/>
    <rect x="80" y="20" width="180" height="10" rx="2" fill="#ff0080" opacity="0.3"/>
    <text x="85" y="28" fill="#ff0080" font-family="monospace" font-size="8" opacity="0.8">SERVER_03_PROCESSING</text>
  </g>

  <!-- Server Unit 4 - Bottom -->
  <g transform="translate(60, 225)">
    <rect width="280" height="35" rx="3"
          stroke="#f0ff00"
          strokeWidth="1"
          fill="#0a0a0f"
          opacity="0.8"/>
    <circle cx="20" cy="17.5" r="4" fill="#f0ff00" opacity="0.8" filter="url(#serverGlow)"/>
    <circle cx="35" cy="17.5" r="4" fill="#00f0ff" opacity="0.6"/>
    <circle cx="50" cy="17.5" r="4" fill="#9d00ff" opacity="0.6"/>
    <rect x="65" y="14" width="195" height="7" rx="1" fill="#f0ff00" opacity="0.3"/>
    <text x="70" y="20" fill="#f0ff00" font-family="monospace" font-size="7" opacity="0.8">POWER_DISTRIBUTION_UNIT</text>
  </g>

  <!-- Data streams -->
  <g opacity="0.4">
    <rect x="330" y="55" width="10" height="2" fill="#00f0ff">
      <animate attributeName="y" values="55;245;55" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="330" y="85" width="10" height="2" fill="#9d00ff">
      <animate attributeName="y" values="85;245;85" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="330" y="115" width="10" height="2" fill="#ff0080">
      <animate attributeName="y" values="115;245;115" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Corner accents -->
  <circle cx="50" cy="30" r="2" fill="#00f0ff" opacity="0.8"/>
  <circle cx="350" cy="30" r="2" fill="#9d00ff" opacity="0.8"/>
  <circle cx="350" cy="270" r="2" fill="#ff0080" opacity="0.8"/>
  <circle cx="50" cy="270" r="2" fill="#f0ff00" opacity="0.8"/>
</svg>