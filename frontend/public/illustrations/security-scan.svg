<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="secGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#00ff88;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.2" />
    </linearGradient>
    <filter id="secGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Scanning Area -->
  <rect x="80" y="80" width="240" height="240" fill="rgba(0,255,136,0.03)"
        stroke="url(#secGrad)" stroke-width="2" rx="10" filter="url(#secGlow)" />

  <!-- Scanner Grid -->
  <g stroke="url(#secGrad)" stroke-width="0.5" opacity="0.3">
    <line x1="80" y1="140" x2="320" y2="140" />
    <line x1="80" y1="200" x2="320" y2="200" />
    <line x1="80" y1="260" x2="320" y2="260" />
    <line x1="140" y1="80" x2="140" y2="320" />
    <line x1="200" y1="80" x2="200" y2="320" />
    <line x1="260" y1="80" x2="260" y2="320" />
  </g>

  <!-- Scan Line -->
  <rect x="80" y="195" width="240" height="10" fill="url(#scanGrad)" filter="url(#secGlow)" />

  <!-- Central Shield -->
  <g filter="url(#secGlow)">
    <path d="M200 130 L250 150 V190 C250 220 200 250 200 250 C200 250 150 220 150 190 V150 Z"
          fill="rgba(0,255,136,0.1)" stroke="url(#secGrad)" stroke-width="2.5" />
    <circle cx="200" cy="190" r="20" fill="none" stroke="url(#secGrad)" stroke-width="2" />
    <path d="M190 190 L198 198 L210 182" stroke="url(#secGrad)" stroke-width="3" fill="none" />
  </g>

  <!-- Corner Brackets -->
  <g stroke="url(#secGrad)" stroke-width="2" fill="none">
    <path d="M70 90 L70 70 L90 70" />
    <path d="M330 90 L330 70 L310 70" />
    <path d="M70 310 L70 330 L90 330" />
    <path d="M330 310 L330 330 L310 330" />
  </g>

  <!-- Status Indicators -->
  <g fill="#00ff88" filter="url(#secGlow)">
    <circle cx="100" cy="350" r="5" />
    <circle cx="200" cy="350" r="5" />
    <circle cx="300" cy="350" r="5" />
  </g>

  <!-- Status Text -->
  <g fill="#00ff88" font-family="monospace" font-size="12" opacity="0.8">
    <text x="100" y="375" text-anchor="middle">SECURE</text>
    <text x="200" y="375" text-anchor="middle">SCANNING</text>
    <text x="300" y="375" text-anchor="middle">ACTIVE</text>
  </g>

  <!-- Top Display -->
  <rect x="150" y="40" width="100" height="25" fill="rgba(0,255,136,0.1)"
        stroke="url(#secGrad)" stroke-width="1" rx="3" />
  <text x="200" y="57" fill="#00ff88" font-family="monospace" font-size="12"
        text-anchor="middle" font-weight="bold">SYSTEM OK</text>
</svg>
