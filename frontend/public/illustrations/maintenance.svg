<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="maintGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
    <filter id="maintGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#0a0a0f" rx="12"/>

  <!-- Gear Icon -->
  <g transform="translate(150, 80)" filter="url(#maintGlow)">
    <!-- Outer Gear -->
    <circle cx="50" cy="50" r="40" fill="none" stroke="url(#maintGradient)" stroke-width="4"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="url(#maintGradient)" stroke-width="2"/>

    <!-- Gear Teeth -->
    <g stroke="url(#maintGradient)" stroke-width="3">
      <line x1="50" y1="5" x2="50" y2="15"/>
      <line x1="50" y1="85" x2="50" y2="95"/>
      <line x1="5" y1="50" x2="15" y2="50"/>
      <line x1="85" y1="50" x2="95" y2="50"/>
      <line x1="18" y1="18" x2="25" y2="25"/>
      <line x1="75" y1="75" x2="82" y2="82"/>
      <line x1="18" y1="82" x2="25" y2="75"/>
      <line x1="75" y1="25" x2="82" y2="18"/>
    </g>

    <!-- Center Circle -->
    <circle cx="50" cy="50" r="15" fill="url(#maintGradient)" opacity="0.3"/>

    <!-- Animation -->
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- Wrench -->
  <g transform="translate(230, 130) rotate(-30)" filter="url(#maintGlow)">
    <path d="M 10 0 L 20 0 L 25 20 L 20 60 L 10 60 L 5 20 Z" fill="none" stroke="url(#maintGradient)" stroke-width="2"/>
    <circle cx="15" cy="10" r="8" fill="none" stroke="url(#maintGradient)" stroke-width="2"/>
  </g>

  <!-- Progress Bar -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="300" height="8" rx="4" fill="#1a1a2e"/>
    <rect x="0" y="0" width="180" height="8" rx="4" fill="url(#maintGradient)">
      <animate attributeName="width" values="0;180;0" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Text -->
  <text x="200" y="240" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#f0ff00" text-anchor="middle">
    Under Maintenance
  </text>
  <text x="200" y="265" font-family="Arial, sans-serif" font-size="12" fill="#a0a0b0" text-anchor="middle">
    We'll be back online soon
  </text>

  <!-- Status Indicator -->
  <g transform="translate(180, 50)">
    <circle cx="0" cy="0" r="5" fill="#f0ff00">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="15" y="4" font-family="Arial, sans-serif" font-size="12" fill="#f0ff00">
      System Update
    </text>
  </g>
</svg>
