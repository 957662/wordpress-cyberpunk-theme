<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <filter id="screenGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal window -->
  <rect x="50" y="30" width="300" height="240" rx="8"
        stroke="#00f0ff"
        strokeWidth="2"
        fill="url(#screenGradient)"
        filter="url(#screenGlow)"/>

  <!-- Window controls -->
  <g transform="translate(65, 45)">
    <circle cx="0" cy="0" r="6" fill="#ff0080" opacity="0.8"/>
    <circle cx="20" cy="0" r="6" fill="#f0ff00" opacity="0.8"/>
    <circle cx="40" cy="0" r="6" fill="#00ff88" opacity="0.8"/>
  </g>

  <!-- Title bar -->
  <text x="200" y="50" fill="#00f0ff" font-family="monospace" font-size="12" text-anchor="middle" opacity="0.8">
    cyberpress_terminal
  </text>

  <!-- Code content -->
  <g transform="translate(70, 80)" font-family="monospace" font-size="11">
    <!-- Line 1 -->
    <text x="0" y="0" fill="#9d00ff" opacity="0.8">import</text>
    <text x="40" y="0" fill="#e0e0e0" opacity="0.9"> { CyberPress } </text>
    <text x="125" y="0" fill="#9d00ff" opacity="0.8">from</text>
    <text x="155" y="0" fill="#00f0ff" opacity="0.8"> '@cyberpress/core'</text>

    <!-- Line 2 -->
    <text x="0" y="20" fill="#9d00ff" opacity="0.8">const</text>
    <text x="35" y="20" fill="#ff0080" opacity="0.9"> app </text>
    <text x="60" y="20" fill="#e0e0e0" opacity="0.9"> = </text>
    <text x="75" y="20" fill="#9d00ff" opacity="0.8">new</text>
    <text x="100" y="20" fill="#f0ff00" opacity="0.9"> CyberPress</text>
    <text x="180" y="20" fill="#e0e0e0" opacity="0.9">()</text>

    <!-- Line 3 -->
    <text x="0" y="45" fill="#e0e0e0" opacity="0.9">app.</text>
    <text x="25" y="45" fill="#00f0ff" opacity="0.9">init</text>
    <text x="50" y="45" fill="#e0e0e0" opacity="0.9">({</text>

    <!-- Line 4 -->
    <text x="15" y="65" fill="#ff0080" opacity="0.9">theme</text>
    <text x="50" y="65" fill="#e0e0e0" opacity="0.9">: </text>
    <text x="65" y="65" fill="#00f0ff" opacity="0.9">'cyberpunk'</text>
    <text x="135" y="65" fill="#e0e0e0" opacity="0.9">,</text>

    <!-- Line 5 -->
    <text x="15" y="85" fill="#ff0080" opacity="0.9">mode</text>
    <text x="45" y="85" fill="#e0e0e0" opacity="0.9">: </text>
    <text x="60" y="85" fill="#00f0ff" opacity="0.9">'neon'</text>
    <text x="100" y="85" fill="#e0e0e0" opacity="0.9">,</text>

    <!-- Line 6 -->
    <text x="15" y="105" fill="#ff0080" opacity="0.9">glow</text>
    <text x="40" y="105" fill="#e0e0e0" opacity="0.9">: </text>
    <text x="55" y="105" fill="#9d00ff" opacity="0.9">true</text>

    <!-- Line 7 -->
    <text x="0" y="125" fill="#e0e0e0" opacity="0.9">})</text>

    <!-- Line 8 - Empty -->

    <!-- Line 9 - Prompt -->
    <text x="0" y="155" fill="#00ff88" opacity="0.9">❯</text>
    <text x="15" y="155" fill="#00ff88" opacity="0.9"> _</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="85" y="228" width="8" height="14" fill="#00ff88" opacity="0.8">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Scanline effect -->
  <g opacity="0.03">
    <line x1="50" y1="70" x2="350" y2="70" stroke="#00f0ff" stroke-width="1"/>
    <line x1="50" y1="90" x2="350" y2="90" stroke="#00f0ff" stroke-width="1"/>
    <line x1="50" y1="110" x2="350" y2="110" stroke="#00f0ff" stroke-width="1"/>
    <line x1="50" y1="130" x2="350" y2="130" stroke="#00f0ff" stroke-width="1"/>
    <line x1="50" y1="150" x2="350" y2="150" stroke="#00f0ff" stroke-width="1"/>
    <line x1="50" y1="170" x2="350" y2="170" stroke="#00f0ff" stroke-width="1"/>
    <line x1="50" y1="190" x2="350" y2="190" stroke="#00f0ff" stroke-width="1"/>
    <line x1="50" y1="210" x2="350" y2="210" stroke="#00f0ff" stroke-width="1"/>
    <line x1="50" y1="230" x2="350" y2="230" stroke="#00f0ff" stroke-width="1"/>
    <line x1="50" y1="250" x2="350" y2="250" stroke="#00f0ff" stroke-width="1"/>
  </g>

  <!-- Corner accents -->
  <circle cx="50" cy="30" r="2" fill="#00f0ff" opacity="0.8"/>
  <circle cx="350" cy="30" r="2" fill="#9d00ff" opacity="0.8"/>
  <circle cx="350" cy="270" r="2" fill="#ff0080" opacity="0.8"/>
  <circle cx="50" cy="270" r="2" fill="#f0ff00" opacity="0.8"/>
</svg>