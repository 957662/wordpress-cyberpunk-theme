<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 霓虹青发光 -->
    <filter id="cyanGlow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 电压黄发光 -->
    <filter id="yellowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 赛博紫发光 -->
    <filter id="purpleGlow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 脑部轮廓 -->
  <g filter="url(#cyanGlow2)">
    <!-- 外部轮廓 -->
    <ellipse cx="200" cy="150" rx="120" ry="100"
             stroke="#00f0ff" stroke-width="2" fill="none" opacity="0.8"/>

    <!-- 大脑半球分割线 -->
    <path d="M200 50 Q200 150 200 250" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- 左半球纹理 -->
    <path d="M140 100 Q170 120 150 140" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M120 130 Q150 150 130 170" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M110 160 Q140 180 120 200" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.4"/>

    <!-- 右半球纹理 -->
    <path d="M260 100 Q230 120 250 140" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M280 130 Q250 150 270 170" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M290 160 Q260 180 280 200" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- 神经节点 -->
  <g filter="url(#yellowGlow)">
    <!-- 主要节点 -->
    <circle cx="160" cy="100" r="6" fill="#f0ff00" opacity="0.9">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="100" r="6" fill="#f0ff00" opacity="0.9">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="130" r="8" fill="#f0ff00" opacity="1">
      <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="160" r="5" fill="#f0ff00" opacity="0.8">
      <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="240" cy="160" r="5" fill="#f0ff00" opacity="0.8">
      <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="180" cy="190" r="4" fill="#f0ff00" opacity="0.7"/>
    <circle cx="220" cy="190" r="4" fill="#f0ff00" opacity="0.7"/>
  </g>

  <!-- 神经连接线 -->
  <g stroke="#9d00ff" stroke-width="1" fill="none" opacity="0.6" filter="url(#purpleGlow2)">
    <!-- 上部连接 -->
    <path d="M160 100 L200 130 L240 100">
      <animate attributeName="stroke-dasharray" values="0,100;50,100;0,100" dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- 中部连接 -->
    <path d="M160 100 L160 160 L200 130">
      <animate attributeName="stroke-dasharray" values="0,100;50,100;0,100" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <path d="M240 100 L240 160 L200 130">
      <animate attributeName="stroke-dasharray" values="0,100;50,100;0,100" dur="3s" repeatCount="indefinite" begin="1s"/>
    </path>
    <!-- 下部连接 -->
    <path d="M160 160 L180 190 L200 130 L220 190 L240 160">
      <animate attributeName="stroke-dasharray" values="0,150;75,150;0,150" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </path>
  </g>

  <!-- 数据脉冲 -->
  <g fill="#00f0ff">
    <circle cx="0" cy="0" r="3" opacity="0">
      <animateMotion dur="2s" repeatCount="indefinite" path="M160 100 L200 130"/>
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="3" opacity="0">
      <animateMotion dur="2s" repeatCount="indefinite" begin="0.5s" path="M240 100 L200 130"/>
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 外部数据流 -->
  <g stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.4">
    <!-- 左侧输入 -->
    <path d="M30 100 L80 100 L160 100">
      <animate attributeName="stroke-dasharray" values="0,150;75,150;0,150" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- 右侧输出 -->
    <path d="M240 100 L320 100 L370 100">
      <animate attributeName="stroke-dasharray" values="0,150;75,150;0,150" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <!-- 上方输入 -->
    <path d="M200 10 L200 50 L200 100">
      <animate attributeName="stroke-dasharray" values="0,100;50,100;0,100" dur="2s" repeatCount="indefinite" begin="1s"/>
    </path>
  </g>

  <!-- 背景网格装饰 -->
  <g stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.1">
    <line x1="200" y1="20" x2="200" y2="280"/>
    <line x1="80" y1="150" x2="320" y2="150"/>
    <circle cx="200" cy="150" r="50" opacity="0.3"/>
    <circle cx="200" cy="150" r="80" opacity="0.2"/>
  </g>
</svg>
