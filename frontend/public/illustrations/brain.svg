<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="brainGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Brain outline -->
  <ellipse cx="100" cy="100" rx="60" ry="70" stroke="#00f0ff" stroke-width="2" fill="rgba(0,240,255,0.05)" filter="url(#brainGlow)"/>

  <!-- Neural network lines -->
  <path d="M60 80 L80 70 L100 85 L120 70 L140 80" stroke="#00f0ff" stroke-width="1" opacity="0.5" filter="url(#brainGlow)"/>
  <path d="M70 100 L85 110 L100 100 L115 110 L130 100" stroke="#9d00ff" stroke-width="1" opacity="0.5" filter="url(#brainGlow)"/>
  <path d="M65 120 L85 130 L100 115 L115 130 L135 120" stroke="#ff0080" stroke-width="1" opacity="0.5" filter="url(#brainGlow)"/>

  <!-- Neural nodes -->
  <circle cx="80" cy="70" r="4" fill="#00f0ff" filter="url(#brainGlow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="85" r="4" fill="#00f0ff" filter="url(#brainGlow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="70" r="4" fill="#00f0ff" filter="url(#brainGlow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.1s" repeatCount="indefinite"/>
  </circle>

  <circle cx="85" cy="110" r="4" fill="#9d00ff" filter="url(#brainGlow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.7s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="100" cy="100" r="4" fill="#9d00ff" filter="url(#brainGlow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="115" cy="110" r="4" fill="#9d00ff" filter="url(#brainGlow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <circle cx="85" cy="130" r="4" fill="#ff0080" filter="url(#brainGlow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.9s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="100" cy="115" r="4" fill="#ff0080" filter="url(#brainGlow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="115" cy="130" r="4" fill="#ff0080" filter="url(#brainGlow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
</svg>
