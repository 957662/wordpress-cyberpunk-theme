<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="globeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0.8" />
    </linearGradient>
    <filter id="globeGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer orbital ring -->
  <ellipse cx="200" cy="150" rx="140" ry="100"
           stroke="url(#globeGradient)"
           strokeWidth="1"
           fill="none"
           opacity="0.4"/>

  <!-- Middle orbital ring -->
  <ellipse cx="200" cy="150" rx="100" ry="70"
           stroke="url(#globeGradient)"
           strokeWidth="1.5"
           fill="none"
           opacity="0.6"/>

  <!-- Inner core -->
  <circle cx="200" cy="150" r="50"
          stroke="url(#globeGradient)"
          strokeWidth="2"
          fill="#0a0a0f"
          opacity="0.3"/>

  <!-- Central node -->
  <circle cx="200" cy="150" r="15"
          fill="url(#globeGradient)"
          opacity="0.6"
          filter="url(#globeGlow)"/>
  <circle cx="200" cy="150" r="8"
          fill="#00f0ff"
          filter="url(#globeGlow)"/>

  <!-- Orbiting satellites -->
  <g>
    <circle cx="340" cy="150" r="4" fill="#00f0ff" filter="url(#globeGlow)">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 200 150"
        to="360 200 150"
        dur="8s"
        repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <circle cx="60" cy="150" r="3" fill="#9d00ff" filter="url(#globeGlow)">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="180 200 150"
        to="540 200 150"
        dur="12s"
        repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <circle cx="200" cy="50" r="3" fill="#ff0080" filter="url(#globeGlow)">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="90 200 150"
        to="450 200 150"
        dur="10s"
        repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Network nodes -->
  <g filter="url(#globeGlow)">
    <circle cx="200" cy="50" r="4" fill="#00f0ff" opacity="0.7"/>
    <circle cx="300" cy="80" r="4" fill="#9d00ff" opacity="0.7"/>
    <circle cx="340" cy="150" r="4" fill="#ff0080" opacity="0.7"/>
    <circle cx="300" cy="220" r="4" fill="#f0ff00" opacity="0.7"/>
    <circle cx="200" cy="250" r="4" fill="#00f0ff" opacity="0.7"/>
    <circle cx="100" cy="220" r="4" fill="#9d00ff" opacity="0.7"/>
    <circle cx="60" cy="150" r="4" fill="#ff0080" opacity="0.7"/>
    <circle cx="100" cy="80" r="4" fill="#f0ff00" opacity="0.7"/>
  </g>

  <!-- Connection lines -->
  <g stroke="url(#globeGradient)" stroke-width="1" opacity="0.3">
    <line x1="200" y1="150" x2="200" y2="50"/>
    <line x1="200" y1="150" x2="300" y2="80"/>
    <line x1="200" y1="150" x2="340" y2="150"/>
    <line x1="200" y1="150" x2="300" y2="220"/>
    <line x1="200" y1="150" x2="200" y2="250"/>
    <line x1="200" y1="150" x2="100" y2="220"/>
    <line x1="200" y1="150" x2="60" y2="150"/>
    <line x1="200" y1="150" x2="100" y2="80"/>
  </g>

  <!-- Data particles -->
  <g opacity="0.5">
    <circle cx="0" cy="0" r="2" fill="#00f0ff">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath href="#particlePath1"/>
      </animateMotion>
    </circle>
    <circle cx="0" cy="0" r="2" fill="#9d00ff">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#particlePath2"/>
      </animateMotion>
    </circle>
  </g>

  <path id="particlePath1" d="M200 50 L300 80 L340 150 L300 220 L200 250" fill="none"/>
  <path id="particlePath2" d="M200 250 L100 220 L60 150 L100 80 L200 50" fill="none"/>

  <!-- Outer ring segments -->
  <g opacity="0.6">
    <path d="M60 150 A140 100 0 0 1 200 50"
          stroke="#00f0ff" stroke-width="2" fill="none"/>
    <path d="M200 50 A140 100 0 0 1 340 150"
          stroke="#9d00ff" stroke-width="2" fill="none"/>
    <path d="M340 150 A140 100 0 0 1 200 250"
          stroke="#ff0080" stroke-width="2" fill="none"/>
    <path d="M200 250 A140 100 0 0 1 60 150"
          stroke="#f0ff00" stroke-width="2" fill="none"/>
  </g>

  <!-- Corner accents -->
  <circle cx="20" cy="20" r="2" fill="#00f0ff" opacity="0.6"/>
  <circle cx="380" cy="20" r="2" fill="#9d00ff" opacity="0.6"/>
  <circle cx="380" cy="280" r="2" fill="#ff0080" opacity="0.6"/>
  <circle cx="20" cy="280" r="2" fill="#f0ff00" opacity="0.6"/>
</svg>