<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neural-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0" />
    </radialGradient>
    <filter id="glow-effect">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strong-glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a0f"/>

  <!-- Grid Pattern -->
  <g stroke="#00f0ff" stroke-width="0.3" opacity="0.1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Neural Network Connections -->
  <g stroke="url(#neural-gradient)" stroke-width="1" opacity="0.4" filter="url(#glow-effect)">
    <!-- Central connections -->
    <line x1="400" y1="300" x2="200" y2="150">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="600" y2="150">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="200" y2="450">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="600" y2="450">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="100" y2="300">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="300" x2="700" y2="300">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2.6s" repeatCount="indefinite"/>
    </line>

    <!-- Outer connections -->
    <line x1="200" y1="150" x2="100" y2="100" opacity="0.3"/>
    <line x1="200" y1="150" x2="300" y2="80" opacity="0.3"/>
    <line x1="600" y1="150" x2="500" y2="80" opacity="0.3"/>
    <line x1="600" y1="150" x2="700" y2="100" opacity="0.3"/>
    <line x1="200" y1="450" x2="100" y2="500" opacity="0.3"/>
    <line x1="200" y1="450" x2="300" y2="520" opacity="0.3"/>
    <line x1="600" y1="450" x2="500" y2="520" opacity="0.3"/>
    <line x1="600" y1="450" x2="700" y2="500" opacity="0.3"/>

    <!-- Cross connections -->
    <line x1="200" y1="150" x2="600" y2="450" opacity="0.2"/>
    <line x1="600" y1="150" x2="200" y2="450" opacity="0.2"/>
    <line x1="100" y1="300" x2="700" y2="300" opacity="0.15"/>
  </g>

  <!-- Data Flow Particles -->
  <g fill="#00f0ff" filter="url(#strong-glow)">
    <circle r="3">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#path1"/>
      </animateMotion>
    </circle>
    <circle r="2.5" fill="#9d00ff">
      <animateMotion dur="5s" repeatCount="indefinite">
        <mpath href="#path2"/>
      </animateMotion>
    </circle>
    <circle r="2" fill="#ff0080">
      <animateMotion dur="3.5s" repeatCount="indefinite">
        <mpath href="#path3"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Hidden paths for animation -->
  <path id="path1" d="M 100 300 L 400 300 L 700 300" fill="none" stroke="none"/>
  <path id="path2" d="M 200 150 L 400 300 L 600 450" fill="none" stroke="none"/>
  <path id="path3" d="M 600 150 L 400 300 L 200 450" fill="none" stroke="none"/>

  <!-- Neural Nodes -->
  <g filter="url(#strong-glow)">
    <!-- Central Node -->
    <circle cx="400" cy="300" r="40" fill="url(#node-glow)" opacity="0.3">
      <animate attributeName="r" values="38;42;38" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="25" fill="#00f0ff" opacity="0.8">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="15" fill="#ffffff" opacity="0.9"/>
    <text x="400" y="305" fill="#0a0a0f" font-size="12" font-weight="bold" text-anchor="middle">AI</text>

    <!-- Inner Ring Nodes -->
    <g>
      <circle cx="200" cy="150" r="20" fill="url(#node-glow)" opacity="0.25"/>
      <circle cx="200" cy="150" r="12" fill="#9d00ff" opacity="0.8"/>
      <circle cx="200" cy="150" r="6" fill="#ffffff"/>
    </g>
    <g>
      <circle cx="600" cy="150" r="20" fill="url(#node-glow)" opacity="0.25"/>
      <circle cx="600" cy="150" r="12" fill="#ff0080" opacity="0.8"/>
      <circle cx="600" cy="150" r="6" fill="#ffffff"/>
    </g>
    <g>
      <circle cx="200" cy="450" r="20" fill="url(#node-glow)" opacity="0.25"/>
      <circle cx="200" cy="450" r="12" fill="#f0ff00" opacity="0.8"/>
      <circle cx="200" cy="450" r="6" fill="#ffffff"/>
    </g>
    <g>
      <circle cx="600" cy="450" r="20" fill="url(#node-glow)" opacity="0.25"/>
      <circle cx="600" cy="450" r="12" fill="#00ff88" opacity="0.8"/>
      <circle cx="600" cy="450" r="6" fill="#ffffff"/>
    </g>

    <!-- Outer Ring Nodes -->
    <g opacity="0.7">
      <circle cx="100" cy="300" r="15" fill="#00f0ff"/>
      <circle cx="700" cy="300" r="15" fill="#9d00ff"/>
      <circle cx="100" cy="100" r="12" fill="#ff0080"/>
      <circle cx="300" cy="80" r="12" fill="#f0ff00"/>
      <circle cx="500" cy="80" r="12" fill="#00ff88"/>
      <circle cx="700" cy="100" r="12" fill="#00f0ff"/>
      <circle cx="100" cy="500" r="12" fill="#9d00ff"/>
      <circle cx="300" cy="520" r="12" fill="#ff0080"/>
      <circle cx="500" cy="520" r="12" fill="#f0ff00"/>
      <circle cx="700" cy="500" r="12" fill="#00ff88"/>
    </g>
  </g>

  <!-- Pulse Rings -->
  <g stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.3">
    <circle cx="400" cy="300" r="50">
      <animate attributeName="r" values="40;80;40" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="60">
      <animate attributeName="r" values="50;90;50" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0;0.25" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Code Snippets -->
  <g font-family="monospace" font-size="10" opacity="0.6">
    <text x="50" y="50" fill="#00f0ff">neural_network.activate()</text>
    <text x="620" y="50" fill="#9d00ff">learning_rate: 0.01</text>
    <text x="50" y="570" fill="#ff0080">epoch: 1000</text>
    <text x="620" y="570" fill="#f0ff00">accuracy: 98.5%</text>
  </g>

  <!-- Binary Rain Effect -->
  <g font-family="monospace" font-size="8" fill="#00f0ff" opacity="0.15">
    <text x="80" y="200">1 0 1 1 0</text>
    <text x="720" y="250">0 1 0 1 1</text>
    <text x="150" y="380">1 0 0 1 0</text>
    <text x="650" y="380">0 1 1 0 1</text>
  </g>
</svg>
