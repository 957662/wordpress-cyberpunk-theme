<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="neonCyanFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a0aa;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="cyberPurpleFav" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6600aa;stop-opacity:1" />
    </linearGradient>

    <filter id="glowFav" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 外部六边形 -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18"
           fill="none" stroke="url(#cyberPurpleFav)" stroke-width="1.5"
           filter="url(#glowFav)"/>

  <!-- 内部六边形 -->
  <polygon points="32,14 48,23 48,41 32,50 16,41 16,23"
           fill="rgba(0,240,255,0.15)" stroke="url(#neonCyanFav)"
           stroke-width="1.5" filter="url(#glowFav)"/>

  <!-- 中心 C -->
  <text x="32" y="42" font-family="Arial, sans-serif" font-size="24"
        font-weight="bold" fill="url(#neonCyanFav)" text-anchor="middle"
        filter="url(#glowFav)">C</text>
</svg>