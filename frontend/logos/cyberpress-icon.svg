<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 霓虹青渐变 -->
    <linearGradient id="iconCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a0aa;stop-opacity:1" />
    </linearGradient>

    <!-- 赛博紫渐变 -->
    <linearGradient id="iconPurple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6600aa;stop-opacity:1" />
    </linearGradient>

    <!-- 激光粉渐变 -->
    <linearGradient id="iconPink" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa0055;stop-opacity:1" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 强发光效果 -->
    <filter id="iconStrongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景六边形 -->
  <polygon
    points="100,15 170,50 170,130 100,165 30,130 30,50"
    fill="none"
    stroke="url(#iconPurple)"
    stroke-width="2"
    filter="url(#iconGlow)"
    opacity="0.8"
  />

  <!-- 内部六边形 -->
  <polygon
    points="100,35 150,60 150,120 100,145 50,120 50,60"
    fill="rgba(0,240,255,0.08)"
    stroke="url(#iconCyan)"
    stroke-width="2"
    filter="url(#iconGlow)"
  />

  <!-- 核心六边形 -->
  <polygon
    points="100,50 135,70 135,110 100,130 65,110 65,70"
    fill="rgba(157,0,255,0.1)"
    stroke="url(#iconPurple)"
    stroke-width="1.5"
    filter="url(#iconGlow)"
  />

  <!-- 中心 C 字母 -->
  <text
    x="100"
    y="98"
    font-family="Arial, sans-serif"
    font-size="50"
    font-weight="bold"
    fill="url(#iconCyan)"
    text-anchor="middle"
    filter="url(#iconStrongGlow)"
  >C</text>

  <!-- 底部 CYBERPRESS -->
  <text
    x="100"
    y="118"
    font-family="Courier New, monospace"
    font-size="10"
    fill="url(#iconCyan)"
    text-anchor="middle"
    filter="url(#iconGlow)"
    letter-spacing="1.5"
  >CYBERPRESS</text>

  <!-- 装饰性电路线条 -->
  <g filter="url(#iconGlow)" opacity="0.6">
    <path d="M30,50 L15,35" stroke="url(#iconCyan)" stroke-width="1.5" />
    <path d="M170,50 L185,35" stroke="url(#iconCyan)" stroke-width="1.5" />
    <path d="M30,130 L15,145" stroke="url(#iconPurple)" stroke-width="1.5" />
    <path d="M170,130 L185,145" stroke="url(#iconPurple)" stroke-width="1.5" />
  </g>

  <!-- 装饰点 -->
  <g filter="url(#iconStrongGlow)">
    <circle cx="15" cy="35" r="3" fill="#00f0ff" />
    <circle cx="185" cy="35" r="3" fill="#00f0ff" />
    <circle cx="15" cy="145" r="3" fill="#9d00ff" />
    <circle cx="185" cy="145" r="3" fill="#9d00ff" />
  </g>

  <!-- 内部装饰点 -->
  <g opacity="0.5">
    <circle cx="50" cy="60" r="1.5" fill="#00f0ff" />
    <circle cx="150" cy="60" r="1.5" fill="#00f0ff" />
    <circle cx="50" cy="120" r="1.5" fill="#9d00ff" />
    <circle cx="150" cy="120" r="1.5" fill="#9d00ff" />
  </g>

  <!-- 科技纹理 -->
  <g opacity="0.3">
    <rect x="98" y="17" width="4" height="1" fill="#00f0ff" />
    <rect x="98" y="182" width="4" height="1" fill="#9d00ff" />
  </g>
</svg>
