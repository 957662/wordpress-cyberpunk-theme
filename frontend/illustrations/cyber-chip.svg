<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- 霓虹渐变 -->
    <linearGradient id="chipCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080aa;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="chipPurple" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9d00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6600aa;stop-opacity:1" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="chipGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 数据流动画 -->
    <style>
      .chip-pulse {
        animation: chipPulse 2s ease-in-out infinite;
      }
      @keyframes chipPulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .data-flow {
        animation: dataFlow 3s linear infinite;
      }
      @keyframes dataFlow {
        0% { stroke-dashoffset: 100; }
        100% { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- 背景 -->
  <rect
    x="50"
    y="50"
    width="300"
    height="300"
    rx="20"
    fill="rgba(0,240,255,0.02)"
    stroke="url(#chipCyan)"
    stroke-width="2"
    filter="url(#chipGlow)"
  />

  <!-- 主芯片体 -->
  <rect
    x="120"
    y="120"
    width="160"
    height="160"
    rx="10"
    fill="rgba(157,0,255,0.1)"
    stroke="url(#chipPurple)"
    stroke-width="2"
    filter="url(#chipGlow)"
  />

  <!-- 内部芯片细节 -->
  <rect
    x="140"
    y="140"
    width="120"
    height="120"
    rx="5"
    fill="none"
    stroke="url(#chipCyan)"
    stroke-width="1"
    opacity="0.5"
  />

  <!-- 核心处理器 -->
  <rect
    x="170"
    y="170"
    width="60"
    height="60"
    rx="3"
    fill="rgba(0,240,255,0.2)"
    stroke="url(#chipCyan)"
    stroke-width="2"
    filter="url(#chipGlow)"
  />

  <!-- 芯片引脚 -->
  <g stroke="url(#chipCyan)" stroke-width="2" filter="url(#chipGlow)">
    <!-- 上方引脚 -->
    <line x1="150" y1="120" x2="150" y2="80" class="chip-pulse" />
    <line x1="175" y1="120" x2="175" y2="80" class="chip-pulse" style="animation-delay: 0.2s" />
    <line x1="200" y1="120" x2="200" y2="80" class="chip-pulse" style="animation-delay: 0.4s" />
    <line x1="225" y1="120" x2="225" y2="80" class="chip-pulse" style="animation-delay: 0.6s" />
    <line x1="250" y1="120" x2="250" y2="80" class="chip-pulse" style="animation-delay: 0.8s" />

    <!-- 下方引脚 -->
    <line x1="150" y1="280" x2="150" y2="320" class="chip-pulse" style="animation-delay: 0.3s" />
    <line x1="175" y1="280" x2="175" y2="320" class="chip-pulse" style="animation-delay: 0.5s" />
    <line x1="200" y1="280" x2="200" y2="320" class="chip-pulse" style="animation-delay: 0.7s" />
    <line x1="225" y1="280" x2="225" y2="320" class="chip-pulse" style="animation-delay: 0.9s" />
    <line x1="250" y1="280" x2="250" y2="320" class="chip-pulse" style="animation-delay: 1.1s" />

    <!-- 左侧引脚 -->
    <line x1="120" y1="150" x2="80" y2="150" class="chip-pulse" style="animation-delay: 0.15s" />
    <line x1="120" y1="175" x2="80" y2="175" class="chip-pulse" style="animation-delay: 0.35s" />
    <line x1="120" y1="200" x2="80" y2="200" class="chip-pulse" style="animation-delay: 0.55s" />
    <line x1="120" y1="225" x2="80" y2="225" class="chip-pulse" style="animation-delay: 0.75s" />
    <line x1="120" y1="250" x2="80" y2="250" class="chip-pulse" style="animation-delay: 0.95s" />

    <!-- 右侧引脚 -->
    <line x1="280" y1="150" x2="320" y2="150" class="chip-pulse" style="animation-delay: 0.25s" />
    <line x1="280" y1="175" x2="320" y2="175" class="chip-pulse" style="animation-delay: 0.45s" />
    <line x1="280" y1="200" x2="320" y2="200" class="chip-pulse" style="animation-delay: 0.65s" />
    <line x1="280" y1="225" x2="320" y2="225" class="chip-pulse" style="animation-delay: 0.85s" />
    <line x1="280" y1="250" x2="320" y2="250" class="chip-pulse" style="animation-delay: 1.05s" />
  </g>

  <!-- 芯片电路 -->
  <g stroke="url(#chipPurple)" stroke-width="1" fill="none" opacity="0.4">
    <path d="M170 200 L140 200 L140 230 L170 230" />
    <path d="M230 200 L260 200 L260 230 L230 230" />
    <path d="M200 170 L200 140" />
    <path d="M200 230 L200 260" />
  </g>

  <!-- 数据流节点 -->
  <g filter="url(#chipGlow)">
    <circle cx="200" cy="200" r="5" fill="#00f0ff" class="chip-pulse" />
    <circle cx="150" cy="80" r="2" fill="#9d00ff" class="chip-pulse" />
    <circle cx="250" cy="80" r="2" fill="#9d00ff" class="chip-pulse" style="animation-delay: 0.3s" />
    <circle cx="150" cy="320" r="2" fill="#00f0ff" class="chip-pulse" style="animation-delay: 0.6s" />
    <circle cx="250" cy="320" r="2" fill="#00f0ff" class="chip-pulse" style="animation-delay: 0.9s" />
    <circle cx="80" cy="200" r="2" fill="#9d00ff" class="chip-pulse" style="animation-delay: 1.2s" />
    <circle cx="320" cy="200" r="2" fill="#9d00ff" class="chip-pulse" style="animation-delay: 1.5s" />
  </g>

  <!-- 装饰性数据流动线 -->
  <g stroke="url(#chipCyan)" stroke-width="0.5" stroke-dasharray="5 5" opacity="0.3">
    <path d="M80 150 L80 250" class="data-flow" />
    <path d="M320 150 L320 250" class="data-flow" style="animation-delay: 1s" />
    <path d="M150 80 L250 80" class="data-flow" style="animation-delay: 2s" />
    <path d="M150 320 L250 320" class="data-flow" style="animation-delay: 3s" />
  </g>

  <!-- 装饰角标 -->
  <g stroke="url(#chipCyan)" stroke-width="2" fill="none" filter="url(#chipGlow)">
    <path d="M55 70 L55 55 L70 55" />
    <path d="M330 70 L345 70 L345 55" />
    <path d="M55 330 L55 345 L70 345" />
    <path d="M330 330 L345 330 L345 345" />
  </g>
</svg>
