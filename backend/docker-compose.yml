version: '3.8'

services:
  wordpress:
    image: wordpress:6.5-apache
    container_name: cyberpress-wordpress
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: cyberpress
      WORDPRESS_DB_PASSWORD: cyberpress_secure_2024
      WORDPRESS_DB_NAME: cyberpress
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_SITEURL', 'http://localhost:8080');
        define('WP_HOME', 'http://localhost:8080');
        define('REST_ALLOW_JSON_ENDPOINTS', true);
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content:/var/www/html/wp-content
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: cyberpress-mysql
    restart: always
    environment:
      MYSQL_DATABASE: cyberpress
      MYSQL_USER: cyberpress
      MYSQL_PASSWORD: cyberpress_secure_2024
      MYSQL_ROOT_PASSWORD: root_secure_2024
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: cyberpress-redis
    restart: always
    ports:
      - "6379:6379"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cyberpress-pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_secure_2024

volumes:
  wordpress_data:
  db_data:

networks:
  default:
    name: cyberpress-network
